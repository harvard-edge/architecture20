schema_version: "1.1"
design_loop_card:
  card_id: example-level-3
  conformance_level: 3
  intent:
    objective: Decide whether a 32x8 accelerator array should advance to RTL study.
    constraints:
    - Hold SRAM capacity, workload, and dataflow constant.
    non_goals:
    - Authorize tapeout, integration, or post-layout performance claims.
    risks:
    - Architecture simulation may hide timing and routing effects.
    claim_boundary:
      claim: The 32x8 array has enough workload-level evidence to justify an RTL experiment.
      non_claim: The 32x8 array improves post-layout performance or energy.
  task: dse
  design_space:
    legal:
    - 16x16 and 32x8 arrays.
    invalid:
    - Shapes that exceed 256 processing elements.
    deferred:
    - SRAM banking, clock frequency, and physical design.
  representation:
    state_schema_id: arch2.example.array-state.v1
    ir_level: Layer dimensions and array geometry.
    reads:
    - Workload layer dimensions.
    - Candidate array dimensions.
    writes:
    - Utilization and cycle estimates.
    uncertainties:
    - Simulator results omit physical-design effects.
  environment:
    environment_id: scale-sim-v3.0.0-fixed-os
    actions:
    - Select one legal array shape.
    invalid_actions:
    - Change dataflow or memory capacity.
    blast_radius_limit: Analysis only; no generated RTL is modified.
    observations:
    - Estimated cycles.
    - Processing-element utilization.
    fidelity: simulation
  method_role:
    roles:
    - predict
    - critique
    actor_map:
    - actor_id: loop-analyst
      role: Select candidates and summarize simulator evidence.
      reads:
      - Simulator summaries.
      writes:
      - Candidate recommendation.
      authority: May propose, but cannot authorize, the next experiment.
    - actor_id: design-reviewer
      role: Review claim scope and rejection evidence.
      reads:
      - Simulator summaries.
      - Negative traces.
      writes:
      - Review disposition.
      authority: May reject advancement to RTL study.
  feedback_budget:
    evaluations: 2
    latency: Under one minute per evaluation.
    cost: One local CPU process.
    fidelity: Architecture simulation.
    model_side_cost:
      model_calls: 0
      gpu_hours: 0
      energy_or_carbon: No model inference used.
      human_review: One 15-minute architecture review.
  evidence:
    baseline_id: array-16x16
    records:
    - evidence_id: scale-sim-summary-16x16
      kind: simulator summary
      workload_id: resnet-conv-layer-set-v1
      seed: deterministic
      provenance:
        tool_version: SCALE-Sim 3.0.0
        parameter_hash: sha256:ed7f987becd32da9ff0c108d03c522598d38326af2f8a2648023de22f0582ed1
        source_uri: evidence/scale-sim-summary-16x16.json
    - evidence_id: scale-sim-summary-32x8
      kind: simulator summary
      workload_id: resnet-conv-layer-set-v1
      seed: deterministic
      provenance:
        tool_version: SCALE-Sim 3.0.0
        parameter_hash: sha256:a2723358051c6b69ff19b8df27d9e25c751fe8f071b29c05e357e80b65f33e3b
        source_uri: evidence/scale-sim-summary-32x8.json
  negative_traces:
  - candidate_id: array-32x8
    reason: Utilization regressed on narrow layers.
    stage: architecture simulation
    gate: workload-level utilization comparison
  rejection_authority:
    gates:
    - Independent review of per-layer utilization and cycle evidence.
    independent_of_producer: true
    independence_basis: The design reviewer did not select the candidate or produce the simulator summary.
  commitment_boundary:
    level: experimental
    strongest_supported_claim: Run one bounded RTL experiment for the 32x8 candidate.
    would_overturn: A replay mismatch or a representative workload regression against the baseline.
  human_decision:
    owner: Accelerator architecture lead.
    authorizes: One RTL experiment; no integration or product commitment.
