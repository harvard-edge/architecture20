schema_version: "1.1"
design_loop_card:
  card_id: example-level-1
  conformance_level: 1
  intent:
    objective: Screen two accelerator array shapes with a fast simulator.
    constraints:
    - Hold SRAM capacity and dataflow constant.
    non_goals:
    - Predict post-layout timing or power.
  task: dse
  design_space:
    legal:
    - 16x16 and 32x8 arrays.
    invalid:
    - Shapes that exceed 256 processing elements.
    deferred:
    - Clock-frequency selection.
  representation:
    ir_level: Layer dimensions and array geometry.
    reads:
    - Workload layer dimensions.
    - Candidate array dimensions.
    writes:
    - Utilization and cycle estimates.
    uncertainties:
    - Proxy results omit physical-design effects.
  environment:
    actions:
    - Select one legal array shape.
    invalid_actions:
    - Change dataflow or memory capacity.
    blast_radius_limit: Analysis only; no generated RTL is modified.
    observations:
    - Estimated cycles.
    - Processing-element utilization.
    fidelity: simulation
  method_role:
    roles:
    - predict
    - critique
    actor_map:
    - actor_id: loop-analyst
      role: Select candidates and summarize simulator evidence.
      reads:
      - Workload definitions and candidate parameters.
      writes:
      - Simulator requests and evidence summaries.
      authority: May recommend a higher-fidelity experiment but cannot authorize it.
  feedback_budget:
    evaluations: 2
    latency: Under one minute per evaluation.
    cost: One local CPU process.
    fidelity: Architecture simulation.
  evidence:
    baseline_id: array-16x16
    records:
    - kind: simulator summary
  negative_traces:
  - reason: Utilization regressed on narrow layers.
    stage: architecture simulation
    gate: workload-level utilization comparison
