schema_version: "1.0"
design_loop_card:
  card_id: example-level-0
  conformance_level: 0
  intent:
    objective: Compare two cache-policy ideas before allocating simulation time.
    constraints:
    - Use the existing trace corpus.
    non_goals:
    - Authorize an implementation decision.
    claim_boundary:
      claim: The comparison is scoped well enough to plan a first experiment.
      non_claim: Either policy improves a measured workload.
  task: dse
  design_space:
    legal:
    - Existing replacement policies and one proposed variant.
    invalid:
    - Changes to cache capacity or associativity.
    deferred:
    - Multicore interference.
