schema_version: "2.0"
design_loop_card:
  card_id: illustrative-array-study-v2
  profiles:
    context: complete
    inspectability: complete
    replay: complete
    independent_review: complete
    disclosure: complete
    decision_rights: complete
  profile_gaps: {}
  intent:
    objective: Determine whether a 32x8 accelerator array merits one bounded RTL experiment.
    constraints:
      - Hold SRAM capacity, synthetic workload, and output-stationary dataflow constant.
      - Compare only the 16x16 baseline and the 32x8 candidate.
    non_goals:
      - Claim post-layout performance, energy, timing closure, integration readiness, or product fitness.
    risks:
      - The deterministic estimator omits memory stalls, timing, routing, and physical-design effects.
  task:
    kind: accelerator_array_comparison
    description: Compare two fixed array shapes under one deterministic illustrative estimator.
  design_space:
    legal:
      - A 16x16 baseline and a 32x8 candidate, each with 256 processing elements.
    invalid:
      - Shapes above 256 processing elements or changes to workload, dataflow, or SRAM capacity.
    deferred:
      - SRAM banking, clock frequency, RTL, synthesis, placement, routing, power, and thermal behavior.
  representation:
    state_schema_id: arch2.example.array-state.v2
    abstraction: Synthetic layer dimensions, array geometry, dataflow, and SRAM capacity.
    reads:
      - The versioned synthetic workload and candidate parameters in each replay packet.
    writes:
      - Per-layer and aggregate cycle and processing-element-utilization estimates.
    uncertainties:
      - The representation excludes memory traffic, timing, power, and physical topology.
  environment:
    environment_id: arch2-illustrative-array-estimator-v1.0.0
    actions:
      - Evaluate one of the two declared array shapes.
    invalid_actions:
      - Change the workload, dataflow, SRAM capacity, or estimator equation.
    blast_radius_limit: Analysis-only files under examples/design-loop-cards; no RTL or project source is modified.
    observations:
      - Estimated cycles and processing-element utilization for each layer and in aggregate.
    fidelity: Deterministic illustrative compute estimate, below architecture simulation.
  method_roles:
    - actor_id: illustrative-array-estimator
      actor_type: tool
      roles:
        - predict
      reads:
        - Candidate and workload records.
      writes:
        - Deterministic replay packets.
      limitations:
        - Cannot evaluate memory, timing, energy, area, or physical design.
    - actor_id: example-loop-analyst
      actor_type: person
      roles:
        - critique
        - verify
      reads:
        - Replay packets, claim boundaries, and gate outcomes.
      writes:
        - A constructed recommendation for the teaching example.
      limitations:
        - Cannot authorize work outside the example's bounded RTL experiment.
  feedback_budget:
    evaluations: 2
    latency: Under one minute for both local evaluations.
    compute_or_tool_cost: One local CPU process using the Python standard library.
    human_review: One 15-minute review of the constructed teaching record.
    fidelity: Deterministic illustrative estimator.
    model_calls: 0
    energy_or_carbon: No model inference is used.
  claims:
    - claim_id: claim-array-cycle-estimate
      claim_type: architecture_outcome
      statement: The 32x8 candidate has a lower aggregate cycle estimate than the 16x16 baseline in the declared illustrative study.
      baseline_or_comparator: The 16x16 baseline under the same workload, SRAM capacity, dataflow, and estimator.
      outcome: The estimator reports 3368 cycles for 32x8 and 4032 cycles for 16x16, a 16.5% reduction.
      scope: The three-layer synthetic workload and deterministic pipeline-fill estimator in the bound replay packets.
      non_claims:
        - The 32x8 candidate improves measured silicon, RTL, post-layout, energy, or product outcomes.
        - The result generalizes beyond the declared synthetic workload.
      status: supported
      evidence_refs:
        - illustrative-array-summary-16x16
        - illustrative-array-summary-32x8
  evidence:
    records:
      - evidence_id: illustrative-array-summary-16x16
        producer:
          producer_id: illustrative-array-estimator
          producer_type: tool
        kind: Deterministic estimator replay packet for the 16x16 baseline.
        status: illustrative
        tool:
          name: Architecture 2.0 illustrative array estimator
          version: 1.0.0
        inputs:
          - artifact_id: illustrative-workload-v1
            uri: workloads/illustrative-conv-layer-set-v1.json
            integrity:
              sha256: sha256:b2ab2afd5b67405e65eff72fc27cecd21eaa9d2d97c895ade76edfee1106bda6
          - artifact_id: replay-implementation-v1
            uri: replay.py
            integrity:
              sha256: sha256:808d1e6763a414b214316ffc02849171201ec3c4e551d24ba2017ac52bc4134a
        outputs:
          - artifact_id: packet-16x16
            uri: evidence/illustrative-array-summary-16x16.json
            integrity:
              sha256: sha256:718f7ff0a02b4a20ff60b67fc24933ce35f48e4a135eba0266d343890d4ba72f
        scope: The fixed 16x16 baseline and declared synthetic workload.
        uncertainty: This is a deterministic estimate, not a measurement.
        limitations:
          - Omits memory stalls, timing, energy, area, and physical design.
          - Uses a synthetic workload rather than a published benchmark.
        integrity:
          sha256: sha256:718f7ff0a02b4a20ff60b67fc24933ce35f48e4a135eba0266d343890d4ba72f
      - evidence_id: illustrative-array-summary-32x8
        producer:
          producer_id: illustrative-array-estimator
          producer_type: tool
        kind: Deterministic estimator replay packet for the 32x8 candidate.
        status: illustrative
        tool:
          name: Architecture 2.0 illustrative array estimator
          version: 1.0.0
        inputs:
          - artifact_id: illustrative-workload-v1
            uri: workloads/illustrative-conv-layer-set-v1.json
            integrity:
              sha256: sha256:b2ab2afd5b67405e65eff72fc27cecd21eaa9d2d97c895ade76edfee1106bda6
          - artifact_id: replay-implementation-v1
            uri: replay.py
            integrity:
              sha256: sha256:808d1e6763a414b214316ffc02849171201ec3c4e551d24ba2017ac52bc4134a
        outputs:
          - artifact_id: packet-32x8
            uri: evidence/illustrative-array-summary-32x8.json
            integrity:
              sha256: sha256:2291e0b449982ebf232f53d3d1a04a938f8926d681e2b46a8903503e3b688014
        scope: The fixed 32x8 candidate and declared synthetic workload.
        uncertainty: This is a deterministic estimate, not a measurement.
        limitations:
          - Omits memory stalls, timing, energy, area, and physical design.
          - Uses a synthetic workload rather than a published benchmark.
        integrity:
          sha256: sha256:2291e0b449982ebf232f53d3d1a04a938f8926d681e2b46a8903503e3b688014
  failed_or_rejected:
    - record_id: reject-16x16-on-declared-objective
      kind: rejected_alternative
      candidate_id: array-16x16
      stage: Constructed example recommendation.
      reason: The baseline has the higher aggregate cycle estimate under the only declared comparison objective.
      gate_ref: gate-aggregate-cycles
      evidence_refs:
        - illustrative-array-summary-16x16
        - illustrative-array-summary-32x8
  gates:
    - gate_id: gate-pe-budget
      category: area
      criterion: Every evaluated array must contain no more than 256 processing elements.
      result: passed
      authority_id: example-design-reviewer
      waiver_rule:
        allowed: false
      evidence_refs:
        - illustrative-array-summary-16x16
        - illustrative-array-summary-32x8
      disposition: continue
    - gate_id: gate-aggregate-cycles
      category: performance
      criterion: A candidate may be recommended only if its aggregate estimate is lower than the baseline under identical inputs.
      result: passed
      authority_id: example-design-reviewer
      waiver_rule:
        allowed: false
      evidence_refs:
        - illustrative-array-summary-16x16
        - illustrative-array-summary-32x8
      disposition: escalate
      notes: Passing this illustrative gate supports only a bounded next-fidelity experiment.
  decision_rights:
    - action: propose
      holder_id: example-loop-analyst
      holder_type: person
      scope: May propose either declared candidate.
      conditions: Must preserve the frozen workload and estimator.
    - action: execute
      holder_id: illustrative-array-estimator
      holder_type: tool
      scope: May execute only the two declared deterministic evaluations.
      conditions: Inputs and implementation must match their recorded hashes.
    - action: reject
      holder_id: example-design-reviewer
      holder_type: person
      scope: May reject a candidate that fails a declared pass/fail check.
      conditions: Rejection must cite the check and supporting evidence.
    - action: waive
      holder_id: example-architecture-lead
      holder_type: person
      scope: May consider waivers only where a gate explicitly permits one.
      conditions: Neither gate in this card permits a waiver.
    - action: recommend
      holder_id: example-loop-analyst
      holder_type: person
      scope: May recommend one bounded next-fidelity experiment.
      conditions: Recommendation cannot authorize RTL, integration, or product work.
    - action: commit
      holder_id: example-architecture-lead
      holder_type: person
      scope: May authorize one bounded RTL experiment in this constructed example.
      conditions: No integration, tapeout, or product commitment follows.
  recommendation:
    recommender_id: example-loop-analyst
    action: Run one bounded RTL experiment for the 32x8 candidate.
    basis: The 32x8 candidate passes the declared checks and has the lower aggregate illustrative cycle estimate.
    claim_refs:
      - claim-array-cycle-estimate
    authority_limit: This recommendation is noncommitting and does not establish implementation readiness.
  accountable_decision:
    status: authorized
    holder_id: example-architecture-lead
    action: Authorize one bounded RTL experiment for the 32x8 candidate.
    rationale: The illustrative result is adequate to justify one stronger experiment, but no broader conclusion.
    claim_refs:
      - claim-array-cycle-estimate
    authorized_scope: One constructed next-fidelity RTL experiment; no integration or product commitment.
    recorded_at: "2026-07-14T00:00:00Z"
    reopen_conditions:
      - A replay mismatch.
      - A regression on an added workload within the intended deployment scope.
      - RTL evidence that contradicts the illustrative estimate.
  replay:
    commands:
      - command: python3 replay.py verify-all
        working_directory: examples/design-loop-cards
    environment_binding:
      artifact_id: replay-environment
      uri: replay-environment.json
      sha256: sha256:59fdf97379cf672c2e29a8167349785227f5cf18628da615978a9d5273f2b2a1
    inputs:
      - artifact_id: replay-implementation-v1
        uri: replay.py
        sha256: sha256:808d1e6763a414b214316ffc02849171201ec3c4e551d24ba2017ac52bc4134a
      - artifact_id: illustrative-workload-v1
        uri: workloads/illustrative-conv-layer-set-v1.json
        sha256: sha256:b2ab2afd5b67405e65eff72fc27cecd21eaa9d2d97c895ade76edfee1106bda6
    outputs:
      - artifact_id: packet-16x16
        uri: evidence/illustrative-array-summary-16x16.json
        sha256: sha256:718f7ff0a02b4a20ff60b67fc24933ce35f48e4a135eba0266d343890d4ba72f
      - artifact_id: packet-32x8
        uri: evidence/illustrative-array-summary-32x8.json
        sha256: sha256:2291e0b449982ebf232f53d3d1a04a938f8926d681e2b46a8903503e3b688014
    expected_status: Exit code 0 and byte-bound packets matching deterministic recomputation.
    observed_status: Exit code 0; both packets matched on 2026-07-14.
    validation_status: replay_verified
    validated_at: "2026-07-14T00:00:00Z"
    validator: examples/design-loop-cards/replay.py packet contract 1.0
  independent_review:
    review_id: illustrative-independent-review
    reviewer_id: example-design-reviewer
    independence_basis: The constructed reviewer did not select the candidate or produce either estimator packet.
    shared_dependencies:
      - The reviewer and producer use the same declared workload and estimator contract.
    conflicts: []
    result: accepted
    claim_refs:
      - claim-array-cycle-estimate
    evidence_refs:
      - illustrative-array-summary-16x16
      - illustrative-array-summary-32x8
  disclosure:
    data_classes:
      - Public synthetic workload, estimator source, and constructed decision records.
    redactions: []
    reviewer_roles:
      - Public reader and course reviewer.
    release_boundary_or_compliance_review_id: Public synthetic fixture; no confidential or personal data.
