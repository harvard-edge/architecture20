schema_version: "1.1"
design_loop_card:
  card_id: example-redacted-physical-context
  conformance_level: 0
  intent:
    objective: Evaluate whether increasing L2 associativity from 4 ways to 16 ways remains physically feasible in the protected implementation context.
    constraints:
    - Hold the cache organization and protected process assumptions fixed.
    - The public record must not expose the PDK, dimensions, or confidential report.
    - The public summary is context for the protected rejection, not equivalent evidence.
    non_goals:
    - Reproduce the proprietary physical-design result.
    - Claim that the rejection transfers to another process or cache design.
    claim_boundary:
      claim: A protected physical-design review rejected this candidate for routing congestion in the stated internal context.
      non_claim: The public summary independently proves the candidate is unroutable.
  task: dse
  design_space:
    legal:
    - Compare the 4-way baseline and 16-way candidate within the unchanged L2 organization.
    invalid:
    - Advance a candidate that exceeds the protected routing-congestion threshold at target utilization.
    deferred:
    - Test transfer to another process, workload, or cache organization.
  negative_traces:
  - candidate_id: l2-associativity-16way
    reason: Protected review found routing congestion in the L2 array macros at the target utilization; absolute dimensions and rules are redacted.
    stage: proprietary physical-design review
    gate: routing-congestion threshold
  disclosure_boundary:
    data_classes:
    - physical-design report
    - PDK rules
    redactions:
    - absolute dimensions
    - NDA design rules
    reviewer_roles:
    - independent auditor authorized for the protected report
    release_boundary_or_compliance_review_id: internal-review-redacted
