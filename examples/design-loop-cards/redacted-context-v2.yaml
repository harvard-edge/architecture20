schema_version: "2.0"
design_loop_card:
  card_id: example-redacted-physical-context-v2
  profiles:
    context: complete
    inspectability: partial
    replay: not_claimed
    independent_review: partial
    disclosure: complete
    decision_rights: partial
  profile_gaps:
    inspectability:
      - Protected representation, environment settings, and raw physical-design observations are not public.
    independent_review:
      - The public record cannot verify the auditor's shared dependencies or conflicts.
    decision_rights:
      - Public records do not identify holders for propose, execute, waive, or recommend.
  intent:
    objective: Evaluate whether increasing L2 associativity from 4 ways to 16 ways remains physically feasible in the protected implementation context.
    constraints:
      - Hold the cache organization and protected process assumptions fixed.
      - Do not expose the PDK, absolute dimensions, or confidential report.
      - Treat the public summary as context for the protected rejection, not equivalent evidence.
    non_goals:
      - Reproduce the proprietary physical-design result.
      - Claim that the rejection transfers to another process or cache design.
  task:
    kind: protected_cache_design_space_review
    description: Compare a 4-way baseline and 16-way candidate under a protected physical-design flow.
  design_space:
    legal:
      - Compare the 4-way baseline and 16-way candidate within the unchanged L2 organization.
    invalid:
      - Advance a candidate that exceeds the protected routing-congestion threshold at target utilization.
    deferred:
      - Test transfer to another process, workload, or cache organization.
  claims:
    - claim_id: claim-protected-review-disposition
      claim_type: architecture_outcome
      statement: An authorized protected review reported that the 16-way candidate failed the declared routing-congestion gate in the internal context.
      baseline_or_comparator: The 4-way baseline under the same protected process and utilization target.
      outcome: The protected review rejected the 16-way candidate; absolute dimensions and design rules are redacted.
      scope: The named internal cache organization, protected process assumptions, and target utilization only.
      non_claims:
        - The public summary independently proves that the candidate is unroutable.
        - The rejection transfers to another process, workload, or cache design.
      status: supported
      evidence_refs:
        - protected-review-summary
  evidence:
    records:
      - evidence_id: protected-review-summary
        producer:
          producer_id: authorized-protected-reviewer
          producer_type: person
        kind: Redacted disposition from a protected physical-design review.
        status: author-judgment
        tool:
          name: Protected physical-design review process
          version: internal-review-redacted
        inputs:
          - artifact_id: protected-physical-report
            uri: restricted://internal/physical-design-report
            integrity:
              not_applicable_reason: The public record is not authorized to disclose or bind the protected report.
        outputs:
          - artifact_id: protected-review-disposition
            uri: restricted://internal/review-disposition
            integrity:
              not_applicable_reason: The public record exposes only this bounded summary.
        scope: The protected 16-way L2 candidate at the internal target utilization.
        uncertainty: Public readers cannot inspect the protected observations or reproduce the mapping.
        limitations:
          - Absolute dimensions, PDK rules, flow settings, and raw reports are redacted.
          - The summary supports only the fact and scope of the recorded disposition.
        integrity:
          not_applicable_reason: No public content hash is authorized for the protected evidence.
  failed_or_rejected:
    - record_id: reject-l2-associativity-16way
      kind: failed_gate
      candidate_id: l2-associativity-16way
      stage: Proprietary physical-design review.
      reason: The protected review reported routing congestion in the L2 array macros at target utilization.
      gate_ref: gate-protected-routing-congestion
      evidence_refs:
        - protected-review-summary
  gates:
    - gate_id: gate-protected-routing-congestion
      category: performance
      criterion: Reject a candidate that exceeds the protected routing-congestion threshold at target utilization.
      result: failed
      authority_id: authorized-protected-reviewer
      waiver_rule:
        allowed: false
      evidence_refs:
        - protected-review-summary
      disposition: reject
      notes: The threshold and absolute observation are protected.
  decision_rights:
    - action: reject
      holder_id: authorized-protected-reviewer
      holder_type: person
      scope: May reject candidates that fail the protected congestion gate.
      conditions: The review must use the approved protected flow and target utilization.
    - action: commit
      holder_id: internal-cache-architecture-owner
      holder_type: person
      scope: May stop advancement of the 16-way candidate in the protected study.
      conditions: The public record creates no authority outside the internal context.
  accountable_decision:
    status: rejected
    holder_id: internal-cache-architecture-owner
    action: Do not advance the 16-way candidate in the protected study.
    rationale: The authorized protected review reported failure of the declared congestion gate.
    claim_refs:
      - claim-protected-review-disposition
    authorized_scope: The internal cache study only; no transferable public architecture conclusion.
    recorded_at: "2026-07-14T00:00:00Z"
    reopen_conditions:
      - An authorized rerun under changed physical-design assumptions passes the failed check.
  disclosure:
    data_classes:
      - Protected physical-design report.
      - Protected PDK rules and dimensions.
    redactions:
      - Absolute dimensions.
      - PDK rules, flow settings, threshold value, and raw observations.
    reviewer_roles:
      - Authorized internal auditor may inspect the protected evidence.
      - Public reader may inspect only this bounded summary.
    release_boundary_or_compliance_review_id: internal-review-redacted
