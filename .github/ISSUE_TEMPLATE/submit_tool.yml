name: "\U0001f680 Submit an Architecture 2.0 Tool"
description: Propose a new tool, simulator, or generator to be added to the Architecture 2.0 Living Catalog.
title: "[Tool]: <Tool Name>"
labels: ["tool-submission", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for contributing to the Architecture 2.0 ecosystem! 
        Please fill out the form below so we can accurately represent your tool in the living catalog (Appendix D).

  - type: input
    id: tool_name
    attributes:
      label: Tool Name
      description: The official name of the tool or framework.
      placeholder: e.g., gem5-agents
    validations:
      required: true

  - type: input
    id: repo_link
    attributes:
      label: Repository or Website URL
      description: Where can people find the tool?
      placeholder: https://github.com/...
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Where does this tool fit in the Architecture 2.0 design loop?
      options:
        - Proxy / Surrogate Predictor
        - Simulation / Execution Environment
        - Agentic Workflow / Search Method
        - Data Representation / LLM Vocabulary
        - Synthesis / Code Generation
        - Verification / Red-teaming
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Short Description
      description: A 1-2 sentence description of what the tool does and how it accelerates the design loop.
      placeholder: A framework for wrapping the gem5 simulator in a gym-like environment for RL agents...
    validations:
      required: true

  - type: textarea
    id: design_loop
    attributes:
      label: Example Loop
      description: (Optional) If you have a specific example of an AI agent using this tool in a design loop, link or describe it here!
    validations:
      required: false
