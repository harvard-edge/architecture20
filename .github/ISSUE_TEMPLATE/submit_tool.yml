name: "Submit a tool"
description: Propose a tool, simulator, model, or workflow for the Architecture 2.0 tool registry.
title: "[Tool]: <tool name>"
labels: ["tool-submission"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for contributing to the Architecture 2.0 tool registry. Fill out the
        fields below and the automated check will turn the submission into one YAML
        file under `tools/registry/`. If the form is complete, it opens a pull
        request for maintainer review. Field labels must stay as-is so the parser
        can read them.

        The public card is built from these fields: a short summary, one primary
        category, optional tags, and credit. The remaining fields form the
        artifact record maintainers use for review, reproducibility, citation,
        and future detail pages.

        New submissions enter the registry as `unverified`. A maintainer checks
        artifact availability and adds a verification date before changing that
        status.

  - type: input
    id: tool_name
    attributes:
      label: Tool name
      description: The official name of the tool or framework.
      placeholder: e.g., gem5
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: Repository or website URL
      description: Where people can find the tool. Must start with http:// or https://.
      placeholder: https://github.com/...
    validations:
      required: true

  - type: dropdown
    id: artifact_type
    attributes:
      label: Artifact type
      description: What kind of contribution is this?
      options:
        - Tool
        - Dataset
        - Benchmark
        - Evaluation Harness
        - Design Loop
        - Tutorial or Example
        - Other
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Primary category
      description: Pick one primary fit. Use tags below for secondary labels.
      options:
        - Simulation
        - Proxy Models
        - Agentic Workflows
        - Data Representations
        - Verification
        - Benchmarks and Datasets
        - Physical Design
        - Not sure / suggest a category
    validations:
      required: true

  - type: input
    id: category_suggestion
    attributes:
      label: Suggested category
      description: Optional unless you picked "Not sure / suggest a category" above. A maintainer will map this before merge.
      placeholder: e.g., Compiler infrastructure, EDA orchestration, design review
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Short description
      description: Required. Maximum 220 characters. This is the main text shown on the public card.
      placeholder: A modular computer-system simulator for architecture feedback needing workload execution and reproducible state.
    validations:
      required: true

  - type: textarea
    id: fit_note
    attributes:
      label: Why does this belong in Architecture 2.0?
      description: Required. Maximum 180 characters. This helps maintainers review fit and is not shown on the public card.
      placeholder: It provides executable architecture feedback for design-space exploration.
    validations:
      required: true

  - type: textarea
    id: inputs
    attributes:
      label: Inputs
      description: Optional. What does this artifact consume? Examples include RTL, traces, workloads, prompts, specs, graphs, or benchmark tasks.
      placeholder: e.g., RTL designs, workload traces, simulator configs
    validations:
      required: false

  - type: textarea
    id: outputs
    attributes:
      label: Outputs
      description: Optional. What does this artifact produce?
      placeholder: e.g., performance estimates, verification results, generated RTL, layout metrics
    validations:
      required: false

  - type: textarea
    id: evidence
    attributes:
      label: Evidence produced
      description: Optional. What kind of evidence can an architecture loop get from this artifact?
      placeholder: e.g., pass/fail checks, timing estimates, benchmark scores, simulator traces
    validations:
      required: false

  - type: textarea
    id: limitations
    attributes:
      label: Known limitations
      description: Optional. Scope boundaries, assumptions, unsupported designs, or reproducibility caveats.
      placeholder: e.g., Evaluated on a small benchmark suite; requires manual setup for proprietary flows.
    validations:
      required: false

  - type: input
    id: tags
    attributes:
      label: Tags
      description: Optional. Up to 5 comma-separated tags for secondary fit, methods, or artifacts.
      placeholder: e.g., simulation, reproducibility, full-system
    validations:
      required: false

  - type: input
    id: authors
    attributes:
      label: Author(s)
      description: Optional. Names to show on the public card. Use the first one or two authors plus "et al." when the author list is long.
      placeholder: e.g., Jane Doe, Alex Smith et al.
    validations:
      required: false

  - type: input
    id: institution
    attributes:
      label: Institution(s)
      description: Optional. Lab, university, company, or organization associated with the work.
      placeholder: e.g., Example University
    validations:
      required: false

  - type: input
    id: submitted_by
    attributes:
      label: Submitted by
      description: Optional. Person or GitHub handle adding this item, if different from the authors.
      placeholder: e.g., @username or Jane Doe
    validations:
      required: false

  - type: input
    id: paper_url
    attributes:
      label: Paper or preprint URL
      description: Optional. Link to a paper, preprint, tech report, or documentation page.
      placeholder: https://arxiv.org/abs/...
    validations:
      required: false

  - type: input
    id: docs_url
    attributes:
      label: Documentation URL
      description: Optional. Link to documentation, tutorial, or getting-started page.
      placeholder: https://docs.example.org/
    validations:
      required: false

  - type: input
    id: artifact_url
    attributes:
      label: Artifact URL
      description: Optional. Link to a dataset, model, benchmark, package, or release artifact.
      placeholder: https://zenodo.org/records/...
    validations:
      required: false

  - type: input
    id: license
    attributes:
      label: License
      description: Optional. SPDX identifier or plain-language license.
      placeholder: e.g., BSD-3-Clause, Apache-2.0, MIT, CC-BY-4.0
    validations:
      required: false

  - type: textarea
    id: citation
    attributes:
      label: Citation
      description: Optional. DOI, BibTeX key, or citation text people should use.
      placeholder: "e.g., DOI: 10.1145/... or a short citation string"
    validations:
      required: false

  - type: dropdown
    id: status
    attributes:
      label: Artifact status
      description: Optional. Pick the closest current state.
      options:
        - Active project
        - Published artifact
        - Preprint or paper artifact
        - Prototype
        - Dataset or benchmark
        - Other
    validations:
      required: false

  - type: textarea
    id: maintainer_note
    attributes:
      label: Maintainer note
      description: Optional. Anything maintainers should know that does not need to appear on the public card.
      placeholder: e.g., This is a new category suggestion, or the paper URL is pending camera-ready publication.
    validations:
      required: false
