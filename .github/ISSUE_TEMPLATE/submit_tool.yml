name: "Submit a tool"
description: Propose a tool, simulator, model, or workflow for the Architecture 2.0 tool registry.
title: "[Tool]: <tool name>"
labels: ["tool-submission"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for contributing to the Architecture 2.0 tool registry. Fill out the
        fields below and the automated check will turn the submission into one YAML
        file under `tools/registry/`. If the form is complete, it opens a pull
        request for maintainer review. Field labels must stay as-is so the parser
        can read them.

        The public card is built from these fields: a short summary, one primary
        category, optional tags, credit, and links to papers, docs, and artifacts.
        Keep the summary concise so readers can scan the registry. The fit
        question helps maintainers review whether the item belongs in Architecture
        2.0, but it is not shown on the public card.

  - type: input
    id: tool_name
    attributes:
      label: Tool name
      description: The official name of the tool or framework.
      placeholder: e.g., gem5
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: Repository or website URL
      description: Where people can find the tool. Must start with http:// or https://.
      placeholder: https://github.com/...
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Primary category
      description: Pick one primary fit. Use tags below for secondary labels.
      options:
        - Simulation
        - Proxy Models
        - Agentic Workflows
        - Data Representations
        - Verification
        - Benchmarks and Datasets
        - Physical Design
        - Not sure / suggest a category
    validations:
      required: true

  - type: input
    id: category_suggestion
    attributes:
      label: Suggested category
      description: Optional unless you picked "Not sure / suggest a category" above. A maintainer will map this before merge.
      placeholder: e.g., Compiler infrastructure, EDA orchestration, design review
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Short description
      description: Required. Maximum 220 characters. This is the main text shown on the public card.
      placeholder: A modular computer-system simulator for architecture feedback needing workload execution and reproducible state.
    validations:
      required: true

  - type: textarea
    id: fit_note
    attributes:
      label: Why does this belong in Architecture 2.0?
      description: Required. Maximum 180 characters. This helps maintainers review fit and is not shown on the public card.
      placeholder: It provides executable architecture feedback for design-space exploration.
    validations:
      required: true

  - type: input
    id: tags
    attributes:
      label: Tags
      description: Optional. Up to 5 comma-separated tags for secondary fit, methods, or artifacts.
      placeholder: e.g., simulation, reproducibility, full-system
    validations:
      required: false

  - type: input
    id: authors
    attributes:
      label: Author(s)
      description: Optional. Names to show on the public card. Use the first one or two authors plus "et al." when the author list is long.
      placeholder: e.g., Jane Doe, Alex Smith et al.
    validations:
      required: false

  - type: input
    id: institution
    attributes:
      label: Institution(s)
      description: Optional. Lab, university, company, or organization associated with the work.
      placeholder: e.g., Example University
    validations:
      required: false

  - type: input
    id: submitted_by
    attributes:
      label: Submitted by
      description: Optional. Person or GitHub handle adding this item, if different from the authors.
      placeholder: e.g., @username or Jane Doe
    validations:
      required: false

  - type: input
    id: paper_url
    attributes:
      label: Paper or preprint URL
      description: Optional. Link to a paper, preprint, tech report, or documentation page.
      placeholder: https://arxiv.org/abs/...
    validations:
      required: false

  - type: input
    id: docs_url
    attributes:
      label: Documentation URL
      description: Optional. Link to documentation, tutorial, or getting-started page.
      placeholder: https://docs.example.org/
    validations:
      required: false

  - type: input
    id: artifact_url
    attributes:
      label: Artifact URL
      description: Optional. Link to a dataset, model, benchmark, package, or release artifact.
      placeholder: https://zenodo.org/records/...
    validations:
      required: false

  - type: dropdown
    id: status
    attributes:
      label: Artifact status
      description: Optional. Pick the closest current state.
      options:
        - Active project
        - Published artifact
        - Preprint or paper artifact
        - Prototype
        - Dataset or benchmark
        - Other
    validations:
      required: false

  - type: textarea
    id: maintainer_note
    attributes:
      label: Maintainer note
      description: Optional. Anything maintainers should know that does not need to appear on the public card.
      placeholder: e.g., This is a new category suggestion, or the paper URL is pending camera-ready publication.
    validations:
      required: false
