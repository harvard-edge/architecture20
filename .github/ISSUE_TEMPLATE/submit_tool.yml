name: "Submit a tool"
description: Propose a tool, simulator, model, or workflow for the Architecture 2.0 tool registry.
title: "[Tool]: <tool name>"
labels: ["tool-submission"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for contributing to the Architecture 2.0 tool registry. Fill out the
        fields below. When you submit, an automated check parses the form and, if
        it is complete, opens a pull request adding your tool. A maintainer then
        reviews and merges it. Field labels must stay as-is so the parser can read
        them. The optional credit fields help the public card point people back to
        the authors, institutions, papers, and artifacts behind the work.

  - type: input
    id: tool_name
    attributes:
      label: Tool name
      description: The official name of the tool or framework.
      placeholder: e.g., gem5
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: Repository or website URL
      description: Where people can find the tool. Must start with http:// or https://.
      placeholder: https://github.com/...
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Which part of the design loop does this tool serve? Pick the closest fit.
      options:
        - Simulation
        - Proxy Models
        - Agentic Workflows
        - Data Representations
        - Verification
        - Benchmarks
        - Physical Design
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Short description
      description: One or two sentences on what the tool does and where it fits in a design loop.
      placeholder: A modular computer-system simulator for architecture feedback needing workload execution and reproducible state.
    validations:
      required: true

  - type: input
    id: authors
    attributes:
      label: Author(s)
      description: Optional. Names to show on the public card.
      placeholder: e.g., Jane Doe, Alex Smith, and the Example Lab
    validations:
      required: false

  - type: input
    id: institution
    attributes:
      label: Institution(s)
      description: Optional. Lab, university, company, or organization associated with the work.
      placeholder: e.g., Example University
    validations:
      required: false

  - type: input
    id: paper_url
    attributes:
      label: Paper or preprint URL
      description: Optional. Link to a paper, preprint, tech report, or documentation page.
      placeholder: https://arxiv.org/abs/...
    validations:
      required: false

  - type: dropdown
    id: status
    attributes:
      label: Artifact status
      description: Optional. Pick the closest current state.
      options:
        - Active project
        - Published artifact
        - Preprint or paper artifact
        - Prototype
        - Dataset or benchmark
        - Other
    validations:
      required: false

  - type: textarea
    id: example_loop
    attributes:
      label: Example loop
      description: Optional. If an AI agent uses this tool inside a design loop, link or describe it in one short sentence.
    validations:
      required: false
