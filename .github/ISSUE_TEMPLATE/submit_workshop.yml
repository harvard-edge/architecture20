name: "Submit a workshop"
description: Propose a workshop, special session, or venue relevant to Architecture 2.0.
title: "[Workshop]: <workshop name>"
labels: ["workshop-submission"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping the Architecture 2.0 community find relevant venues.
        Fill out the fields below. When you submit, an automated check parses the
        form and opens a pull request adding a workshop card. A maintainer reviews
        it before it appears on the site. Field labels must stay as-is so the
        parser can read them.

        Event dates must use `YYYY-MM-DD`. New submissions enter as `proposed`;
        maintainers set active or archived status and add a verification date
        only after checking the submitted links.

  - type: input
    id: workshop_title
    attributes:
      label: Workshop or venue name
      description: The official name of the workshop, special session, seminar, or venue.
      placeholder: e.g., Architecture 2.0 Workshop
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: Website URL
      description: Public page for the workshop or venue. Must start with http:// or https://.
      placeholder: https://...
    validations:
      required: true

  - type: input
    id: venue
    attributes:
      label: Venue or host
      description: Conference, symposium, institution, or host organization.
      placeholder: e.g., ISCA 2026
    validations:
      required: true

  - type: input
    id: date
    attributes:
      label: Date or year
      description: Date, year, or recurring status.
      placeholder: e.g., June 2026 or Annual workshop series
    validations:
      required: true

  - type: input
    id: event_start
    attributes:
      label: Event start date
      description: First day of the next or most recent event, in YYYY-MM-DD format.
      placeholder: "2026-06-27"
    validations:
      required: true

  - type: input
    id: event_end
    attributes:
      label: Event end date
      description: Final day of the same event, in YYYY-MM-DD format.
      placeholder: "2026-06-27"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Primary topic
      description: Pick the closest fit so the page can filter consistently.
      options:
        - Architecture 2.0
        - ML for Systems
        - Agentic AI
        - Computer Architecture
        - EDA and Tools
        - Benchmarks and Datasets
        - Education
        - Community
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Short description
      description: One or two sentences explaining why this venue is relevant to Architecture 2.0.
      placeholder: A workshop focused on agentic AI for computing-systems design and auditable hardware design loops.
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Location
      description: Optional. City, country, online, or hybrid.
      placeholder: e.g., Raleigh, North Carolina
    validations:
      required: false

  - type: input
    id: organizers
    attributes:
      label: Organizer(s)
      description: Optional. Names, lab, or organizing community.
      placeholder: e.g., Example Lab and collaborators
    validations:
      required: false

  - type: input
    id: institution
    attributes:
      label: Institution(s)
      description: Optional. University, company, society, or organization associated with the venue.
      placeholder: e.g., Example University
    validations:
      required: false

  - type: input
    id: submission_url
    attributes:
      label: CFP or submission URL
      description: Optional. Direct link to the call for papers, call for participation, or submission page.
      placeholder: https://...
    validations:
      required: false

  - type: input
    id: deadline
    attributes:
      label: Submission deadline
      description: Optional. Use the format shown by the workshop page.
      placeholder: e.g., February 15, 2026
    validations:
      required: false
