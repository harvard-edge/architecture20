name: "Report a broken link"
description: Flag a dead or wrong link on the site, in the book, or in a registry.
title: "[Link]: <where the link is>"
labels: ["link-rot"]
body:
  - type: input
    id: location
    attributes:
      label: Where is the link?
      description: The page, chapter, or registry entry where you found it.
      placeholder: e.g., Tool registry - the "Timeloop" card
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: The broken link
      placeholder: https://...
    validations:
      required: true

  - type: input
    id: expected
    attributes:
      label: Correct link (if you know it)
      placeholder: https://...
    validations:
      required: false
