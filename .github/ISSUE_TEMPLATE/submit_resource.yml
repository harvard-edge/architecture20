name: "Submit a reading or resource"
description: Propose a paper, blog post, talk, dataset, or reference for the Architecture 2.0 reading list.
title: "[Resource]: <resource title>"
labels: ["resource-submission"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping curate the Architecture 2.0 reading list. Fill out
        the fields below. When you submit, an automated check parses the form and
        opens a pull request adding a resource card. A maintainer reviews it
        before it appears on the site. Field labels must stay as-is so the parser
        can read them.

  - type: input
    id: resource_title
    attributes:
      label: Resource title
      description: The title of the paper, post, talk, dataset, or resource.
      placeholder: "e.g., Architecture 2.0: Challenges and Opportunities"
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: URL
      description: Public URL for the resource. Must start with http:// or https://.
      placeholder: https://...
    validations:
      required: true

  - type: dropdown
    id: kind
    attributes:
      label: Resource type
      description: Pick the closest type.
      options:
        - Paper
        - Article
        - Blog post
        - Podcast
        - Talk
        - Report
        - Dataset
        - Tool documentation
        - Workshop writeup
        - Other
    validations:
      required: true

  - type: input
    id: venue
    attributes:
      label: Venue or source
      description: Optional. Conference, journal, blog, podcast, lab, or publisher.
      placeholder: e.g., IEEE Computer, SIGARCH Computer Architecture Today, ISCA 2023
    validations:
      required: false

  - type: input
    id: date
    attributes:
      label: Date or year
      description: Optional. Publication date or year.
      placeholder: e.g., 2025 or June 14, 2023
    validations:
      required: false

  - type: input
    id: authors
    attributes:
      label: Author(s)
      description: Optional. Authors, speakers, or maintainers.
      placeholder: e.g., Vijay Janapa Reddi; Amir Yazdanbakhsh
    validations:
      required: false

  - type: input
    id: doi
    attributes:
      label: DOI
      description: Optional. DOI without a URL wrapper is fine.
      placeholder: e.g., 10.1109/MC.2024.3521641
    validations:
      required: false

  - type: dropdown
    id: category
    attributes:
      label: Primary topic
      description: Pick the closest fit so the page can filter consistently.
      options:
        - Architecture 2.0
        - Papers
        - Blog posts
        - Agentic AI
        - Benchmarks and Datasets
        - Tools and Infrastructure
        - Talks
        - Computer Architecture
        - Foundations
        - Workshops
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Short description
      description: One or two sentences explaining why this belongs in the reading list.
      placeholder: A concise explanation of what this resource contributes to Architecture 2.0.
    validations:
      required: true
