name: "Suggest a book correction"
description: Report a typo, factual error, unclear passage, or wrong reference in the book.
title: "[Book]: <chapter or section>"
labels: ["book-correction"]
body:
  - type: markdown
    attributes:
      value: |
        The book is a work in progress and we rely on readers to make it right.
        For a small fix you are also welcome to open a pull request directly against
        the relevant file under `book/`.

  - type: input
    id: location
    attributes:
      label: Chapter or section
      description: Where in the book is this?
      placeholder: e.g., Chapter 7, "Feedback, verification, trust"
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: What is wrong, and what should it say?
      description: Quote the passage if you can, and suggest the correction.
    validations:
      required: true
