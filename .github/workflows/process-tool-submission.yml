name: Process tool submission

# When someone files a "Submit a tool" issue, parse it, validate it, and open a
# pull request that adds the tool to the registry. A maintainer reviews and merges
# the PR. That human step is the moderation gate.

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  create_pr_from_issue:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'tool-submission')
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Parse issue and update tool registry
        id: parse
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          PYTHONPATH: .github/scripts
        run: python .github/scripts/add_tool_from_issue.py

      - name: Validate tool registry
        if: steps.parse.outputs.success == 'true'
        env:
          PYTHONPATH: .github/scripts
          ARCH2_ALLOW_TRIAGE_CATEGORY: "1"
        run: python .github/scripts/validate_catalog.py

      - name: Create pull request
        if: steps.parse.outputs.success == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "tools: add ${{ steps.parse.outputs.tool_name }}"
          title: "Add ${{ steps.parse.outputs.tool_name }} to the tool registry"
          body: |
            Adds **${{ steps.parse.outputs.tool_name }}** to the tool registry,
            generated from issue #${{ github.event.issue.number }}.

            ## Parsed card fields

            | Field | Value |
            | --- | --- |
            | Tool | ${{ steps.parse.outputs.tool_name }} |
            | URL | ${{ steps.parse.outputs.tool_url }} |
            | Category | ${{ steps.parse.outputs.tool_category }} |
            | Suggested category | ${{ steps.parse.outputs.tool_category_suggestion }} |
            | Description | ${{ steps.parse.outputs.tool_description }} |
            | Architecture 2.0 fit | ${{ steps.parse.outputs.tool_fit_note }} |
            | Tags | ${{ steps.parse.outputs.tool_tags }} |
            | Author(s) | ${{ steps.parse.outputs.tool_authors }} |
            | Institution(s) | ${{ steps.parse.outputs.tool_institution }} |
            | Submitted by | ${{ steps.parse.outputs.tool_submitted_by }} |
            | Paper or preprint | ${{ steps.parse.outputs.tool_paper_url }} |
            | Documentation | ${{ steps.parse.outputs.tool_docs_url }} |
            | Artifact | ${{ steps.parse.outputs.tool_artifact_url }} |
            | Artifact status | ${{ steps.parse.outputs.tool_status }} |
            | Maintainer note | ${{ steps.parse.outputs.tool_maintainer_note }} |
            | Source YAML | `${{ steps.parse.outputs.tool_file }}` |

            ## Maintainer review

            - [ ] The tool fits the Architecture 2.0 registry.
            - [ ] The primary category is appropriate. If it says `Needs Triage`, replace it before merge.
            - [ ] The URL resolves and points to the intended project or artifact.
            - [ ] The Architecture 2.0 fit note explains why this belongs in the registry.
            - [ ] The public card gives appropriate credit to authors and institutions.
            - [ ] Tags are useful secondary labels and not redundant with the category.
            - [ ] The generated `tools/tools.yml` index matches the source YAML.
            - [ ] The description is concise, useful to readers, and within the card limit.

            Closes #${{ github.event.issue.number }}
          branch: "tools/add-${{ github.event.issue.number }}"
          labels: "tools"

      - name: Comment on the issue (accepted)
        if: steps.parse.outputs.success == 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            Thanks for the submission. I parsed **${{ steps.parse.outputs.tool_name }}**
            and opened a pull request to add it to the registry. A maintainer will
            review and merge it, and it will appear on the site shortly after.

            Questions about the ecosystem are welcome in
            [Discussions](https://github.com/harvard-edge/arch2/discussions).

      - name: Comment on the issue (needs changes)
        if: steps.parse.outputs.success == 'false'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            Thanks for the submission. I could not add this automatically:
            **${{ steps.parse.outputs.reason }}**

            Please edit the issue to fix that, then close and reopen it to re-run
            the check.
