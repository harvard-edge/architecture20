name: Link Checker

on:
  schedule:
    - cron: '0 0 * * 0' # Run every Sunday at midnight
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-links:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install lychee
        env:
          LYCHEE_VERSION: lychee-v0.24.2
          LYCHEE_SHA256: 1f4e0ef7f6554a6ed33dd7ac144fb2e1bbed98598e7af973042fc5cd43951c9a
        run: |
          archive="lychee-x86_64-unknown-linux-gnu.tar.gz"
          url="https://github.com/lycheeverse/lychee/releases/download/${LYCHEE_VERSION}/${archive}"
          curl --fail --location --silent --show-error "$url" -o "/tmp/$archive"
          echo "$LYCHEE_SHA256  /tmp/$archive" | sha256sum --check --strict
          tar -xzf "/tmp/$archive" -C /tmp --strip-components=1 \
            lychee-x86_64-unknown-linux-gnu/lychee
          sudo install -m 0755 /tmp/lychee /usr/local/bin/lychee
          lychee --version

      - name: Run link checker
        run: |
          mkdir -p lychee
          lychee --timeout 15 --max-retries 3 \
            --exclude "twitter.com" --exclude "linkedin.com" \
            --output ./lychee/out.md --format markdown \
            "./**/*.md" "./**/*.qmd" \
            "./tools/tools.yml" "./tools/registry/*.yml" \
            "./www/workshops.yml" "./www/workshops/*.yml" \
            "./www/readings.yml" "./www/readings/*.yml"
        continue-on-error: true
        id: lychee

      - name: Create Issue From File
        if: steps.lychee.outcome == 'failure'
        uses: peter-evans/create-issue-from-file@e8ef132d6df98ed982188e460ebb3b5d4ef3a9cd # v5
        with:
          title: "Broken links detected in repository"
          content-filepath: ./lychee/out.md
          labels: "automated-maintenance, link-rot"
