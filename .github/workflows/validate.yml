name: Validate site

# Mandatory preflight for integration work. This workflow runs the same
# pre-commit gate developers run locally, then validates community registries and
# renders the public website surfaces that should stay fast.

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-site-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Pre-commit gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Run repository-integrity tests
        run: |
          python -m unittest discover -s .github/tests -p 'test_*.py' -v
          python -m pytest -q tests

      - name: Check repository metadata
        run: |
          python .github/scripts/check_action_pins.py
          python .github/scripts/check_release_consistency.py
          python .github/scripts/check_labels.py

  catalog:
    name: Validate registries
    runs-on: ubuntu-latest
    timeout-minutes: 8
    needs: preflight
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate tool registry
        env:
          PYTHONPATH: .github/scripts
        run: python .github/scripts/validate_catalog.py

      - name: Validate workshop registry
        env:
          PYTHONPATH: .github/scripts
        run: python .github/scripts/validate_workshops.py

      - name: Validate reading list
        env:
          PYTHONPATH: .github/scripts
        run: python .github/scripts/validate_readings.py

      - name: Rebuild generated registry indexes
        env:
          PYTHONPATH: .github/scripts
        run: |
          python .github/scripts/build_catalog_index.py
          python .github/scripts/build_workshops_index.py
          python .github/scripts/build_readings_index.py
          git diff --exit-code tools/tools.yml www/workshops.yml www/readings.yml

  render:
    name: Render landing + registries
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: catalog
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends librsvg2-bin

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@8a96df13519ee81fd526f2dfca5962811136661b # v2
        with:
          version: 1.9.36

      - name: Validate public artifact sources
        run: |
          test -f schemas/design-loop-card.v1.schema.json
          test -f schemas/design-loop-card.md
          test -f design-loop-card/template.yaml
          test -f design-loop-card/template.md
          test -f examples/design-loop-cards/level-0-context.yaml
          test -f examples/design-loop-cards/level-1-auditable.yaml
          test -f examples/design-loop-cards/level-2-replayable.yaml
          test -f examples/design-loop-cards/level-3-independent.yaml

      - name: Render landing page
        run: quarto render www

      - name: Render tool registry
        run: quarto render tools

      - name: Validate rendered output
        run: |
          test -f www/_site/index.html
          test -f www/_site/about.html
          test -f tools/_site/index.html
          test -f www/_site/workshops.html
          test -f www/_site/readings.html
          test -f www/_site/submit.html
          test -f www/_site/submit-resource.html
          test -f www/_site/submit-workshop.html
          test -f www/_site/start.html
          test ! -e www/_site/discord.html
          test ! -e www/_site/huggingface.html
          echo "Landing + registries rendered." >> "$GITHUB_STEP_SUMMARY"

  book:
    name: Build full book
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: preflight
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            latexmk \
            tex-gyre \
            lmodern \
            librsvg2-bin \
            poppler-utils \
            texlive-fonts-extra \
            texlive-fonts-recommended \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-latex-recommended \
            texlive-pictures \
            texlive-plain-generic \
            texlive-science

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@8a96df13519ee81fd526f2dfca5962811136661b # v2
        with:
          version: 1.9.36

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Resolve development release identity
        run: python .github/scripts/release_metadata.py --bump skip

      - name: Build HTML, PDF, and EPUB
        run: ./arch2 build --all

      - name: Verify full-book artifacts and release identity
        run: |
          test -f book/_build/index.html
          test -f book/_build/Architecture-2.0.pdf
          test -f book/_build/Architecture-2.0.epub
          python .github/scripts/check_release_consistency.py \
            --expected-version "$ARCH2_VERSION" \
            --rendered-html book/_build/index.html \
            --rendered-pdf book/_build/Architecture-2.0.pdf \
            --rendered-epub book/_build/Architecture-2.0.epub

      - name: Upload render logs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: arch2-validation-render-logs
          path: book/_build/logs
          if-no-files-found: ignore

  labs:
    name: Labs (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: labs/pyproject.toml

      - name: Install source and test dependencies
        working-directory: labs
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m pip install -e ".[dev,notebook]"

      - name: Run lab tests and notebook checks
        working-directory: labs
        run: |
          python -m pytest -q
          marimo check --strict \
            examples/scale_proxy_mirage/lab.py \
            notebooks/lab_01_prompt_to_card.py \
            notebooks/lab_02_scissors_gap.py

      - name: Build distribution artifacts
        working-directory: labs
        run: python -m build

      - name: Smoke-test installed wheel outside the checkout
        run: |
          wheel="$(find "$PWD/labs/dist" -name '*.whl' -print -quit)"
          test -n "$wheel"
          smoke_dir="$(mktemp -d)"
          python -m venv "$smoke_dir/venv"
          "$smoke_dir/venv/bin/python" -m pip install "$wheel"
          cd "$smoke_dir"
          decision_file="$("$smoke_dir/venv/bin/python" - <<'PY'
          from arch2_labs.scale_env import example_dir
          print(example_dir("scale_proxy_mirage") / "human_decision.example.yaml")
          PY
          )"
          test -f "$decision_file"
          "$smoke_dir/venv/bin/python" -m arch2_labs.scale_env \
            --example scale_proxy_mirage \
            --out "$smoke_dir/receipt" \
            --decision-file "$decision_file"
          "$smoke_dir/venv/bin/python" -m arch2_labs.validators \
            "$smoke_dir/receipt"
