name: Publish site

on:
  push:
    branches: [main]
    paths:
      - "synthesis/**"
      - "requirements.txt"
      - ".github/workflows/publish-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: publish-site-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"

jobs:
  build:
    name: Render Quarto book
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends librsvg2-bin poppler-utils

      - name: Set up Quarto and TinyTeX
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Render synthesis book
        working-directory: synthesis
        run: ./arch2 render

      - name: Validate Pages payload
        run: |
          test -f synthesis/book/_build/index.html
          test -f synthesis/book/_build/Architecture-2.0.pdf
          touch synthesis/book/_build/.nojekyll
          echo "arch2.mlsysbook.ai" > synthesis/book/_build/CNAME
          echo "HTML pages: $(find synthesis/book/_build -name '*.html' | wc -l)" >> "$GITHUB_STEP_SUMMARY"
          echo "PDF: synthesis/book/_build/Architecture-2.0.pdf" >> "$GITHUB_STEP_SUMMARY"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: synthesis/book/_build

      - name: Upload render logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: arch2-render-logs
          path: synthesis/book/_build/logs
          if-no-files-found: ignore

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Verify live site
        run: |
          for attempt in {1..12}; do
            if curl -fsSL https://arch2.mlsysbook.ai/ -o /tmp/arch2-index.html &&
               grep -q "Architecture 2.0" /tmp/arch2-index.html &&
               curl -fsSI https://arch2.mlsysbook.ai/Architecture-2.0.pdf >/dev/null; then
              echo "Live site verified on attempt $attempt" >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            echo "Waiting for Pages propagation ($attempt/12)..."
            sleep 10
          done
          echo "Live site did not verify after Pages deployment."
          exit 1

      - name: Summarize deployment
        run: |
          echo "Published: ${{ steps.deployment.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Custom domain: https://arch2.mlsysbook.ai/" >> "$GITHUB_STEP_SUMMARY"
