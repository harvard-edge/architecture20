name: Publish site

on:
  push:
    branches: [main]
    tags: ["v[0-9]*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-site
  cancel-in-progress: false

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"
  ARCH2_SITE_DOMAIN: ${{ vars.ARCH2_SITE_DOMAIN || 'arch2.mlsysbook.ai' }}

jobs:
  publish_guard:
    name: Authorize publish ref
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Authorize publish ref
        shell: bash
        run: |
          set -euo pipefail

          case "$GITHUB_REF" in
            refs/heads/main)
              echo "Authorized main branch publish."
              ;;
            refs/tags/*)
              if [[ ! "$GITHUB_REF" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                echo "Refusing non-stable release tag: $GITHUB_REF" >&2
                exit 1
              fi

              ref_commit="$(git rev-parse --verify "${GITHUB_REF}^{commit}")"
              event_commit="$(git rev-parse --verify "${GITHUB_SHA}^{commit}")"
              if [[ "$ref_commit" != "$event_commit" ]]; then
                echo "Release tag does not identify the event commit." >&2
                exit 1
              fi

              git fetch --no-tags origin \
                "+refs/heads/main:refs/remotes/origin/main"
              if ! git merge-base --is-ancestor \
                "$event_commit" refs/remotes/origin/main; then
                echo "Release tag commit is not an ancestor of origin/main." >&2
                exit 1
              fi
              echo "Authorized stable release tag: $GITHUB_REF"
              ;;
            *)
              echo "Refusing publish from unauthorized ref: $GITHUB_REF" >&2
              exit 1
              ;;
          esac

  preflight:
    name: Pre-commit gate
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: publish_guard

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11.15"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-card.txt
            requirements-cff.txt
            constraints/cff-py311-linux.txt
            constraints/py311-linux.txt

      - name: Install dependencies
        run: |
          bash .github/scripts/bootstrap_pip.sh
          python -m pip install -r requirements.txt -c constraints/py311-linux.txt
          python -m pip check

      - name: Run pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Run repository-integrity tests
        run: |
          python -m unittest discover -s .github/tests -p 'test_*.py' -v
          python -m pytest -q tests

      - name: Validate citation metadata
        run: |
          python -m venv "$RUNNER_TEMP/cff-venv"
          bash .github/scripts/bootstrap_pip.sh \
            "$RUNNER_TEMP/cff-venv/bin/python"
          "$RUNNER_TEMP/cff-venv/bin/python" -m pip install \
            -r requirements-cff.txt -c constraints/cff-py311-linux.txt
          "$RUNNER_TEMP/cff-venv/bin/cffconvert" --validate

      - name: Check repository metadata
        run: |
          python .github/scripts/check_action_pins.py
          python .github/scripts/check_release_consistency.py
          python .github/scripts/check_labels.py

  build:
    name: Render and assemble site
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: [publish_guard, preflight]
    permissions:
      contents: read
      pages: read
    outputs:
      arch2_version: ${{ steps.release_metadata.outputs.arch2_version }}
      arch2_publish_date: ${{ steps.release_metadata.outputs.arch2_publish_date }}

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11.15"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            constraints/py311-linux.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            latexmk \
            tex-gyre \
            lmodern \
            librsvg2-bin \
            poppler-utils \
            texlive-fonts-extra \
            texlive-fonts-recommended \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-latex-recommended \
            openjdk-21-jre-headless \
            texlive-pictures \
            texlive-plain-generic \
            texlive-science

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@8a96df13519ee81fd526f2dfca5962811136661b # v2
        with:
          version: 1.9.36

      - name: Install Python dependencies
        run: |
          bash .github/scripts/bootstrap_pip.sh
          python -m pip install -r requirements.txt -c constraints/py311-linux.txt
          python -m pip check

      - name: Install EPUBCheck
        run: .github/scripts/install_epubcheck.sh

      - name: Resolve release metadata
        id: release_metadata
        run: python .github/scripts/release_metadata.py --bump skip

      - name: Build the full site
        run: |
          chmod +x .github/scripts/build_site.sh
          .github/scripts/build_site.sh

      - name: Verify rendered release identity
        run: |
          python .github/scripts/check_release_consistency.py \
            --expected-version "$ARCH2_VERSION" \
            --rendered-html _site/book/index.html \
            --rendered-pdf _site/book/Architecture-2.0.pdf \
            --rendered-epub _site/book/Architecture-2.0.epub

      - name: Validate Pages payload
        run: |
          test -f _site/index.html
          test -f _site/about.html
          test -f _site/workshops.html
          test -f _site/readings.html
          test -f _site/submit.html
          test -f _site/submit-resource.html
          test -f _site/submit-workshop.html
          test -f _site/start.html
          test ! -e _site/discord.html
          test ! -e _site/huggingface.html
          test -f _site/tools/index.html
          test -f _site/book/index.html
          test -f _site/images/arch2-card.png
          test -f _site/schemas/design-loop-card.v1.schema.json
          test -f _site/schemas/design-loop-card.v1.1.schema.json
          test -f _site/schemas/design-loop-card.v2.schema.json
          test -f _site/schemas/design-loop-card.md
          test -f _site/design-loop-card/template.yaml
          test -f _site/design-loop-card/template.md
          test -f _site/examples/design-loop-cards/level-0-context.yaml
          test -f _site/examples/design-loop-cards/level-1-auditable.yaml
          test -f _site/examples/design-loop-cards/level-2-replayable.yaml
          test -f _site/examples/design-loop-cards/level-3-independent.yaml
          test -f _site/examples/design-loop-cards/array-study-v2.yaml
          test -f _site/examples/design-loop-cards/redacted-context-v2.yaml
          test -f _site/examples/design-loop-cards/replay-environment.json
          test -f _site/examples/design-loop-cards/replay.py
          test -f _site/examples/design-loop-cards/workloads/illustrative-conv-layer-set-v1.json
          test -f _site/examples/design-loop-cards/evidence/illustrative-array-summary-16x16.json
          test -f _site/examples/design-loop-cards/evidence/illustrative-array-summary-32x8.json
          test -f _site/tools/snapshots/registry-2026-07-14.yml
          test -f _site/book/Architecture-2.0.pdf
          touch _site/.nojekyll
          echo "$ARCH2_SITE_DOMAIN" > _site/CNAME
          {
            echo "Version: $ARCH2_VERSION"
            echo "Publish date: $ARCH2_PUBLISH_DATE"
            echo "HTML pages: $(find _site -name '*.html' | wc -l)"
            echo "PDF: _site/book/Architecture-2.0.pdf"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

      - name: Upload render logs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: arch2-render-logs
          path: book/_build/logs
          if-no-files-found: ignore

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [publish_guard, build]
    permissions:
      contents: read
      id-token: write
      pages: write
    env:
      ARCH2_VERSION: ${{ needs.build.outputs.arch2_version }}
      ARCH2_PUBLISH_DATE: ${{ needs.build.outputs.arch2_publish_date }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

      - name: Verify live site
        run: |
          for attempt in $(seq 1 12); do
            if curl -fsSL "https://$ARCH2_SITE_DOMAIN/" -o /tmp/arch2-index.html &&
               curl -fsSL "https://$ARCH2_SITE_DOMAIN/book/" -o /tmp/arch2-book.html &&
               grep -q "Architecture 2.0" /tmp/arch2-index.html &&
               grep -q "$ARCH2_VERSION" /tmp/arch2-book.html &&
               curl -fsSI "https://$ARCH2_SITE_DOMAIN/book/Architecture-2.0.pdf" >/dev/null; then
              echo "Live site verified on attempt $attempt" >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            echo "Waiting for Pages propagation ($attempt/12)..."
            sleep 10
          done
          echo "Live site did not verify after Pages deployment."
          exit 1

      - name: Summarize deployment
        run: |
          {
            echo "Published: ${{ steps.deployment.outputs.page_url }}"
            echo "Custom domain: https://$ARCH2_SITE_DOMAIN/"
            echo "Version: $ARCH2_VERSION"
            echo "Publish date: $ARCH2_PUBLISH_DATE"
          } >> "$GITHUB_STEP_SUMMARY"
