<script>
(function () {
  function closeDropdown(dropdown) {
    var toggle = dropdown.querySelector('[data-bs-toggle="dropdown"]');
    var menu = dropdown.querySelector(".dropdown-menu");

    if (window.bootstrap && window.bootstrap.Dropdown && toggle) {
      var instance = window.bootstrap.Dropdown.getInstance(toggle);
      if (instance) {
        instance.hide();
      }
    }

    dropdown.classList.remove("show");
    if (toggle) {
      toggle.classList.remove("show");
      toggle.setAttribute("aria-expanded", "false");
    }
    if (menu) {
      menu.classList.remove("show");
    }
  }

  function closeOtherDropdowns(toggle) {
    var navbar = toggle.closest(".navbar");
    var current = toggle.closest(".dropdown");
    if (!navbar || !current) {
      return;
    }

    navbar.querySelectorAll(".dropdown").forEach(function (dropdown) {
      if (dropdown !== current) {
        closeDropdown(dropdown);
      }
    });
  }

  document.addEventListener("show.bs.dropdown", function (event) {
    if (event.target && event.target.matches('.navbar [data-bs-toggle="dropdown"]')) {
      closeOtherDropdowns(event.target);
    }
  }, true);

  document.addEventListener("click", function (event) {
    var toggle = event.target.closest('.navbar [data-bs-toggle="dropdown"]');
    if (toggle) {
      closeOtherDropdowns(toggle);
    }
  }, true);

  document.addEventListener("pointerover", function (event) {
    var toggle = event.target.closest('.navbar [data-bs-toggle="dropdown"]');
    if (toggle) {
      closeOtherDropdowns(toggle);
    }
  }, true);
})();
</script>
