<script>
function arch2EnhanceTitleBlock() {
  var path = window.location.pathname.replace(/\/+$/, "/");
  var isContentPage = /\/(chapters|appendices)\//.test(path);

  if (isContentPage) {
    document.body.classList.add("arch2-content-page");
    document.querySelectorAll(".quarto-title-meta, .quarto-title-meta-author").forEach(function (meta) {
      meta.hidden = true;
    });
  } else {
    document.body.classList.add("arch2-front-page");
    var titleBlock = document.querySelector("#title-block-header");
    if (titleBlock && !titleBlock.querySelector(".arch2-preview-meta")) {
      var releaseVersion = "";
      var releaseMetadata = document.getElementById("arch2-release-metadata");
      if (releaseMetadata) {
        releaseVersion = releaseMetadata.textContent.trim();
      }
      var renderedDate = "Published";
      var dateText = titleBlock.querySelector(".quarto-title-meta-contents p.date");
      if (dateText && dateText.textContent.trim()) {
        renderedDate = dateText.textContent.trim();
      }
      var preview = document.createElement("div");
      preview.className = "arch2-preview-meta";
      var cleanVersion = releaseVersion ? releaseVersion.replace(/^preview\s+/i, '') : '';
      // Strip semver build metadata (v0.1.5+g<sha>) from the reader-facing
      // pill; the hidden metadata span keeps the full provenance string.
      var displayVersion = cleanVersion.replace(/\+[0-9A-Za-z.-]+$/, '');
      var versionLabel = displayVersion ? 'Preview ' + displayVersion : 'Preview';
      preview.innerHTML = [
        '<span title="' + (cleanVersion || 'development build') + '">' + versionLabel + '</span>',
        '<span>' + renderedDate + '</span>',
        '<a class="arch2-download-pdf" href="Architecture-2.0.pdf" aria-label="Download Architecture 2.0 PDF">',
        '<i class="bi bi-file-pdf" aria-hidden="true"></i>',
        '<span>Download PDF</span>',
        '</a>'
      ].join("");
      var description = titleBlock.querySelector(".description");
      if (description) {
        description.insertAdjacentElement("afterend", preview);
      } else {
        titleBlock.appendChild(preview);
      }
    }
    document.querySelectorAll(".quarto-title-meta").forEach(function (meta) {
      meta.hidden = true;
    });
  }

  document.querySelectorAll(".quarto-title-meta-contents p.author").forEach(function (author) {
    if (author.querySelector("a")) {
      return;
    }
    var name = author.textContent.trim();
    if (name !== "Vijay Janapa Reddi") {
      return;
    }
    var link = document.createElement("a");
    link.href = "https://vijay.seas.harvard.edu";
    link.textContent = name;
    author.textContent = "";
    author.appendChild(link);
  });
}

if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", arch2EnhanceTitleBlock);
} else {
  arch2EnhanceTitleBlock();
}
</script>
