<!-- Candid, non-dismissable work-in-progress banner. A small script lifts it to
     the very top of <body>, just above the hub nav (whose own script relocates
     it to body.firstElementChild). Running in a requestAnimationFrame guarantees
     we place the banner AFTER the nav is placed, so the final order is
     [banner][nav] at the top of the page, in normal flow, above the content and
     clear of the fixed/headroom Quarto header. Book HTML only; no PDF/EPUB. -->
<div class="arch2-wip-banner" role="note" aria-label="Status of this book">
  <span class="arch2-wip-icon" aria-hidden="true"><i class="bi bi-exclamation-triangle"></i></span>
  <span class="arch2-wip-text"><strong>Written in the open, and in progress.</strong> Live, evolving work that will keep changing. <a href="/disclosure.html">How this book is written &rarr;</a></span>
</div>
<script>
(function () {
  function placeBanner() {
    var banner = document.querySelector(".arch2-wip-banner");
    if (!banner) {
      return;
    }
    // Insert as the first child of <body>, above the relocated hub nav.
    document.body.insertBefore(banner, document.body.firstElementChild);
  }
  function schedule() {
    if (window.requestAnimationFrame) {
      window.requestAnimationFrame(placeBanner);
    } else {
      setTimeout(placeBanner, 0);
    }
  }
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", schedule);
  } else {
    schedule();
  }
})();
</script>
