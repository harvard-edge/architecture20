project:
  type: book
  output-dir: _build
  execute-dir: project
  resources:
    - images/favicon.svg
    - images/favicon-16.png
    - images/favicon-32.png
    - images/favicon-48.png
    - images/favicon.ico
    - images/apple-touch-icon.png
    - images/icon-192.png
    - images/icon-512.png
    - images/arch2-card.png
    - images/site.webmanifest
  # No pre/post-render hooks: the arch2 CLI owns the pipeline (prepare -> render
  # -> finalize) so `quarto render` and `arch2 build`/`render` do not bounce
  # through hook scripts. Build the book with `./arch2 build`.
  preview:
    browser: true
    navigate: true

# Keep publication language independent of the shell locale. Pandoc otherwise
# may serialize LANG=C into EPUB package and XHTML metadata.
lang: en-US

book:
  title: "Architecture 2.0"
  subtitle: "The Discipline of AI-Assisted Computer Architecture"
  author: "Vijay Janapa Reddi"
  description: "An engineering discipline for using AI, grounded in architectural representations, tools, and experiments, to formulate, explore, implement, evaluate, explain, and defend computer architecture decisions."
  search: true
  page-navigation: true
  page-footer:
    left: "Architecture 2.0"
    center: "Part of the [mlsysbook.ai](https://mlsysbook.ai) family"
    right: "arch2.mlsysbook.ai"
  chapters:
    - index.qmd
    - acknowledgments.qmd
    - about-the-author.qmd
    - disclosure.qmd
    - "---"
    - part: "Part I: The Catalyst and Framework"
      chapters:
        - chapters/01-moonshot/index.qmd
        - chapters/02-design-loop-no-longer-scales/index.qmd
        - chapters/03-architecture-20-framework/index.qmd
    - part: "Part II: The Substrate"
      chapters:
        - chapters/04-data-representations-world-models/index.qmd
        - chapters/05-architecture-environments-tool-interfaces/index.qmd
    - part: "Part III: The Engines and Brakes"
      chapters:
        - chapters/06-methods-generation-prediction-optimization/index.qmd
        - chapters/07-feedback-verification-trust/index.qmd
    - part: "Part IV: Execution and Evaluation"
      chapters:
        - chapters/08-running-the-loop/index.qmd
        - chapters/09-evaluating-the-agentic-architect/index.qmd
        - chapters/10-loop-patterns-across-stack/index.qmd
    - part: "Part V: Accountability"
      chapters:
        - chapters/11-what-architect-owns/index.qmd
  appendices:
    - appendices/appendix-a-bootstrapping/index.qmd
    - appendices/appendix-b-design-loop-card/index.qmd
    - appendices/appendix-c-reviewer-checklist/index.qmd
    - appendices/appendix-e-ai-for-architecture-map/index.qmd

website:
  site-url: "https://arch2.mlsysbook.ai/book"
  bread-crumbs: true
  # Favicon + social-card (open-graph / twitter) metadata is injected via
  # format.html.include-in-header (_includes/head-icons.html) because Quarto
  # type:book does not emit those website keys into the page head.

author:
  - name: "Vijay Janapa Reddi"
    url: "https://vijay.seas.harvard.edu"
    orcid: "0000-0002-5259-7721"
institute: "Harvard John A. Paulson School of Engineering and Applied Sciences"
date: "July 14, 2026"
date-format: "MMMM D, YYYY"
arch2-version: "Development build"
reference-section-title: "References"
metadata-files:
  - ../_global/navbar.yml
  - config/custom-numbered-blocks.yml

bibliography:
  - references/references.bib
csl: csl/chicago-author-date.csl
filters:
  - epigraph.lua
  - arch2-ext/custom-numbered-blocks
  - include-code-files

execute:
  echo: false
  warning: false
  message: false
  freeze: auto
  env:
    MPLBACKEND: "Agg"

jupyter: python3

format:
  html:
    reference-section-title: "Notes"
    respect-user-color-scheme: true
    theme:
      light:
        - cosmo
        - _styles/arch2-html.scss
      dark:
        - cosmo
        - _styles/arch2-html.scss
        - _styles/arch2-html-dark.scss
    include-in-header:
      - _includes/head-icons.html
    include-before-body:
      - _includes/wip-banner.html
      - _includes/hub-navbar.html
    include-after-body:
      - _includes/author-link.html
      - ../_global/navbar-behavior.html
    default-image-extension: svg
    reference-location: margin
    citation-location: margin
    citations-hover: true
    crossrefs-hover: false
    lightbox:
      match: auto
      effect: fade
      desc-position: bottom
      loop: true
      css-class: arch2-lightbox
    toc: true
    toc-depth: 2
    number-sections: true
    fig-cap-location: bottom
    tbl-cap-location: top
    callout-appearance: simple
    anchor-sections: true
    smooth-scroll: true
    link-external-icon: true
  pdf:
    documentclass: SNmono
    fig-pos: 'htbp'
    reference-location: margin
    default-image-extension: pdf
    biblio-style: spbasic
    cite-method: natbib
    classoption:
      - graybox
      - envcountchap
      - sectrefs
      - natbib
      - openany
    code-block-fontsize: \small
    code-overflow: wrap
    include-in-header:
      - tex/version.tex
      - tex/springer-header.tex
    include-before-body: tex/frontmatter.tex
    pdf-engine: pdflatex
    toc: true
    toc-depth: 2
    number-sections: true
    fig-caption: true
    fig-cap-location: bottom
    tbl-cap-location: top
  epub:
    cover-image: images/arch2-cover.png
    default-image-extension: svg
    toc: true
    toc-depth: 2
    number-sections: true
    fig-cap-location: bottom
    tbl-cap-location: top
    callout-appearance: simple
