filter-metadata:
  arch2-ext/custom-numbered-blocks:
    icon-path: "images/icons/callouts"
    # SVG is the icon master. HTML/EPUB consume the SVG; the LaTeX/PDF build
    # consumes the PDF (pdflatex cannot embed SVG). Both are regenerated from
    # the SVG icons. colors = [background, accent];
    # the HTML tint is auto-derived from the accent, so the accent (colors[1])
    # is the meaningful value. Palette: failure keeps true red, war-story uses
    # muted rose, lighthouse uses cool cobalt, and field-note stays neutral gray.
    # The other used roles are spread across a muted hue wheel so adjacent
    # callout purposes do not collide visually.
    icon-format: "pdf"
    icon-format-html: "svg"
    groups:
      crux:
        colors: ["FBF1E8", "B96419"]
        collapse: false
        numbered: false
      learning-objectives:
        colors: ["EBF4EF", "2F7A53"]
        collapse: false
        numbered: false
      carry-forward:
        colors: ["E8F4F5", "0B7C8F"]
        collapse: false
        numbered: false
      lighthouse:
        colors: ["EEF3FC", "3B6FC0"]
        collapse: false
        numbered: false
      field-note:
        colors: ["F1F2F3", "68727A"]
        collapse: false
        numbered: false
      architect-checkpoint:
        colors: ["EAF1F8", "2767A6"]
        collapse: false
        numbered: false
      failure-mode:
        colors: ["FBECEC", "C83F4C"]
        collapse: false
        numbered: false
      design-principle:
        colors: ["F7F2E3", "A17410"]
        collapse: false
        numbered: false
      engineer-move:
        colors: ["F1F4E6", "6E851C"]
        collapse: false
        numbered: false
      war-story:
        colors: ["F8EEF2", "A14F68"]
        collapse: false
        numbered: false
    classes:
      callout-crux:
        label: "Guiding question"
        group: crux
      callout-learning-objectives:
        label: "What this chapter gives you"
        group: learning-objectives
      callout-carry-forward:
        label: "What to carry forward"
        group: carry-forward
      callout-lighthouse:
        label: "Lighthouse prompt"
        group: lighthouse
      callout-field-note:
        label: "Field note"
        group: field-note
      callout-architect-checkpoint:
        label: "Architect's checkpoint"
        group: architect-checkpoint
      callout-failure-mode:
        label: "Failure mode"
        group: failure-mode
      callout-design-principle:
        label: "Design principle"
        group: design-principle
        prefix: pri
      callout-engineer-move:
        label: "Engineer move"
        group: engineer-move
      callout-war-story:
        label: "War story"
        group: war-story
        prefix: war
