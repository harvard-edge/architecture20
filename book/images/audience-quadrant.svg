<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-labelledby="title desc">
  <title id="title">Architecture 2.0 Audience Quadrant</title>
  <desc id="desc">Audience quadrant mapping readers across domain expertise (ML vs Hardware) and reader role (Strategist vs Implementer).</desc>
  <defs>
    <style>
      .label { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 20px; font-weight: 750; }
      .sub { fill: #343A40; font-family: Georgia, "Times New Roman", serif; font-size: 15px; }
      .section { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; font-weight: 750; letter-spacing: 2px; }
      .axis { fill: #20252B; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 17px; font-weight: 750; letter-spacing: 1px; }
      .axis-sub { fill: #59636D; font-family: Georgia, "Times New Roman", serif; font-size: 14px; font-style: italic; }
      .line { fill: none; stroke: #9AA8B5; stroke-width: 1.5; stroke-dasharray: 6,6; }
    </style>
  </defs>

  <!-- Background border -->
  <rect x="1" y="1" width="898" height="598" fill="#F7FAFB" stroke="#9AA8B5" stroke-width="1.5"/>

  <!-- Title -->
  <text x="42" y="43" class="section" fill="#59636D">THE ARCHITECTURE 2.0 AUDIENCE</text>

  <!-- Axes -->
  <line x1="450" y1="80" x2="450" y2="520" class="line"/>
  <line x1="80" y1="300" x2="820" y2="300" class="line"/>

  <!-- X Axis Labels -->
  <text x="450" y="560" class="axis" text-anchor="middle">DOMAIN EXPERTISE</text>
  <text x="250" y="585" class="axis-sub" text-anchor="middle">← Machine Learning</text>
  <text x="650" y="585" class="axis-sub" text-anchor="middle">Hardware Architecture →</text>

  <!-- Y Axis Labels -->
  <text x="40" y="300" class="axis" text-anchor="middle" transform="rotate(-90, 40, 300)">READER ROLE</text>
  <text x="15" y="190" class="axis-sub" text-anchor="middle" transform="rotate(-90, 15, 190)">Strategy &amp; Governance →</text>
  <text x="15" y="410" class="axis-sub" text-anchor="middle" transform="rotate(-90, 15, 410)">← Implementation &amp; Execution</text>

  <!-- Quadrant 1: AI Strategist (Top Left) -->
  <g transform="translate(100, 100)">
    <rect x="0" y="0" width="300" height="150" fill="#F1F3F5" stroke="#20252B" stroke-width="2"/>
    <text x="150" y="40" class="label" text-anchor="middle" fill="#20252B">The AI Strategist</text>
    <text x="150" y="75" class="sub" text-anchor="middle">Needs to understand physical</text>
    <text x="150" y="95" class="sub" text-anchor="middle">bottlenecks, limits of the design</text>
    <text x="150" y="115" class="sub" text-anchor="middle">space, and ROI of integration.</text>
    <text x="150" y="135" class="section" text-anchor="middle" fill="#495057">CHAPTERS 1, 2, 6</text>
  </g>

  <!-- Quadrant 2: Chief Architect (Top Right) -->
  <g transform="translate(500, 100)">
    <rect x="0" y="0" width="300" height="150" fill="#FFF0F2" stroke="#A42A38" stroke-width="2"/>
    <text x="150" y="40" class="label" text-anchor="middle" fill="#A42A38">The Chief Architect</text>
    <text x="150" y="75" class="sub" text-anchor="middle">Needs epistemic trust boundaries,</text>
    <text x="150" y="95" class="sub" text-anchor="middle">formal verification limits, and</text>
    <text x="150" y="115" class="sub" text-anchor="middle">human accountability rules.</text>
    <text x="150" y="135" class="section" text-anchor="middle" fill="#A42A38">CHAPTERS 10, 11</text>
  </g>

  <!-- Quadrant 3: ML Researcher (Bottom Left) -->
  <g transform="translate(100, 350)">
    <rect x="0" y="0" width="300" height="150" fill="#EEF7FB" stroke="#1F5F7A" stroke-width="2"/>
    <text x="150" y="40" class="label" text-anchor="middle" fill="#1F5F7A">The ML Researcher</text>
    <text x="150" y="75" class="sub" text-anchor="middle">Needs concrete EDA tool API</text>
    <text x="150" y="95" class="sub" text-anchor="middle">mechanics, data representations,</text>
    <text x="150" y="115" class="sub" text-anchor="middle">and physics-bound metrics.</text>
    <text x="150" y="135" class="section" text-anchor="middle" fill="#1F5F7A">CHAPTERS 4, 5, 9</text>
  </g>

  <!-- Quadrant 4: Computer Architect (Bottom Right) -->
  <g transform="translate(500, 350)">
    <rect x="0" y="0" width="300" height="150" fill="#F4FCE3" stroke="#5C940D" stroke-width="2"/>
    <text x="150" y="40" class="label" text-anchor="middle" fill="#5C940D">The Computer Architect</text>
    <text x="150" y="75" class="sub" text-anchor="middle">Needs to integrate AI securely,</text>
    <text x="150" y="95" class="sub" text-anchor="middle">manage simulator fast feedback,</text>
    <text x="150" y="115" class="sub" text-anchor="middle">and map the design space.</text>
    <text x="150" y="135" class="section" text-anchor="middle" fill="#5C940D">CHAPTERS 7, 8</text>
  </g>
</svg>
