<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 370" role="img" aria-labelledby="title desc">
  <title id="title">Architecture 2.0 loop diagram</title>
  <desc id="desc">A human-governed architecture loop connecting architect intent, agent synthesis, system evidence, and loop decision.</desc>
  <defs>
    <style>
      .serif { font-family: Georgia, "Times New Roman", serif; }
      .sans { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #20252B; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 21px; font-weight: 750; }
      .sub { fill: #59636D; font-family: Georgia, "Times New Roman", serif; font-size: 14.5px; }
      .section { fill: #59636D; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 15px; font-weight: 750; letter-spacing: 2px; }
      .node-human { fill: #FFFFFF; stroke: #20252B; stroke-width: 3.5; vector-effect: non-scaling-stroke; }
      .node-agent { fill: #FFFFFF; stroke: #1F5F7A; stroke-width: 3.5; vector-effect: non-scaling-stroke; }
      .arrow { fill: none; stroke: #1F5F7A; stroke-width: 3.5; stroke-linecap: butt; vector-effect: non-scaling-stroke; }
      .ink-line { fill: none; stroke: #20252B; stroke-linecap: round; stroke-linejoin: round; vector-effect: non-scaling-stroke; }
      .blue-line { fill: none; stroke: #1F5F7A; stroke-linecap: round; stroke-linejoin: round; vector-effect: non-scaling-stroke; }
      .badge { fill: #FFFFFF; stroke: #1F5F7A; stroke-width: 2; vector-effect: non-scaling-stroke; }
      .badge-num { fill: #1F5F7A; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 15px; font-weight: 750; }
      .verb { fill: #1F5F7A; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13.5px; font-weight: 700; letter-spacing: 0.4px; }
      .pill { fill: #F7FAFB; }
    </style>
    <marker id="arrow" markerWidth="15" markerHeight="14" refX="15" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0L15 7L0 14Z" fill="#1F5F7A"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="898" height="368" rx="2" fill="#F7FAFB" stroke="#9AA8B5" stroke-width="1.5"/>

  <text x="42" y="43" class="section">HUMAN-GOVERNED ARCHITECTURE LOOP</text>
  <text x="858" y="43" class="section" text-anchor="end">AGENT + TOOLS</text>

  <rect x="266" y="66" width="184" height="254" fill="#EEF7FB" opacity="0.6"/>
  <rect x="450" y="66" width="184" height="254" fill="#F1F8F0" opacity="0.6"/>

  <!-- Intent -> Synthesis (top, right) -->
  <path class="arrow" d="M406 116H497" marker-end="url(#arrow)"/>
  <!-- Synthesis -> Evidence (right, down) -->
  <path class="arrow" d="M540 162V241" marker-end="url(#arrow)"/>
  <!-- Evidence -> Decision (bottom, left) -->
  <path class="arrow" d="M494 284H403" marker-end="url(#arrow)"/>
  <!-- Decision -> Intent (left, up) -->
  <path class="arrow" d="M360 238V159" marker-end="url(#arrow)"/>

  <g>
    <circle cx="360" cy="116" r="40" class="node-human"/>
    <circle cx="360" cy="116" r="14" class="ink-line" stroke-width="3.5"/>
    <circle cx="360" cy="116" r="4" fill="#20252B"/>
    <text x="292" y="121" class="label" text-anchor="end">Architect's Intent</text>
    <text x="292" y="146" class="sub" text-anchor="end">Human goal</text>
  </g>

  <g>
    <circle cx="540" cy="116" r="40" class="node-agent"/>
    <rect x="525" y="105" width="30" height="24" rx="4" class="blue-line" stroke-width="3.5"/>
    <path d="M533 105V96M547 105V96M521 116H511M559 116H569" class="blue-line" stroke-width="3.5"/>
    <circle cx="534" cy="118" r="3" fill="#1F5F7A"/>
    <circle cx="546" cy="118" r="3" fill="#1F5F7A"/>
    <text x="608" y="121" class="label">Agent Synthesis</text>
    <text x="608" y="146" class="sub">Exploration &amp; tools</text>
  </g>

  <g>
    <circle cx="540" cy="284" r="40" class="node-agent"/>
    <path d="M522 283L535 296L562 266" class="blue-line" stroke-width="4"/>
    <text x="608" y="289" class="label">System Evidence</text>
    <text x="608" y="314" class="sub">Fidelity &amp; metrics</text>
  </g>

  <g>
    <circle cx="360" cy="284" r="40" class="node-human"/>
    <path d="M351 266V302M351 284H369M369 272V296" class="ink-line" stroke-width="4"/>
    <circle cx="351" cy="266" r="4" fill="#20252B"/>
    <circle cx="351" cy="302" r="4" fill="#20252B"/>
    <circle cx="369" cy="272" r="4" fill="#20252B"/>
    <circle cx="369" cy="296" r="4" fill="#20252B"/>
    <text x="292" y="289" class="label" text-anchor="end">Loop Decision</text>
    <text x="292" y="314" class="sub" text-anchor="end">Accept, reject, escalate</text>
  </g>

</svg>
