<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 370" role="img">
  <title>Bootstrap execution path for a bounded architecture study</title>
  <desc>A bounded architecture study containing a six-step execution path from a formulated task through representation, tool binding, method-role assignment, evidence checks, and a review record. Review can revise any earlier part of the study.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1683A6"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .label { font-size: 13.5px; font-weight: 700; fill: #222222; }
      .small { font-size: 11.5px; fill: #444444; }
      .micro { font-size: 10.5px; fill: #59636D; }
      .note { font-size: 12px; font-weight: 700; fill: #136680; }
      .task { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.4; }
      .rep { fill: #F0ECFA; stroke: #6A4FC7; stroke-width: 1.4; }
      .env { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.4; }
      .method { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.4; }
      .evidence { fill: #FDECEC; stroke: #DE3D3C; stroke-width: 1.4; }
      .record { fill: #E7F5EC; stroke: #1E9E48; stroke-width: 1.4; }
      .card { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .arrow { stroke: #333333; stroke-width: 2; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .return { stroke: #1683A6; stroke-width: 2; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
    </style>
  </defs>

  <rect width="720" height="370" fill="#ffffff"/>
  <g class="font">

    <text class="note" x="360" y="38" text-anchor="middle">one bounded architecture study</text>

    <rect class="task" x="70" y="54" width="126" height="72"/>
    <text class="label" x="133" y="79" text-anchor="middle">1. formulate</text>
    <text class="small" x="133" y="99" text-anchor="middle">question + baseline</text>
    <text class="micro" x="133" y="117" text-anchor="middle">claim + non-goals</text>

    <rect class="rep" x="236" y="54" width="126" height="72"/>
    <text class="label" x="299" y="79" text-anchor="middle">2. represent</text>
    <text class="small" x="299" y="99" text-anchor="middle">inputs, outputs,</text>
    <text class="micro" x="299" y="117" text-anchor="middle">constraints, traces</text>

    <rect class="env" x="402" y="54" width="126" height="72"/>
    <text class="label" x="465" y="79" text-anchor="middle">3. wrap tools</text>
    <text class="small" x="465" y="99" text-anchor="middle">actions, outputs,</text>
    <text class="micro" x="465" y="117" text-anchor="middle">costs, provenance</text>

    <rect class="method" x="402" y="176" width="126" height="72"/>
    <text class="label" x="465" y="201" text-anchor="middle">4. assign role</text>
    <text class="small" x="465" y="221" text-anchor="middle">generate, search,</text>
    <text class="micro" x="465" y="239" text-anchor="middle">critique, verify</text>

    <rect class="evidence" x="236" y="176" width="126" height="72"/>
    <text class="label" x="299" y="201" text-anchor="middle">5. set checks</text>
    <text class="small" x="299" y="221" text-anchor="middle">evaluate + explain</text>
    <text class="micro" x="299" y="239" text-anchor="middle">challenge + escalate</text>

    <rect class="record" x="70" y="176" width="126" height="72"/>
    <text class="label" x="133" y="201" text-anchor="middle">6. record</text>
    <text class="micro" x="133" y="221" text-anchor="middle">evidence + mechanism</text>
    <text class="micro" x="133" y="239" text-anchor="middle">decision + next step</text>

    <line class="arrow" x1="196" y1="90" x2="236" y2="90" marker-end="url(#arrow)"/>
    <line class="arrow" x1="362" y1="90" x2="402" y2="90" marker-end="url(#arrow)"/>
    <line class="arrow" x1="465" y1="126" x2="465" y2="176" marker-end="url(#arrow)"/>
    <line class="arrow" x1="402" y1="212" x2="362" y2="212" marker-end="url(#arrow)"/>
    <line class="arrow" x1="236" y1="212" x2="196" y2="212" marker-end="url(#arrow)"/>

    <path class="return" d="M 70 212 L 45 212 L 45 38 L 133 38 L 133 54" marker-end="url(#arrowTeal)"/>
    <text class="note" x="267" y="156" text-anchor="middle">review may revise any part of the study</text>

    <rect class="card" x="565" y="65" width="120" height="172"/>
    <text class="label" x="625" y="89" text-anchor="middle">first study</text>
    <text class="micro" x="625" y="118" text-anchor="middle">one question</text>
    <text class="micro" x="625" y="143" text-anchor="middle">one workload</text>
    <text class="micro" x="625" y="168" text-anchor="middle">one tool path</text>
    <text class="micro" x="625" y="193" text-anchor="middle">one method role</text>
    <text class="micro" x="625" y="218" text-anchor="middle">one decision owner</text>

    <rect class="card" x="105" y="292" width="510" height="52"/>
    <text class="label" x="360" y="313" text-anchor="middle">a study with no possible counterevidence</text>
    <text class="label" x="360" y="332" text-anchor="middle">is not ready to support a decision</text>
  </g>
</svg>
