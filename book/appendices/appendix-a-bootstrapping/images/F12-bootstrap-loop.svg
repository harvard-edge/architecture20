<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 430" role="img">
  <title>Bootstrap execution path for a bounded architecture study</title>
  <desc>A bounded architecture study containing a six-step execution path from a formulated task through representation, tool binding, method-role assignment, evidence checks, and a review record. Review can revise any earlier part of the study.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .label { font-size: 14px; font-weight: 700; fill: #222222; }
      .small { font-size: 11.5px; fill: #444444; }
      .micro { font-size: 10.5px; fill: #555555; }
      .note { font-size: 12px; font-weight: 700; fill: #136680; }
      .task { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.4; }
      .rep { fill: #F0ECFA; stroke: #6A4FC7; stroke-width: 1.4; }
      .env { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.4; }
      .method { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.4; }
      .evidence { fill: #FDECEC; stroke: #DE3D3C; stroke-width: 1.4; }
      .card { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.3; }
      .arrow { stroke: #333333; stroke-width: 2; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .return { stroke: #136680; stroke-width: 2; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
    </style>
  </defs>

  <rect width="720" height="430" fill="#ffffff"/>
  <g class="font" transform="translate(0,-90)">

    <text class="note" x="360" y="108" text-anchor="middle">one bounded architecture study</text>

    <rect class="task" x="70" y="124" width="126" height="72"/>
    <text class="label" x="133" y="149" text-anchor="middle">1. formulate</text>
    <text class="small" x="133" y="169" text-anchor="middle">question + baseline</text>
    <text class="micro" x="133" y="187" text-anchor="middle">claim + non-goals</text>

    <rect class="rep" x="236" y="124" width="126" height="72"/>
    <text class="label" x="299" y="149" text-anchor="middle">2. represent</text>
    <text class="small" x="299" y="169" text-anchor="middle">inputs, outputs,</text>
    <text class="micro" x="299" y="187" text-anchor="middle">constraints, traces</text>

    <rect class="env" x="402" y="124" width="126" height="72"/>
    <text class="label" x="465" y="149" text-anchor="middle">3. wrap tools</text>
    <text class="small" x="465" y="169" text-anchor="middle">actions, outputs,</text>
    <text class="micro" x="465" y="187" text-anchor="middle">costs, provenance</text>

    <rect class="method" x="402" y="246" width="126" height="72"/>
    <text class="label" x="465" y="271" text-anchor="middle">4. assign role</text>
    <text class="small" x="465" y="291" text-anchor="middle">generate, search,</text>
    <text class="micro" x="465" y="309" text-anchor="middle">critique, verify</text>

    <rect class="evidence" x="236" y="246" width="126" height="72"/>
    <text class="label" x="299" y="271" text-anchor="middle">5. set checks</text>
    <text class="small" x="299" y="291" text-anchor="middle">evaluate + explain</text>
    <text class="micro" x="299" y="309" text-anchor="middle">challenge + escalate</text>

    <rect class="card" x="70" y="246" width="126" height="72" style="fill:#E7F5EC;stroke:#1E9E48"/>
    <text class="label" x="133" y="271" text-anchor="middle">6. record</text>
    <text class="micro" x="133" y="291" text-anchor="middle">evidence + mechanism</text>
    <text class="micro" x="133" y="309" text-anchor="middle">decision + next step</text>

    <line class="arrow" x1="196" y1="160" x2="236" y2="160" marker-end="url(#arrow)"/>
    <line class="arrow" x1="362" y1="160" x2="402" y2="160" marker-end="url(#arrow)"/>
    <line class="arrow" x1="465" y1="196" x2="465" y2="246" marker-end="url(#arrow)"/>
    <line class="arrow" x1="402" y1="282" x2="362" y2="282" marker-end="url(#arrow)"/>
    <line class="arrow" x1="236" y1="282" x2="196" y2="282" marker-end="url(#arrow)"/>

    <path class="return" d="M 70 282 L 45 282 L 45 108 L 133 108 L 133 124" marker-end="url(#arrow)"/>
    <text class="note" x="267" y="226" text-anchor="middle">review may revise any part of the study</text>

    <rect class="card" x="565" y="135" width="120" height="172"/>
    <text class="label" x="625" y="159" text-anchor="middle">first study</text>
    <text class="micro" x="625" y="188" text-anchor="middle">one question</text>
    <text class="micro" x="625" y="213" text-anchor="middle">one workload</text>
    <text class="micro" x="625" y="238" text-anchor="middle">one tool path</text>
    <text class="micro" x="625" y="263" text-anchor="middle">one method role</text>
    <text class="micro" x="625" y="288" text-anchor="middle">one decision owner</text>

    <rect class="card" x="105" y="362" width="510" height="52"/>
    <text class="label" x="360" y="383" text-anchor="middle">a study with no possible counterevidence</text>
    <text class="label" x="360" y="402" text-anchor="middle">is not ready to support a decision</text>
  </g>
</svg>
