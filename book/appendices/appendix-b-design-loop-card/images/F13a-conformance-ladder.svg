<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" role="img">
  <title>Card conformance levels stack cumulatively and a missing required field caps the card</title>
  <desc>Two side-by-side panels. The left panel is a four-rung ladder of structural conformance levels read bottom-up: Level 0 context only, Level 1 inspectable study bindings, Level 2 replay bindings, and Level 3 independence and decision fields, with upward arrows showing that each level requires all fields below it. The right panel judges one illustrative card per level: Level 0 and Level 1 required fields are all present, Level 2 is missing one replay binding, and Level 3 fields are present but greyed out. A dashed red cap line between the Level 1 and Level 2 rows is labeled conformance caps at Level 1, showing that the missing Level 2 binding caps the card even though Level 3 fields are present. A bottom bar states that a missing required field caps the whole card at the highest level whose required fields are all present.</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .head { font-size: 13.5px; font-weight: 700; fill: #20252B; }
      .sub  { font-size: 11.2px; fill: #59636D; }
      .rung { font-size: 12px; font-weight: 700; fill: #20252B; }
      .rung-off { font-size: 12px; font-weight: 700; fill: #8A95A0; }
      .fields { font-size: 11.2px; fill: #333333; }
      .fields-off { font-size: 11.2px; fill: #8A95A0; }
      .tag  { font-size: 10.6px; font-style: italic; fill: #8A95A0; }
      .cap-label { font-size: 11.4px; font-weight: 700; fill: #C62A2A; }
      .arrow { stroke: #333333; stroke-width: 1.9; fill: none; stroke-linecap: square; }
      .cap { stroke: #DE3D3C; stroke-width: 1.8; stroke-dasharray: 5 4; fill: none; }
      .bar-text { font-size: 12px; font-weight: 700; fill: #1683A6; }
    </style>
  </defs>

  <rect width="860" height="440" fill="#FFFFFF"/>

  <g class="font">
    <!-- headers -->
    <text class="head" x="220" y="30" text-anchor="middle">Conformance levels</text>
    <text class="sub" x="220" y="46" text-anchor="middle">each level requires all fields below it</text>
    <text class="head" x="640" y="30" text-anchor="middle">One card, judged per level</text>
    <text class="sub" x="640" y="46" text-anchor="middle">illustrative card with one missing binding</text>

    <!-- left ladder, bottom-up L0..L3 -->
    <rect x="50" y="58" width="340" height="64" fill="#FBEDF4" stroke="#D24D96" stroke-width="1.5"/>
    <text class="rung" x="220" y="81" text-anchor="middle">Level 3, independence and decision</text>
    <text class="fields" x="220" y="98" text-anchor="middle">adds rejection gates, independent authority,</text>
    <text class="fields" x="220" y="112" text-anchor="middle">commitment boundary, accountable owner</text>

    <rect x="50" y="138" width="340" height="64" fill="#F0ECFA" stroke="#6A4FC7" stroke-width="1.5"/>
    <text class="rung" x="220" y="161" text-anchor="middle">Level 2, replay bindings</text>
    <text class="fields" x="220" y="178" text-anchor="middle">adds workload, seed, and tool-version IDs,</text>
    <text class="fields" x="220" y="192" text-anchor="middle">parameter digest, replay source URI</text>

    <rect x="50" y="218" width="340" height="64" fill="#E7F5EC" stroke="#1E9E48" stroke-width="1.5"/>
    <text class="rung" x="220" y="241" text-anchor="middle">Level 1, inspectable study bindings</text>
    <text class="fields" x="220" y="258" text-anchor="middle">adds representation, environment, actor map,</text>
    <text class="fields" x="220" y="272" text-anchor="middle">feedback budget, baseline evidence, negative traces</text>

    <rect x="50" y="298" width="340" height="64" fill="#E4F1F6" stroke="#1683A6" stroke-width="1.5"/>
    <text class="rung" x="220" y="321" text-anchor="middle">Level 0, context only</text>
    <text class="fields" x="220" y="338" text-anchor="middle">card ID, conformance level, intent, task,</text>
    <text class="fields" x="220" y="352" text-anchor="middle">design-space boundaries</text>

    <!-- cumulative arrows between rungs -->
    <line class="arrow" x1="220" y1="298" x2="220" y2="282" marker-end="url(#arr)"/>
    <line class="arrow" x1="220" y1="218" x2="220" y2="202" marker-end="url(#arr)"/>
    <line class="arrow" x1="220" y1="138" x2="220" y2="122" marker-end="url(#arr)"/>

    <!-- right panel rows, aligned with the ladder -->
    <rect x="470" y="58" width="340" height="64" fill="#F5F8FA" stroke="#9AA8B5" stroke-width="1.1"/>
    <text class="rung-off" x="640" y="83" text-anchor="middle">Level 3 fields all present</text>
    <text class="tag" x="640" y="102" text-anchor="middle">cannot lift the card above the gap below</text>

    <rect x="470" y="138" width="340" height="64" fill="#FDECEC" stroke="#DE3D3C" stroke-width="1.8" stroke-dasharray="5 4"/>
    <text class="rung" x="640" y="161" text-anchor="middle">Level 2, one required binding missing</text>
    <text class="fields" x="640" y="180" text-anchor="middle">tool version not recorded</text>

    <rect x="470" y="218" width="340" height="64" fill="#E7F5EC" stroke="#1E9E48" stroke-width="1.4"/>
    <text class="rung" x="640" y="253" text-anchor="middle">Level 1 fields all present</text>

    <rect x="470" y="298" width="340" height="64" fill="#E4F1F6" stroke="#1683A6" stroke-width="1.4"/>
    <text class="rung" x="640" y="333" text-anchor="middle">Level 0 fields all present</text>

    <!-- cap line between L1 and L2 rows -->
    <line class="cap" x1="470" y1="210" x2="548" y2="210"/>
    <text class="cap-label" x="640" y="214" text-anchor="middle">conformance caps at Level 1</text>
    <line class="cap" x1="732" y1="210" x2="810" y2="210"/>

    <!-- bottom takeaway bar -->
    <rect x="50" y="386" width="760" height="28" fill="#F5F8FA" stroke="#9AA8B5" stroke-width="1.1"/>
    <text class="bar-text" x="430" y="404" text-anchor="middle">A missing required field caps the whole card at the highest level whose required fields are all present.</text>
  </g>
</svg>
