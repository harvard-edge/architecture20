<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 398" role="img" aria-labelledby="chain-title chain-desc">
  <title id="chain-title">Architecture study evidence chain: claim, evidence, check, and accountable decision</title>
  <desc id="chain-desc">An entity-relationship chain for a bounded architecture study. A Claim (a typed assertion) requires Evidence (a checkable record). The Evidence is evaluated by a Check (a pass or fail rule), and a passing Check authorizes an Accountable Decision (an authorized action). The same Evidence is generated in an Environment (the execution context), shown below. Small italic labels name each relationship, and small gray labels give the cardinality on each link.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .node-title { font-size: 13px; font-weight: 700; fill: #20252B; }
      .node-sub { font-size: 11.5px; fill: #444444; }
      .rel { font-size: 11.5px; font-style: italic; fill: #59636D; }
      .card { font-size: 11px; fill: #8A95A0; }
      .note { font-size: 12px; font-weight: 700; fill: #1683A6; }
      .box-artifact { fill: #F0ECFA; stroke: #6A4FC7; stroke-width: 1.5; }
      .box-verify { fill: #E7F5EC; stroke: #1E9E48; stroke-width: 1.5; }
      .box-context { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.5; }
      .bar { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .arrow { fill: none; stroke: #333333; stroke-width: 2; stroke-linecap: square; }
    </style>
  </defs>

  <rect width="950" height="398" fill="#FFFFFF"/>
  <g class="font">
    <!-- Main chain: Claim -> Evidence -> Check -> Accountable Decision -->
    <rect class="box-artifact" x="42" y="68" width="158" height="64"/>
    <text class="node-title" x="121" y="94" text-anchor="middle">Claim</text>
    <text class="node-sub" x="121" y="113" text-anchor="middle">Typed assertion</text>

    <rect class="box-artifact" x="278" y="68" width="158" height="64"/>
    <text class="node-title" x="357" y="94" text-anchor="middle">Evidence</text>
    <text class="node-sub" x="357" y="113" text-anchor="middle">Checkable record</text>

    <rect class="box-verify" x="514" y="68" width="158" height="64"/>
    <text class="node-title" x="593" y="94" text-anchor="middle">Check</text>
    <text class="node-sub" x="593" y="113" text-anchor="middle">Pass/fail rule</text>

    <rect class="box-verify" x="750" y="68" width="158" height="64"/>
    <text class="node-title" x="829" y="94" text-anchor="middle">Accountable Decision</text>
    <text class="node-sub" x="829" y="113" text-anchor="middle">Authorized action</text>

    <!-- Environment feeds Evidence -->
    <rect class="box-context" x="278" y="248" width="158" height="64"/>
    <text class="node-title" x="357" y="274" text-anchor="middle">Environment</text>
    <text class="node-sub" x="357" y="293" text-anchor="middle">Execution context</text>

    <!-- Claim requires Evidence -->
    <path class="arrow" d="M 200 100 H 278" marker-end="url(#arrow)"/>
    <text class="rel" x="239" y="88" text-anchor="middle">requires</text>
    <text class="card" x="209" y="117" text-anchor="middle">1</text>
    <text class="card" x="269" y="117" text-anchor="middle">0..*</text>

    <!-- Evidence evaluated_by Check -->
    <path class="arrow" d="M 436 100 H 514" marker-end="url(#arrow)"/>
    <text class="rel" x="475" y="88" text-anchor="middle">evaluated_by</text>
    <text class="card" x="447" y="117" text-anchor="middle">1..*</text>
    <text class="card" x="505" y="117" text-anchor="middle">0..*</text>

    <!-- Check authorizes Accountable Decision -->
    <path class="arrow" d="M 672 100 H 750" marker-end="url(#arrow)"/>
    <text class="rel" x="711" y="88" text-anchor="middle">authorizes</text>
    <text class="card" x="683" y="117" text-anchor="middle">1..*</text>
    <text class="card" x="741" y="117" text-anchor="middle">1</text>

    <!-- Evidence generated_in Environment -->
    <path class="arrow" d="M 357 132 V 248" marker-end="url(#arrow)"/>
    <text class="rel" x="369" y="192" text-anchor="start">generated_in</text>
    <text class="card" x="345" y="150" text-anchor="end">1</text>
    <text class="card" x="345" y="242" text-anchor="end">1</text>

    <!-- Takeaway bar -->
    <rect class="bar" x="42" y="334" width="866" height="44"/>
    <text class="note" x="475" y="352" text-anchor="middle">A claim requires evidence, a check evaluates the evidence,</text>
    <text class="note" x="475" y="368" text-anchor="middle">and only a passing check authorizes the accountable decision.</text>
  </g>
</svg>
