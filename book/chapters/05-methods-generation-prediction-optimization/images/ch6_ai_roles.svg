<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 470" role="img" aria-labelledby="roles-title roles-desc">
  <title id="roles-title">The eight AI roles in Architecture 2.0</title>
  <desc id="roles-desc">A hub-and-spoke diagram of eight AI roles in Architecture 2.0. A central coordination hub orchestrates the other roles and holds shared state. Three proposer roles on the left (generation, prediction, optimization) supply candidates and estimates, three reviewer roles on the right (critique, verification, repair) challenge and confirm them, and explanation sits below. Straight arrows run outward from the coordination hub to each surrounding role.</desc>
  <defs>
    <marker id="arrow-dark" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .role-title { font-size: 13.5px; font-weight: 700; fill: #20252B; }
      .role-sub { font-size: 11.5px; fill: #59636D; }
      .hub-title { font-size: 13.5px; font-weight: 700; fill: #20252B; }
      .hub-sub { font-size: 11.5px; fill: #59636D; }
      .gen { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.45; }
      .pred { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.45; }
      .opt { fill: #F0ECFA; stroke: #6A4FC7; stroke-width: 1.45; }
      .crit { fill: #FDECEC; stroke: #DE3D3C; stroke-width: 1.45; }
      .verif { fill: #E7F5EC; stroke: #1E9E48; stroke-width: 1.45; }
      .repair { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.45; }
      .expl { fill: #F0ECFA; stroke: #6A4FC7; stroke-width: 1.45; }
      .hub { fill: #FBEDF4; stroke: #D24D96; stroke-width: 2.0; }
      .edge { fill: none; stroke: #333333; stroke-width: 1.9; stroke-linecap: square; stroke-linejoin: miter; marker-end: url(#arrow-dark); }
    </style>
  </defs>

  <rect width="860" height="470" fill="#FFFFFF"/>
  <g class="font">

    <!-- spokes: coordination hub orchestrates each role -->
    <path class="edge" d="M 350 215 L 200 90"/>
    <path class="edge" d="M 350 245 L 200 245"/>
    <path class="edge" d="M 350 275 L 200 400"/>
    <path class="edge" d="M 510 215 L 660 90"/>
    <path class="edge" d="M 510 245 L 660 245"/>
    <path class="edge" d="M 510 275 L 660 400"/>
    <path class="edge" d="M 430 290 L 430 372"/>

    <!-- proposer roles (left) -->
    <rect class="gen" x="40" y="62" width="160" height="56"/>
    <text class="role-title" x="120" y="86" text-anchor="middle">Generation</text>
    <text class="role-sub" x="120" y="104" text-anchor="middle">proposes candidates</text>

    <rect class="pred" x="40" y="217" width="160" height="56"/>
    <text class="role-title" x="120" y="241" text-anchor="middle">Prediction</text>
    <text class="role-sub" x="120" y="259" text-anchor="middle">estimates behavior</text>

    <rect class="opt" x="40" y="372" width="160" height="56"/>
    <text class="role-title" x="120" y="396" text-anchor="middle">Optimization</text>
    <text class="role-sub" x="120" y="414" text-anchor="middle">searches tradeoffs</text>

    <!-- reviewer roles (right) -->
    <rect class="crit" x="660" y="62" width="160" height="56"/>
    <text class="role-title" x="740" y="86" text-anchor="middle">Critique</text>
    <text class="role-sub" x="740" y="104" text-anchor="middle">exposes weak claims</text>

    <rect class="verif" x="660" y="217" width="160" height="56"/>
    <text class="role-title" x="740" y="241" text-anchor="middle">Verification</text>
    <text class="role-sub" x="740" y="259" text-anchor="middle">tests against checks</text>

    <rect class="repair" x="660" y="372" width="160" height="56"/>
    <text class="role-title" x="740" y="396" text-anchor="middle">Repair</text>
    <text class="role-sub" x="740" y="414" text-anchor="middle">corrects artifacts</text>

    <!-- explanation (below hub) -->
    <rect class="expl" x="350" y="372" width="160" height="56"/>
    <text class="role-title" x="430" y="396" text-anchor="middle">Explanation</text>
    <text class="role-sub" x="430" y="414" text-anchor="middle">traces to mechanism</text>

    <!-- coordination hub -->
    <rect class="hub" x="350" y="200" width="160" height="90"/>
    <text class="hub-title" x="430" y="234" text-anchor="middle">Coordination</text>
    <text class="hub-sub" x="430" y="254" text-anchor="middle">orchestrates the roles</text>
    <text class="hub-sub" x="430" y="272" text-anchor="middle">holds shared state</text>

  </g>
</svg>
