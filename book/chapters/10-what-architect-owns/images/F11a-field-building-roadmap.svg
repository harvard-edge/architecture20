<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 620" role="img" aria-labelledby="field-roadmap-title field-roadmap-desc">
  <title id="field-roadmap-title">Interdependent field-building layers for AI-assisted computer architecture</title>
  <desc id="field-roadmap-desc">Four reciprocal field-building layers connect through shared interfaces. Shared foundations, methods and reference practices, evaluation and challenge, and institutional durability jointly support comparable, cumulative, and contestable AI-assisted architecture studies.</desc>
  <defs>
    <marker id="roadmap-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .title { font-size: 13.5px; font-weight: 700; fill: #20252B; }
      .subtitle { font-size: 12px; fill: #59636D; }
      .panel-title { font-size: 13.5px; font-weight: 700; fill: #20252B; }
      .item { font-size: 12px; fill: #333333; }
      .hub { font-size: 11.4px; font-weight: 700; fill: #3E474B; }
      .outcome-label { font-size: 13px; font-weight: 700; fill: #136680; letter-spacing: 0.6px; }
      .outcome-title { font-size: 13.5px; font-weight: 700; fill: #20252B; }
      .outcome-body { font-size: 12.5px; fill: #444444; }
      .foundation { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.5; }
      .methods { fill: #F0ECFA; stroke: #6A4FC7; stroke-width: 1.5; }
      .evaluation { fill: #E7F5EC; stroke: #1E9E48; stroke-width: 1.5; }
      .institution { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.5; }
      .hub-box { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .outcome { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.5; }
      .divider { stroke: #9AA8B5; stroke-width: 1; }
      .connector { stroke: #333333; stroke-width: 1.9; fill: none; stroke-linecap: square; marker-start: url(#roadmap-arrow); marker-end: url(#roadmap-arrow); }
    </style>
  </defs>

  <rect width="860" height="620" fill="#FFFFFF"/>
  <g class="font">
    <text class="title" x="430" y="31" text-anchor="middle">Four interdependent layers for a durable field</text>
    <text class="subtitle" x="430" y="54" text-anchor="middle">Each layer constrains and depends on the other three.</text>

    <rect class="foundation" x="36" y="78" width="350" height="170"/>
    <text class="panel-title" x="61" y="109">Shared foundations</text>
    <line class="divider" x1="61" y1="122" x2="361" y2="122"/>
    <rect x="61" y="142" width="6" height="6" fill="#1683A6"/>
    <text class="item" x="78" y="149">Datasets and benchmarks</text>
    <rect x="61" y="174" width="6" height="6" fill="#1683A6"/>
    <text class="item" x="78" y="181">Paired multi-fidelity trajectories</text>
    <rect x="61" y="206" width="6" height="6" fill="#1683A6"/>
    <text class="item" x="78" y="213">Versioned environments and tool contracts</text>

    <rect class="methods" x="474" y="78" width="350" height="170"/>
    <text class="panel-title" x="499" y="109">Methods and reference practices</text>
    <line class="divider" x1="499" y1="122" x2="799" y2="122"/>
    <rect x="499" y="142" width="6" height="6" fill="#6A4FC7"/>
    <text class="item" x="516" y="149">Role-appropriate methods and matched baselines</text>
    <rect x="499" y="174" width="6" height="6" fill="#6A4FC7"/>
    <text class="item" x="516" y="181">AI-role ablations and experimental protocols</text>
    <rect x="499" y="206" width="6" height="6" fill="#6A4FC7"/>
    <text class="item" x="516" y="213">Failure analysis and reporting practices</text>

    <path class="connector" d="M 354 248 L 402 268"/>
    <path class="connector" d="M 506 248 L 458 268"/>
    <path class="connector" d="M 354 322 L 402 312"/>
    <path class="connector" d="M 506 322 L 458 312"/>
    <rect class="hub-box" x="388" y="268" width="84" height="44"/>
    <text class="hub" x="430" y="286" text-anchor="middle">shared</text>
    <text class="hub" x="430" y="301" text-anchor="middle">interfaces</text>

    <rect class="evaluation" x="36" y="322" width="350" height="170"/>
    <text class="panel-title" x="61" y="353">Evaluation and challenge</text>
    <line class="divider" x1="61" y1="366" x2="361" y2="366"/>
    <rect x="61" y="386" width="6" height="6" fill="#1E9E48"/>
    <text class="item" x="78" y="393">Held-out tasks and calibration</text>
    <rect x="61" y="418" width="6" height="6" fill="#1E9E48"/>
    <text class="item" x="78" y="425">Uncertainty and total feedback cost</text>
    <rect x="61" y="450" width="6" height="6" fill="#1E9E48"/>
    <text class="item" x="78" y="457">Independent adjudication and challenge</text>

    <rect class="institution" x="474" y="322" width="350" height="170"/>
    <text class="panel-title" x="499" y="353">Institutional durability</text>
    <line class="divider" x1="499" y1="366" x2="799" y2="366"/>
    <rect x="499" y="386" width="6" height="6" fill="#E68A17"/>
    <text class="item" x="516" y="393">Standards and governance</text>
    <rect x="499" y="418" width="6" height="6" fill="#E68A17"/>
    <text class="item" x="516" y="425">Maintenance and incentives</text>
    <rect x="499" y="450" width="6" height="6" fill="#E68A17"/>
    <text class="item" x="516" y="457">Confidentiality and education</text>

    <rect class="outcome" x="106" y="522" width="648" height="72"/>
    <text class="outcome-label" x="430" y="543" text-anchor="middle">JOINT OUTCOME</text>
    <text class="outcome-title" x="430" y="566" text-anchor="middle">Comparable, cumulative, and contestable</text>
    <text class="outcome-body" x="430" y="585" text-anchor="middle">AI-assisted architecture studies</text>
  </g>
</svg>
