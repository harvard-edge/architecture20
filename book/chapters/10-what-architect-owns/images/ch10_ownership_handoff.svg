<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450">
    <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .panel-title { font-size: 13.5px; font-weight: 700; fill: #20252B; }
      .panel-subtitle { font-size: 11.5px; fill: #59636D; }
      .body-bold { font-size: 12.5px; font-weight: 700; fill: #222222; }
      .chip { font-size: 12.5px; font-weight: 700; fill: #222222; }
      .small { font-size: 11.2px; fill: #444444; }
      .panel { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .role-box { fill: #FFFFFF; stroke: #1683A6; stroke-width: 1.45; }
      .line { stroke: #333333; stroke-width: 1.9; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
    </style>
  </defs>

  <!-- Left Side -->
  <text x="225" y="50" class="role-box">"Over the Wall" (Anti-Pattern)</text>

  <rect x="50" y="200" width="90" height="70" class="role-box"/>
  <text x="95" y="240" class="body-bold">Team A</text>

  <rect x="210" y="140" width="30" height="190" class="role-box"/>
  <text x="225" y="130" class="small" fill="#7f8c8d">Silo Wall</text>

  <rect x="310" y="200" width="90" height="70" class="role-box"/>
  <text x="355" y="240" class="body-bold">Team B</text>

  <path d="M 110 190 Q 225 60 340 190" class="line" marker-end="url(#arrow)"/>

  <rect x="180" y="60" width="90" height="30" class="role-box"/>
  <text x="225" y="80" class="small" fill="#c0392b">Artifact Only</text>

  <!-- Divider -->
  <line x1="450" y1="30" x2="450" y2="400" class="role-box" stroke-dasharray="5,5" stroke="#ccc"/>

  <!-- Right Side -->
  <text x="675" y="50" class="role-box">Architecture Record Handoff</text>

  <rect x="510" y="200" width="90" height="70" class="role-box"/>
  <text x="555" y="240" class="body-bold">Team A</text>

  <rect x="750" y="200" width="90" height="70" class="role-box"/>
  <text x="795" y="240" class="body-bold">Team B</text>

  <path d="M 600 235 L 740 235" class="role-box" marker-end="url(#arrow)"/>

  <rect x="605" y="110" width="140" height="110" class="role-box"/>
  <text x="675" y="130" class="body-bold" fill="#145a32" font-size="13px">Arch Record</text>

  <rect x="615" y="140" width="120" height="20" class="role-box"/>
  <text x="675" y="154" class="small" font-size="11px">1. Core Claim</text>

  <rect x="615" y="165" width="120" height="20" class="role-box"/>
  <text x="675" y="179" class="small" font-size="11px">2. Rejected Options</text>

  <rect x="615" y="190" width="120" height="20" class="role-box"/>
  <text x="675" y="204" class="small" font-size="11px">3. Waivers</text>
</svg>
