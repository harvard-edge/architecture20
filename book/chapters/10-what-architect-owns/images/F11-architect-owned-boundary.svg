<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img">
  <title>What the architect owns</title>
  <desc>A clean rectangular diagram separating assistable Architecture 2.0 loop work from nondelegable architect-owned responsibility, with the architect-owned stages marked by icons.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: sans-serif; }
      .label { font-size: 14px; font-weight: 700; fill: #222222; }
      .small { font-size: 11.5px; fill: #444444; }
      .micro { font-size: 10.5px; fill: #555555; }
      .note { font-size: 12px; font-weight: 700; fill: #1683A6; }
      .assist { fill: #F0ECFA; stroke: #1683A6; stroke-width: 1.4; }
      .record { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.3; }
      .own { fill: #FDECEC; stroke: #DE3D3C; stroke-width: 1.4; }
      .field { fill: #F0ECFA; stroke: #1683A6; stroke-width: 1.4; }
      .boundary { fill: #F0ECFA; stroke: #1683A6; stroke-width: 1.5; }
      .arrow { stroke: #333333; stroke-width: 2; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .thin { stroke: #555555; stroke-width: 1.4; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
    </style>
  </defs>

  <rect width="800" height="500" fill="#FFFFFF"/>
  <g class="font" transform="translate(0,-54)">

    <text class="note" x="61" y="116">assistable loop work</text>
    <rect class="assist" x="61" y="134" width="110" height="54"/>
    <text class="label" x="116" y="156" text-anchor="middle">represent</text>
    <text class="micro" x="116" y="174" text-anchor="middle">state + traces</text>
    <rect class="assist" x="203" y="134" width="110" height="54"/>
    <text class="label" x="258" y="156" text-anchor="middle">generate</text>
    <text class="micro" x="258" y="174" text-anchor="middle">candidates</text>
    <rect class="assist" x="345" y="134" width="110" height="54"/>
    <text class="label" x="400" y="156" text-anchor="middle">evaluate</text>
    <text class="micro" x="400" y="174" text-anchor="middle">tools + proxies</text>
    <rect class="assist" x="487" y="134" width="110" height="54"/>
    <text class="label" x="542" y="156" text-anchor="middle">critique</text>
    <text class="micro" x="542" y="174" text-anchor="middle">find failures</text>
    <rect class="assist" x="629" y="134" width="110" height="54"/>
    <text class="label" x="684" y="156" text-anchor="middle">record</text>
    <text class="micro" x="684" y="174" text-anchor="middle">evidence</text>

    <line class="arrow" x1="171" y1="161" x2="203" y2="161" marker-end="url(#arrow)"/>
    <line class="arrow" x1="313" y1="161" x2="345" y2="161" marker-end="url(#arrow)"/>
    <line class="arrow" x1="455" y1="161" x2="487" y2="161" marker-end="url(#arrow)"/>
    <line class="arrow" x1="597" y1="161" x2="629" y2="161" marker-end="url(#arrow)"/>

    <rect class="record" x="61" y="215" width="678" height="48"/>
    <text class="label" x="400" y="236" text-anchor="middle">evidence record</text>
    <text class="small" x="400" y="254" text-anchor="middle">assumptions, tool versions, uncertainty, failures, rejected alternatives, provenance</text>

    <line class="thin" x1="684" y1="188" x2="684" y2="215"/>
    <line class="thin" x1="400" y1="263" x2="400" y2="290"/>

    <rect class="boundary" x="45" y="290" width="710" height="134"/>
    <text class="note" x="400" y="314" text-anchor="middle">architect-owned accountability boundary</text>

    <rect class="own" x="61" y="332" width="110" height="62" style="fill:#E4F1F6;stroke:#1683A6"/>
    <g stroke="#1683A6" stroke-width="1.7" fill="none"><circle cx="116" cy="350" r="6"/><circle cx="116" cy="350" r="1.7" fill="#1683A6"/></g>
    <text class="label" x="116" y="373" text-anchor="middle">intent</text>
    <text class="micro" x="116" y="388" text-anchor="middle">and constraints</text>

    <rect class="own" x="203" y="332" width="110" height="62" style="fill:#F0ECFA;stroke:#6A4FC7"/>
    <g stroke="#6A4FC7" stroke-width="1.7" fill="none"><line x1="250" y1="347" x2="266" y2="347"/><line x1="250" y1="351" x2="266" y2="351"/><line x1="250" y1="355" x2="266" y2="355"/></g>
    <text class="label" x="258" y="373" text-anchor="middle">abstraction</text>
    <text class="micro" x="258" y="388" text-anchor="middle">representation</text>

    <rect class="own" x="345" y="332" width="110" height="62" style="fill:#E7F5EC;stroke:#1E9E48"/>
    <g stroke="#1E9E48" stroke-width="1.5" fill="none"><rect x="395" y="344" width="10" height="12" rx="1"/><line x1="397" y1="348" x2="403" y2="348"/><line x1="397" y1="352" x2="403" y2="352"/></g>
    <text class="label" x="400" y="373" text-anchor="middle">evidence</text>
    <text class="micro" x="400" y="388" text-anchor="middle">standard</text>

    <rect class="own" x="487" y="332" width="110" height="62"/>
    <g stroke="#DE3D3C" stroke-width="1.7" fill="none"><circle cx="542" cy="350" r="6"/><line x1="538" y1="354" x2="546" y2="346"/></g>
    <text class="label" x="542" y="373" text-anchor="middle">reject</text>
    <text class="micro" x="542" y="388" text-anchor="middle">or commit</text>

    <rect class="own" x="629" y="332" width="110" height="62" style="fill:#FBEDF4;stroke:#D24D96"/>
    <g stroke="#D24D96" stroke-width="1.7" fill="none"><circle cx="684" cy="350" r="6"/><path d="M 681 350 L 683 353 L 688 347"/></g>
    <text class="label" x="684" y="373" text-anchor="middle">answer</text>
    <text class="micro" x="684" y="388" text-anchor="middle">for result</text>

    <line class="arrow" x1="171" y1="363" x2="203" y2="363" marker-end="url(#arrow)"/>
    <line class="arrow" x1="313" y1="363" x2="345" y2="363" marker-end="url(#arrow)"/>
    <line class="arrow" x1="455" y1="363" x2="487" y2="363" marker-end="url(#arrow)"/>
    <line class="arrow" x1="597" y1="363" x2="629" y2="363" marker-end="url(#arrow)"/>

    <rect class="field" x="170" y="454" width="460" height="28"/>
    <text class="small" x="400" y="473" text-anchor="middle">community infrastructure: schemas, benchmarks, provenance, shared tasks</text>
  </g>
</svg>
