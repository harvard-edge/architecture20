<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" role="img" aria-labelledby="tacit-title tacit-desc">
  <title id="tacit-title">Tacit knowledge enters a bounded study through elicitation and accountable validation</title>
  <desc id="tacit-desc">Domain knowledge flows through AI-assisted elicitation and organization, then validation by an accountable domain role, before it becomes represented study state. A blocked path shows that elicitation cannot write authoritative state directly. Conflicts, expiry, and new evidence return represented state for revalidation.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1683A6"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .source { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.5; }
      .assist { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.4; }
      .validate { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.4; }
      .state-panel { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.5; }
      .state { fill: #FFFFFF; stroke: #1683A6; stroke-width: 1.4; }
      .warning { fill: #FDECEC; stroke: #DE3D3C; stroke-width: 1.5; stroke-dasharray: 5 4; }
      .stage { font-size: 13px; font-weight: 700; fill: #136680; letter-spacing: 0.6px; }
      .heading { font-size: 13.5px; font-weight: 700; fill: #20252B; }
      .label { font-size: 12.5px; font-weight: 700; fill: #20252B; }
      .body { font-size: 11.5px; fill: #444444; }
      .small { font-size: 11.2px; fill: #444444; }
      .note { font-size: 11.4px; font-weight: 700; fill: #3E474B; }
      .arrow { stroke: #333333; stroke-width: 2; fill: none; stroke-linecap: square; marker-end: url(#arrow); }
      .revalidate { stroke: #1683A6; stroke-width: 2; fill: none; stroke-dasharray: 5 4; marker-end: url(#arrow-teal); }
      .blocked { stroke: #DE3D3C; stroke-width: 1.8; fill: none; stroke-dasharray: 5 4; }
      .divider { stroke: #9AA8B5; stroke-width: 1; }
    </style>
  </defs>

  <rect width="960" height="620" fill="#FFFFFF"/>
  <g class="font">
    <text class="stage" x="28" y="42">1 · DOMAIN KNOWLEDGE</text>
    <rect class="source" x="28" y="58" width="260" height="198"/>
    <text class="heading" x="158" y="88" text-anchor="middle">Situated expertise</text>
    <line class="divider" x1="52" y1="103" x2="264" y2="103"/>
    <text class="label" x="56" y="135">Compiler and ISA constraints</text>
    <text class="label" x="56" y="175">Physical implementation</text>
    <text class="label" x="56" y="196">limits</text>
    <text class="label" x="56" y="222">Workload and product</text>
    <text class="label" x="56" y="243">obligations</text>

    <text class="stage" x="328" y="42">2 · ELICIT AND ORGANIZE</text>
    <rect class="assist" x="328" y="58" width="280" height="198"/>
    <text class="heading" x="468" y="88" text-anchor="middle">AI-assisted elicitation</text>
    <line class="divider" x1="352" y1="103" x2="584" y2="103"/>
    <text class="body" x="352" y="134">Interview and document synthesis</text>
    <text class="body" x="352" y="164">Candidate assumptions and</text>
    <text class="body" x="352" y="185">constraints</text>
    <text class="body" x="352" y="214">Contradictions and missing cases</text>
    <text class="note" x="468" y="242" text-anchor="middle">Proposes entries without authority</text>

    <text class="stage" x="648" y="42">3 · VALIDATE</text>
    <rect class="validate" x="648" y="58" width="260" height="198"/>
    <text class="heading" x="778" y="88" text-anchor="middle">Accountable domain role</text>
    <line class="divider" x1="672" y1="103" x2="884" y2="103"/>
    <text class="body" x="672" y="134">Challenge with tools and records</text>
    <text class="body" x="672" y="166">Resolve conflicts and scope</text>
    <text class="body" x="672" y="198">Approve, reject, or qualify</text>
    <text class="body" x="672" y="219">each proposed entry</text>
    <text class="note" x="778" y="244" text-anchor="middle">Owns entry into study state</text>

    <path class="arrow" d="M 288 157 L 328 157"/>
    <path class="arrow" d="M 608 157 L 648 157"/>

    <text class="stage" x="328" y="330">4 · REPRESENT IN THE BOUNDED STUDY</text>
    <rect class="state-panel" x="328" y="345" width="580" height="185"/>
    <text class="heading" x="618" y="377" text-anchor="middle">Represented study state</text>
    <text class="body" x="618" y="401" text-anchor="middle">machine-readable, scoped, attributable, and open to challenge</text>

    <rect class="state" x="344" y="426" width="130" height="76"/>
    <text class="label" x="409" y="455" text-anchor="middle">Constraints</text>
    <text class="small" x="409" y="479" text-anchor="middle">legal moves</text>
    <rect class="state" x="482" y="426" width="130" height="76"/>
    <text class="label" x="547" y="455" text-anchor="middle">Assumptions</text>
    <text class="small" x="547" y="479" text-anchor="middle">scope and basis</text>
    <rect class="state" x="620" y="426" width="130" height="76"/>
    <text class="label" x="685" y="450" text-anchor="middle">Rejection</text>
    <text class="label" x="685" y="470" text-anchor="middle">checks</text>
    <text class="small" x="685" y="491" text-anchor="middle">early failures</text>
    <rect class="state" x="758" y="426" width="130" height="76"/>
    <text class="label" x="823" y="450" text-anchor="middle">Validity</text>
    <text class="label" x="823" y="470" text-anchor="middle">conditions</text>
    <text class="small" x="823" y="491" text-anchor="middle">scope and expiry</text>

    <path class="arrow" d="M 778 256 L 778 345"/>

    <path class="blocked" d="M 468 256 L 468 274"/>
    <circle cx="468" cy="288" r="14" fill="#FFFFFF" stroke="#DE3D3C" stroke-width="1.8"/>
    <path d="M 460 280 L 476 296 M 476 280 L 460 296" stroke="#DE3D3C" stroke-width="2.2"/>
    <text class="small" x="444" y="293" text-anchor="end" fill="#C62A2A">no direct authority path</text>

    <path class="revalidate" d="M 850 530 L 850 557 L 936 557 L 936 284 L 878 284 L 878 256"/>
    <text class="small" x="618" y="597" text-anchor="middle" fill="#136680">conflict, expiry, or new evidence triggers revalidation</text>

    <rect class="warning" x="28" y="373" width="260" height="157"/>
    <text class="label" x="158" y="403" text-anchor="middle" fill="#C62A2A">Authority boundary</text>
    <text class="small" x="158" y="430" text-anchor="middle">Elicitation can surface and</text>
    <text class="small" x="158" y="451" text-anchor="middle">organize knowledge. It cannot write</text>
    <text class="small" x="158" y="472" text-anchor="middle">authoritative study state without</text>
    <text class="small" x="158" y="493" text-anchor="middle">validation by an accountable</text>
    <text class="small" x="158" y="514" text-anchor="middle">domain role.</text>
  </g>
</svg>
