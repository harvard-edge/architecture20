<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" role="img" aria-labelledby="tacit-title tacit-desc">
  <title id="tacit-title">Tacit knowledge enters a bounded study through elicitation and accountable validation</title>
  <desc id="tacit-desc">Domain knowledge flows through AI-assisted elicitation and organization, then validation by an accountable domain role, before it becomes represented study state. A blocked path shows that elicitation cannot write authoritative state directly. Conflicts, expiry, and new evidence return represented state for revalidation.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1683A6"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .source { fill: #F8FAFC; stroke: #94A3B8; stroke-width: 1.6; }
      .assist { fill: #E7F4F7; stroke: #1F6F8B; stroke-width: 1.6; }
      .validate { fill: #FFF3E5; stroke: #C8751A; stroke-width: 1.7; }
      .state-panel { fill: #F5FAFC; stroke: #1683A6; stroke-width: 1.8; }
      .state { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.4; }
      .warning { fill: #FDECEC; stroke: #C2413B; stroke-width: 1.5; stroke-dasharray: 6,4; }
      .stage { font-size: 14px; font-weight: 700; fill: #64748B; letter-spacing: 0; }
      .heading { font-size: 21px; font-weight: 700; fill: #20252B; }
      .label { font-size: 16px; font-weight: 700; fill: #20252B; }
      .body { font-size: 15px; fill: #475569; }
      .small { font-size: 14px; fill: #475569; }
      .note { font-size: 14.5px; font-weight: 700; fill: #475569; }
      .arrow { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .revalidate { stroke: #1683A6; stroke-width: 2; fill: none; stroke-dasharray: 6,4; marker-end: url(#arrow-teal); }
      .blocked { stroke: #C2413B; stroke-width: 1.8; fill: none; stroke-dasharray: 6,4; }
      .divider { stroke: #CBD5E1; stroke-width: 1.2; }
    </style>
  </defs>

  <rect width="1000" height="610" fill="#FFFFFF"/>
  <g class="font">
    <text class="stage" x="48" y="42">1 · DOMAIN KNOWLEDGE</text>
    <rect class="source" x="40" y="58" width="270" height="198" rx="4"/>
    <text class="heading" x="175" y="90" text-anchor="middle">Situated expertise</text>
    <line class="divider" x1="64" y1="105" x2="286" y2="105"/>
    <text class="label" x="68" y="137">Compiler and ISA constraints</text>
    <text class="label" x="68" y="177">Physical implementation</text>
    <text class="label" x="68" y="198">limits</text>
    <text class="label" x="68" y="224">Workload and product</text>
    <text class="label" x="68" y="245">obligations</text>

    <text class="stage" x="365" y="42">2 · ELICIT AND ORGANIZE</text>
    <rect class="assist" x="357" y="58" width="286" height="198" rx="4"/>
    <text class="heading" x="500" y="90" text-anchor="middle">AI-assisted elicitation</text>
    <line class="divider" x1="381" y1="105" x2="619" y2="105"/>
    <text class="body" x="385" y="136">Interview and document synthesis</text>
    <text class="body" x="385" y="166">Candidate assumptions and</text>
    <text class="body" x="385" y="187">constraints</text>
    <text class="body" x="385" y="216">Contradictions and missing cases</text>
    <text class="note" x="500" y="243" text-anchor="middle">Proposes entries without authority</text>

    <text class="stage" x="698" y="42">3 · VALIDATE</text>
    <rect class="validate" x="690" y="58" width="270" height="198" rx="4"/>
    <text class="heading" x="825" y="90" text-anchor="middle">Accountable domain role</text>
    <line class="divider" x1="714" y1="105" x2="936" y2="105"/>
    <text class="body" x="718" y="136">Challenge with tools and records</text>
    <text class="body" x="718" y="168">Resolve conflicts and scope</text>
    <text class="body" x="718" y="200">Approve, reject, or qualify</text>
    <text class="body" x="718" y="221">each proposed entry</text>
    <text class="note" x="825" y="246" text-anchor="middle">Owns entry into study state</text>

    <path class="arrow" d="M 310 157 L 357 157"/>
    <path class="arrow" d="M 643 157 L 690 157"/>

    <text class="stage" x="365" y="330">4 · REPRESENT IN THE BOUNDED STUDY</text>
    <rect class="state-panel" x="357" y="345" width="603" height="185" rx="4"/>
    <text class="heading" x="658.5" y="379" text-anchor="middle">Represented study state</text>
    <text class="body" x="658.5" y="405" text-anchor="middle">machine-readable, scoped, attributable, and open to challenge</text>

    <rect class="state" x="373" y="426" width="135" height="76" rx="3"/>
    <text class="label" x="440.5" y="456" text-anchor="middle">Constraints</text>
    <text class="small" x="440.5" y="481" text-anchor="middle">legal moves</text>
    <rect class="state" x="516" y="426" width="135" height="76" rx="3"/>
    <text class="label" x="583.5" y="456" text-anchor="middle">Assumptions</text>
    <text class="small" x="583.5" y="481" text-anchor="middle">scope and basis</text>
    <rect class="state" x="659" y="426" width="135" height="76" rx="3"/>
    <text class="label" x="726.5" y="451" text-anchor="middle">Rejection</text>
    <text class="label" x="726.5" y="473" text-anchor="middle">checks</text>
    <text class="small" x="726.5" y="494" text-anchor="middle">early failures</text>
    <rect class="state" x="802" y="426" width="135" height="76" rx="3"/>
    <text class="label" x="869.5" y="451" text-anchor="middle">Validity</text>
    <text class="label" x="869.5" y="473" text-anchor="middle">conditions</text>
    <text class="small" x="869.5" y="494" text-anchor="middle">scope and expiry</text>

    <path class="arrow" d="M 825 256 L 825 345"/>

    <path class="blocked" d="M 500 256 L 500 274"/>
    <circle cx="500" cy="288" r="14" fill="#FFFFFF" stroke="#C2413B" stroke-width="1.8"/>
    <path d="M 492 280 L 508 296 M 508 280 L 492 296" stroke="#C2413B" stroke-width="2.2"/>
    <text class="small" x="476" y="293" text-anchor="end" fill="#9F2F2B">no direct authority path</text>

    <path class="revalidate" d="M 900 530 L 900 557 L 976 557 L 976 284 L 930 284 L 930 256"/>
    <text class="small" x="643" y="597" text-anchor="middle" fill="#1683A6">conflict, expiry, or new evidence triggers revalidation</text>

    <rect class="warning" x="40" y="373" width="270" height="157" rx="4"/>
    <text class="label" x="175" y="403" text-anchor="middle" fill="#9F2F2B">Authority boundary</text>
    <text class="small" x="175" y="430" text-anchor="middle">Elicitation can surface and</text>
    <text class="small" x="175" y="451" text-anchor="middle">organize knowledge. It cannot write</text>
    <text class="small" x="175" y="472" text-anchor="middle">authoritative study state without</text>
    <text class="small" x="175" y="493" text-anchor="middle">validation by an accountable</text>
    <text class="small" x="175" y="514" text-anchor="middle">domain role.</text>
  </g>
</svg>
