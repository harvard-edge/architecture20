<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="commitment-title commitment-desc">
  <title id="commitment-title">Evidence and commitment remain separate until an accountable role maps them</title>
  <desc id="commitment-desc">Two parallel panels separate evidence available to a bounded architecture study from the commitments a claim or decision may authorize. Both feed an accountable mapping that states required evidence, challenge conditions, ownership, and the strongest supported commitment.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .panel { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.5; }
      .evidence { fill: #E7F5EC; stroke: #1E9E48; stroke-width: 1.4; }
      .decision { fill: #FBEDF4; stroke: #D24D96; stroke-width: 1.4; }
      .mapping { fill: #FBF0DE; stroke: #E68A17; stroke-width: 2; }
      .heading { font-size: 13.5px; font-weight: 700; fill: #20252B; }
      .label { font-size: 12.5px; font-weight: 700; fill: #20252B; }
      .body { font-size: 11.5px; fill: #444444; }
      .note { font-size: 11.2px; font-weight: 700; fill: #3E474B; }
      .mapping-body { font-size: 11.5px; fill: #444444; }
      .arrow { stroke: #333333; stroke-width: 2; fill: none; stroke-linecap: square; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="900" height="520" fill="#FFFFFF"/>
  <g class="font">
    <rect class="panel" x="30" y="26" width="402" height="340"/>
    <text class="heading" x="231" y="58" text-anchor="middle">Evidence available to the study</text>
    <text class="body" x="231" y="80" text-anchor="middle">what the bounded study can support and reproduce</text>

    <rect class="evidence" x="57" y="107" width="348" height="45"/>
    <text class="label" x="231" y="134" text-anchor="middle">Analytical model or proxy</text>
    <rect class="evidence" x="57" y="166" width="348" height="45"/>
    <text class="label" x="231" y="193" text-anchor="middle">Trace or cycle-level simulation</text>
    <rect class="evidence" x="57" y="225" width="348" height="45"/>
    <text class="label" x="231" y="252" text-anchor="middle">RTL, synthesis, or physical check</text>
    <rect class="evidence" x="57" y="284" width="348" height="45"/>
    <text class="label" x="231" y="311" text-anchor="middle">Prototype, silicon, or deployment</text>
    <text class="note" x="231" y="350" text-anchor="middle">Fidelity, cost, scope, and validation vary.</text>

    <rect class="panel" x="468" y="26" width="402" height="340"/>
    <text class="heading" x="669" y="58" text-anchor="middle">Commitment ladder</text>
    <text class="body" x="669" y="80" text-anchor="middle">what an architectural claim or decision may authorize</text>

    <rect class="decision" x="495" y="102" width="348" height="38"/>
    <text class="label" x="669" y="125" text-anchor="middle">Exploratory</text>
    <rect class="decision" x="495" y="150" width="348" height="38"/>
    <text class="label" x="669" y="173" text-anchor="middle">Experimental</text>
    <rect class="decision" x="495" y="198" width="348" height="38"/>
    <text class="label" x="669" y="221" text-anchor="middle">Implementation</text>
    <rect class="decision" x="495" y="246" width="348" height="38"/>
    <text class="label" x="669" y="269" text-anchor="middle">Integration</text>
    <rect class="decision" x="495" y="294" width="348" height="38"/>
    <text class="label" x="669" y="317" text-anchor="middle">Irreversible</text>
    <text class="note" x="669" y="350" text-anchor="middle">Consequence and reversibility vary.</text>

    <path class="arrow" d="M 231 366 L 231 407"/>
    <path class="arrow" d="M 669 366 L 669 407"/>
    <rect class="mapping" x="72" y="407" width="756" height="88"/>
    <text class="heading" x="450" y="436" text-anchor="middle">Accountable evidence-to-commitment mapping</text>
    <text class="mapping-body" x="450" y="460" text-anchor="middle">For each claim or decision, state the required evidence, challenge conditions, and owner.</text>
    <text class="mapping-body" x="450" y="480" text-anchor="middle">Authorize only the strongest commitment that the available evidence supports.</text>
  </g>
</svg>
