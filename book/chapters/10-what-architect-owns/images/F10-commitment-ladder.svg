<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" role="img" aria-labelledby="commitment-title commitment-desc">
  <title id="commitment-title">Evidence sources and the commitment ladder are separate</title>
  <desc id="commitment-desc">Two parallel columns distinguish evidence sources from proposed decisions. Both feed an architect-owned mapping that declares what evidence and rejection condition a decision requires.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .font { font-family: sans-serif; }
      .panel { fill: #F8FAFC; stroke: #94A3B8; stroke-width: 1.4; }
      .evidence { fill: #E7F4F7; stroke: #1F6F8B; stroke-width: 1.3; }
      .decision { fill: #FBEDF4; stroke: #B33C7A; stroke-width: 1.3; }
      .mapping { fill: #FFF3E5; stroke: #C8751A; stroke-width: 1.6; }
      .heading { font-size: 17px; font-weight: 700; fill: #20252B; }
      .label { font-size: 13.5px; font-weight: 700; fill: #20252B; }
      .body { font-size: 11.5px; fill: #475569; }
      .note { font-size: 11.5px; font-weight: 700; fill: #475569; }
      .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="760" height="430" fill="#FFFFFF"/>
  <g class="font">
    <rect class="panel" x="34" y="28" width="326" height="285" rx="4"/>
    <text class="heading" x="197" y="56" text-anchor="middle">Evidence sources</text>
    <text class="body" x="197" y="75" text-anchor="middle">what the loop observed</text>

    <rect class="evidence" x="60" y="100" width="274" height="34" rx="3"/>
    <text class="label" x="197" y="122" text-anchor="middle">Analytical model or proxy</text>
    <rect class="evidence" x="60" y="148" width="274" height="34" rx="3"/>
    <text class="label" x="197" y="170" text-anchor="middle">Trace or cycle-level simulation</text>
    <rect class="evidence" x="60" y="196" width="274" height="34" rx="3"/>
    <text class="label" x="197" y="218" text-anchor="middle">RTL, synthesis, or physical check</text>
    <rect class="evidence" x="60" y="244" width="274" height="34" rx="3"/>
    <text class="label" x="197" y="266" text-anchor="middle">Prototype, silicon, or deployment</text>
    <text class="note" x="197" y="299" text-anchor="middle">Fidelity, cost, scope, and validation vary.</text>

    <rect class="panel" x="400" y="28" width="326" height="285" rx="4"/>
    <text class="heading" x="563" y="56" text-anchor="middle">Commitment ladder</text>
    <text class="body" x="563" y="75" text-anchor="middle">what the decision would authorize</text>

    <rect class="decision" x="426" y="91" width="274" height="30" rx="3"/>
    <text class="label" x="563" y="111" text-anchor="middle">Exploratory</text>
    <rect class="decision" x="426" y="130" width="274" height="30" rx="3"/>
    <text class="label" x="563" y="150" text-anchor="middle">Experimental</text>
    <rect class="decision" x="426" y="169" width="274" height="30" rx="3"/>
    <text class="label" x="563" y="189" text-anchor="middle">Implementation</text>
    <rect class="decision" x="426" y="208" width="274" height="30" rx="3"/>
    <text class="label" x="563" y="228" text-anchor="middle">Integration</text>
    <rect class="decision" x="426" y="247" width="274" height="30" rx="3"/>
    <text class="label" x="563" y="267" text-anchor="middle">Irreversible</text>
    <text class="note" x="563" y="299" text-anchor="middle">Consequence and reversibility vary.</text>

    <path class="arrow" d="M 197 313 L 285 346"/>
    <path class="arrow" d="M 563 313 L 475 346"/>
    <rect class="mapping" x="110" y="347" width="540" height="61" rx="4"/>
    <text class="heading" x="380" y="373" text-anchor="middle">Architect-owned evidence requirement</text>
    <text class="body" x="380" y="394" text-anchor="middle">For each decision, declare evidence, rejection conditions, and ownership.</text>
  </g>
</svg>
