<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 584" role="img" aria-labelledby="stackCoverageTitle stackCoverageDesc">
  <title id="stackCoverageTitle">Registry coverage of the eight-layer field-building stack</title>
  <desc id="stackCoverageDesc">Eight horizontal rows represent the eight field-building layers, ordered top to bottom from education down to datasets, benchmarks, and multi-fidelity trajectories. Each row pairs the layer name with a bar whose length equals the number of living-registry entries classified onto that layer, out of 39 total. The bottom two layers dominate: versioned environments and tool contracts hold 26 entries and datasets and benchmarks hold 9, while methods and reference practices hold 4. The five layers above methods, which are evaluation and neutral adjudication, reporting and claim interfaces, standards and governance, incentives and confidentiality, and education, each hold zero registry entries and are drawn greyed out. A bottom note bar states that 35 of 39 entries sit in the two lowest layers and dates the registry snapshot to 2026-07-14.</desc>
  <style>
    .font { font-family: Arial, Helvetica, sans-serif; }
    .eyebrow { font-size: 13px; font-weight: bold; fill: #136680; letter-spacing: 0.6px; }
    .axisnote { font-size: 11.2px; fill: #59636D; }
    .name { font-size: 12.5px; font-weight: bold; fill: #20252B; }
    .nameoff { font-size: 12.5px; font-weight: bold; fill: #8A95A0; }
    .count { font-size: 12px; font-weight: bold; }
    .sub { font-size: 11.2px; fill: #444444; }
    .zero { font-size: 11.2px; font-style: italic; fill: #8A95A0; }
    .bar { font-size: 12px; font-weight: bold; fill: #1683A6; }
  </style>
  <rect x="0" y="0" width="900" height="584" fill="#FFFFFF"/>
  <g class="font">
    <text class="eyebrow" x="28" y="32">APP C REGISTRY COVERAGE OF THE EIGHT-LAYER STACK</text>
    <text class="axisnote" x="872" y="32" text-anchor="end">bar length = registry entries classified onto the layer (of 39)</text>

    <!-- Row 1: Education (0) -->
    <rect x="28" y="56" width="270" height="44" fill="#F5F8FA" stroke="#9AA8B5" stroke-width="1.1"/>
    <text class="nameoff" x="163" y="82" text-anchor="middle">Education</text>
    <rect x="322" y="60" width="460" height="26" fill="#F5F8FA" stroke="#E4E8ED" stroke-width="1"/>
    <text class="zero" x="332" y="77">no registry entries yet</text>

    <!-- Row 2: Incentives and confidentiality (0) -->
    <rect x="28" y="112" width="270" height="44" fill="#F5F8FA" stroke="#9AA8B5" stroke-width="1.1"/>
    <text class="nameoff" x="163" y="138" text-anchor="middle">Incentives and confidentiality</text>
    <rect x="322" y="116" width="460" height="26" fill="#F5F8FA" stroke="#E4E8ED" stroke-width="1"/>
    <text class="zero" x="332" y="133">no registry entries yet</text>

    <!-- Row 3: Standards, governance, and institutions (0) -->
    <rect x="28" y="168" width="270" height="44" fill="#F5F8FA" stroke="#9AA8B5" stroke-width="1.1"/>
    <text class="nameoff" x="163" y="187" text-anchor="middle">Standards, governance,</text>
    <text class="nameoff" x="163" y="202" text-anchor="middle">and institutions</text>
    <rect x="322" y="172" width="460" height="26" fill="#F5F8FA" stroke="#E4E8ED" stroke-width="1"/>
    <text class="zero" x="332" y="189">no registry entries yet</text>

    <!-- Row 4: Reporting and claim interfaces (0) -->
    <rect x="28" y="224" width="270" height="44" fill="#F5F8FA" stroke="#9AA8B5" stroke-width="1.1"/>
    <text class="nameoff" x="163" y="250" text-anchor="middle">Reporting and claim interfaces</text>
    <rect x="322" y="228" width="460" height="26" fill="#F5F8FA" stroke="#E4E8ED" stroke-width="1"/>
    <text class="zero" x="332" y="245">no registry entries yet</text>

    <!-- Row 5: Evaluation and neutral adjudication (0) -->
    <rect x="28" y="280" width="270" height="44" fill="#F5F8FA" stroke="#9AA8B5" stroke-width="1.1"/>
    <text class="nameoff" x="163" y="299" text-anchor="middle">Evaluation and neutral</text>
    <text class="nameoff" x="163" y="314" text-anchor="middle">adjudication</text>
    <rect x="322" y="284" width="460" height="26" fill="#F5F8FA" stroke="#E4E8ED" stroke-width="1"/>
    <text class="zero" x="332" y="301">no registry entries yet</text>

    <!-- Row 6: Methods and reference practices (4, amber) -->
    <rect x="28" y="336" width="270" height="44" fill="#FBF0DE" stroke="#E68A17" stroke-width="1.4"/>
    <text class="name" x="163" y="362" text-anchor="middle" fill="#8A5310">Methods and reference practices</text>
    <rect x="322" y="340" width="460" height="26" fill="#F5F8FA" stroke="#E4E8ED" stroke-width="1"/>
    <rect x="322" y="340" width="71" height="26" fill="#FBF0DE" stroke="#E68A17" stroke-width="1.4"/>
    <text class="count" x="403" y="357" fill="#E68A17">4 of 39</text>
    <text class="sub" x="322" y="380">Apollo, AutoChip, ChipNeMo, VeriGen</text>

    <!-- Row 7: Versioned environments and tool contracts (26, violet) -->
    <rect x="28" y="392" width="270" height="44" fill="#F0ECFA" stroke="#6A4FC7" stroke-width="1.4"/>
    <text class="name" x="163" y="411" text-anchor="middle" fill="#59429E">Versioned environments</text>
    <text class="name" x="163" y="426" text-anchor="middle" fill="#59429E">and tool contracts</text>
    <rect x="322" y="396" width="460" height="26" fill="#F5F8FA" stroke="#E4E8ED" stroke-width="1"/>
    <rect x="322" y="396" width="460" height="26" fill="#F0ECFA" stroke="#6A4FC7" stroke-width="1.4"/>
    <text class="count" x="792" y="413" fill="#6A4FC7">26 of 39</text>
    <text class="sub" x="322" y="436">gem5, FireSim, Chipyard, Verilator, ArchGym, Timeloop, Chisel, OpenROAD, and 18 more</text>

    <!-- Row 8: Datasets, benchmarks, and multi-fidelity trajectories (9, teal) -->
    <rect x="28" y="448" width="270" height="44" fill="#E4F1F6" stroke="#1683A6" stroke-width="1.4"/>
    <text class="name" x="163" y="467" text-anchor="middle" fill="#136680">Datasets, benchmarks, and</text>
    <text class="name" x="163" y="482" text-anchor="middle" fill="#136680">multi-fidelity trajectories</text>
    <rect x="322" y="452" width="460" height="26" fill="#F5F8FA" stroke="#E4E8ED" stroke-width="1"/>
    <rect x="322" y="452" width="159" height="26" fill="#E4F1F6" stroke="#1683A6" stroke-width="1.4"/>
    <text class="count" x="491" y="469" fill="#1683A6">9 of 39</text>
    <text class="sub" x="322" y="492">VerilogEval, CVDP, RTLLM, RTL-Repo, QuArch, MLPerf Inference, KernelBench, and 2 more</text>

    <!-- Note bar -->
    <rect x="28" y="512" width="844" height="52" fill="#F5F8FA" stroke="#9AA8B5" stroke-width="1.1"/>
    <text class="bar" x="450" y="533" text-anchor="middle">35 of 39 entries sit in the two lowest layers; the five layers above methods hold none yet.</text>
    <text class="bar" x="450" y="550" text-anchor="middle">Living-registry snapshot, arch2.mlsysbook.ai/tools, 2026-07-14 · one editorial classification per entry</text>
  </g>
