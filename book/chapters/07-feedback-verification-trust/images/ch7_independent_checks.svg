<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
    <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .panel-title { font-size: 13.5px; font-weight: 700; fill: #20252B; }
      .panel-subtitle { font-size: 11.5px; fill: #59636D; }
      .body-bold { font-size: 12.5px; font-weight: 700; fill: #222222; }
      .chip { font-size: 12.5px; font-weight: 700; fill: #222222; }
      .small { font-size: 11.2px; fill: #444444; }
      .panel { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .role-box { fill: #FFFFFF; stroke: #1683A6; stroke-width: 1.45; }
      .line { stroke: #333333; stroke-width: 1.9; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
    </style>
  </defs>

  <!-- Left Side -->
  <text x="200" y="50" class="role-box">Correlated Error</text>

  <rect x="120" y="100" width="160" height="60" class="role-box"/>
  <text x="200" y="125" class="body-bold">Generator LLM</text>
  <text x="200" y="145" class="small">Produces Artifact</text>

  <path d="M 200 160 L 200 230" class="role-box" marker-end="url(#arrow-error)"/>

  <rect x="120" y="240" width="160" height="60" class="role-box"/>
  <text x="200" y="265" class="body-bold">Critic LLM</text>
  <text x="200" y="285" class="small">Same Blind Spots</text>

  <rect x="100" y="340" width="200" height="40" class="role-box"/>
  <text x="200" y="365" class="body-bold" fill="#c0392b">False Confidence</text>

  <!-- Divider -->
  <line x1="400" y1="30" x2="400" y2="400" class="line" stroke-dasharray="5,5"/>

  <!-- Right Side -->
  <text x="600" y="50" class="role-box">Independent Modality Shift</text>

  <rect x="520" y="100" width="160" height="60" class="role-box"/>
  <text x="600" y="125" class="body-bold">Generator LLM</text>
  <text x="600" y="145" class="small">Produces Artifact</text>

  <path d="M 600 160 L 600 230" class="role-box" marker-end="url(#arrow-success)"/>

  <rect x="520" y="240" width="160" height="60" class="role-box"/>
  <text x="600" y="265" class="body-bold">Physical Simulator</text>
  <text x="600" y="285" class="small">Deterministic Physics</text>

  <rect x="500" y="340" width="200" height="40" class="role-box"/>
  <text x="600" y="365" class="body-bold" fill="#27ae60">Grounded Verification</text>
</svg>
