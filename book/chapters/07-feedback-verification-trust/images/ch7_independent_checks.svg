<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 350" role="img" aria-labelledby="ic-title ic-desc">
  <title id="ic-title">Correlated error versus independent modality shift</title>
  <desc id="ic-desc">A two-column contrast split by a dashed vertical divider. The left column, labeled Correlated Error, runs from a Generator LLM down to a Critic LLM that shares the same blind spots, and ends in a red False confidence box. The right column, labeled Independent Modality Shift, runs from the same Generator LLM down to a Physical simulator governed by deterministic physics, and ends in a green Grounded verification box. Both generator and critic are the same LLM modality, so their agreement is correlated; only the physical simulator adds an independent check.</desc>
  <defs>
    <marker id="arrow-dark" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#C62A2A"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .eyebrow-l { font-size: 13px; font-weight: 700; fill: #C62A2A; letter-spacing: 0.6px; }
      .eyebrow-r { font-size: 13px; font-weight: 700; fill: #157A38; letter-spacing: 0.6px; }
      .title { font-size: 13px; font-weight: 700; fill: #20252B; }
      .sub { font-size: 11.5px; fill: #444444; }
      .out-fail { font-size: 13px; font-weight: 700; fill: #C62A2A; }
      .out-verify { font-size: 13px; font-weight: 700; fill: #157A38; }
      .llm { fill: #F0ECFA; stroke: #6A4FC7; stroke-width: 1.45; }
      .phys { fill: #E7F5EC; stroke: #1E9E48; stroke-width: 1.45; }
      .fail { fill: #FDECEC; stroke: #DE3D3C; stroke-width: 2.0; }
      .verify { fill: #E7F5EC; stroke: #1E9E48; stroke-width: 2.0; }
      .flow { stroke: #333333; stroke-width: 2.0; fill: none; stroke-linecap: square; }
      .flow-fail { stroke: #C62A2A; stroke-width: 2.0; fill: none; stroke-linecap: square; }
      .divider { stroke: #9AA8B5; stroke-width: 1.5; fill: none; stroke-dasharray: 5 4; }
    </style>
  </defs>

  <rect width="720" height="350" fill="#FFFFFF"/>
  <g class="font">
    <line class="divider" x1="360" y1="28" x2="360" y2="322"/>

    <!-- Left column: correlated error -->
    <text class="eyebrow-l" x="180" y="42" text-anchor="middle">CORRELATED ERROR</text>

    <rect class="llm" x="75" y="66" width="210" height="62"/>
    <text class="title" x="180" y="93" text-anchor="middle">Generator LLM</text>
    <text class="sub" x="180" y="112" text-anchor="middle">Produces artifact</text>

    <path class="flow-fail" d="M 180 128 V 162" marker-end="url(#arrow-red)"/>

    <rect class="llm" x="75" y="162" width="210" height="62"/>
    <text class="title" x="180" y="189" text-anchor="middle">Critic LLM</text>
    <text class="sub" x="180" y="208" text-anchor="middle">Same blind spots</text>

    <path class="flow-fail" d="M 180 224 V 258" marker-end="url(#arrow-red)"/>

    <rect class="fail" x="75" y="258" width="210" height="48"/>
    <text class="out-fail" x="180" y="287" text-anchor="middle">False confidence</text>

    <!-- Right column: independent modality shift -->
    <text class="eyebrow-r" x="540" y="42" text-anchor="middle">INDEPENDENT MODALITY SHIFT</text>

    <rect class="llm" x="435" y="66" width="210" height="62"/>
    <text class="title" x="540" y="93" text-anchor="middle">Generator LLM</text>
    <text class="sub" x="540" y="112" text-anchor="middle">Produces artifact</text>

    <path class="flow" d="M 540 128 V 162" marker-end="url(#arrow-dark)"/>

    <rect class="phys" x="435" y="162" width="210" height="62"/>
    <text class="title" x="540" y="189" text-anchor="middle">Physical simulator</text>
    <text class="sub" x="540" y="208" text-anchor="middle">Deterministic physics</text>

    <path class="flow" d="M 540 224 V 258" marker-end="url(#arrow-dark)"/>

    <rect class="verify" x="435" y="258" width="210" height="48"/>
    <text class="out-verify" x="540" y="287" text-anchor="middle">Grounded verification</text>
  </g>
</svg>
