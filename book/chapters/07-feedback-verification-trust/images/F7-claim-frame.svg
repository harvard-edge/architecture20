<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      .text-title { font-family: -apple-system, sans-serif; font-size: 16px; font-weight: bold; fill: #111; text-anchor: middle;}
      .text-body { font-family: -apple-system, sans-serif; font-size: 14px; fill: #333; text-anchor: middle;}
      .text-small { font-family: -apple-system, sans-serif; font-size: 12px; fill: #555; text-anchor: middle;}
      
      .box-cand { fill: #e8eaf6; stroke: #3f51b5; stroke-width: 2px; rx: 8px; }
      .box-prop { fill: #fff3e0; stroke: #ff9800; stroke-width: 2px; rx: 8px; }
      .box-env { fill: #e8f5e9; stroke: #4caf50; stroke-width: 2px; rx: 8px; }
      
      .edge { stroke: #555; stroke-width: 2px; fill: none; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <text x="400" y="30" class="text-title">The Compact Claim Frame</text>

  <!-- Left: Artifacts -->
  <rect x="50" y="100" width="160" height="50" class="box-cand" />
  <text x="130" y="130" class="text-body" font-weight="bold">Candidate</text>

  <rect x="50" y="200" width="160" height="50" class="box-cand" />
  <text x="130" y="230" class="text-body" font-weight="bold">Comparator</text>
  
  <!-- Middle: Measurement -->
  <rect x="320" y="100" width="160" height="50" class="box-prop" />
  <text x="400" y="130" class="text-body" font-weight="bold">Property</text>

  <rect x="320" y="200" width="160" height="50" class="box-prop" />
  <text x="400" y="230" class="text-body" font-weight="bold">Metric</text>

  <!-- Right: Environment Constraints -->
  <rect x="590" y="60" width="160" height="50" class="box-env" />
  <text x="670" y="90" class="text-body" font-weight="bold">Workload</text>

  <rect x="590" y="150" width="160" height="50" class="box-env" />
  <text x="670" y="180" class="text-body" font-weight="bold">Tool Path</text>
  
  <rect x="590" y="240" width="160" height="50" class="box-env" />
  <text x="670" y="270" class="text-body" font-weight="bold">Validity Region</text>

  <!-- Edges -->
  <!-- Candidate to Property -->
  <path d="M 210 125 L 320 125" class="edge" marker-end="url(#arrow)"/>
  
  <!-- Comparator to Property -->
  <path d="M 210 225 L 265 225 L 265 140 L 320 140" class="edge" marker-end="url(#arrow)"/>

  <!-- Property to Metric -->
  <path d="M 400 150 L 400 200" class="edge" marker-end="url(#arrow)"/>
  
  <!-- Metric to Conditions -->
  <path d="M 480 225 L 535 225 L 535 85 L 590 85" class="edge" marker-end="url(#arrow)"/>
  <path d="M 480 225 L 535 225 L 535 175 L 590 175" class="edge" marker-end="url(#arrow)"/>
  <path d="M 480 225 L 535 225 L 535 265 L 590 265" class="edge" marker-end="url(#arrow)"/>

</svg>
