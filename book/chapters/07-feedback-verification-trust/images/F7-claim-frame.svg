<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 350" role="img" aria-labelledby="cf-title cf-desc">
  <title id="cf-title">The compact claim frame</title>
  <desc id="cf-desc">A relational graph in three columns. On the left, an artifact column pairs a Candidate with a Comparator. Both feed a middle measurement column of a Property and its Metric. The Metric fans out to a right-hand scope-and-validity column of three conditions: Workload, Tool Path, and Validity Region. The frame shows that a claim links a candidate artifact to a measured property and metric, evaluated only within a stated scope.</desc>
  <defs>
    <marker id="arrow-dark" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .eb-artifact { font-size: 13px; font-weight: 700; fill: #59429E; letter-spacing: 0.6px; }
      .eb-measure { font-size: 13px; font-weight: 700; fill: #136680; letter-spacing: 0.6px; }
      .eb-scope { font-size: 13px; font-weight: 700; fill: #C62A2A; letter-spacing: 0.6px; }
      .label { font-size: 13px; font-weight: 700; fill: #20252B; }
      .artifact { fill: #F0ECFA; stroke: #6A4FC7; stroke-width: 1.45; }
      .measure { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.45; }
      .scope { fill: #FDECEC; stroke: #DE3D3C; stroke-width: 1.45; }
      .flow { stroke: #333333; stroke-width: 1.9; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
    </style>
  </defs>

  <rect width="780" height="350" fill="#FFFFFF"/>
  <g class="font">
    <text class="eb-artifact" x="135" y="32" text-anchor="middle">ARTIFACT</text>
    <text class="eb-measure" x="400" y="32" text-anchor="middle">MEASUREMENT</text>
    <text class="eb-scope" x="665" y="32" text-anchor="middle">SCOPE &amp; VALIDITY</text>

    <!-- Artifact column -->
    <rect class="artifact" x="50" y="88" width="170" height="56"/>
    <text class="label" x="135" y="121" text-anchor="middle">Candidate</text>

    <rect class="artifact" x="50" y="198" width="170" height="56"/>
    <text class="label" x="135" y="231" text-anchor="middle">Comparator</text>

    <!-- Measurement column -->
    <rect class="measure" x="315" y="88" width="170" height="56"/>
    <text class="label" x="400" y="121" text-anchor="middle">Property</text>

    <rect class="measure" x="315" y="198" width="170" height="56"/>
    <text class="label" x="400" y="231" text-anchor="middle">Metric</text>

    <!-- Scope column -->
    <rect class="scope" x="580" y="52" width="170" height="56"/>
    <text class="label" x="665" y="85" text-anchor="middle">Workload</text>

    <rect class="scope" x="580" y="162" width="170" height="56"/>
    <text class="label" x="665" y="195" text-anchor="middle">Tool Path</text>

    <rect class="scope" x="580" y="272" width="170" height="56"/>
    <text class="label" x="665" y="305" text-anchor="middle">Validity Region</text>

    <!-- Candidate and Comparator feed Property -->
    <path class="flow" d="M 220 116 H 268 V 108 H 315" marker-end="url(#arrow-dark)"/>
    <path class="flow" d="M 220 226 H 268 V 128 H 315" marker-end="url(#arrow-dark)"/>

    <!-- Property to Metric -->
    <path class="flow" d="M 400 144 V 198" marker-end="url(#arrow-dark)"/>

    <!-- Metric fans out to scope conditions -->
    <path class="flow" d="M 485 226 H 535"/>
    <path class="flow" d="M 535 80 V 300"/>
    <path class="flow" d="M 535 80 H 580" marker-end="url(#arrow-dark)"/>
    <path class="flow" d="M 535 190 H 580" marker-end="url(#arrow-dark)"/>
    <path class="flow" d="M 535 300 H 580" marker-end="url(#arrow-dark)"/>
  </g>
</svg>
