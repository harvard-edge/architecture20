<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 372" role="img">
  <title>Evidence chain with rejection checks</title>
  <desc>A diagram showing how an architectural claim moves from low-fidelity feedback to higher-fidelity evidence, staged rejection checks, and an accountable decision. Five stage boxes run left to right: architectural claim, proxy, simulation, build flow, and decision. Each middle stage connects down to a rejection gate that can stop the candidate, and the final decision connects to an authorized review gate. A wide evidence-record box below collects provenance, assumptions, workload and tool versions, uncertainty, and rejected alternatives. A bottom arrow notes that evidence fidelity, latency, and cost often rise along the chain while commitment and allowed autonomy remain separately governed.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .label { font-size: 13.4px; font-weight: 700; fill: #222222; }
      .small { font-size: 12px; fill: #444444; }
      .micro { font-size: 10.5px; fill: #59636D; }
      .note { font-size: 12px; font-weight: 700; fill: #1683A6; }
      .claim { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.4; }
      .proxy { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.4; }
      .sim { fill: #FDECEC; stroke: #DE3D3C; stroke-width: 1.4; }
      .impl { fill: #F0ECFA; stroke: #6A4FC7; stroke-width: 1.4; }
      .commit { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.4; }
      .reject { fill: #FDECEC; stroke: #DE3D3C; stroke-width: 1.4; }
      .record { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.3; }
      .arrow { stroke: #333333; stroke-width: 2; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .thin { stroke: #59636D; stroke-width: 1.4; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .glyph { fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
      .glyph-claim { color: #1683A6; }
      .glyph-proxy { color: #1683A6; }
      .glyph-sim { color: #DE3D3C; }
      .glyph-impl { color: #6A4FC7; }
      .glyph-commit { color: #1683A6; }
      .glyph-record { color: #1683A6; }
    </style>
  </defs>

  <rect width="720" height="372" fill="#FFFFFF"/>
  <g class="font">

    <rect class="claim" x="62" y="24" width="102" height="72"/>
    <text class="label" x="113" y="48" text-anchor="middle">architectural</text>
    <text class="label" x="113" y="66" text-anchor="middle">claim</text>
    <text class="micro" x="113" y="86" text-anchor="middle">scope + limits</text>

    <rect class="proxy" x="192" y="24" width="112" height="72"/>
    <g class="glyph glyph-proxy" transform="translate(205 41)">
      <circle cx="8" cy="8" r="7"/>
      <path d="M 13 13 L 18 18"/>
    </g>
    <text class="label" x="230" y="49" text-anchor="start">proxy</text>
    <text class="small" x="257" y="69" text-anchor="middle">models, rules,</text>
    <text class="small" x="257" y="86" text-anchor="middle">cheap runs</text>

    <rect class="sim" x="326" y="24" width="124" height="72"/>
    <g class="glyph glyph-sim" transform="translate(336 41)">
      <rect x="0" y="4" width="18" height="14"/>
      <path d="M 4 0 L 4 4"/>
      <path d="M 9 0 L 9 4"/>
      <path d="M 14 0 L 14 4"/>
    </g>
    <text class="label" x="362" y="49" text-anchor="start">simulation</text>
    <text class="small" x="388" y="69" text-anchor="middle">workloads,</text>
    <text class="small" x="388" y="86" text-anchor="middle">configs, seeds</text>

    <rect class="impl" x="472" y="24" width="112" height="72"/>
    <g class="glyph glyph-impl" transform="translate(480 41)">
      <path d="M 2 4 L 8 10 L 2 16"/>
      <path d="M 10 16 L 18 16"/>
    </g>
    <text class="label" x="506" y="49" text-anchor="start">build flow</text>
    <text class="small" x="538" y="69" text-anchor="middle">synthesis,</text>
    <text class="small" x="538" y="86" text-anchor="middle">emulation</text>

    <rect class="commit" x="602" y="24" width="84" height="72"/>
    <text class="label" x="644" y="49" text-anchor="middle">decision</text>
    <text class="micro" x="644" y="69" text-anchor="middle">accept / reject</text>
    <text class="micro" x="644" y="86" text-anchor="middle">deploy / defer</text>

    <line class="arrow" x1="164" y1="60" x2="192" y2="60" marker-end="url(#arrow)"/>
    <line class="arrow" x1="304" y1="60" x2="326" y2="60" marker-end="url(#arrow)"/>
    <line class="arrow" x1="450" y1="60" x2="472" y2="60" marker-end="url(#arrow)"/>
    <line class="arrow" x1="584" y1="60" x2="602" y2="60" marker-end="url(#arrow)"/>

    <rect class="reject" x="190" y="128" width="116" height="50"/>
    <text class="small" x="248" y="148" text-anchor="middle">reject if proxy</text>
    <text class="small" x="248" y="165" text-anchor="middle">misses target</text>

    <rect class="reject" x="326" y="128" width="124" height="50"/>
    <text class="small" x="388" y="148" text-anchor="middle">hold if run</text>
    <text class="small" x="388" y="165" text-anchor="middle">is invalid</text>

    <rect class="reject" x="465" y="128" width="126" height="50"/>
    <text class="small" x="528" y="148" text-anchor="middle">reject if power/area</text>
    <text class="small" x="528" y="165" text-anchor="middle">or timing fails</text>

    <rect class="reject" x="601" y="128" width="86" height="50"/>
    <text class="micro" x="644" y="149" text-anchor="middle">authorized</text>
    <text class="micro" x="644" y="166" text-anchor="middle">review</text>

    <line class="thin" x1="248" y1="96" x2="248" y2="128"/>
    <line class="thin" x1="388" y1="96" x2="388" y2="128"/>
    <line class="thin" x1="528" y1="96" x2="528" y2="128"/>
    <line class="thin" x1="644" y1="96" x2="644" y2="128"/>

    <rect class="record" x="82" y="210" width="556" height="70"/>
    <g class="glyph glyph-record" transform="translate(260 218)">
      <rect x="0" y="0" width="17" height="22"/>
      <path d="M 4 7 L 13 7"/>
      <path d="M 4 12 L 13 12"/>
      <path d="M 4 17 L 10 17"/>
    </g>
    <text class="label" x="374" y="232" text-anchor="middle">evidence record</text>
    <text class="small" x="360" y="252" text-anchor="middle">provenance, assumptions, workload versions, tool versions,</text>
    <text class="small" x="360" y="268" text-anchor="middle">uncertainty, rejected alternatives</text>

    <line class="arrow" x1="112" y1="310" x2="600" y2="310" marker-end="url(#arrow)"/>
    <text class="note" x="356" y="327" text-anchor="middle">evidence fidelity, latency, and cost often rise</text>
    <text class="note" x="356" y="344" text-anchor="middle">commitment and allowed autonomy remain separately governed</text>
  </g>
</svg>
