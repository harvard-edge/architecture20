<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" role="img">
  <title>Quantitative trust-calibration plot</title>
  <desc>Plot showing how a proxy metric diverges from physical ground truth as AI optimization depth increases. Highlights the calibrated region versus the reward hacking region.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .title { font-size: 14px; font-weight: 700; fill: #222222; }
      .label { font-size: 13px; font-weight: 700; fill: #222222; }
      .small { font-size: 12px; fill: #444444; }
      .note { font-size: 12.5px; font-weight: 700; fill: #1683A6; }
      .warning { font-size: 12.5px; font-weight: 700; fill: #DE3D3C; }
      .axis { stroke: #333333; stroke-width: 2; fill: none; }
      .boundary-line { stroke: #9AA8B5; stroke-width: 2; fill: none; stroke-dasharray: 6,6; }
      .proxy-line { stroke: #6A4FC7; stroke-width: 4; fill: none; stroke-linecap: round; }
      .truth-line { stroke: #1E9E48; stroke-width: 4; fill: none; stroke-linecap: round; }
      .tool { fill: #FFFFFF; stroke: #9AA8B5; stroke-width: 1.4; }
      .arrow { stroke: #333333; stroke-width: 1.5; fill: none; stroke-linecap: square; }
    </style>
  </defs>

  <rect width="720" height="440" fill="#FFFFFF"/>
  <g class="font">
    <!-- Background regions -->
    <rect x="98" y="50" width="182" height="312" fill="#F5F8FA" opacity="0.6"/>
    <rect x="280" y="50" width="370" height="312" fill="#FDECEC" opacity="0.4"/>

    <text class="note" x="189" y="345" text-anchor="middle">Calibrated Region</text>
    <text class="warning" x="465" y="345" text-anchor="middle">Reward Hacking / Out-of-Distribution</text>

    <!-- Calibration Boundary -->
    <line class="boundary-line" x1="280" y1="50" x2="280" y2="362"/>
    <text class="label" x="280" y="40" text-anchor="middle" fill="#9AA8B5">Calibration Boundary</text>

    <!-- Axes -->
    <polyline class="axis" points="100 60 100 360 650 360"/>
    <text class="label" x="375" y="395" text-anchor="middle">AI Optimization Steps / Search Depth</text>
    <text class="label" x="60" y="210" text-anchor="middle" transform="rotate(-90, 60, 210)">Architectural Value / Score</text>

    <!-- Lines -->
    <!-- Proxy Metric: Monotonically increasing -->
    <path class="proxy-line" d="M 100 320 C 250 200, 400 120, 600 70"/>

    <!-- Physical Ground Truth: Tracks proxy, then crashes -->
    <path class="truth-line" d="M 100 320 C 190 230, 250 200, 280 195 C 330 185, 380 290, 600 310"/>

    <!-- Legends / Labels directly on lines -->
    <text class="label" x="660" y="75" fill="#6A4FC7">Surrogate Proxy</text>
    <text class="small" x="660" y="90" fill="#6A4FC7">(e.g., Estimated IPC)</text>

    <text class="label" x="660" y="315" fill="#1E9E48">Physical Ground Truth</text>
    <text class="small" x="660" y="330" fill="#1E9E48">(e.g., Timing Closure)</text>

    <!-- Callout Box -->
    <rect x="360" y="80" width="220" height="60" rx="4" class="tool"/>
    <text class="label" x="470" y="100" text-anchor="middle">Proxy mismatch exploited</text>
    <text class="small" x="470" y="117" text-anchor="middle">AI finds pathological shortcuts</text>
    <text class="small" x="470" y="132" text-anchor="middle">that ignore physical constraints</text>

    <path class="arrow" d="M 430 140 L 380 200" marker-end="url(#arrow)"/>
  </g>
</svg>
