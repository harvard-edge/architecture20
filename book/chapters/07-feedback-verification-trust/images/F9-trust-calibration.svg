<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" role="img">
  <title>Quantitative trust-calibration plot</title>
  <desc>A line plot with architectural value or score on the vertical axis and AI optimization steps or search depth on the horizontal axis. A grey calibrated region on the left is separated by a dashed calibration boundary from a red reward-hacking, out-of-distribution region on the right. A violet surrogate-proxy curve rises steadily across the whole range. A green physical-ground-truth curve tracks the proxy inside the calibrated region, then collapses after the boundary as the AI exploits the proxy's blind spots. A callout notes that the proxy mismatch is exploited by pathological shortcuts that ignore physical constraints.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .axis-label { font-size: 13px; font-weight: 700; fill: #222222; }
      .lab-proxy { font-size: 13px; font-weight: 700; fill: #6A4FC7; }
      .sub-proxy { font-size: 12px; fill: #6A4FC7; }
      .lab-truth { font-size: 13px; font-weight: 700; fill: #1E9E48; }
      .sub-truth { font-size: 12px; fill: #1E9E48; }
      .region-good { font-size: 12.5px; font-weight: 700; fill: #157A38; }
      .region-bad { font-size: 12.5px; font-weight: 700; fill: #C62A2A; }
      .boundary-lab { font-size: 13px; font-weight: 700; fill: #59636D; }
      .callout-title { font-size: 13px; font-weight: 700; fill: #20252B; }
      .callout-sub { font-size: 12px; fill: #444444; }
      .axis { stroke: #333333; stroke-width: 2; fill: none; }
      .boundary-line { stroke: #9AA8B5; stroke-width: 2; fill: none; stroke-dasharray: 6 6; }
      .proxy-line { stroke: #6A4FC7; stroke-width: 3; fill: none; stroke-linecap: round; }
      .truth-line { stroke: #1E9E48; stroke-width: 3; fill: none; stroke-linecap: round; }
      .panel { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .leader { stroke: #333333; stroke-width: 1.5; fill: none; stroke-linecap: square; }
    </style>
  </defs>

  <rect width="820" height="440" fill="#FFFFFF"/>
  <g class="font">
    <!-- Background regions -->
    <rect x="110" y="55" width="190" height="300" fill="#F5F8FA"/>
    <rect x="300" y="55" width="350" height="300" fill="#FDECEC"/>

    <text class="region-good" x="205" y="342" text-anchor="middle">Calibrated Region</text>
    <text class="region-bad" x="475" y="342" text-anchor="middle">Reward Hacking / Out-of-Distribution</text>

    <!-- Calibration boundary -->
    <line class="boundary-line" x1="300" y1="55" x2="300" y2="355"/>
    <text class="boundary-lab" x="300" y="46" text-anchor="middle">Calibration Boundary</text>

    <!-- Axes -->
    <polyline class="axis" points="110 60 110 355 650 355"/>
    <text class="axis-label" x="380" y="392" text-anchor="middle">AI Optimization Steps / Search Depth</text>
    <text class="axis-label" x="95" y="205" text-anchor="middle" transform="rotate(-90, 95, 205)">Architectural Value / Score</text>

    <!-- Curves -->
    <path class="proxy-line" d="M 110 315 C 260 205, 420 120, 600 80"/>
    <path class="truth-line" d="M 110 315 C 195 240, 255 208, 300 205 C 350 200, 400 300, 610 318"/>

    <!-- Direct line-end labels -->
    <text class="lab-proxy" x="655" y="82">Surrogate Proxy</text>
    <text class="sub-proxy" x="655" y="98">(e.g., Estimated IPC)</text>

    <text class="lab-truth" x="655" y="314">Physical Ground Truth</text>
    <text class="sub-truth" x="655" y="330">(e.g., Timing Closure)</text>

    <!-- Callout -->
    <rect class="panel" x="360" y="92" width="240" height="74"/>
    <text class="callout-title" x="480" y="116" text-anchor="middle">Proxy mismatch exploited</text>
    <text class="callout-sub" x="480" y="135" text-anchor="middle">AI finds pathological shortcuts</text>
    <text class="callout-sub" x="480" y="153" text-anchor="middle">that ignore physical constraints</text>

    <path class="leader" d="M 470 166 L 418 242" marker-end="url(#arrow)"/>
  </g>
</svg>
