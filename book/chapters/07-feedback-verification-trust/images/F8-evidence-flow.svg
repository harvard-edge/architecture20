<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" role="img">
  <title>The six-part branching result map</title>
  <desc>Flowchart mapping Feedback to Tool Observation to Evidence Relation to Review Result, and finally branching to Knowledge-Update and Architecture-Action. Highlights the invalid inferences to avoid.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#DE3D3C"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .panel-title { font-size: 13.5px; font-weight: 700; fill: #222222; }
      .label { font-size: 12.5px; font-weight: 700; fill: #222222; }
      .small { font-size: 12px; fill: #444444; }
      .note { font-size: 12px; font-weight: 700; fill: #1683A6; }
      .warning { font-size: 12px; font-weight: 700; fill: #DE3D3C; }
      .tool { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.4; }
      .obs { fill: #E7F5EC; stroke: #1E9E48; stroke-width: 1.4; }
      .rep { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.4; }
      .method { fill: #F0ECFA; stroke: #6A4FC7; stroke-width: 1.4; }
      .model { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.4; }
      .decision { fill: #FDECEC; stroke: #DE3D3C; stroke-width: 1.4; }
      .arrow { stroke: #333333; stroke-width: 2; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .arrow-dashed { stroke: #DE3D3C; stroke-width: 1.5; fill: none; stroke-linecap: square; stroke-dasharray: 5,5; }
    </style>
  </defs>

  <rect width="720" height="560" fill="#FFFFFF"/>
  <g class="font">
    <!-- Boxes -->
    <rect class="tool" x="230" y="40" width="260" height="65" rx="4"/>
    <text class="panel-title" x="360" y="60" text-anchor="middle">Feedback</text>
    <text class="small" x="360" y="78" text-anchor="middle">Returned signal or response</text>
    <text class="small" x="360" y="93" text-anchor="middle" fill="#1683A6">What came back?</text>

    <rect class="obs" x="230" y="135" width="260" height="65" rx="4"/>
    <text class="panel-title" x="360" y="155" text-anchor="middle">Tool Observation</text>
    <text class="small" x="360" y="173" text-anchor="middle">Typed result, status, inputs, uncertainty</text>
    <text class="small" x="360" y="188" text-anchor="middle" fill="#1683A6">What did this path observe?</text>

    <rect class="rep" x="230" y="230" width="260" height="65" rx="4"/>
    <text class="panel-title" x="360" y="250" text-anchor="middle">Evidence Relation</text>
    <text class="small" x="360" y="268" text-anchor="middle">Claim, comparator, scope, validity</text>
    <text class="small" x="360" y="283" text-anchor="middle" fill="#1683A6">What does the observation bear on?</text>

    <rect class="method" x="230" y="325" width="260" height="65" rx="4"/>
    <text class="panel-title" x="360" y="345" text-anchor="middle">Review Result</text>
    <text class="small" x="360" y="363" text-anchor="middle">Supported, unsupported, or unresolved</text>
    <text class="small" x="360" y="378" text-anchor="middle" fill="#1683A6">What is justified at this scope?</text>

    <rect class="model" x="100" y="430" width="220" height="75" rx="4"/>
    <text class="panel-title" x="210" y="452" text-anchor="middle">Knowledge-Update Branch</text>
    <text class="small" x="210" y="470" text-anchor="middle">Named update surface &amp; criteria</text>
    <text class="small" x="210" y="488" text-anchor="middle" fill="#1683A6">What project/model changes?</text>

    <rect class="decision" x="400" y="430" width="220" height="75" rx="4"/>
    <text class="panel-title" x="510" y="452" text-anchor="middle">Architecture-Action Branch</text>
    <text class="small" x="510" y="470" text-anchor="middle">Stop, continue, revise, waive, implement</text>
    <text class="small" x="510" y="488" text-anchor="middle" fill="#1683A6">What action is authorized?</text>

    <!-- Center Arrows -->
    <line class="arrow" x1="360" y1="105" x2="360" y2="135" marker-end="url(#arrow)"/>
    <text class="note" x="370" y="124">valid extraction</text>

    <line class="arrow" x1="360" y1="200" x2="360" y2="230" marker-end="url(#arrow)"/>
    <text class="note" x="370" y="219">scope relevance</text>

    <line class="arrow" x1="360" y1="295" x2="360" y2="325" marker-end="url(#arrow)"/>
    <text class="note" x="370" y="314">expert judgment</text>

    <!-- Branch Arrows -->
    <polyline class="arrow" points="360 390 360 410 210 410 210 430" marker-end="url(#arrow)"/>
    <polyline class="arrow" points="360 390 360 410 510 410 510 430" marker-end="url(#arrow)"/>
    <text class="note" x="360" y="405" text-anchor="middle">separate authorization</text>

    <!-- Invalid Bypass 1: Action -->
    <path class="arrow-dashed" d="M 490 72 C 670 72, 670 467, 630 467" marker-end="url(#arrow-red)"/>
    <text class="warning" x="650" y="270" text-anchor="middle" transform="rotate(90, 650, 270)">Invalid inference: automated bypass to action</text>

    <!-- Invalid Bypass 2: Training -->
    <path class="arrow-dashed" d="M 230 167 C 50 167, 50 467, 90 467" marker-end="url(#arrow-red)"/>
    <text class="warning" x="70" y="320" text-anchor="middle" transform="rotate(-90, 70, 320)">Invalid inference: auto-train on feedback</text>

  </g>
</svg>
