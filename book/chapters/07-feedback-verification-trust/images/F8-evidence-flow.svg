<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" role="img">
  <title>The evidence chain and its two invalid shortcuts</title>
  <desc>Flowchart: Feedback flows down through Tool Observation, Evidence Relation, and Review Result, then branches into a Knowledge-Update branch and an Architecture-Action branch. Two red dashed arcs sweep symmetrically from Feedback down the outside to each branch, marking invalid inferences that skip the evidence chain: auto-training on raw feedback, and bypassing straight to action.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#DE3D3C"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .panel-title { font-size: 13.5px; font-weight: 700; fill: #222222; }
      .small { font-size: 12px; fill: #444444; }
      .note { font-size: 12px; font-weight: 700; fill: #1683A6; }
      .warning { font-size: 11px; font-weight: 700; fill: #C62A2A; }
      .tool { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.4; }
      .obs { fill: #E7F5EC; stroke: #1E9E48; stroke-width: 1.4; }
      .rep { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.4; }
      .method { fill: #F0ECFA; stroke: #6A4FC7; stroke-width: 1.4; }
      .model { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.4; }
      .decision { fill: #FDECEC; stroke: #DE3D3C; stroke-width: 1.4; }
      .arrow { stroke: #333333; stroke-width: 2; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .arrow-dashed { stroke: #DE3D3C; stroke-width: 1.5; fill: none; stroke-linecap: square; stroke-dasharray: 5 4; }
    </style>
  </defs>

  <rect width="720" height="560" fill="#FFFFFF"/>
  <g class="font">
    <!-- Evidence chain (single centered column) -->
    <rect class="tool" x="230" y="44" width="260" height="54"/>
    <text class="panel-title" x="360" y="70" text-anchor="middle">Feedback</text>
    <text class="small" x="360" y="88" text-anchor="middle">Returned signal or response</text>

    <rect class="obs" x="230" y="138" width="260" height="54"/>
    <text class="panel-title" x="360" y="164" text-anchor="middle">Tool Observation</text>
    <text class="small" x="360" y="182" text-anchor="middle">Typed result, status, inputs, uncertainty</text>

    <rect class="rep" x="230" y="232" width="260" height="54"/>
    <text class="panel-title" x="360" y="258" text-anchor="middle">Evidence Relation</text>
    <text class="small" x="360" y="276" text-anchor="middle">Claim, comparator, scope, validity</text>

    <rect class="method" x="230" y="326" width="260" height="54"/>
    <text class="panel-title" x="360" y="352" text-anchor="middle">Review Result</text>
    <text class="small" x="360" y="370" text-anchor="middle">Supported, unsupported, or unresolved</text>

    <!-- Branches -->
    <rect class="model" x="80" y="430" width="260" height="64"/>
    <text class="panel-title" x="210" y="456" text-anchor="middle">Knowledge-Update Branch</text>
    <text class="small" x="210" y="475" text-anchor="middle">Named update surface &amp; criteria</text>

    <rect class="decision" x="380" y="430" width="260" height="64"/>
    <text class="panel-title" x="510" y="456" text-anchor="middle">Architecture-Action Branch</text>
    <text class="small" x="510" y="475" text-anchor="middle">Stop, continue, revise, waive, implement</text>

    <!-- Chain transitions -->
    <line class="arrow" x1="360" y1="98" x2="360" y2="138" marker-end="url(#arrow)"/>
    <text class="note" x="370" y="122">valid extraction</text>

    <line class="arrow" x1="360" y1="192" x2="360" y2="232" marker-end="url(#arrow)"/>
    <text class="note" x="370" y="216">scope relevance</text>

    <line class="arrow" x1="360" y1="286" x2="360" y2="326" marker-end="url(#arrow)"/>
    <text class="note" x="370" y="310">expert judgment</text>

    <!-- Split to the two branches -->
    <polyline class="arrow" points="360 380 360 408 210 408 210 430" marker-end="url(#arrow)"/>
    <polyline class="arrow" points="360 380 360 408 510 408 510 430" marker-end="url(#arrow)"/>
    <text class="note" x="360" y="401" text-anchor="middle">separate authorization</text>

    <!-- Invalid shortcut 1: auto-train on raw feedback (mirror-left, orthogonal) -->
    <path class="arrow-dashed" d="M 230 71 H 40 V 462 H 80" marker-end="url(#arrow-red)"/>
    <text class="warning" x="135" y="250" text-anchor="middle">Invalid inference:</text>
    <text class="warning" x="135" y="266" text-anchor="middle">auto-train on feedback</text>

    <!-- Invalid shortcut 2: bypass straight to action (mirror-right, orthogonal) -->
    <path class="arrow-dashed" d="M 490 71 H 680 V 462 H 640" marker-end="url(#arrow-red)"/>
    <text class="warning" x="585" y="250" text-anchor="middle">Invalid inference:</text>
    <text class="warning" x="585" y="266" text-anchor="middle">bypass to action</text>

  </g>
</svg>
