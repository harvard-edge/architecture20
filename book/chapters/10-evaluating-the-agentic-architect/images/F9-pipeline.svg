<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" role="img" aria-labelledby="pipeline-title pipeline-desc">
  <title id="pipeline-title">The evaluation pipeline</title>
  <desc id="pipeline-desc">A left-to-right flow diagram of three role boxes connected by forward and return arrows. A generation box, the agent architect, proposes an action to a prediction box, the trajectory logger, which forwards it to an optimization box, the simulator sandbox. The sandbox returns state and metrics to the logger, which records and relays observations back to the agent, so every proposal is intercepted and measured before it reaches the environment.</desc>
  <defs>
    <marker id="pipe-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .title { font-size: 13px; font-weight: 700; fill: #20252B; }
      .sub   { font-size: 11.5px; fill: #444444; }
      .edge  { font-size: 11.5px; fill: #59636D; }
      .flow  { stroke: #333333; stroke-width: 2; fill: none; stroke-linecap: square; }
    </style>
  </defs>

  <rect width="900" height="300" fill="#FFFFFF"/>
  <g class="font">

    <!-- role boxes: tint fill + same-role mark stroke, square corners -->
    <rect x="30"  y="105" width="180" height="90" fill="#FBF0DE" stroke="#E68A17" stroke-width="1.5"/>
    <rect x="360" y="105" width="180" height="90" fill="#E7F5EC" stroke="#1E9E48" stroke-width="1.5"/>
    <rect x="690" y="105" width="180" height="90" fill="#E4F1F6" stroke="#1683A6" stroke-width="1.5"/>

    <!-- box labels: black ink title + gray subtitle, centered -->
    <text class="title" x="120" y="146" text-anchor="middle">Generation</text>
    <text class="sub"   x="120" y="166" text-anchor="middle">Agent Architect</text>

    <text class="title" x="450" y="146" text-anchor="middle">Prediction</text>
    <text class="sub"   x="450" y="166" text-anchor="middle">Trajectory Logger</text>

    <text class="title" x="780" y="146" text-anchor="middle">Optimization</text>
    <text class="sub"   x="780" y="166" text-anchor="middle">Simulator Sandbox</text>

    <!-- forward path (top) -->
    <line class="flow" x1="210" y1="135" x2="360" y2="135" marker-end="url(#pipe-arrow)"/>
    <text class="edge" x="285" y="127" text-anchor="middle">Proposes Action</text>

    <line class="flow" x1="540" y1="135" x2="690" y2="135" marker-end="url(#pipe-arrow)"/>
    <text class="edge" x="615" y="127" text-anchor="middle">Forwards to Environment</text>

    <!-- return path (bottom) -->
    <line class="flow" x1="690" y1="175" x2="540" y2="175" marker-end="url(#pipe-arrow)"/>
    <text class="edge" x="615" y="195" text-anchor="middle">Returns State/Metric</text>

    <line class="flow" x1="360" y1="175" x2="210" y2="175" marker-end="url(#pipe-arrow)"/>
    <text class="edge" x="285" y="195" text-anchor="middle">Records &amp; Relays</text>
  </g>
</svg>
