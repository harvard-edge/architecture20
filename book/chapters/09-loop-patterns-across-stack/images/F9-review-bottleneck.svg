<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <style>
      .title { font-family: -apple-system, sans-serif; font-size: 16px; font-weight: bold; fill: #111; text-anchor: middle;}
      .text-body { font-family: -apple-system, sans-serif; font-size: 14px; fill: #333; text-anchor: middle;}
      .funnel { fill: #e3f2fd; stroke: #2196f3; stroke-width: 2px; }
      .pipe { fill: #ffebee; stroke: #f44336; stroke-width: 2px; }
      .edge { stroke: #555; stroke-width: 2px; fill: none; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <text x="300" y="30" class="title">Amdahl's Law for Human Review</text>

  <!-- Funnel -->
  <polygon points="100,80 500,80 350,250 250,250" class="funnel"/>
  <text x="300" y="140" class="text-body" font-weight="bold">AI Generator</text>
  <text x="300" y="160" class="text-body">High Proposal Rate (λ)</text>

  <!-- Pipe -->
  <rect x="250" y="250" width="100" height="100" class="pipe"/>
  <text x="300" y="300" class="text-body" font-weight="bold">Human Review</text>
  <text x="300" y="320" class="text-body">Constrained Settlement Rate (μ)</text>

  <!-- Inputs -->
  <path d="M 200 40 L 200 80" class="edge" marker-end="url(#arrow)"/>
  <path d="M 300 40 L 300 80" class="edge" marker-end="url(#arrow)"/>
  <path d="M 400 40 L 400 80" class="edge" marker-end="url(#arrow)"/>

  <!-- Output -->
  <path d="M 300 350 L 300 390" class="edge" marker-end="url(#arrow)"/>
</svg>
