<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 405" role="img">
  <title>Loop patterns across the stack</title>
  <desc>A diagram comparing illustrative Architecture 2.0 operating regimes by feedback latency, rollback cost, review mechanism, evidence burden, and delegated authority without treating the regimes as a maturity scale.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .label { font-size: 14px; font-weight: 700; fill: #222222; }
      .small { font-size: 11.5px; fill: #444444; }
      .note { font-size: 12px; font-weight: 700; fill: #1683A6; }
      .ontology { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.3; }
      /* visual grouping for illustrative operating regimes, not a maturity scale */
      .fast { fill: #EBF5F9; stroke: #93C1D3; stroke-width: 1.4; }
      .mid { fill: #DBEEF5; stroke: #6EAFC7; stroke-width: 1.4; }
      .system { fill: #C9E4EE; stroke: #4C9AB6; stroke-width: 1.4; }
      .hard { fill: #B4D9E7; stroke: #2E88A8; stroke-width: 1.4; }
      .reject { fill: #FDECEC; stroke: #DE3D3C; stroke-width: 1.4; }
      .arrow { stroke: #333333; stroke-width: 2; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
    </style>
  </defs>

  <rect width="720" height="405" fill="#FFFFFF"/>
  <g class="font">

    <rect class="ontology" x="50" y="50" width="619" height="68"/>
    <text class="label" x="360" y="71" text-anchor="middle">shared ontology</text>
    <text class="small" x="360" y="91" text-anchor="middle">bounded study &#8594; representation + environment &#8594; AI method roles</text>
    <text class="small" x="360" y="107" text-anchor="middle">evidence &#8594; architectural claim &#8594; accountable decision</text>

    <text class="note" x="360" y="140" text-anchor="middle">illustrative operating regimes, not a maturity scale</text>

    <rect class="fast" x="50" y="150" width="128" height="112"/>
    <text class="label" x="114" y="174" text-anchor="middle">fast software</text>
    <text class="small" x="114" y="197" text-anchor="middle">feedback: fast</text>
    <text class="small" x="114" y="219" text-anchor="middle">rollback: local</text>
    <text class="small" x="114" y="241" text-anchor="middle">review: tests</text>

    <rect class="mid" x="208" y="150" width="128" height="112"/>
    <text class="label" x="272" y="174" text-anchor="middle">workload + DSE</text>
    <text class="small" x="272" y="197" text-anchor="middle">feedback: staged</text>
    <text class="small" x="272" y="219" text-anchor="middle">rollback: mixed</text>
    <text class="small" x="272" y="241" text-anchor="middle">review: coverage</text>

    <rect class="system" x="366" y="150" width="128" height="112"/>
    <text class="label" x="430" y="174" text-anchor="middle">co-design + fleet</text>
    <text class="small" x="430" y="197" text-anchor="middle">feedback: noisy</text>
    <text class="small" x="430" y="219" text-anchor="middle">rollback: coupled</text>
    <text class="small" x="430" y="241" text-anchor="middle">review: telemetry</text>

    <rect class="hard" x="524" y="150" width="145" height="112"/>
    <text class="label" x="596.5" y="174" text-anchor="middle">RTL / physical</text>
    <text class="small" x="596.5" y="197" text-anchor="middle">feedback: slow</text>
    <text class="small" x="596.5" y="219" text-anchor="middle">rollback: costly</text>
    <text class="small" x="596.5" y="241" text-anchor="middle">review: signoff</text>

    <rect class="reject" x="90" y="292" width="540" height="38"/>
    <text class="label" x="360" y="316" text-anchor="middle">higher consequence and lower reversibility require stronger evidence</text>

    <line class="arrow" x1="95" y1="373" x2="625" y2="373" marker-end="url(#arrow)"/>
    <text class="note" x="360" y="392" text-anchor="middle">decision consequence and rollback cost often rise; delegated authority narrows</text>
  </g>
</svg>
