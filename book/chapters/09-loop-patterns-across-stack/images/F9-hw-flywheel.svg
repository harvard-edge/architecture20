<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <style>
      .title { font-family: -apple-system, sans-serif; font-size: 18px; font-weight: bold; fill: #111; text-anchor: middle;}
      .text-body { font-family: -apple-system, sans-serif; font-size: 13px; fill: #111; text-anchor: middle;}
      .text-bold { font-family: -apple-system, sans-serif; font-size: 14px; font-weight: bold; fill: #111; text-anchor: middle;}
      .hardware { fill: #d4e6f1; stroke: #2980b9; stroke-width: 2px; rx: 6px; }
      .software { fill: #e8daef; stroke: #8e44ad; stroke-width: 2px; rx: 6px; }
      .telemetry { fill: #d5f5e3; stroke: #27ae60; stroke-width: 2px; rx: 6px; }
      .edge { stroke: #555; stroke-width: 2.5px; fill: none; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Flywheel arc paths -->
  <!-- We draw curved arrows between the nodes to emphasize the flywheel effect -->

  <path d="M 470 120 A 150 150 0 0 1 540 225" class="edge" marker-end="url(#arrow)"/>
  <path d="M 540 275 A 150 150 0 0 1 470 380" class="edge" marker-end="url(#arrow)"/>
  <path d="M 330 380 A 150 150 0 0 1 260 275" class="edge" marker-end="url(#arrow)"/>
  <path d="M 260 225 A 150 150 0 0 1 330 120" class="edge" marker-end="url(#arrow)"/>

  <path d="M 330 90 A 150 150 0 0 1 470 90" class="edge" marker-end="url(#arrow)"/>
  <path d="M 470 410 A 150 150 0 0 1 330 410" class="edge" marker-end="url(#arrow)"/>

  <!-- Nodes -->
  <!-- Top Left: Extract Bottlenecks -->
  <rect x="180" y="70" width="160" height="50" class="telemetry"/>
  <text x="260" y="93" class="text-body">Extract Workloads</text>
  <text x="260" y="110" class="text-body">&amp; Bottlenecks</text>

  <!-- Top Right: Calibrate Surrogates -->
  <rect x="460" y="70" width="160" height="50" class="software"/>
  <text x="540" y="93" class="text-body">Calibrate AI</text>
  <text x="540" y="110" class="text-body">Surrogate Models</text>

  <!-- Right: AI-Assisted Search -->
  <rect x="520" y="225" width="160" height="50" class="software"/>
  <text x="600" y="248" class="text-bold">AI-Assisted Search</text>
  <text x="600" y="265" class="text-body">(Gen N+1)</text>

  <!-- Bottom Right: Tapeout -->
  <rect x="460" y="380" width="160" height="50" class="hardware"/>
  <text x="540" y="403" class="text-bold">Tapeout Silicon</text>
  <text x="540" y="420" class="text-body">(Gen N+1)</text>

  <!-- Bottom Left: Deploy -->
  <rect x="180" y="380" width="160" height="50" class="hardware"/>
  <text x="260" y="403" class="text-bold">Deploy Silicon</text>
  <text x="260" y="420" class="text-body">(Gen N)</text>

  <!-- Left: Capture Telemetry -->
  <rect x="120" y="225" width="160" height="50" class="telemetry"/>
  <text x="200" y="248" class="text-body">Capture Fleet</text>
  <text x="200" y="265" class="text-body">Telemetry</text>

  <!-- Center Text -->
  <text x="400" y="245" class="title" font-size="22px" fill="#444">Hardware Flywheel</text>

</svg>
