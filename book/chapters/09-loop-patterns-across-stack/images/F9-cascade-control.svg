<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" role="img" aria-labelledby="cascade-title cascade-desc">
  <title id="cascade-title">Cascade control with delayed telemetry</title>
  <desc id="cascade-desc">A cascade control diagram with a fast inner loop nested inside a slow outer loop. The architect or large language model sets targets for a small-language-model optimizer, which tunes the physical system. A fast teal path returns immediate proxy measurements to the optimizer. Delayed field telemetry from the physical system is not fed to the fast loop; a dashed path routes it to a Smith predictor that reviews it before the architect updates the plan. The dashed violet boundary marks the slow outer loop; the solid teal boundary marks the fast inner loop.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1683A6"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .eyebrow-v { font-size: 13px; font-weight: 700; fill: #59429E; letter-spacing: 0.5px; }
      .eyebrow-t { font-size: 13px; font-weight: 700; fill: #136680; letter-spacing: 0.5px; }
      .sub { font-size: 11.5px; fill: #59636D; }
      .node-title { font-size: 12.5px; font-weight: 700; fill: #20252B; }
      .node-sub { font-size: 11.4px; fill: #59636D; }
      .edge-label { font-size: 11.4px; fill: #59636D; }
      .violet { fill: #F0ECFA; stroke: #6A4FC7; stroke-width: 1.5; }
      .teal { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.5; }
      .green { fill: #E7F5EC; stroke: #1E9E48; stroke-width: 1.5; }
      .amber { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.5; }
      .outer-panel { fill: #F5F8FA; stroke: #6A4FC7; stroke-width: 1.5; stroke-dasharray: 6 5; }
      .inner-panel { fill: #FFFFFF; stroke: #1683A6; stroke-width: 1.5; }
      .edge { fill: none; stroke: #333333; stroke-width: 2; stroke-linecap: square; marker-end: url(#arrow); }
      .edge-fast { fill: none; stroke: #1683A6; stroke-width: 2; stroke-linecap: square; marker-end: url(#arrow-teal); }
      .edge-delay { fill: none; stroke: #333333; stroke-width: 1.9; stroke-linecap: square; stroke-dasharray: 5 4; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="820" height="440" fill="#FFFFFF"/>
  <g class="font">
    <!-- outer (slow) loop panel -->
    <rect class="outer-panel" x="40" y="58" width="740" height="332"/>
    <text class="eyebrow-v" x="58" y="86">SLOW OUTER LOOP &#183; LLM / ARCHITECT</text>
    <text class="sub" x="58" y="105">reviews delayed telemetry, updates plans and test targets</text>

    <!-- inner (fast) loop panel -->
    <rect class="inner-panel" x="268" y="150" width="464" height="150"/>
    <text class="eyebrow-t" x="286" y="174">FAST INNER LOOP &#183; SLM / COMPILER / TUNING</text>

    <!-- nodes -->
    <rect class="violet" x="63" y="190" width="156" height="58"/>
    <text class="node-title" x="141" y="215" text-anchor="middle">Architect / LLM</text>
    <text class="node-sub" x="141" y="233" text-anchor="middle">semantic planning</text>

    <rect class="teal" x="297" y="190" width="156" height="58"/>
    <text class="node-title" x="375" y="215" text-anchor="middle">SLM Optimizer</text>
    <text class="node-sub" x="375" y="233" text-anchor="middle">fast tuning</text>

    <rect class="green" x="557" y="190" width="156" height="58"/>
    <text class="node-title" x="635" y="215" text-anchor="middle">Physical System</text>
    <text class="node-sub" x="635" y="233" text-anchor="middle">field behavior</text>

    <rect class="amber" x="450" y="326" width="200" height="52"/>
    <text class="node-title" x="550" y="349" text-anchor="middle">Smith Predictor</text>
    <text class="node-sub" x="550" y="367" text-anchor="middle">review before update</text>

    <!-- forward edges -->
    <path class="edge" d="M 219 219 H 297"/>
    <text class="edge-label" x="258" y="211" text-anchor="middle">targets</text>
    <path class="edge" d="M 453 219 H 557"/>
    <text class="edge-label" x="505" y="211" text-anchor="middle">config</text>

    <!-- fast inner feedback: physical system -> optimizer (immediate proxies) -->
    <path class="edge-fast" d="M 635 248 V 274 H 375 V 248"/>
    <text class="edge-label" x="505" y="291" text-anchor="middle">immediate proxies</text>

    <!-- delayed telemetry: physical system -> Smith predictor -->
    <path class="edge-delay" d="M 713 219 H 756 V 352 H 650"/>
    <text class="edge-label" x="715" y="333" text-anchor="middle">delayed</text>
    <text class="edge-label" x="715" y="348" text-anchor="middle">telemetry</text>

    <!-- reviewed telemetry: Smith predictor -> architect -->
    <path class="edge" d="M 450 352 H 141 V 248"/>
    <text class="edge-label" x="300" y="344" text-anchor="middle">reviewed update</text>
  </g>
</svg>
