<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 454" role="img">
  <title>Domain specificity has many shapes</title>
  <desc>A clean matrix showing that domain-specific architecture can specialize for kernels, precision, memory behavior, interfaces, deployment context, drift, and verification burden.</desc>
  <defs>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .center { fill: #F0ECFA; stroke: #6A4FC7; stroke-width: 1.5; }
      .blue { fill: #E4F1F6; stroke: #1683A6; }
      .green { fill: #E7F5EC; stroke: #1E9E48; }
      .orange { fill: #FBF0DE; stroke: #E68A17; }
      .purple { fill: #F0ECFA; stroke: #6A4FC7; }
      .red { fill: #FDECEC; stroke: #DE3D3C; }
      .gray { fill: #F5F8FA; stroke: #9AA8B5; }
      .card { stroke-width: 1.4; }
      .label { font-size: 13.5px; font-weight: 700; fill: #222222; }
      .body { font-size: 12.5px; fill: #333333; }
      .note { font-size: 12px; font-weight: 700; fill: #1683A6; }
      .bar { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .line { stroke: #1683A6; stroke-width: 1.5; fill: none; stroke-linecap: square; }
    </style>
  </defs>

  <rect width="960" height="454" fill="#FFFFFF"/>
  <g class="font">

    <rect class="center" x="338" y="138" width="284" height="110"/>
    <text class="label" x="480" y="168" text-anchor="middle">domain-specific</text>
    <text class="label" x="480" y="188" text-anchor="middle">architecture claim</text>
    <text class="body" x="480" y="212" text-anchor="middle">what shape is stable enough</text>
    <text class="body" x="480" y="229" text-anchor="middle">to specialize?</text>

    <line class="line" x1="338" y1="168" x2="274" y2="112"/>
    <line class="line" x1="480" y1="138" x2="480" y2="112"/>
    <line class="line" x1="622" y1="168" x2="686" y2="112"/>
    <line class="line" x1="338" y1="222" x2="279" y2="274"/>
    <line class="line" x1="480" y1="248" x2="480" y2="274"/>
    <line class="line" x1="622" y1="222" x2="681" y2="274"/>

    <rect class="card blue" x="88" y="28" width="230" height="84"/>
    <text class="label" x="203" y="55" text-anchor="middle">kernel family</text>
    <text class="body" x="203" y="76" text-anchor="middle">operation mix, reuse,</text>
    <text class="body" x="203" y="93" text-anchor="middle">dataflow, sparsity</text>

    <rect class="card green" x="365" y="28" width="230" height="84"/>
    <text class="label" x="480" y="55" text-anchor="middle">data + precision</text>
    <text class="body" x="480" y="76" text-anchor="middle">numerical contract,</text>
    <text class="body" x="480" y="93" text-anchor="middle">range, error tolerance</text>

    <rect class="card orange" x="642" y="28" width="230" height="84"/>
    <text class="label" x="757" y="55" text-anchor="middle">memory behavior</text>
    <text class="body" x="757" y="76" text-anchor="middle">locality, bandwidth,</text>
    <text class="body" x="757" y="93" text-anchor="middle">movement, footprint</text>

    <rect class="card purple" x="88" y="274" width="230" height="84"/>
    <text class="label" x="203" y="301" text-anchor="middle">program interface</text>
    <text class="body" x="203" y="322" text-anchor="middle">API, compiler IR,</text>
    <text class="body" x="203" y="339" text-anchor="middle">runtime, libraries</text>

    <rect class="card red" x="365" y="274" width="230" height="84"/>
    <text class="label" x="480" y="301" text-anchor="middle">deployment and QoS</text>
    <text class="body" x="480" y="322" text-anchor="middle">latency, power, thermal,</text>
    <text class="body" x="480" y="339" text-anchor="middle">isolation, updates</text>

    <rect class="card gray" x="642" y="274" width="230" height="84"/>
    <text class="label" x="757" y="301" text-anchor="middle">drift + verification</text>
    <text class="body" x="757" y="322" text-anchor="middle">portability, tests,</text>
    <text class="body" x="757" y="339" text-anchor="middle">coverage, maintenance</text>

    <rect class="bar" x="188" y="394" width="584" height="34"/>
    <text class="note" x="480" y="415" text-anchor="middle">The study must characterize the domain shape before claiming specialization.</text>
  </g>
</svg>
