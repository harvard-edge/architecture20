<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 584" role="img">
  <title>Code generation narrow waist for specialization</title>
  <desc>A vertical diagram showing code generation as the narrow waist between domain intent, specialized architecture mechanisms, and feedback-based acceptance or rejection.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .top { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.4; }
      .hw { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.4; }
      .waist { fill: #F0ECFA; stroke: #6A4FC7; stroke-width: 2; }
      .feedback { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.4; }
      .gate { fill: #FDECEC; stroke: #DE3D3C; stroke-width: 1.4; }
      .label { font-size: 13.5px; font-weight: 700; fill: #222222; }
      .body { font-size: 12.5px; fill: #333333; }
      .small { font-size: 11.4px; fill: #59636D; }
      .note { font-size: 12.5px; font-weight: 700; fill: #1683A6; }
      .arrow { stroke: #333333; stroke-width: 2; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .glyph { fill: none; stroke: currentColor; stroke-width: 1.85; stroke-linecap: round; stroke-linejoin: round; }
      .glyph-top { color: #1683A6; }
      .glyph-hw { color: #1683A6; }
      .glyph-waist { color: #6A4FC7; }
      .glyph-feedback { color: #1683A6; }
    </style>
  </defs>

  <rect width="860" height="584" fill="#FFFFFF"/>
  <g class="font">

    <rect class="top" x="175" y="28" width="510" height="78"/>
    <g class="glyph glyph-top" transform="translate(204 43)">
      <rect x="0" y="0" width="22" height="26"/>
      <path d="M 5 9 L 17 9"/>
      <path d="M 5 16 L 14 16"/>
    </g>
    <text class="label" x="454" y="56" text-anchor="middle">domain intent + workload distribution</text>
    <text class="body" x="454" y="79" text-anchor="middle">semantics, input mix, QoS, deployment context, drift</text>

    <line class="arrow" x1="430" y1="106" x2="430" y2="180" marker-end="url(#arrow)"/>

    <rect class="hw" x="92" y="148" width="272" height="88"/>
    <text class="label" x="228" y="176" text-anchor="middle">architecture mechanisms</text>
    <text class="body" x="228" y="199" text-anchor="middle">dataflow, memory, precision,</text>
    <text class="body" x="228" y="217" text-anchor="middle">accelerators, chiplets</text>

    <rect class="hw" x="496" y="148" width="272" height="88"/>
    <text class="label" x="632" y="176" text-anchor="middle">hardware constraints</text>
    <text class="body" x="632" y="199" text-anchor="middle">power, area, timing, bandwidth,</text>
    <text class="body" x="632" y="217" text-anchor="middle">thermal, reliability, cost</text>

    <rect x="411" y="180" width="38" height="24" fill="#FFFFFF" stroke="#333333" stroke-width="1.1"/>
    <line class="arrow" x1="364" y1="192" x2="411" y2="192" marker-end="url(#arrow)"/>
    <line class="arrow" x1="496" y1="192" x2="449" y2="192" marker-end="url(#arrow)"/>
    <circle cx="430" cy="192" r="3.2" fill="#333333"/>

    <path class="waist" d="M 250 272 L 610 272 L 555 372 L 305 372 Z"/>
    <g class="glyph glyph-waist" transform="translate(318 284)">
      <path d="M 12 4 L 4 11 L 12 18"/>
      <path d="M 16.5 18 L 21.5 4"/>
      <path d="M 26 4 L 34 11 L 26 18"/>
    </g>
    <text class="label" x="454" y="299" text-anchor="middle">code-generation waist</text>
    <text class="body" x="430" y="323" text-anchor="middle">programming model, compiler IR,</text>
    <text class="body" x="430" y="340" text-anchor="middle">libraries, runtime, generated code</text>
    <text class="small" x="430" y="358" text-anchor="middle">where specialization becomes usable</text>

    <line class="arrow" x1="430" y1="204" x2="430" y2="272" marker-end="url(#arrow)"/>
    <line class="arrow" x1="430" y1="372" x2="430" y2="410" marker-end="url(#arrow)"/>

    <rect class="feedback" x="158" y="410" width="544" height="62"/>
    <g class="glyph glyph-feedback" transform="translate(216 422)">
      <rect x="0" y="0" width="22" height="26"/>
      <path d="M 5 9 L 17 9"/>
      <path d="M 5 15 L 17 15"/>
      <path d="M 5 21 L 12 21"/>
    </g>
    <text class="label" x="455" y="434" text-anchor="middle">tool feedback + measurements</text>
    <text class="body" x="455" y="456" text-anchor="middle">tests, profiling, simulation, synthesis, telemetry</text>

    <rect class="gate" x="112" y="492" width="154" height="44"/>
    <text class="body" x="189" y="518" text-anchor="middle">correctness</text>

    <rect class="gate" x="274" y="492" width="154" height="44"/>
    <text class="body" x="351" y="518" text-anchor="middle">performance</text>

    <rect class="gate" x="436" y="492" width="154" height="44"/>
    <text class="body" x="513" y="518" text-anchor="middle">portability</text>

    <rect class="gate" x="598" y="492" width="154" height="44"/>
    <text class="body" x="675" y="518" text-anchor="middle">maintainability</text>

    <text class="note" x="430" y="558" text-anchor="middle">test the specialization claim before making a design commitment</text>
  </g>
</svg>
