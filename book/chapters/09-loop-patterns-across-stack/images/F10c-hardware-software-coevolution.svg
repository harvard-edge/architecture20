<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 484" role="img">
  <title>Hardware/software co-evolution study</title>
  <desc>A two-lane Architecture 2.0 study in which hardware target state and software code paths evolve together through a shared study record and review by a named decision holder.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1683A6"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .lane-label { font-size: 13px; font-weight: 700; fill: #136680; letter-spacing: 0.6px; }
      .label { font-size: 13.5px; font-weight: 700; fill: #222222; }
      .body { font-size: 12.2px; fill: #444444; }
      .micro { font-size: 11.4px; fill: #59636D; }
      .note { font-size: 12.5px; font-weight: 700; fill: #1683A6; }
      .hw-panel { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .sw-panel { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .hw { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.4; }
      .sw { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.4; }
      .evidence { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.5; }
      .decision { fill: #FDECEC; stroke: #DE3D3C; stroke-width: 1.4; }
      .takeaway { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .arrow { stroke: #333333; stroke-width: 1.9; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .blue-arrow { stroke: #1683A6; stroke-width: 1.55; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .pin { stroke: #1683A6; stroke-width: 1.3; fill: none; stroke-linecap: square; }
      .code { stroke: #1683A6; stroke-width: 1.4; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
    </style>
  </defs>
  <rect width="900" height="484" fill="#FFFFFF"/>
  <g class="font">
    <rect class="hw-panel" x="54" y="32" width="348" height="248"/>
    <text class="lane-label" x="80" y="58" style="white-space: pre;">HARDWARE TARGET STATE</text>
    <g>
      <rect x="354" y="54" width="24" height="24" fill="#FFFFFF" stroke="#1683A6" stroke-width="1.5"/>
      <line class="pin" x1="348" y1="60" x2="354" y2="60"/>
      <line class="pin" x1="348" y1="72" x2="354" y2="72"/>
      <line class="pin" x1="378" y1="60" x2="384" y2="60"/>
      <line class="pin" x1="378" y1="72" x2="384" y2="72"/>
      <line class="pin" x1="360" y1="48" x2="360" y2="54"/>
      <line class="pin" x1="372" y1="48" x2="372" y2="54"/>
      <line class="pin" x1="360" y1="78" x2="360" y2="84"/>
      <line class="pin" x1="372" y1="78" x2="372" y2="84"/>
    </g>
    <rect class="hw" x="92" y="82" width="236" height="46"/>
    <text class="label" x="210" y="100" text-anchor="middle" style="white-space: pre;">target spec</text>
    <text class="body" x="210" y="117" text-anchor="middle" style="white-space: pre;">workload, budget, legal knobs</text>
    <rect class="hw" x="92" y="152" width="236" height="46"/>
    <text class="label" x="210" y="170" text-anchor="middle" style="white-space: pre;">hardware snapshot</text>
    <text class="body" x="210" y="187" text-anchor="middle" style="white-space: pre;">ISA, memory, timing state</text>
    <rect class="hw" x="92" y="222" width="236" height="46"/>
    <text class="label" x="210" y="240" text-anchor="middle" style="white-space: pre;">implementation hooks</text>
    <text class="body" x="210" y="257" text-anchor="middle" style="white-space: pre;">simulator, RTL, counters</text>
    <rect class="sw-panel" x="498" y="32" width="348" height="248"/>
    <text class="lane-label" x="524" y="58" style="white-space: pre;">SOFTWARE PATH STATE</text>
    <g>
      <rect x="794" y="46" width="44" height="28" fill="#FFFFFF" stroke="#1683A6" stroke-width="1.5"/>
      <path class="code" d="M 807 54 L 801 60 L 807 66"/>
      <path class="code" d="M 825 54 L 831 60 L 825 66"/>
      <line class="code" x1="812" y1="68" x2="820" y2="52"/>
    </g>
    <rect class="sw" x="572" y="82" width="236" height="46"/>
    <text class="label" x="690" y="100" text-anchor="middle" style="white-space: pre;">software interface</text>
    <text class="body" x="690" y="117" text-anchor="middle" style="white-space: pre;">compiler, runtime, API</text>
    <rect class="sw" x="572" y="152" width="236" height="46"/>
    <text class="label" x="690" y="170" text-anchor="middle" style="white-space: pre;">generated path</text>
    <text class="body" x="690" y="187" text-anchor="middle" style="white-space: pre;">kernels, schedules, libraries</text>
    <rect class="sw" x="572" y="222" width="236" height="46"/>
    <text class="label" x="690" y="240" text-anchor="middle" style="white-space: pre;">workload feedback</text>
    <text class="body" x="690" y="257" text-anchor="middle" style="white-space: pre;">tests, profiles, failures</text>
    <line class="arrow" x1="328" y1="105" x2="572" y2="105" marker-end="url(#arrow)"/>
    <rect x="395" y="81" width="110" height="26" fill="#FFFFFF" opacity="0.94"/>
    <text class="micro" x="450" y="97" text-anchor="middle" style="white-space: pre;">exposes knobs</text>
    <line class="blue-arrow" x1="572" y1="175" x2="328" y2="175" marker-end="url(#arrow-blue)"/>
    <rect x="390" y="174" width="120" height="26" fill="#FFFFFF" opacity="0.94"/>
    <text class="micro" x="450" y="190" text-anchor="middle" fill="#136680" style="white-space: pre;">changes target</text>
    <rect class="evidence" x="178" y="300" width="544" height="58"/>
    <text class="label" x="450" y="323" text-anchor="middle" style="white-space: pre;">shared study record</text>
    <text class="body" x="450" y="342" text-anchor="middle" style="white-space: pre;">hardware snapshot, software artifact, tests, metrics, rejected variants</text>
    <line class="arrow" x1="210" y1="268" x2="210" y2="300" marker-end="url(#arrow)"/>
    <line class="arrow" x1="690" y1="268" x2="690" y2="300" marker-end="url(#arrow)"/>
    <rect class="decision" x="340" y="371" width="220" height="42"/>
    <text class="label" x="450" y="389" text-anchor="middle" style="white-space: pre;">review by decision holder</text>
    <text class="body" x="450" y="405" text-anchor="middle" style="white-space: pre;">accept / reject / revise</text>
    <line class="arrow" x1="450" y1="358" x2="450" y2="371" marker-end="url(#arrow)"/>
    <path class="blue-arrow" d="M 340 392 L 42 392 L 42 105 L 92 105" marker-end="url(#arrow-blue)"/>
    <path class="blue-arrow" d="M 560 392 L 858 392 L 858 105 L 808 105" marker-end="url(#arrow-blue)"/>
    <rect class="takeaway" x="118" y="428" width="664" height="30"/>
    <text class="note" x="450" y="448" text-anchor="middle" style="white-space: pre;">version both sides, then record the claim and decision</text>
  </g>
</svg>
