<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 590" role="img" aria-labelledby="boundary-title boundary-desc">
  <title id="boundary-title">Assigned architecture responsibilities across a bounded study</title>
  <desc id="boundary-desc">A bounded architecture study contains six nonsequential capabilities that may be assisted by AI systems, tools, and domain specialists. Architectural claims are the unit of review. Design loops, evidence records, design-loop cards, checks, and replay packages are supporting instruments. Responsibilities for scope, evidence, exceptions, decisions, transfer, and reopening remain assigned across the entire study.</desc>
  <defs>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .study { fill: #FFFFFF; stroke: #1683A6; stroke-width: 1.5; }
      .assist { fill: #F0ECFA; stroke: #6A4FC7; stroke-width: 1.4; }
      .capability { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.4; }
      .claim { fill: #E7F5EC; stroke: #1E9E48; stroke-width: 2; }
      .mechanism { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .rights { fill: #FDECEC; stroke: #DE3D3C; stroke-width: 1.5; }
      .right { fill: #FFFFFF; stroke: #DE3D3C; stroke-width: 1.05; }
      .study-label { font-size: 13px; font-weight: 700; fill: #136680; letter-spacing: 0.6px; }
      .heading { font-size: 13.5px; font-weight: 700; fill: #20252B; }
      .label { font-size: 12.5px; font-weight: 700; fill: #20252B; }
      .small { font-size: 11.5px; fill: #59636D; }
      .micro { font-size: 11.2px; fill: #444444; }
      .rights-label { font-size: 13.5px; font-weight: 700; fill: #C62A2A; }
      .support-line { stroke: #9AA8B5; stroke-width: 1.25; fill: none; }
    </style>
  </defs>

  <rect width="800" height="590" fill="#FFFFFF"/>
  <g class="font">
    <rect class="study" x="28" y="20" width="744" height="550"/>
    <text class="study-label" x="48" y="48">BOUNDED ARCHITECTURE STUDY</text>
    <text class="small" x="752" y="48" text-anchor="end">declared question, scope, and stopping rule</text>

    <rect class="assist" x="50" y="66" width="700" height="52"/>
    <text class="label" x="400" y="88" text-anchor="middle">AI systems, tools, and domain specialists may assist across every capability</text>
    <text class="small" x="400" y="106" text-anchor="middle">Assignments depend on the study and need not follow a fixed sequence.</text>

    <text class="heading" x="50" y="145">Architecture capabilities</text>
    <text class="small" x="750" y="145" text-anchor="end">composed as the study requires</text>

    <rect class="capability" x="50" y="158" width="106" height="42"/>
    <text class="label" x="103" y="184" text-anchor="middle">formulate</text>
    <rect class="capability" x="169" y="158" width="106" height="42"/>
    <text class="label" x="222" y="184" text-anchor="middle">explore</text>
    <rect class="capability" x="288" y="158" width="106" height="42"/>
    <text class="label" x="341" y="184" text-anchor="middle">implement</text>
    <rect class="capability" x="407" y="158" width="106" height="42"/>
    <text class="label" x="460" y="184" text-anchor="middle">evaluate</text>
    <rect class="capability" x="526" y="158" width="106" height="42"/>
    <text class="label" x="579" y="184" text-anchor="middle">explain</text>
    <rect class="capability" x="645" y="158" width="105" height="42"/>
    <text class="label" x="697.5" y="184" text-anchor="middle">defend</text>

    <line class="support-line" x1="103" y1="200" x2="103" y2="216"/>
    <line class="support-line" x1="222" y1="200" x2="222" y2="216"/>
    <line class="support-line" x1="341" y1="200" x2="341" y2="216"/>
    <line class="support-line" x1="460" y1="200" x2="460" y2="216"/>
    <line class="support-line" x1="579" y1="200" x2="579" y2="216"/>
    <line class="support-line" x1="697.5" y1="200" x2="697.5" y2="216"/>
    <line class="support-line" x1="103" y1="216" x2="697.5" y2="216"/>
    <line class="support-line" x1="400" y1="216" x2="400" y2="228"/>

    <rect class="claim" x="155" y="228" width="490" height="76"/>
    <text class="heading" x="400" y="254" text-anchor="middle">Architectural claim</text>
    <text class="label" x="400" y="274" text-anchor="middle">unit of review</text>
    <text class="micro" x="400" y="293" text-anchor="middle">proposition  |  scope  |  evidence  |  counterevidence  |  qualification</text>

    <text class="heading" x="50" y="333">Supporting instruments</text>
    <text class="small" x="750" y="333" text-anchor="end">instruments, not the subject of the discipline</text>

    <rect class="mechanism" x="50" y="346" width="160" height="52"/>
    <text class="label" x="130" y="369" text-anchor="middle">design loops</text>
    <text class="micro" x="130" y="387" text-anchor="middle">when iteration helps</text>
    <rect class="mechanism" x="230" y="346" width="160" height="52"/>
    <text class="label" x="310" y="369" text-anchor="middle">evidence records</text>
    <text class="micro" x="310" y="387" text-anchor="middle">provenance + uncertainty</text>
    <rect class="mechanism" x="410" y="346" width="160" height="52"/>
    <text class="label" x="490" y="369" text-anchor="middle">design-loop cards</text>
    <text class="micro" x="490" y="387" text-anchor="middle">compact study index</text>
    <rect class="mechanism" x="590" y="346" width="160" height="52"/>
    <text class="label" x="670" y="369" text-anchor="middle">checks + replay</text>
    <text class="micro" x="670" y="387" text-anchor="middle">validity + traceability</text>

    <rect class="rights" x="50" y="420" width="700" height="126"/>
    <text class="rights-label" x="400" y="445" text-anchor="middle">Assigned responsibilities remain visible across the work</text>
    <text class="small" x="400" y="463" text-anchor="middle">assigned to named people or organizational roles across the study</text>

    <rect class="right" x="66" y="476" width="105" height="28"/>
    <text class="label" x="118.5" y="495" text-anchor="middle">scope</text>
    <rect class="right" x="183" y="476" width="120" height="28"/>
    <text class="label" x="243" y="495" text-anchor="middle">abstraction</text>
    <rect class="right" x="315" y="476" width="170" height="28"/>
    <text class="label" x="400" y="495" text-anchor="middle">evidence standards</text>
    <rect class="right" x="497" y="476" width="237" height="28"/>
    <text class="label" x="615.5" y="495" text-anchor="middle">automation limits</text>

    <rect class="right" x="92" y="512" width="188" height="28"/>
    <text class="label" x="186" y="531" text-anchor="middle">exceptions + waivers</text>
    <rect class="right" x="306" y="512" width="188" height="28"/>
    <text class="label" x="400" y="531" text-anchor="middle">final decision</text>
    <rect class="right" x="520" y="512" width="188" height="28"/>
    <text class="label" x="614" y="531" text-anchor="middle">transfer + reopening</text>
  </g>
</svg>
