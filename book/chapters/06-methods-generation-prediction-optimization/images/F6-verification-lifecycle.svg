<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .text-title { font-family: -apple-system, sans-serif; font-size: 16px; font-weight: bold; fill: #111; text-anchor: middle;}
      .text-body { font-family: -apple-system, sans-serif; font-size: 14px; fill: #333; text-anchor: middle;}
      .text-small { font-family: -apple-system, sans-serif; font-size: 12px; fill: #555; text-anchor: middle;}
      .box-gen { fill: #e8eaf6; stroke: #3f51b5; stroke-width: 2px; rx: 8px; }
      .box-verif { fill: #e8f5e9; stroke: #4caf50; stroke-width: 2px; rx: 8px; }
      .box-crit { fill: #fff3e0; stroke: #ff9800; stroke-width: 2px; rx: 8px; }
      .box-rep { fill: #e1f5fe; stroke: #03a9f4; stroke-width: 2px; rx: 8px; }
      .box-arch { fill: #fce4ec; stroke: #e91e63; stroke-width: 2px; rx: 8px; }
      .box-fail { fill: #ffebee; stroke: #f44336; stroke-width: 2px; rx: 8px; }
      .arrow { stroke: #555; stroke-width: 2px; fill: none; }
      .arrow-err { stroke: #d32f2f; stroke-width: 2px; stroke-dasharray: 5,5; fill: none; }
      .arrow-head { fill: #555; }
      .arrow-head-err { fill: #d32f2f; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow-head"/>
    </marker>
    <marker id="arrowhead-err" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow-head-err"/>
    </marker>
  </defs>

  <text x="400" y="30" class="text-title">Artifact Lifecycle: Verification, Critique, and Repair</text>

  <!-- Nodes -->
  <rect x="300" y="80" width="200" height="50" class="box-gen" />
  <text x="400" y="110" class="text-body" font-weight="bold">Generator</text>

  <rect x="300" y="180" width="200" height="50" class="box-verif" />
  <text x="400" y="205" class="text-body" font-weight="bold">Verification (Oracle)</text>
  <text x="400" y="220" class="text-small">DRC, Equivalence, Simulation</text>

  <rect x="50" y="280" width="200" height="50" class="box-rep" />
  <text x="150" y="310" class="text-body" font-weight="bold">Repair</text>

  <rect x="300" y="280" width="200" height="50" class="box-fail" />
  <text x="400" y="310" class="text-body" font-weight="bold">Semantic/Syntax Failure</text>

  <rect x="550" y="280" width="200" height="50" class="box-crit" />
  <text x="650" y="310" class="text-body" font-weight="bold">Critique</text>

  <rect x="300" y="380" width="200" height="50" class="box-arch" />
  <text x="400" y="410" class="text-body" font-weight="bold">Human Architect</text>

  <!-- Edges -->
  <!-- Gen -> Verif -->
  <path d="M 400 130 L 400 180" class="arrow" marker-end="url(#arrowhead)"/>
  
  <!-- Verif -> Success -->
  <path d="M 500 205 L 750 205" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="625" y="195" class="text-small">Success: Valid Artifact</text>

  <!-- Verif -> Fail -->
  <path d="M 400 230 L 400 280" class="arrow-err" marker-end="url(#arrowhead-err)"/>
  
  <!-- Fail -> Repair -->
  <path d="M 300 305 L 250 305" class="arrow" marker-end="url(#arrowhead)"/>
  
  <!-- Repair -> Verif -->
  <path d="M 150 280 L 150 205 L 300 205" class="arrow" marker-end="url(#arrowhead)"/>
  
  <!-- Fail -> Crit -->
  <path d="M 500 305 L 550 305" class="arrow" marker-end="url(#arrowhead)"/>
  
  <!-- Crit -> Architect -->
  <path d="M 650 330 L 650 405 L 500 405" class="arrow-err" marker-end="url(#arrowhead-err)"/>
  <text x="650" y="360" class="text-small" fill="#d32f2f">Timeout/Unrepairable</text>

  <!-- Fail -> Architect -->
  <path d="M 400 330 L 400 380" class="arrow-err" marker-end="url(#arrowhead-err)"/>

</svg>
