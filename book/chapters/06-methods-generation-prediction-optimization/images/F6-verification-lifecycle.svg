<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="lifecycle-title lifecycle-desc">
  <title id="lifecycle-title">Artifact verification lifecycle: verification, critique, and repair</title>
  <desc id="lifecycle-desc">A top-down lifecycle diagram. A generator proposes candidate artifacts that flow into verification, an oracle running syntax checks, equivalence, and simulation. A passing candidate becomes a valid recorded artifact. A failing candidate reaches a failure decision that routes by cause: a repairable failure goes to repair, which corrects the artifact and returns it to verification, while an unrepairable failure goes to critique, which diagnoses the root cause and escalates to the human architect who owns the decision. Failure and escalation paths are drawn in red, and the repair-to-verification feedback loop is teal.</desc>
  <defs>
    <marker id="arrow-dark" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1683A6"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#DE3D3C"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .box-title { font-size: 13.5px; font-weight: 700; fill: #20252B; }
      .box-sub { font-size: 11.4px; fill: #444444; }
      .edge-label { font-size: 11.4px; font-weight: 700; fill: #59636D; }
      .edge-fail { font-size: 11.4px; font-weight: 700; fill: #C62A2A; }
      .gen { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.45; }
      .verif { fill: #E7F5EC; stroke: #1E9E48; stroke-width: 1.45; }
      .valid { fill: #FBEDF4; stroke: #D24D96; stroke-width: 1.45; }
      .fail { fill: #FDECEC; stroke: #DE3D3C; stroke-width: 1.45; }
      .repair { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.45; }
      .crit { fill: #FDECEC; stroke: #DE3D3C; stroke-width: 1.45; }
      .arch { fill: #FBEDF4; stroke: #D24D96; stroke-width: 1.45; }
      .edge { fill: none; stroke: #333333; stroke-width: 1.9; stroke-linecap: square; stroke-linejoin: miter; marker-end: url(#arrow-dark); }
      .edge-teal { fill: none; stroke: #1683A6; stroke-width: 1.9; stroke-linecap: square; stroke-linejoin: miter; marker-end: url(#arrow-teal); }
      .edge-red { fill: none; stroke: #DE3D3C; stroke-width: 1.9; stroke-linecap: square; stroke-linejoin: miter; marker-end: url(#arrow-red); }
    </style>
  </defs>

  <rect width="900" height="520" fill="#FFFFFF"/>
  <g class="font">

    <!-- arrows -->
    <path class="edge" d="M 450 120 L 450 175"/>
    <path class="edge" d="M 550 208 L 660 208"/>
    <text class="edge-label" x="605" y="200" text-anchor="middle">pass</text>

    <path class="edge-red" d="M 450 241 L 450 305"/>
    <text class="edge-fail" x="462" y="277" text-anchor="start">fail</text>

    <path class="edge" d="M 350 338 L 240 338"/>
    <text class="edge-label" x="295" y="330" text-anchor="middle">repairable</text>

    <path class="edge-teal" d="M 140 305 L 140 208 L 350 208"/>
    <text class="edge-label" x="245" y="200" text-anchor="middle">re-verify</text>

    <path class="edge" d="M 550 338 L 660 338"/>
    <text class="edge-label" x="605" y="330" text-anchor="middle">unrepairable</text>

    <path class="edge-red" d="M 760 371 L 760 460 L 550 460"/>
    <text class="edge-fail" x="655" y="452" text-anchor="middle">escalate</text>

    <!-- generator -->
    <rect class="gen" x="350" y="60" width="200" height="60"/>
    <text class="box-title" x="450" y="87" text-anchor="middle">Generator</text>
    <text class="box-sub" x="450" y="105" text-anchor="middle">proposes candidate artifacts</text>

    <!-- verification -->
    <rect class="verif" x="350" y="175" width="200" height="66"/>
    <text class="box-title" x="450" y="202" text-anchor="middle">Verification (oracle)</text>
    <text class="box-sub" x="450" y="221" text-anchor="middle">DRC, equivalence, simulation</text>

    <!-- valid artifact -->
    <rect class="valid" x="660" y="175" width="200" height="66"/>
    <text class="box-title" x="760" y="202" text-anchor="middle">Valid artifact</text>
    <text class="box-sub" x="760" y="221" text-anchor="middle">accepted, recorded</text>

    <!-- repair -->
    <rect class="repair" x="40" y="305" width="200" height="66"/>
    <text class="box-title" x="140" y="332" text-anchor="middle">Repair</text>
    <text class="box-sub" x="140" y="351" text-anchor="middle">corrects the artifact</text>

    <!-- failure -->
    <rect class="fail" x="350" y="305" width="200" height="66"/>
    <text class="box-title" x="450" y="332" text-anchor="middle">Failure</text>
    <text class="box-sub" x="450" y="351" text-anchor="middle">syntax or semantic</text>

    <!-- critique -->
    <rect class="crit" x="660" y="305" width="200" height="66"/>
    <text class="box-title" x="760" y="332" text-anchor="middle">Critique</text>
    <text class="box-sub" x="760" y="351" text-anchor="middle">diagnoses root cause</text>

    <!-- human architect -->
    <rect class="arch" x="350" y="430" width="200" height="60"/>
    <text class="box-title" x="450" y="457" text-anchor="middle">Human architect</text>
    <text class="box-sub" x="450" y="475" text-anchor="middle">escalation, owns decision</text>

  </g>
</svg>
