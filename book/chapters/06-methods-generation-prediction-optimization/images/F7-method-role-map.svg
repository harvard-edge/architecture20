<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 446" role="img">
  <title>AI method roles inside a bounded architecture study</title>
  <desc>A diagram mapping generation, prediction, optimization, critique, repair, verification, explanation, and coordination to bounded study outputs and accountable review of an architectural claim.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .panel-title { font-size: 17.5px; font-weight: 700; fill: #222222; }
      .label { font-size: 14.8px; font-weight: 700; fill: #222222; }
      .small { font-size: 12.8px; fill: #444444; }
      .note { font-size: 12.8px; font-weight: 700; fill: #1683A6; }
      .state { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.4; }
      .method { fill: #F0ECFA; stroke: #6A4FC7; stroke-width: 1.4; }
      .output { fill: #F0ECFA; stroke: #6A4FC7; stroke-width: 1.4; }
      .decision { fill: #FDECEC; stroke: #DE3D3C; stroke-width: 1.4; }
      .coordination { fill: #F0ECFA; stroke: #6A4FC7; stroke-width: 1.2; }
      .arrow { stroke: #333333; stroke-width: 2; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .glyph { fill: none; stroke: currentColor; stroke-width: 1.55; stroke-linecap: round; stroke-linejoin: round; }
      .glyph-state { color: #1683A6; }
      .glyph-method { color: #6A4FC7; }
      .glyph-decision { color: #DE3D3C; }
    </style>
  </defs>
  <rect width="720" height="446" fill="#FFFFFF"/>
  <g class="font" transform="translate(0,-54)">
    <rect class="state" x="65" y="130" width="175" height="225"/>
    <text class="panel-title" x="162" y="160" text-anchor="middle" style="white-space: pre;">bounded study</text>
    <text class="small" x="152.5" y="187" text-anchor="middle" style="white-space: pre;">task + claim</text>
    <text class="small" x="152.5" y="215" text-anchor="middle" style="white-space: pre;">representation</text>
    <text class="small" x="152.5" y="243" text-anchor="middle" style="white-space: pre;">environment</text>
    <text class="small" x="152.5" y="271" text-anchor="middle" style="white-space: pre;">feedback budget</text>
    <text class="small" x="152.5" y="299" text-anchor="middle" style="white-space: pre;">constraints</text>
    <text class="small" x="152.5" y="327" text-anchor="middle" style="white-space: pre;">decision boundary</text>
    <rect class="coordination" x="290" y="82" width="350" height="26"/>
    <text class="small" x="465" y="100" text-anchor="middle" style="white-space: pre;">coordination routes state, actions, and evidence</text>
    <rect class="method" x="290" y="115" width="160" height="42"/>
    <g class="glyph glyph-method" transform="translate(309 127)">
      <path d="M 2 9 L 16 2 L 13 17 Z"/>
      <path d="M 7 11 L 13 17"/>
    </g>
    <text class="label" x="338" y="141" style="white-space: pre;">generate</text>
    <rect class="method" x="290" y="170" width="160" height="42"/>
    <g class="glyph glyph-method" transform="translate(309 182)">
      <path d="M 1 14 C 5 5, 11 5, 17 14"/>
      <circle cx="9" cy="12" r="2.5"/>
    </g>
    <text class="label" x="338" y="196" style="white-space: pre;">predict</text>
    <rect class="method" x="290" y="225" width="160" height="42"/>
    <g class="glyph glyph-method" transform="translate(309 237)">
      <circle cx="9" cy="9" r="8"/>
      <circle cx="9" cy="9" r="3"/>
    </g>
    <text class="label" x="338" y="251" style="white-space: pre;">optimize</text>
    <rect class="method" x="290" y="280" width="160" height="42"/>
    <g class="glyph glyph-method" transform="translate(309 292)">
      <path d="M 3 4 L 15 16"/>
      <path d="M 15 4 L 3 16"/>
    </g>
    <text class="label" x="386" y="306" text-anchor="middle" style="font-size: 14px; white-space: pre;">critique / repair</text>
    <rect class="method" x="290" y="335" width="160" height="42"/>
    <g class="glyph glyph-method" transform="translate(309 347)">
      <path d="M 2 10 L 7 15 L 16 4"/>
      <path d="M 2 19 L 16 19"/>
    </g>
    <text class="label" x="338" y="361" style="font-size: 14px; white-space: pre;">verify / explain</text>
    <rect class="output" x="505" y="115" width="135" height="42"/>
    <text class="small" x="572.5" y="140" text-anchor="middle" style="white-space: pre;">candidates</text>
    <rect class="output" x="505" y="170" width="135" height="42"/>
    <text class="small" x="572.5" y="195" text-anchor="middle" style="white-space: pre;">estimates</text>
    <rect class="output" x="505" y="225" width="135" height="42"/>
    <text class="small" x="572.5" y="250" text-anchor="middle" style="white-space: pre;">next experiment</text>
    <rect class="output" x="505" y="280" width="135" height="42"/>
    <text class="small" x="572.5" y="305" text-anchor="middle" style="white-space: pre;">revisions</text>
    <rect class="output" x="505" y="335" width="135" height="42"/>
    <text class="small" x="572.5" y="360" text-anchor="middle" style="white-space: pre;">evidence</text>
    <rect class="decision" x="240" y="405" width="440" height="28"/>
    <text class="label" x="460" y="424" text-anchor="middle" style="white-space: pre;">accountable claim review: accept, reject, escalate, or revise</text>
    <line class="arrow" x1="240" y1="243" x2="290" y2="243" marker-end="url(#arrow)"/>
    <line class="arrow" x1="450" y1="136" x2="505" y2="136" marker-end="url(#arrow)"/>
    <line class="arrow" x1="450" y1="191" x2="505" y2="191" marker-end="url(#arrow)"/>
    <line class="arrow" x1="450" y1="246" x2="505" y2="246" marker-end="url(#arrow)"/>
    <line class="arrow" x1="450" y1="301" x2="505" y2="301" marker-end="url(#arrow)"/>
    <line class="arrow" x1="450" y1="356" x2="505" y2="356" marker-end="url(#arrow)"/>
    <polyline class="arrow" points="572.5 377 572.5 386 465 386 465 405" marker-end="url(#arrow)"/>
    <text class="note" x="360" y="469" text-anchor="middle" style="white-space: pre;">AI roles support the study; evidence and risk bound the decision</text>
  </g>
</svg>
