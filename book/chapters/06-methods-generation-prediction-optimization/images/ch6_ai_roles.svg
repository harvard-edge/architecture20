<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
    <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .panel-title { font-size: 13.5px; font-weight: 700; fill: #20252B; }
      .panel-subtitle { font-size: 11.5px; fill: #59636D; }
      .body-bold { font-size: 12.5px; font-weight: 700; fill: #222222; }
      .chip { font-size: 12.5px; font-weight: 700; fill: #222222; }
      .small { font-size: 11.2px; fill: #444444; }
      .panel { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .role-box { fill: #FFFFFF; stroke: #1683A6; stroke-width: 1.45; }
      .line { stroke: #333333; stroke-width: 1.9; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
    </style>
  </defs>

  <text x="400" y="40" class="panel-title">The 8 AI Roles in Architecture 2.0</text>

  <!-- Edges to Coordinator -->
  <path d="M 220 125 L 320 220" class="line" marker-end="url(#arrow)"/>
  <path d="M 220 250 L 320 250" class="line" marker-end="url(#arrow)"/>
  <path d="M 220 375 L 320 280" class="line" marker-end="url(#arrow)"/>

  <!-- Coordinator to Reviewers -->
  <path d="M 480 210 L 575 125" class="line" marker-end="url(#arrow)"/>
  <!-- Reviewers back to Coordinator -->
  <path d="M 580 135 L 480 220" class="line" marker-end="url(#arrow)"/>

  <path d="M 480 245 L 575 245" class="line" marker-end="url(#arrow)"/>
  <path d="M 580 255 L 480 255" class="line" marker-end="url(#arrow)"/>

  <path d="M 480 280 L 575 365" class="line" marker-end="url(#arrow)"/>
  <path d="M 580 375 L 480 290" class="line" marker-end="url(#arrow)"/>

  <!-- Coordinator to Explanation -->
  <path d="M 400 300 L 400 375" class="line" marker-end="url(#arrow)"/>

  <!-- Proposers -->
  <rect x="80" y="100" width="140" height="50" class="role-box"/>
  <text x="150" y="130" class="body-bold">Generation</text>

  <rect x="80" y="225" width="140" height="50" class="role-box"/>
  <text x="150" y="255" class="body-bold">Prediction</text>

  <rect x="80" y="350" width="140" height="50" class="role-box"/>
  <text x="150" y="380" class="body-bold">Optimization</text>

  <!-- Coordinator -->
  <rect x="320" y="200" width="160" height="100" class="panel"/>
  <text x="400" y="255" class="body-bold">Coordination</text>

  <!-- Reviewers -->
  <rect x="580" y="100" width="140" height="50" class="role-box"/>
  <text x="650" y="130" class="body-bold">Critique</text>

  <rect x="580" y="225" width="140" height="50" class="role-box"/>
  <text x="650" y="255" class="body-bold">Verification</text>

  <rect x="580" y="350" width="140" height="50" class="role-box"/>
  <text x="650" y="380" class="body-bold">Repair</text>

  <!-- Explainer -->
  <rect x="330" y="380" width="140" height="50" class="role-box"/>
  <text x="400" y="410" class="body-bold">Explanation</text>

</svg>
