<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 566" role="img">
  <title>Hardware awareness capability ladder</title>
  <desc>A stacked ladder defining levels of hardware awareness for Architecture 2.0 methods without treating technical capability as organizational authority.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .level { stroke-width: 1.4; }
      .num { font-size: 12.5px; font-weight: 700; fill: #222222; }
      .label { font-size: 13.5px; font-weight: 700; fill: #222222; }
      .body { font-size: 12.5px; fill: #333333; }
      .num-dark { font-size: 12.5px; font-weight: 700; fill: #222222; }
      .label-dark { font-size: 13.5px; font-weight: 700; fill: #222222; }
      .body-dark { font-size: 12.5px; fill: #333333; }
      .small-dark { font-size: 11.4px; fill: #59636D; }
      .note { font-size: 12.5px; font-weight: 700; fill: #1683A6; }
      .small { font-size: 11.4px; fill: #59636D; }
      .axis { stroke: #333333; stroke-width: 1.9; fill: none; stroke-linecap: square; }
      /* progression built from the canonical teal triple only: Level 0 is the
         tint #E4F1F6; Levels 1-5 step the mark #1683A6 by fill-opacity; every
         stroke is the mark #1683A6 (tint fill + same-role mark stroke) */
      .l0 { fill: #E4F1F6; stroke: #1683A6; }
      .l1 { fill: #1683A6; fill-opacity: 0.19; stroke: #1683A6; }
      .l2 { fill: #1683A6; fill-opacity: 0.28; stroke: #1683A6; }
      .l3 { fill: #1683A6; fill-opacity: 0.37; stroke: #1683A6; }
      .l4 { fill: #1683A6; fill-opacity: 0.46; stroke: #1683A6; }
      .l5 { fill: #1683A6; fill-opacity: 0.55; stroke: #1683A6; }
      .neutral { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
    </style>
  </defs>

  <rect width="960" height="566" fill="#FFFFFF"/>
  <g class="font">

    <line class="axis" x1="44" y1="408" x2="44" y2="96" marker-end="url(#arrow)"/>
    <text class="small" x="44" y="460" text-anchor="middle">lower</text>
    <text class="small" x="48" y="84" text-anchor="middle">higher</text>
    <text class="small" x="480" y="42" text-anchor="middle">broader claims require stronger evidence</text>

    <rect class="level l5" x="230" y="68" width="500" height="54"/>
    <text class="num-dark" x="250" y="90">Level 5</text>
    <text class="label-dark" x="332" y="90">Commitment-boundary awareness</text>
    <text class="body-dark" x="332" y="109">What it may recommend, what must escalate, and why.</text>

    <rect class="level l4" x="195" y="132" width="570" height="58"/>
    <text class="num-dark" x="215" y="154">Level 4</text>
    <text class="label-dark" x="297" y="154">Evidence and calibration awareness</text>
    <text class="body-dark" x="297" y="168">Tracks uncertainty, proxy mismatch, and fidelity;</text>
    <text class="small-dark" x="297" y="182">records rejected alternatives.</text>

    <rect class="level l3" x="160" y="196" width="640" height="54"/>
    <text class="num-dark" x="180" y="218">Level 3</text>
    <text class="label-dark" x="262" y="218">Tool and environment awareness</text>
    <text class="body-dark" x="262" y="237">Compiles, runs, profiles, simulates, and interprets tool failures.</text>

    <rect class="level l2" x="125" y="260" width="710" height="54"/>
    <text class="num" x="145" y="282">Level 2</text>
    <text class="label" x="227" y="282">Performance-model awareness</text>
    <text class="body" x="227" y="301">Reasons about locality, bandwidth, parallelism, pipelines, and data movement.</text>

    <rect class="level l1" x="90" y="324" width="780" height="54"/>
    <text class="num" x="110" y="346">Level 1</text>
    <text class="label" x="192" y="346">Constraint awareness</text>
    <text class="body" x="192" y="365">Uses power, area, memory, latency, precision, reliability, and process limits.</text>

    <rect class="level l0" x="55" y="388" width="850" height="54"/>
    <text class="num" x="75" y="410">Level 0</text>
    <text class="label" x="157" y="410">Vocabulary awareness</text>
    <text class="body" x="157" y="429">Names ISA, cache, vector, accelerator, SoC, compiler, and EDA concepts.</text>

    <rect class="neutral" x="118" y="492" width="724" height="38"/>
    <text class="note" x="480" y="516" text-anchor="middle">Assessment: what can it change, what feedback supports it, and what can reject it?</text>
  </g>
</svg>
