<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 312" role="img" aria-labelledby="ontology-title ontology-desc">
  <title id="ontology-title">The Architecture 2.0 engineering lifecycle</title>
  <desc id="ontology-desc">Six numbered stages run in order across two rows. Formulate bounds the study and the claim, Explore covers state representation and multi-fidelity search, and Implement covers tool execution and friction. Evaluate converts results to evidence, Explain covers mechanism and interpretation, and Defend covers action, authority, and review. A return path carries a revision of the claim or study back to Formulate for another turn.</desc>
  <defs>
    <marker id="arrow-dark" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#C62A2A"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .stage { stroke-width: 1.7; }
      .formulate { fill: #E4F1F6; stroke: #1683A6; }
      .explore   { fill: #F0ECFA; stroke: #6A4FC7; }
      .implement { fill: #FBF0DE; stroke: #E68A17; }
      .evaluate  { fill: #E7F5EC; stroke: #1E9E48; }
      .explain   { fill: #FFFFFF; stroke: #1E9E48; }
      .defend    { fill: #FBEDF4; stroke: #D24D96; }
      .title { font-size: 15px; font-weight: 700; fill: #20252B; }
      .sub { font-size: 13px; fill: #444444; }
      .tag { font-size: 12px; font-weight: 700; }
      .tag-formulate { fill: #136680; }
      .tag-explore   { fill: #59429E; }
      .tag-implement { fill: #8A5310; }
      .tag-evaluate  { fill: #157A38; }
      .tag-explain   { fill: #157A38; }
      .tag-defend    { fill: #A82E70; }
      .edge { fill: none; stroke: #333333; stroke-width: 2; stroke-linecap: square; stroke-linejoin: miter; marker-end: url(#arrow-dark); }
      .revise { fill: none; stroke: #C62A2A; stroke-width: 2; stroke-linecap: square; stroke-linejoin: miter; marker-end: url(#arrow-red); }
      .revise-text { font-size: 12.5px; font-weight: 700; fill: #C62A2A; }
    </style>
  </defs>

  <rect width="940" height="312" fill="#FFFFFF"/>
  <g class="font">

    <!-- Row 1: 1 Formulate -> 2 Explore -> 3 Implement -->
    <rect class="stage formulate" x="100" y="28" width="236" height="88"/>
    <text class="tag tag-formulate" x="118" y="58">1</text>
    <text class="title" x="142" y="58">Formulate</text>
    <text class="sub" x="142" y="80">bounding the study</text>
    <text class="sub" x="142" y="98">and the claim</text>

    <rect class="stage explore" x="380" y="28" width="236" height="88"/>
    <text class="tag tag-explore" x="398" y="58">2</text>
    <text class="title" x="422" y="58">Explore</text>
    <text class="sub" x="422" y="80">state representation</text>
    <text class="sub" x="422" y="98">and multi-fidelity search</text>

    <rect class="stage implement" x="660" y="28" width="236" height="88"/>
    <text class="tag tag-implement" x="678" y="58">3</text>
    <text class="title" x="702" y="58">Implement</text>
    <text class="sub" x="702" y="80">tool execution</text>
    <text class="sub" x="702" y="98">and friction</text>

    <!-- Row 2: 4 Evaluate -> 5 Explain -> 6 Defend (right to left) -->
    <rect class="stage evaluate" x="660" y="196" width="236" height="88"/>
    <text class="tag tag-evaluate" x="678" y="226">4</text>
    <text class="title" x="702" y="226">Evaluate</text>
    <text class="sub" x="702" y="248">converting results</text>
    <text class="sub" x="702" y="266">to evidence</text>

    <rect class="stage explain" x="380" y="196" width="236" height="88"/>
    <text class="tag tag-explain" x="398" y="226">5</text>
    <text class="title" x="422" y="226">Explain</text>
    <text class="sub" x="422" y="248">mechanism</text>
    <text class="sub" x="422" y="266">and interpretation</text>

    <rect class="stage defend" x="100" y="196" width="236" height="88"/>
    <text class="tag tag-defend" x="118" y="226">6</text>
    <text class="title" x="142" y="226">Defend</text>
    <text class="sub" x="142" y="248">action, authority,</text>
    <text class="sub" x="142" y="266">and review</text>

    <!-- Sequence connectors -->
    <line class="edge" x1="336" y1="72" x2="380" y2="72"/>
    <line class="edge" x1="616" y1="72" x2="660" y2="72"/>
    <line class="edge" x1="778" y1="116" x2="778" y2="196"/>
    <line class="edge" x1="660" y1="240" x2="616" y2="240"/>
    <line class="edge" x1="380" y1="240" x2="336" y2="240"/>

    <!-- Return path: revision re-enters at Formulate -->
    <path class="revise" d="M 100 240 H 44 V 72 H 100"/>
    <text class="revise-text" x="100" y="152">revise the claim or the study,</text>
    <text class="revise-text" x="100" y="170">then run another turn</text>

  </g>
</svg>
