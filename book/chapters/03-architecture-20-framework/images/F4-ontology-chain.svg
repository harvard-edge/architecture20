<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 486" role="img">
  <title>Bounded architecture study ontology</title>
  <desc>A bounded architecture study begins with its scope and an architectural claim under review. Representation and tools support an execution and analysis mechanism, which becomes a design loop when work iterates. Evidence then reaches accountable review, which leads outward to a bounded finding or architectural decision or returns to revise the claim or study.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#C62A2A"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .study { fill: #FFFFFF; stroke: #1683A6; stroke-width: 1.7; }
      .box { fill: #FFFFFF; stroke: #333333; stroke-width: 1.5; }
      .scope { stroke: #6A4FC7; fill: #F0ECFA; }
      .claim { stroke: #1683A6; fill: #E4F1F6; }
      .rep { stroke: #9AA8B5; fill: #F5F8FA; }
      .loop { stroke: #E68A17; fill: #FBF0DE; }
      .review { stroke: #1E9E48; fill: #E7F5EC; }
      .outcome { stroke: #9AA8B5; fill: #F5F8FA; }
      .study-label { font-size: 12px; font-weight: 700; fill: #1683A6; letter-spacing: 0; }
      .label { font-size: 13.5px; font-weight: 700; fill: #222222; }
      .small { font-size: 12.5px; fill: #444444; }
      .outcome-text { font-size: 13px; font-weight: 700; fill: #222222; }
      .tag { font-size: 12px; font-weight: 700; fill: #59636D; letter-spacing: 0; }
      .arrow { stroke: #333333; stroke-width: 1.8; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .revision { stroke: #C62A2A; stroke-width: 2; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .revision-text { font-size: 11.5px; fill: #C62A2A; font-weight: 700; }
    </style>
  </defs>

  <rect width="720" height="486" fill="#FFFFFF"/>
  <g class="font">
    <rect class="study" x="34" y="12" width="652" height="405"/>
    <text class="study-label" x="58" y="35">BOUNDED ARCHITECTURE STUDY</text>

    <rect class="box scope" x="70" y="48" width="520" height="55"/>
    <text class="tag" x="92" y="71">1</text>
    <text class="label" x="130" y="71">Bounded study scope</text>
    <text class="small" x="130" y="91">question, baseline, design space, constraints, and intended decision</text>

    <rect class="box claim" x="70" y="119" width="520" height="55"/>
    <text class="tag" x="92" y="142">2</text>
    <text class="label" x="130" y="142">Architectural claim under review</text>
    <text class="small" x="130" y="162">mechanism, expected effect, scope, and rejection conditions</text>

    <rect class="box rep" x="70" y="190" width="520" height="55"/>
    <text class="tag" x="92" y="213">3</text>
    <text class="label" x="130" y="213">Representation + tools + environment</text>
    <text class="small" x="130" y="233">encoded state, valid actions, observations, and tool path</text>

    <rect class="box loop" x="70" y="261" width="520" height="55"/>
    <text class="tag" x="92" y="284">4</text>
    <text class="label" x="130" y="284">Execution + analysis mechanism</text>
    <text class="small" x="130" y="304">design loop when work iterates; method roles compose as needed</text>

    <rect class="box review" x="70" y="332" width="520" height="55"/>
    <text class="tag" x="92" y="355">5</text>
    <text class="label" x="130" y="355">Evidence + accountable review</text>
    <text class="small" x="130" y="375">results, provenance, uncertainty, rejection checks, and decision authority</text>

    <line class="arrow" x1="330" y1="103" x2="330" y2="119" marker-end="url(#arrow)"/>
    <line class="arrow" x1="330" y1="174" x2="330" y2="190" marker-end="url(#arrow)"/>
    <line class="arrow" x1="330" y1="245" x2="330" y2="261" marker-end="url(#arrow)"/>
    <line class="arrow" x1="330" y1="316" x2="330" y2="332" marker-end="url(#arrow)"/>

    <path class="revision" d="M 590 359 H 650 V 75"/>
    <line class="revision" x1="650" y1="75" x2="590" y2="75" marker-end="url(#arrow-red)"/>
    <line class="revision" x1="650" y1="146" x2="590" y2="146" marker-end="url(#arrow-red)"/>
    <rect x="602" y="205" width="78" height="42" fill="#FDECEC" stroke="#C62A2A" stroke-width="0.8" opacity="0.96"/>
    <text class="revision-text" x="641" y="223" text-anchor="middle">revise claim</text>
    <text class="revision-text" x="641" y="239" text-anchor="middle">or study</text>

    <line class="arrow" x1="330" y1="387" x2="330" y2="444" marker-end="url(#arrow)"/>
    <rect class="box outcome" x="188" y="444" width="284" height="30"/>
    <text class="outcome-text" x="330" y="464" text-anchor="middle">bounded finding or architectural decision</text>
  </g>
</svg>
