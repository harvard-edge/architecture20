<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 760" role="img" aria-labelledby="card-title card-desc">
  <title id="card-title">Design-loop card example for the lighthouse prompt</title>
  <desc id="card-desc">A filled example showing all twelve canonical design-loop card fields for a RISC-V mobile XR compute subsystem under a 3 W, 3 nm-class low-power mobile envelope.</desc>
  <defs>
    <style>
      .font { font-family: sans-serif; }
      .prompt { font-size: 18.2px; fill: #222222; }
      .prompt-strong { font-weight: 700; }
      .card { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.7; }
      .prompt-box { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.4; }
      .tile { fill: #FFFFFF; stroke-width: 1.35; }
      .workload { stroke: #1683A6; fill: #E4F1F6; }
      .design { stroke: #6A4FC7; fill: #F0ECFA; }
      .methods { stroke: #E68A17; fill: #FBF0DE; }
      .constraints { stroke: #DE3D3C; fill: #FDECEC; }
      .evidence { stroke: #1E9E48; fill: #E7F5EC; }
      .decision { stroke: #D24D96; fill: #FBEDF4; }
      .label { font-size: 17.2px; font-weight: 700; fill: #222222; }
      .body { font-size: 14.2px; fill: #333333; }
      .note { font-size: 12.8px; fill: #666666; }
    </style>
  </defs>

  <rect width="960" height="760" fill="#FFFFFF"/>
  <rect class="card" x="28" y="24" width="904" height="712"/>

  <rect class="prompt-box" x="58" y="50" width="844" height="88"/>
  <text class="font prompt" x="78" y="77">
    Design a low-power <tspan class="prompt-strong" fill="#59429E">64-bit RISC-V compute subsystem</tspan>
    for <tspan class="prompt-strong" fill="#136680">mobile XR</tspan>
  </text>
  <text class="font prompt" x="78" y="102">
    under a <tspan class="prompt-strong" fill="#C62A2A">3 W, 3 nm-class LP envelope</tspan>,
  </text>
  <text class="font prompt" x="78" y="125">
    returning a <tspan class="prompt-strong" fill="#157A38">DSE report with evidence and rejected alternatives</tspan>.
  </text>

  <g class="font">
    <rect class="tile workload" x="58" y="152" width="402" height="76"/>
    <text class="label" x="80" y="177">Intent</text>
    <text class="body" x="80" y="201">Improve mobile XR efficiency under power,</text>
    <text class="body" x="80" y="219">reliability, memory, and deployment constraints.</text>

    <rect class="tile workload" x="500" y="152" width="402" height="76"/>
    <text class="label" x="522" y="177">Task</text>
    <text class="body" x="522" y="201">Bounded DSE for a RISC-V compute subsystem,</text>
    <text class="body" x="522" y="219">starting with an accelerator and memory slice.</text>

    <rect class="tile design" x="58" y="238" width="402" height="76"/>
    <text class="label" x="80" y="263">Design space</text>
    <text class="body" x="80" y="287">Legal accelerator, memory, and vector choices;</text>
    <text class="body" x="80" y="305">invalid power violations and deferred software work.</text>

    <rect class="tile design" x="500" y="238" width="402" height="76"/>
    <text class="label" x="522" y="263">Representation</text>
    <text class="body" x="522" y="287">XRBench traces, architecture parameters, compiler</text>
    <text class="body" x="522" y="305">assumptions, power model, and uncertainties.</text>

    <rect class="tile methods" x="58" y="324" width="402" height="76"/>
    <text class="label" x="80" y="349">Environment</text>
    <text class="body" x="80" y="373">Simulator or cost model plus workload harness;</text>
    <text class="body" x="80" y="391">actions change tiling, memory, or vector width.</text>

    <rect class="tile methods" x="500" y="324" width="402" height="76"/>
    <text class="label" x="522" y="349">Method role</text>
    <text class="body" x="522" y="373">Generate candidates, predict cost, optimize,</text>
    <text class="body" x="522" y="391">critique assumptions, and write evidence reports.</text>

    <rect class="tile evidence" x="58" y="410" width="402" height="76"/>
    <text class="label" x="80" y="435">Feedback budget</text>
    <text class="body" x="80" y="459">Many cheap proxies, fewer simulations, and</text>
    <text class="body" x="80" y="477">rare high-fidelity checks before review.</text>

    <rect class="tile evidence" x="500" y="410" width="402" height="76"/>
    <text class="label" x="522" y="435">Evidence</text>
    <text class="body" x="522" y="459">Pareto comparison over latency, energy, area proxy,</text>
    <text class="body" x="522" y="477">memory traffic, QoS, and sensitivity.</text>

    <rect class="tile constraints" x="58" y="496" width="402" height="76"/>
    <text class="label" x="80" y="521">Failed / rejected</text>
    <text class="body" x="80" y="545">Power violations, missed real-time bounds, bandwidth</text>
    <text class="body" x="80" y="563">overruns, unsupported software, or proxy mismatches.</text>

    <rect class="tile constraints" x="500" y="496" width="402" height="76"/>
    <text class="label" x="522" y="521">Rejection authority</text>
    <text class="body" x="522" y="545">Declared checks, constraint violations, QoS misses,</text>
    <text class="body" x="522" y="563">cross-tool disagreement and independent review.</text>

    <rect class="tile decision" x="58" y="582" width="402" height="76"/>
    <text class="label" x="80" y="607">Commitment boundary</text>
    <text class="body" x="80" y="631">Authorize a higher-fidelity study only;</text>
    <text class="body" x="80" y="649">no RTL, integration, or product commitment.</text>

    <rect class="tile decision" x="500" y="582" width="402" height="76"/>
    <text class="label" x="522" y="607">Accountable decision</text>
    <text class="body" x="522" y="631">The architect may refine, escalate fidelity,</text>
    <text class="body" x="522" y="649">change scope, or reject the candidate.</text>
  </g>

  <text class="font note" x="58" y="702">Example card, not a completed design claim.</text>
</svg>
