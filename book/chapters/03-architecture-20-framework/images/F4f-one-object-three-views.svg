<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="oov-title oov-desc">
  <title id="oov-title">One bounded study, three aligned views</title>
  <desc id="oov-desc">Alignment diagram for one bounded architecture study. The left panel lists the claim tuple's ten symbols. The center panel shows the twelve design-loop card fields grouped under scope, execution, and judgment. The right panel shows the three reading passes, each bracketing one field group. The tuple's first six symbols map to the scope fields, its last four map to the judgment fields, and the execution fields have no tuple counterpart.</desc>
  <defs>
    <marker id="oov-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .eyebrow { font-size: 13px; font-weight: 700; fill: #136680; letter-spacing: 0.6px; }
      .panel { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.5; }
      .scope { fill: #F0ECFA; stroke: #6A4FC7; stroke-width: 1.4; }
      .exec { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.4; }
      .judge { fill: #E7F5EC; stroke: #1E9E48; stroke-width: 1.4; }
      .pass { fill: #FFFFFF; stroke: #1683A6; stroke-width: 1.5; }
      .group-label { font-size: 13.5px; font-weight: 700; fill: #222222; }
      .field { font-size: 12.5px; fill: #333333; }
      .sym { font-size: 12.5px; font-weight: 700; fill: #222222; }
      .pass-label { font-size: 13.5px; font-weight: 700; fill: #136680; }
      .pass-body { font-size: 11.5px; fill: #444444; }
      .note { font-size: 11.5px; fill: #8A5310; font-weight: 700; }
      .map { stroke: #333333; stroke-width: 1.5; fill: none; }
      .map-neg { stroke: #333333; stroke-width: 1.3; fill: none; stroke-dasharray: 5 4; }
      .bracket { stroke: #333333; stroke-width: 1.5; fill: none; }
      .link { stroke: #1683A6; stroke-width: 1.6; fill: none; }
    </style>
  </defs>

  <rect width="960" height="560" fill="#FFFFFF"/>
  <g class="font">
    <text class="eyebrow" x="24" y="46">CLAIM TUPLE (TEN SYMBOLS)</text>
    <text class="eyebrow" x="384" y="46">DESIGN-LOOP CARD (TWELVE FIELDS)</text>
    <text class="eyebrow" x="724" y="46">READING PASSES (THREE)</text>

    <rect class="panel" x="24" y="64" width="300" height="416"/>
    <text class="sym" x="44" y="100">P</text>
    <text class="field" x="72" y="100">proposition under review</text>
    <text class="sym" x="44" y="140">W</text>
    <text class="field" x="72" y="140">workload or scenario</text>
    <text class="sym" x="44" y="180">B</text>
    <text class="field" x="72" y="180">baseline</text>
    <text class="sym" x="44" y="220">D</text>
    <text class="field" x="72" y="220">legal design space</text>
    <text class="sym" x="44" y="260">J</text>
    <text class="field" x="72" y="260">objective vector</text>
    <text class="sym" x="44" y="300">K</text>
    <text class="field" x="72" y="300">constraint set</text>
    <text class="sym" x="44" y="340">E</text>
    <text class="field" x="72" y="340">evidence</text>
    <text class="sym" x="44" y="380">R</text>
    <text class="field" x="72" y="380">rejection checks and authority</text>
    <text class="sym" x="44" y="420">M</text>
    <text class="field" x="72" y="420">commitment boundary</text>
    <text class="sym" x="44" y="460">H</text>
    <text class="field" x="72" y="460">accountable decision authority</text>

    <rect class="scope" x="384" y="64" width="276" height="104"/>
    <text class="group-label" x="398" y="86">Scope</text>
    <text class="field" x="398" y="108">Intent</text>
    <text class="field" x="398" y="130">Task</text>
    <text class="field" x="398" y="152">Design space</text>

    <rect class="exec" x="384" y="188" width="276" height="128"/>
    <text class="group-label" x="398" y="210">Execution</text>
    <text class="field" x="398" y="232">Representation</text>
    <text class="field" x="398" y="254">Environment</text>
    <text class="field" x="398" y="276">Method role</text>
    <text class="field" x="398" y="298">Feedback budget</text>

    <text class="note" x="384" y="338">No tuple counterpart. Chapters 4&#8211;7</text>
    <text class="note" x="384" y="354">open these fields one by one.</text>

    <rect class="judge" x="384" y="372" width="276" height="152"/>
    <text class="group-label" x="398" y="394">Judgment</text>
    <text class="field" x="398" y="416">Evidence</text>
    <text class="field" x="398" y="438">Failed runs / rejected alternatives</text>
    <text class="field" x="398" y="460">Rejection checks and authority</text>
    <text class="field" x="398" y="482">Evidence-supported claim boundary</text>
    <text class="field" x="398" y="504">Accountable decision</text>

    <path class="bracket" d="M 332 92 L 340 92 L 340 304 L 332 304"/>
    <line class="map" x1="340" y1="198" x2="384" y2="116" marker-end="url(#oov-arrow)"/>
    <line class="map" x1="324" y1="336" x2="384" y2="412" marker-end="url(#oov-arrow)"/>
    <line class="map-neg" x1="324" y1="342" x2="384" y2="434" marker-end="url(#oov-arrow)"/>
    <line class="map" x1="324" y1="376" x2="384" y2="456" marker-end="url(#oov-arrow)"/>
    <line class="map" x1="324" y1="416" x2="384" y2="478" marker-end="url(#oov-arrow)"/>
    <line class="map" x1="324" y1="456" x2="384" y2="500" marker-end="url(#oov-arrow)"/>

    <rect class="pass" x="724" y="84" width="212" height="64"/>
    <text class="pass-label" x="738" y="108">Scope pass</text>
    <text class="pass-body" x="738" y="128">problem formulation</text>

    <rect class="pass" x="724" y="214" width="212" height="76"/>
    <text class="pass-label" x="738" y="238">Execution pass</text>
    <text class="pass-body" x="738" y="258">exploration, implementation,</text>
    <text class="pass-body" x="738" y="274">and evaluation</text>

    <rect class="pass" x="724" y="410" width="212" height="76"/>
    <text class="pass-label" x="738" y="434">Judgment pass</text>
    <text class="pass-body" x="738" y="454">explanation, defense,</text>
    <text class="pass-body" x="738" y="470">and decision</text>

    <line class="link" x1="660" y1="116" x2="724" y2="116"/>
    <line class="link" x1="660" y1="252" x2="724" y2="252"/>
    <line class="link" x1="660" y1="448" x2="724" y2="448"/>
  </g>
</svg>
