<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img" aria-labelledby="title desc">
  <title id="title">Architecture 2.0 Engineering Lifecycle</title>
  <desc id="desc">A six-stage loop connecting Formulate, Explore, Implement, Evaluate, Explain, and Defend.</desc>
  <defs>
    <style>
      .label { fill: #20252B; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 20px; font-weight: 750; }
      .sub { fill: #59636D; font-family: Georgia, "Times New Roman", serif; font-size: 14px; }
      .section { fill: #59636D; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; font-weight: 750; letter-spacing: 2px; }
      .arrow { fill: none; stroke: #9AA8B5; stroke-width: 3; stroke-linecap: butt; vector-effect: non-scaling-stroke; stroke-dasharray: 6 4; }
      .ico { fill: none; stroke: #FFFFFF; stroke-linecap: round; stroke-linejoin: round; vector-effect: non-scaling-stroke; stroke-width: 3; }
      .node-bg { fill: #1F5F7A; }
      .node-bg-human { fill: #20252B; }
      .node-bg-decide { fill: #A42A38; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 1L9 5L0 9Z" fill="#9AA8B5"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="898" height="498" rx="2" fill="#F7FAFB" stroke="#9AA8B5" stroke-width="1.5"/>

  <text x="450" y="45" class="section" text-anchor="middle">THE ARCHITECTURE 2.0 ONTOLOGY</text>

  <!-- Connective arrows (Circle radius ~160, center 450,260) -->
  <path class="arrow" d="M495 100 Q 560 100 585 145" marker-end="url(#arrowhead)"/>
  <path class="arrow" d="M605 215 Q 620 260 605 305" marker-end="url(#arrowhead)"/>
  <path class="arrow" d="M585 375 Q 560 420 495 420" marker-end="url(#arrowhead)"/>
  <path class="arrow" d="M405 420 Q 340 420 315 375" marker-end="url(#arrowhead)"/>
  <path class="arrow" d="M295 305 Q 280 260 295 215" marker-end="url(#arrowhead)"/>
  <path class="arrow" d="M315 145 Q 340 100 405 100" marker-end="url(#arrowhead)"/>

  <!-- 1. Formulate (Top) -->
  <g>
    <circle cx="450" cy="100" r="32" class="node-bg-human"/>
    <circle cx="450" cy="100" r="10" class="ico"/>
    <circle cx="450" cy="100" r="3" fill="#FFFFFF"/>
    <text x="450" y="155" class="label" text-anchor="middle">1. Formulate</text>
    <text x="450" y="175" class="sub" text-anchor="middle">Bounding the Study &amp; Claim</text>
  </g>

  <!-- 2. Explore (Top Right) -->
  <g>
    <circle cx="610" cy="180" r="32" class="node-bg"/>
    <path d="M596 180 L605 168 L624 190" class="ico"/>
    <circle cx="596" cy="180" r="2.5" fill="#FFFFFF"/>
    <circle cx="624" cy="190" r="2.5" fill="#FFFFFF"/>
    <circle cx="605" cy="168" r="2.5" fill="#FFFFFF"/>
    <text x="660" y="175" class="label" text-anchor="start">2. Explore</text>
    <text x="660" y="195" class="sub" text-anchor="start">State &amp; Multi-Fidelity Search</text>
  </g>

  <!-- 3. Implement (Bottom Right) -->
  <g>
    <circle cx="610" cy="340" r="32" class="node-bg"/>
    <rect x="598" y="330" width="24" height="20" rx="3" class="ico"/>
    <path d="M604 330 V325 M616 330 V325" class="ico"/>
    <text x="660" y="335" class="label" text-anchor="start">3. Implement</text>
    <text x="660" y="355" class="sub" text-anchor="start">Tool Execution &amp; Friction</text>
  </g>

  <!-- 4. Evaluate (Bottom) -->
  <g>
    <circle cx="450" cy="420" r="32" class="node-bg"/>
    <path d="M435 418 L446 428 L465 408" class="ico" stroke-width="4"/>
    <text x="450" y="475" class="label" text-anchor="middle">4. Evaluate</text>
    <text x="450" y="495" class="sub" text-anchor="middle">Converting Results to Evidence</text>
  </g>

  <!-- 5. Explain (Bottom Left) -->
  <g>
    <circle cx="290" cy="340" r="32" class="node-bg"/>
    <path d="M280 340 A10 10 0 1 1 300 340 A10 10 0 1 1 280 340" class="ico"/>
    <path d="M280 350 L273 357 M300 350 L307 357" class="ico"/>
    <text x="240" y="335" class="label" text-anchor="end">5. Explain</text>
    <text x="240" y="355" class="sub" text-anchor="end">Mechanism &amp; Interpretation</text>
  </g>

  <!-- 6. Defend (Top Left) -->
  <g>
    <circle cx="290" cy="180" r="32" class="node-bg-decide"/>
    <path d="M280 170 V190 M294 174 C294 184 286 188 280 188" class="ico"/>
    <circle cx="280" cy="170" r="3" fill="#FFFFFF"/>
    <circle cx="280" cy="190" r="3" fill="#FFFFFF"/>
    <circle cx="294" cy="176" r="3" fill="#FFFFFF"/>
    <text x="240" y="175" class="label" text-anchor="end">6. Defend</text>
    <text x="240" y="195" class="sub" text-anchor="end">Action, Authority, &amp; Review</text>
  </g>

</svg>
