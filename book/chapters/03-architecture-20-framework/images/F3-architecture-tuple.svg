<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" role="img">
  <title>The Architecture 2.0 loop tuple</title>
  <desc>Block diagram of the design-loop update: state flows to action, action to observation, observation to an evidence ledger, and evidence to a human decision, with a loop iteration back to state. The state, action, and observation nodes are marked as the interface shared with a generic reinforcement-learning or Gym loop; the evidence ledger and human decision are marked as the Architecture 2.0 extension that replaces a scalar reward.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: sans-serif; }
      .label { font-size: 15px; font-weight: 700; fill: #20252B; }
      .small { font-size: 11px; fill: #59636D; }
      .state { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.35; }
      .action { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.35; }
      .observation { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.35; }
      .evidence { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.9; }
      .decision { fill: #E7F5EC; stroke: #1E9E48; stroke-width: 1.9; }
      .arrow { stroke: #333333; stroke-width: 1.9; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .loop { stroke: #1683A6; stroke-width: 1.35; fill: none; stroke-linecap: square; stroke-linejoin: miter; stroke-dasharray: 4,4; }
      .loop-label { font-size: 10.5px; font-weight: 700; fill: #59636D; }
      .group { font-size: 10.5px; font-weight: 700; fill: #59636D; letter-spacing: 0.2px; }
      .bracket { stroke: #9AA8B5; stroke-width: 1.1; fill: none; }
      .extbracket { stroke: #1E9E48; stroke-width: 1.2; fill: none; }
      .note { font-size: 10.5px; fill: #59636D; }
    </style>
  </defs>

  <rect width="720" height="300" fill="#FFFFFF"/>

  <g class="font">
    <!-- five nodes: s -> a -> o -> e -> d -->
    <rect class="state"       x="30"  y="104" width="100" height="58"/>
    <text class="label" x="80"  y="130" text-anchor="middle">s</text>
    <text class="small" x="80"  y="149" text-anchor="middle">State</text>

    <rect class="action"      x="168" y="104" width="100" height="58"/>
    <text class="label" x="218" y="130" text-anchor="middle">a</text>
    <text class="small" x="218" y="149" text-anchor="middle">Action</text>

    <rect class="observation" x="306" y="104" width="100" height="58"/>
    <text class="label" x="356" y="130" text-anchor="middle">o</text>
    <text class="small" x="356" y="149" text-anchor="middle">Observation</text>

    <rect class="evidence"    x="444" y="104" width="100" height="58"/>
    <text class="label" x="494" y="130" text-anchor="middle">e</text>
    <text class="small" x="494" y="149" text-anchor="middle">Evidence ledger</text>

    <rect class="decision"    x="582" y="104" width="100" height="58"/>
    <text class="label" x="632" y="130" text-anchor="middle">d</text>
    <text class="small" x="632" y="149" text-anchor="middle">Human decision</text>

    <!-- horizontal flow -->
    <line class="arrow" x1="130" y1="133" x2="168" y2="133" marker-end="url(#arrow)"/>
    <line class="arrow" x1="268" y1="133" x2="306" y2="133" marker-end="url(#arrow)"/>
    <line class="arrow" x1="406" y1="133" x2="444" y2="133" marker-end="url(#arrow)"/>
    <line class="arrow" x1="544" y1="133" x2="582" y2="133" marker-end="url(#arrow)"/>

    <!-- shared-interface bracket over s,a,o -->
    <path class="bracket" d="M 30 92 L 30 84 L 406 84 L 406 92"/>
    <text class="group" x="218" y="76" text-anchor="middle">shared with a generic RL / Gym loop (s, a, o)</text>

    <!-- extension bracket over e,d -->
    <path class="extbracket" d="M 444 92 L 444 84 L 682 84 L 682 92"/>
    <text class="group" x="563" y="76" text-anchor="middle" fill="#1E9E48">Architecture 2.0 extension</text>

    <!-- loop iteration back to state -->
    <polyline class="loop" points="632,162 632,206 398,206"/>
    <polyline class="loop" points="316,206 80,206 80,162" marker-end="url(#arrow)"/>
    <rect x="356" y="192" width="118" height="26" fill="#FFFFFF"/>
    <text class="loop-label" x="415" y="208" text-anchor="middle">revise / next turn</text>

    <!-- note: replaces the scalar reward -->
    <text class="note" x="360" y="252" text-anchor="middle">The evidence ledger and human decision replace the scalar reward of a Markov decision process:</text>
    <text class="note" x="360" y="268" text-anchor="middle">the environment emits observations, and a separate rejection authority, not a number, adjudicates them.</text>
  </g>
</svg>
