<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300">
    <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .panel-title { font-size: 13.5px; font-weight: 700; fill: #20252B; }
      .panel-subtitle { font-size: 11.5px; fill: #59636D; }
      .body-bold { font-size: 12.5px; font-weight: 700; fill: #222222; }
      .chip { font-size: 12.5px; font-weight: 700; fill: #222222; }
      .small { font-size: 11.2px; fill: #444444; }
      .panel { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .role-box { fill: #FFFFFF; stroke: #1683A6; stroke-width: 1.45; }
      .line { stroke: #333333; stroke-width: 1.9; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
    </style>
  </defs>

  <text x="450" y="60" class="panel-title">Decision Authority Flow</text>

  <rect x="30" y="120" width="130" height="60" class="role-box"/>
  <text x="95" y="155" class="body-bold">AI Proposal</text>

  <path d="M 160 150 L 205 150" class="line" marker-end="url(#arrow)"/>

  <rect x="210" y="120" width="130" height="60" class="panel"/>
  <text x="275" y="155" class="body-bold">CI / CD</text>

  <path d="M 340 150 L 385 150" class="line" marker-end="url(#arrow)"/>

  <rect x="390" y="120" width="140" height="60" class="panel"/>
  <text x="460" y="147" class="body-bold">Automated</text>
  <text x="460" y="165" class="body-bold">Checks</text>

  <path d="M 530 150 L 575 150" class="line" marker-end="url(#arrow)"/>

  <rect x="580" y="120" width="130" height="60" class="role-box"/>
  <text x="645" y="147" class="body-bold">Architect</text>
  <text x="645" y="165" class="body-bold">Waiver</text>

  <path d="M 710 150 L 755 150" class="line" marker-end="url(#arrow)"/>

  <rect x="760" y="120" width="130" height="60" class="role-box"/>
  <text x="825" y="147" class="body-bold">Product Lead</text>
  <text x="825" y="165" class="body-bold">Commit</text>

</svg>
