<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 520" role="img" aria-labelledby="loop-title loop-desc">
  <title id="loop-title">Auditable Architecture 2.0 design loop</title>
  <desc id="loop-desc">An Architecture 2.0 loop showing represented state, bounded action, tool feedback, evidence, commitment, and rejection or revision. A separate footer distinguishes rising fidelity and cost across evidence stages from the independently governed commitment boundary and allowed autonomy.</desc>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F8B"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#C84444"/>
    </marker>
    <style>
      .font { font-family: "Segoe UI", sans-serif; }
      .node-title { font-size: 18px; font-weight: 750; fill: #202426; }
      .node-body { font-size: 13.5px; fill: #4B5563; }
      .small { font-size: 13px; fill: #657386; }
      .callout { font-size: 15px; font-weight: 750; fill: #1F6F8B; }
      .axis-note { font-size: 14px; font-weight: 700; fill: #1F6F8B; }
      .axis-stage { font-size: 12.5px; fill: #4B5563; }
      .governance-title { font-size: 14px; font-weight: 700; fill: #8A5A00; }
      .governance-body { font-size: 13.5px; fill: #4B5563; }
      .state { fill: #E7F4F7; stroke: #1F6F8B; stroke-width: 1.7; }
      .action { fill: #FFF3E5; stroke: #D9852B; stroke-width: 1.7; }
      .feedback { fill: #EDF7EF; stroke: #4A9660; stroke-width: 1.7; }
      .evidence { fill: #EEF1FB; stroke: #6576BE; stroke-width: 1.7; }
      .human { fill: #FFF7E4; stroke: #BD891D; stroke-width: 1.7; }
      .reject { fill: #FDEDED; stroke: #C84444; stroke-width: 1.7; }
      .edge { fill: none; stroke: #1F6F8B; stroke-width: 3; stroke-linecap: square; stroke-linejoin: miter; marker-end: url(#arrow-blue); }
      .edge-red { fill: none; stroke: #C84444; stroke-width: 2.7; stroke-linecap: square; stroke-linejoin: miter; marker-end: url(#arrow-red); }
      .edge-soft { fill: none; stroke: #9CB8C4; stroke-width: 2.2; stroke-linecap: square; stroke-linejoin: miter; stroke-dasharray: 7 7; marker-end: url(#arrow-blue); }
      .boundary { fill: none; stroke: #D4DEE8; stroke-width: 1.5; }
    </style>
  </defs>

  <rect width="1080" height="520" fill="#FFFFFF"/>
  <g class="font">
    <rect class="boundary" x="62" y="58" width="956" height="355" rx="2"/>

    <rect class="state" x="92" y="125" width="155" height="82" rx="2"/>
    <text class="node-title" x="169.5" y="154" text-anchor="middle">State</text>
    <text class="node-body" x="169.5" y="179" text-anchor="middle">workload, baseline,</text>
    <text class="node-body" x="169.5" y="198" text-anchor="middle">constraints</text>

    <rect class="action" x="306" y="125" width="155" height="82" rx="2"/>
    <text class="node-title" x="383.5" y="154" text-anchor="middle">Action</text>
    <text class="node-body" x="383.5" y="179" text-anchor="middle">AI proposes a</text>
    <text class="node-body" x="383.5" y="198" text-anchor="middle">legal move</text>

    <rect class="feedback" x="520" y="125" width="155" height="82" rx="2"/>
    <text class="node-title" x="597.5" y="154" text-anchor="middle">Feedback</text>
    <text class="node-body" x="597.5" y="179" text-anchor="middle">tools measure,</text>
    <text class="node-body" x="597.5" y="198" text-anchor="middle">simulate, check</text>

    <rect class="evidence" x="734" y="125" width="155" height="82" rx="2"/>
    <text class="node-title" x="811.5" y="154" text-anchor="middle">Evidence</text>
    <text class="node-body" x="811.5" y="179" text-anchor="middle">provenance, cost,</text>
    <text class="node-body" x="811.5" y="198" text-anchor="middle">uncertainty</text>

    <rect class="human" x="785" y="282" width="180" height="82" rx="2"/>
    <text class="node-title" x="875" y="311" text-anchor="middle">Commitment</text>
    <text class="node-body" x="875" y="336" text-anchor="middle">accept, escalate,</text>
    <text class="node-body" x="875" y="355" text-anchor="middle">waive, or stop</text>

    <rect class="reject" x="405" y="282" width="200" height="82" rx="2"/>
    <text class="node-title" x="505" y="311" text-anchor="middle">Reject / revise</text>
    <text class="node-body" x="505" y="336" text-anchor="middle">failed candidates become</text>
    <text class="node-body" x="505" y="355" text-anchor="middle">negative traces</text>

    <path class="edge" d="M 247 166 H 306"/>
    <path class="edge" d="M 461 166 H 520"/>
    <path class="edge" d="M 675 166 H 734"/>
    <path class="edge" d="M 812 207 V 248 H 875 V 282"/>
    <path class="edge-red" d="M 786 323 H 605"/>
    <path class="edge-soft" d="M 405 323 H 170 V 207"/>

    <text class="callout" x="169" y="93" text-anchor="middle">represented loop state</text>
    <text class="callout" x="395" y="93" text-anchor="middle">bounded action space</text>
    <text class="callout" x="609" y="93" text-anchor="middle">tool environment</text>
    <text class="callout" x="823" y="93" text-anchor="middle">evidence ledger</text>

    <text class="axis-note" x="330" y="444" text-anchor="middle">evidence stages may raise fidelity and cost</text>
    <line x1="112" y1="465" x2="548" y2="465" stroke="#59636D" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
    <circle cx="166" cy="465" r="4" fill="#1F6F8B"/>
    <circle cx="324" cy="465" r="4" fill="#1F6F8B"/>
    <circle cx="482" cy="465" r="4" fill="#1F6F8B"/>
    <text class="axis-stage" x="166" y="492" text-anchor="middle">proxy</text>
    <text class="axis-stage" x="324" y="492" text-anchor="middle">simulation</text>
    <text class="axis-stage" x="482" y="492" text-anchor="middle">higher-fidelity check</text>

    <line x1="595" y1="427" x2="595" y2="500" stroke="#D4DEE8" stroke-width="1.5"/>
    <rect class="human" x="632" y="430" width="346" height="62" rx="2"/>
    <text class="governance-title" x="805" y="455" text-anchor="middle">separately governed</text>
    <text class="governance-body" x="805" y="480" text-anchor="middle">commitment boundary and allowed autonomy</text>
  </g>
</svg>
