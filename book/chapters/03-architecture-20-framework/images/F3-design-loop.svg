<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 520" role="img" aria-labelledby="loop-title loop-desc">
  <title id="loop-title">Design loop within a bounded architecture study</title>
  <desc id="loop-desc">A bounded architecture study contains an execution and analysis mechanism that becomes a design loop when work iterates. Represented state, bounded action, tool feedback, and evidence lead to architectural claim review. Review leads outward to a bounded finding, decision, escalation, or stop. Only a recorded revision path returns to the loop. A separate footer distinguishes evidence fidelity from decision rights and commitment.</desc>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F6F8B"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#C84444"/>
    </marker>
    <style>
      .font { font-family: "Segoe UI", sans-serif; }
      .group-label { font-size: 13px; font-weight: 750; fill: #657386; }
      .loop-label { font-size: 12.5px; font-weight: 750; fill: #D0761E; }
      .node-title { font-size: 17px; font-weight: 750; fill: #202426; }
      .node-body { font-size: 13px; fill: #4B5563; }
      .axis-note { font-size: 14px; font-weight: 700; fill: #1F6F8B; }
      .axis-stage { font-size: 12.5px; fill: #4B5563; }
      .governance-title { font-size: 14px; font-weight: 700; fill: #8A5A00; }
      .governance-body { font-size: 13.5px; fill: #4B5563; }
      .state { fill: #E7F4F7; stroke: #1F6F8B; stroke-width: 1.7; }
      .action { fill: #FFF3E5; stroke: #D9852B; stroke-width: 1.7; }
      .feedback { fill: #EDF7EF; stroke: #4A9660; stroke-width: 1.7; }
      .evidence { fill: #EEF1FB; stroke: #6576BE; stroke-width: 1.7; }
      .review { fill: #E7F4F7; stroke: #1F6F8B; stroke-width: 1.7; }
      .outcome { fill: #FFF7E4; stroke: #BD891D; stroke-width: 1.7; }
      .revise { fill: #FDEDED; stroke: #C84444; stroke-width: 1.7; }
      .edge { fill: none; stroke: #1F6F8B; stroke-width: 3; stroke-linecap: square; stroke-linejoin: miter; marker-end: url(#arrow-blue); }
      .edge-red { fill: none; stroke: #C84444; stroke-width: 2.7; stroke-linecap: square; stroke-linejoin: miter; marker-end: url(#arrow-red); }
      .edge-revise { fill: none; stroke: #C84444; stroke-width: 2.2; stroke-linecap: square; stroke-linejoin: miter; stroke-dasharray: 7 7; marker-end: url(#arrow-red); }
      .study-boundary { fill: none; stroke: #9CB8C4; stroke-width: 1.7; }
      .loop-boundary { fill: #FFFCF7; stroke: #D9852B; stroke-width: 1.3; }
    </style>
  </defs>

  <rect width="1080" height="520" fill="#FFFFFF"/>
  <g class="font">
    <rect class="study-boundary" x="34" y="34" width="1012" height="379" rx="2"/>
    <text class="group-label" x="58" y="59">BOUNDED ARCHITECTURE STUDY</text>

    <rect class="loop-boundary" x="62" y="76" width="696" height="182" rx="2"/>
    <text class="loop-label" x="82" y="100">DESIGN LOOP (WHEN WORK ITERATES)</text>

    <rect class="state" x="82" y="125" width="145" height="82" rx="2"/>
    <text class="node-title" x="154.5" y="154" text-anchor="middle">State</text>
    <text class="node-body" x="154.5" y="179" text-anchor="middle">workload, baseline,</text>
    <text class="node-body" x="154.5" y="198" text-anchor="middle">constraints</text>

    <rect class="action" x="252" y="125" width="145" height="82" rx="2"/>
    <text class="node-title" x="324.5" y="154" text-anchor="middle">Action</text>
    <text class="node-body" x="324.5" y="179" text-anchor="middle">AI-assisted method</text>
    <text class="node-body" x="324.5" y="198" text-anchor="middle">takes a valid action</text>

    <rect class="feedback" x="422" y="125" width="145" height="82" rx="2"/>
    <text class="node-title" x="494.5" y="154" text-anchor="middle">Feedback</text>
    <text class="node-body" x="494.5" y="179" text-anchor="middle">tools measure,</text>
    <text class="node-body" x="494.5" y="198" text-anchor="middle">simulate, check</text>

    <rect class="evidence" x="592" y="125" width="145" height="82" rx="2"/>
    <text class="node-title" x="664.5" y="154" text-anchor="middle">Evidence</text>
    <text class="node-body" x="664.5" y="179" text-anchor="middle">claim link + scope</text>
    <text class="node-body" x="664.5" y="198" text-anchor="middle">provenance + limits</text>

    <rect class="review" x="800" y="125" width="200" height="82" rx="2"/>
    <text class="node-title" x="900" y="154" text-anchor="middle">Claim review</text>
    <text class="node-body" x="900" y="179" text-anchor="middle">apply rejection checks;</text>
    <text class="node-body" x="900" y="198" text-anchor="middle">challenge scope + support</text>

    <rect class="revise" x="422" y="282" width="200" height="82" rx="2"/>
    <text class="node-title" x="522" y="311" text-anchor="middle">Revision needed</text>
    <text class="node-body" x="522" y="336" text-anchor="middle">record the reason and</text>
    <text class="node-body" x="522" y="355" text-anchor="middle">change the study state</text>

    <rect class="outcome" x="800" y="282" width="200" height="82" rx="2"/>
    <text class="node-title" x="900" y="311" text-anchor="middle">Bounded outcome</text>
    <text class="node-body" x="900" y="336" text-anchor="middle">finding, decision,</text>
    <text class="node-body" x="900" y="355" text-anchor="middle">escalation, or stop</text>

    <path class="edge" d="M 227 166 H 252"/>
    <path class="edge" d="M 397 166 H 422"/>
    <path class="edge" d="M 567 166 H 592"/>
    <path class="edge" d="M 737 166 H 800"/>
    <path class="edge" d="M 900 207 V 282"/>
    <path class="edge-red" d="M 800 190 H 770 V 323 H 622"/>
    <path class="edge-revise" d="M 422 323 H 154 V 207"/>

    <text class="axis-note" x="330" y="444" text-anchor="middle">evidence stages may raise fidelity and cost</text>
    <line x1="112" y1="465" x2="548" y2="465" stroke="#59636D" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
    <circle cx="166" cy="465" r="4" fill="#1F6F8B"/>
    <circle cx="324" cy="465" r="4" fill="#1F6F8B"/>
    <circle cx="482" cy="465" r="4" fill="#1F6F8B"/>
    <text class="axis-stage" x="166" y="492" text-anchor="middle">proxy</text>
    <text class="axis-stage" x="324" y="492" text-anchor="middle">simulation</text>
    <text class="axis-stage" x="482" y="492" text-anchor="middle">higher-fidelity check</text>

    <line x1="595" y1="427" x2="595" y2="500" stroke="#D4DEE8" stroke-width="1.5"/>
    <rect class="outcome" x="632" y="430" width="346" height="62" rx="2"/>
    <text class="governance-title" x="805" y="455" text-anchor="middle">separately governed</text>
    <text class="governance-body" x="805" y="480" text-anchor="middle">decision rights and commitment boundary</text>
  </g>
</svg>
