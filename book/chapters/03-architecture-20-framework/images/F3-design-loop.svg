<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 520" role="img" aria-labelledby="loop-title loop-desc">
  <title id="loop-title">Design loop within a bounded architecture study</title>
  <desc id="loop-desc">A scoped architecture study contains an execution and analysis process that becomes a design loop when work iterates. Represented state, permitted action, tool feedback, and evidence lead to architectural claim review. Review leads outward to a scoped finding, decision, escalation, or stop. Only a recorded revision path returns to the loop. A separate footer distinguishes evidence fidelity from decision rights and commitment.</desc>
  <defs>
    <marker id="arrow-dark" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1683A6"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#C62A2A"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .group-label { font-size: 14px; font-weight: 700; fill: #59636D; }
      .loop-label { font-size: 14px; font-weight: 700; fill: #8A5310; }
      .node-title { font-size: 15px; font-weight: 700; fill: #20252B; }
      .node-body { font-size: 14px; fill: #444444; }
      .axis-note { font-size: 14px; font-weight: 700; fill: #136680; }
      .axis-stage { font-size: 14px; fill: #444444; }
      .governance-title { font-size: 14px; font-weight: 700; fill: #A82E70; }
      .governance-body { font-size: 14px; fill: #444444; }
      .state { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.7; }
      .action { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.7; }
      .feedback { fill: #F0ECFA; stroke: #6A4FC7; stroke-width: 1.7; }
      .evidence { fill: #E7F5EC; stroke: #1E9E48; stroke-width: 1.7; }
      .review { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.7; }
      .outcome { fill: #FBEDF4; stroke: #D24D96; stroke-width: 1.7; }
      .revise { fill: #FDECEC; stroke: #DE3D3C; stroke-width: 1.7; }
      .edge { fill: none; stroke: #333333; stroke-width: 2.3; stroke-linecap: square; stroke-linejoin: miter; marker-end: url(#arrow-dark); }
      .edge-red { fill: none; stroke: #C62A2A; stroke-width: 2.2; stroke-linecap: square; stroke-linejoin: miter; marker-end: url(#arrow-red); }
      .edge-revise { fill: none; stroke: #C62A2A; stroke-width: 2; stroke-linecap: square; stroke-linejoin: miter; stroke-dasharray: 5 4; marker-end: url(#arrow-red); }
      .study-boundary { fill: none; stroke: #9AA8B5; stroke-width: 1.7; }
      .loop-boundary { fill: #FFFFFF; stroke: #E68A17; stroke-width: 1.4; }
    </style>
  </defs>

  <rect width="1080" height="520" fill="#FFFFFF"/>
  <g class="font">
    <rect class="study-boundary" x="34" y="34" width="1012" height="379"/>
    <text class="group-label" x="58" y="59">BOUNDED ARCHITECTURE STUDY</text>

    <rect class="loop-boundary" x="62" y="76" width="696" height="182"/>
    <text class="loop-label" x="82" y="100">DESIGN LOOP (WHEN WORK ITERATES)</text>

    <rect class="state" x="77" y="125" width="155" height="82"/>
    <text class="node-title" x="154.5" y="154" text-anchor="middle">State</text>
    <text class="node-body" x="154.5" y="179" text-anchor="middle">workload, baseline,</text>
    <text class="node-body" x="154.5" y="198" text-anchor="middle">constraints</text>

    <rect class="action" x="247" y="125" width="155" height="82"/>
    <text class="node-title" x="324.5" y="154" text-anchor="middle">Action</text>
    <text class="node-body" x="324.5" y="179" text-anchor="middle">AI method</text>
    <text class="node-body" x="324.5" y="198" text-anchor="middle">takes valid action</text>

    <rect class="feedback" x="417" y="125" width="155" height="82"/>
    <text class="node-title" x="494.5" y="154" text-anchor="middle">Feedback</text>
    <text class="node-body" x="494.5" y="179" text-anchor="middle">tools measure</text>
    <text class="node-body" x="494.5" y="198" text-anchor="middle">simulate + check</text>

    <rect class="evidence" x="587" y="125" width="155" height="82"/>
    <text class="node-title" x="664.5" y="154" text-anchor="middle">Evidence</text>
    <text class="node-body" x="664.5" y="179" text-anchor="middle">claim + scope</text>
    <text class="node-body" x="664.5" y="198" text-anchor="middle">provenance, limits</text>

    <rect class="review" x="800" y="125" width="200" height="82"/>
    <text class="node-title" x="900" y="154" text-anchor="middle">Claim review</text>
    <text class="node-body" x="900" y="179" text-anchor="middle">rejection checks</text>
    <text class="node-body" x="900" y="198" text-anchor="middle">scope + support</text>

    <rect class="revise" x="422" y="282" width="200" height="82"/>
    <text class="node-title" x="522" y="311" text-anchor="middle">Revision needed</text>
    <text class="node-body" x="522" y="336" text-anchor="middle">record reason</text>
    <text class="node-body" x="522" y="355" text-anchor="middle">change study state</text>

    <rect class="outcome" x="800" y="282" width="200" height="82"/>
    <text class="node-title" x="900" y="311" text-anchor="middle">Bounded outcome</text>
    <text class="node-body" x="900" y="336" text-anchor="middle">finding, decision,</text>
    <text class="node-body" x="900" y="355" text-anchor="middle">escalation, or stop</text>

    <path class="edge" d="M 232 166 H 247"/>
    <path class="edge" d="M 402 166 H 417"/>
    <path class="edge" d="M 572 166 H 587"/>
    <path class="edge" d="M 742 166 H 800"/>
    <path class="edge" d="M 900 207 V 282"/>
    <path class="edge-red" d="M 800 190 H 770 V 323 H 622"/>
    <path class="edge-revise" d="M 422 323 H 154 V 207"/>

    <text class="axis-note" x="330" y="444" text-anchor="middle">evidence stages may raise fidelity and cost</text>
    <line x1="112" y1="465" x2="548" y2="465" stroke="#1683A6" stroke-width="2" marker-end="url(#arrow-teal)"/>
    <circle cx="166" cy="465" r="4" fill="#1683A6"/>
    <circle cx="324" cy="465" r="4" fill="#1683A6"/>
    <circle cx="482" cy="465" r="4" fill="#1683A6"/>
    <text class="axis-stage" x="166" y="492" text-anchor="middle">proxy</text>
    <text class="axis-stage" x="324" y="492" text-anchor="middle">simulation</text>
    <text class="axis-stage" x="482" y="492" text-anchor="middle">higher-fidelity check</text>

    <line x1="595" y1="427" x2="595" y2="500" stroke="#D5DEE3" stroke-width="1.5"/>
    <rect class="outcome" x="632" y="430" width="346" height="62"/>
    <text class="governance-title" x="805" y="455" text-anchor="middle">separately governed</text>
    <text class="governance-body" x="805" y="480" text-anchor="middle">decision rights and commitment boundary</text>
  </g>
</svg>
