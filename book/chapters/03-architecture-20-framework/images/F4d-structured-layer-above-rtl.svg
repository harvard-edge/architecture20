<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 478" role="img">
  <title>Represented bounded architecture study above implementation tools</title>
  <desc>Architecture questions and judgment enter a scoped architecture study. The study defines its scope and architectural claim before an execution and analysis process invokes implementation tools. The process becomes a design loop when work iterates. Measurements return to evidence and review by an authorized owner, which leads outward to a scoped finding or architectural decision or returns to revise the claim or study.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1683A6"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#C62A2A"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .row-label { font-size: 13px; font-weight: 700; fill: #59636D; letter-spacing: 0; }
      .label { font-size: 13.5px; font-weight: 700; fill: #222222; }
      .process-label { font-size: 13.5px; font-weight: 700; fill: #222222; }
      .body { font-size: 12.5px; fill: #444444; }
      .micro { font-size: 12.5px; fill: #59636D; }
      .note { font-size: 13px; font-weight: 700; fill: #1683A6; }
      .panel { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .study { fill: #FFFFFF; stroke: #1683A6; stroke-width: 1.7; }
      .tacit { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.3; }
      .scope { fill: #F0ECFA; stroke: #6A4FC7; stroke-width: 1.4; }
      .loop { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.4; }
      .evidence { fill: #E7F5EC; stroke: #1E9E48; stroke-width: 1.4; }
      .review { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.4; }
      .flow { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.3; }
      .outcome { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.3; }
      .arrow { stroke: #333333; stroke-width: 1.8; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .feedback { stroke: #1683A6; stroke-width: 1.8; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .revision { stroke: #C62A2A; stroke-width: 1.8; fill: none; stroke-linecap: square; stroke-linejoin: miter; stroke-dasharray: 5 4; }
      .revision-text { font-size: 12.5px; font-weight: 700; fill: #C62A2A; }
    </style>
  </defs>

  <rect width="900" height="478" fill="#FFFFFF"/>
  <g class="font">
    <rect class="panel" x="42" y="28" width="816" height="100"/>
    <text class="row-label" x="66" y="52">ARCHITECTURE QUESTION AND JUDGMENT</text>
    <rect class="tacit" x="78" y="70" width="190" height="42"/>
    <text class="label" x="173" y="88" text-anchor="middle">design intent</text>
    <text class="body" x="173" y="104" text-anchor="middle">goals, risks, tradeoffs</text>

    <rect class="tacit" x="355" y="70" width="190" height="42"/>
    <text class="label" x="450" y="88" text-anchor="middle">architecture models</text>
    <text class="body" x="450" y="104" text-anchor="middle">cost, latency, energy</text>

    <rect class="tacit" x="632" y="70" width="190" height="42"/>
    <text class="label" x="727" y="88" text-anchor="middle">requirements + rationale</text>
    <text class="body" x="727" y="104" text-anchor="middle">scope, constraints, stakes</text>

    <line class="arrow" x1="450" y1="128" x2="450" y2="148" marker-end="url(#arrow)"/>

    <rect class="study" x="42" y="148" width="816" height="264"/>
    <text class="row-label" x="66" y="172">BOUNDED ARCHITECTURE STUDY</text>

    <rect class="scope" x="70" y="194" width="168" height="60"/>
    <text class="label" x="154" y="216" text-anchor="middle">study scope</text>
    <text class="body" x="154" y="234" text-anchor="middle">question + decision</text>

    <rect class="review" x="268" y="194" width="168" height="60"/>
    <text class="label" x="352" y="216" text-anchor="middle">architectural claim</text>
    <text class="body" x="352" y="234" text-anchor="middle">under review</text>

    <rect class="loop" x="458" y="194" width="184" height="60"/>
    <text class="process-label" x="550" y="216" text-anchor="middle">execution + analysis</text>
    <text class="micro" x="550" y="236" text-anchor="middle">loop when work iterates</text>

    <rect class="evidence" x="664" y="194" width="168" height="60"/>
    <text class="label" x="748" y="216" text-anchor="middle">evidence + review</text>
    <text class="body" x="748" y="234" text-anchor="middle">decision rights</text>

    <line class="arrow" x1="238" y1="224" x2="268" y2="224" marker-end="url(#arrow)"/>
    <line class="arrow" x1="436" y1="224" x2="458" y2="224" marker-end="url(#arrow)"/>
    <line class="arrow" x1="642" y1="224" x2="664" y2="224" marker-end="url(#arrow)"/>

    <path class="revision" d="M 748 194 V 182 H 154"/>
    <line class="revision" x1="154" y1="182" x2="154" y2="194" marker-end="url(#arrow-red)"/>
    <line class="revision" x1="352" y1="182" x2="352" y2="194" marker-end="url(#arrow-red)"/>
    <rect x="470" y="170" width="160" height="24" fill="#FFFFFF" opacity="0.96"/>
    <text class="revision-text" x="550" y="186" text-anchor="middle">revise claim or study</text>

    <text class="row-label" x="66" y="298">TOOL PATH</text>
    <path class="arrow" d="M 550 254 V 308 H 748"/>
    <line class="arrow" x1="154" y1="308" x2="154" y2="326" marker-end="url(#arrow)"/>
    <line class="arrow" x1="352" y1="308" x2="352" y2="326" marker-end="url(#arrow)"/>
    <line class="arrow" x1="550" y1="308" x2="550" y2="326" marker-end="url(#arrow)"/>
    <line class="arrow" x1="748" y1="308" x2="748" y2="326" marker-end="url(#arrow)"/>
    <line class="arrow" x1="154" y1="308" x2="550" y2="308"/>

    <rect class="flow" x="70" y="326" width="168" height="32"/>
    <text class="micro" x="154" y="346" text-anchor="middle">simulators / models</text>
    <rect class="flow" x="268" y="326" width="168" height="32"/>
    <text class="micro" x="352" y="346" text-anchor="middle">compiler / runtime</text>
    <rect class="flow" x="466" y="326" width="168" height="32"/>
    <text class="micro" x="550" y="346" text-anchor="middle">RTL / generators</text>
    <rect class="flow" x="664" y="326" width="168" height="32"/>
    <text class="micro" x="748" y="346" text-anchor="middle">EDA / signoff</text>

    <path class="feedback" d="M 832 342 H 846 V 292 H 748 V 254" marker-end="url(#arrow-blue)"/>
    <rect x="678" y="272" width="140" height="32" fill="#FFFFFF" opacity="0.94"/>
    <text class="micro" x="748" y="293" text-anchor="middle" fill="#1683A6">measurements return</text>

    <path class="feedback" d="M 832 224 H 874 V 445 H 800" marker-end="url(#arrow-blue)"/>
    <rect class="outcome" x="100" y="432" width="700" height="26"/>
    <text class="note" x="450" y="450" text-anchor="middle">bounded finding or architectural decision</text>
  </g>
</svg>
