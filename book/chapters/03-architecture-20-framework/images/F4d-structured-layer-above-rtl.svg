<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 54 900 466" role="img">
  <title>Structured layer above RTL</title>
  <desc>A three-layer diagram showing tacit architecture reasoning above a represented Architecture 2.0 loop layer, which then connects to simulators, compilers, RTL, EDA, and software evidence.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1683A6"/>
    </marker>
    <style>
      .font { font-family: sans-serif; }
      .row-label { font-size: 12px; font-weight: 700; fill: #66717A; letter-spacing: 0; }
      .label { font-size: 13.5px; font-weight: 700; fill: #222222; }
      .body { font-size: 10.8px; fill: #444444; }
      .micro { font-size: 10px; fill: #555555; }
      .note { font-size: 12.5px; font-weight: 700; fill: #1683A6; }
      .panel { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .tacit { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.3; }
      .contract { fill: #F0ECFA; stroke: #1683A6; stroke-width: 1.4; }
      .state { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.4; }
      .env { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.4; }
      .evidence { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.4; }
      .flow { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.3; }
      .takeaway { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.3; }
      .arrow { stroke: #333333; stroke-width: 1.8; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .feedback { stroke: #1683A6; stroke-width: 1.8; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
    </style>
  </defs>

  <rect y="54" width="900" height="466" fill="#FFFFFF"/>
  <g class="font">
    <rect class="panel" x="42" y="82" width="816" height="100"/>
    <text class="row-label" x="66" y="106">TACIT ARCHITECTURE REASONING</text>
    <rect class="tacit" x="78" y="124" width="190" height="42"/>
    <text class="label" x="173" y="142" text-anchor="middle">whiteboard intent</text>
    <text class="body" x="173" y="158" text-anchor="middle">goals, risks, tradeoffs</text>

    <rect class="tacit" x="355" y="124" width="190" height="42"/>
    <text class="label" x="450" y="142" text-anchor="middle">models + sheets</text>
    <text class="body" x="450" y="158" text-anchor="middle">cost, latency, energy</text>

    <rect class="tacit" x="632" y="124" width="190" height="42"/>
    <text class="label" x="727" y="142" text-anchor="middle">natural specs</text>
    <text class="body" x="727" y="158" text-anchor="middle">requirements, rationale</text>

    <line class="arrow" x1="450" y1="182" x2="450" y2="214" marker-end="url(#arrow)"/>

    <rect class="panel" x="42" y="214" width="816" height="146"/>
    <text class="row-label" x="66" y="238">REPRESENTED DESIGN-LOOP LAYER</text>
    <rect class="contract" x="70" y="266" width="168" height="60"/>
    <text class="label" x="154" y="288" text-anchor="middle">loop contract</text>
    <text class="body" x="154" y="306" text-anchor="middle">intent + legal choices</text>

    <rect class="state" x="268" y="266" width="168" height="60"/>
    <text class="label" x="352" y="288" text-anchor="middle">representation</text>
    <text class="body" x="352" y="306" text-anchor="middle">design state + roles</text>

    <rect class="env" x="466" y="266" width="168" height="60"/>
    <text class="label" x="550" y="288" text-anchor="middle">environment</text>
    <text class="body" x="550" y="306" text-anchor="middle">actions + feedback</text>

    <rect class="evidence" x="664" y="266" width="168" height="60"/>
    <text class="label" x="748" y="288" text-anchor="middle">evidence ledger</text>
    <text class="body" x="748" y="306" text-anchor="middle">provenance + rejection</text>

    <line class="arrow" x1="238" y1="296" x2="268" y2="296" marker-end="url(#arrow)"/>
    <line class="arrow" x1="436" y1="296" x2="466" y2="296" marker-end="url(#arrow)"/>
    <line class="arrow" x1="634" y1="296" x2="664" y2="296" marker-end="url(#arrow)"/>

    <rect class="panel" x="42" y="390" width="816" height="74"/>
    <rect class="flow" x="70" y="416" width="168" height="32"/>
    <text class="micro" x="154" y="436" text-anchor="middle">simulators / models</text>
    <rect class="flow" x="268" y="416" width="168" height="32"/>
    <text class="micro" x="352" y="436" text-anchor="middle">compiler / runtime</text>
    <rect class="flow" x="466" y="416" width="168" height="32"/>
    <text class="micro" x="550" y="436" text-anchor="middle">RTL / generators</text>
    <rect class="flow" x="664" y="416" width="168" height="32"/>
    <text class="micro" x="748" y="436" text-anchor="middle">EDA / signoff</text>

    <line class="arrow" x1="154" y1="326" x2="154" y2="416" marker-end="url(#arrow)"/>
    <line class="arrow" x1="352" y1="326" x2="352" y2="416" marker-end="url(#arrow)"/>
    <line class="arrow" x1="550" y1="326" x2="550" y2="416" marker-end="url(#arrow)"/>
    <line class="arrow" x1="748" y1="326" x2="748" y2="416" marker-end="url(#arrow)"/>

    <path class="feedback" d="M 832 432 L 846 432 L 846 296 L 828 296" marker-end="url(#arrow-blue)"/>
    <rect x="770" y="362" width="76" height="24" fill="#FFFFFF" opacity="0.94"/>
    <text class="micro" x="808" y="378" text-anchor="middle" fill="#1683A6">feedback</text>

    <rect class="takeaway" x="100" y="486" width="700" height="26"/>
    <text class="note" x="450" y="504" text-anchor="middle">the missing layer is a reviewable loop contract, not extra documentation</text>
  </g>
</svg>
