<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 408" role="img" aria-labelledby="admet-title admet-desc">
  <title id="admet-title">Silicon ADMET funnel: drug discovery and silicon design</title>
  <desc id="admet-desc">Two parallel three-stage funnels. On the left, drug discovery narrows from in-silico screening of ten thousand candidates, through in-vitro testing, to clinical trials. On the right, silicon design narrows from fast ISA simulators, through RTL and logic synthesis, to physical signoff. Corresponding stages share the same color across the two columns, and an arrow marks the isomorphic filtering between them. A bottom bar states that both funnels weed out high-scoring decoys before the expensive, high-fidelity stages.</desc>
  <defs>
    <marker id="arrow-dark" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .eyebrow { font-size: 13px; font-weight: 700; fill: #136680; letter-spacing: 0.6px; }
      .box-title { font-size: 13px; font-weight: 700; fill: #20252B; }
      .box-sub { font-size: 11px; fill: #59636D; }
      .bridge-title { font-size: 12.5px; font-weight: 700; fill: #20252B; }
      .bridge-sub { font-size: 11px; fill: #59636D; }
      .note { font-size: 12px; font-weight: 700; fill: #1683A6; }
      .funnel { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .bar { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .amber { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.45; }
      .teal  { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.45; }
      .green { fill: #E7F5EC; stroke: #1E9E48; stroke-width: 1.45; }
      .flow { fill: none; stroke: #333333; stroke-width: 2; stroke-linecap: square; marker-end: url(#arrow-dark); }
    </style>
  </defs>

  <rect width="800" height="408" fill="#FFFFFF"/>
  <g class="font">
    <polygon class="funnel" points="47,80 353,80 265,312 135,312"/>
    <polygon class="funnel" points="447,80 753,80 665,312 535,312"/>

    <text class="eyebrow" x="200" y="66" text-anchor="middle">DRUG DISCOVERY</text>
    <text class="eyebrow" x="600" y="66" text-anchor="middle">SILICON DESIGN</text>

    <!-- Left column: drug discovery -->
    <rect class="amber" x="70" y="84" width="260" height="56"/>
    <text class="box-title" x="200" y="110" text-anchor="middle">In-silico screening</text>
    <text class="box-sub" x="200" y="126" text-anchor="middle">10,000+ candidates</text>

    <rect class="teal" x="105" y="170" width="190" height="56"/>
    <text class="box-title" x="200" y="196" text-anchor="middle">In-vitro testing</text>
    <text class="box-sub" x="200" y="212" text-anchor="middle">toxicity, binding</text>

    <rect class="green" x="135" y="256" width="130" height="56"/>
    <text class="box-title" x="200" y="288" text-anchor="middle">Clinical trials</text>

    <path class="flow" d="M 200 140 V 170"/>
    <path class="flow" d="M 200 226 V 256"/>

    <!-- Right column: silicon design -->
    <rect class="amber" x="470" y="84" width="260" height="56"/>
    <text class="box-title" x="600" y="110" text-anchor="middle">Fast ISA simulators</text>
    <text class="box-sub" x="600" y="126" text-anchor="middle">high-level performance proxy</text>

    <rect class="teal" x="505" y="170" width="190" height="56"/>
    <text class="box-title" x="600" y="196" text-anchor="middle">RTL &amp; logic synthesis</text>
    <text class="box-sub" x="600" y="212" text-anchor="middle">power, thermal, area limits</text>

    <rect class="green" x="535" y="256" width="130" height="56"/>
    <text class="box-title" x="600" y="288" text-anchor="middle">Physical signoff</text>

    <path class="flow" d="M 600 140 V 170"/>
    <path class="flow" d="M 600 226 V 256"/>

    <!-- Isomorphism bridge -->
    <text class="bridge-title" x="400" y="190" text-anchor="middle">isomorphic</text>
    <path class="flow" d="M 325 200 H 475"/>
    <text class="bridge-sub" x="400" y="220" text-anchor="middle">filters</text>

    <rect class="bar" x="40" y="348" width="720" height="40"/>
    <text class="note" x="400" y="373" text-anchor="middle">Both funnels weed out high-scoring decoys before the expensive, high-fidelity stages.</text>
  </g>
</svg>
