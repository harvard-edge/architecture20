<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
    <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .panel-title { font-size: 13.5px; font-weight: 700; fill: #20252B; }
      .panel-subtitle { font-size: 11.5px; fill: #59636D; }
      .body-bold { font-size: 12.5px; font-weight: 700; fill: #222222; }
      .chip { font-size: 12.5px; font-weight: 700; fill: #222222; }
      .small { font-size: 11.2px; fill: #444444; }
      .panel { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .role-box { fill: #FFFFFF; stroke: #1683A6; stroke-width: 1.45; }
      .line { stroke: #333333; stroke-width: 1.9; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
    </style>
  </defs>

  <text x="250" y="70" class="panel-title">TAO Stack</text>
  <text x="550" y="70" class="panel-title">TAOS Stack</text>

  <!-- TAO -->
  <rect x="150" y="120" width="200" height="60" class="role-box"/>
  <text x="250" y="155" class="body-bold">Optimization</text>

  <rect x="150" y="200" width="200" height="60" class="role-box"/>
  <text x="250" y="235" class="body-bold">Architecture</text>

  <rect x="150" y="280" width="200" height="60" class="role-box"/>
  <text x="250" y="315" class="body-bold">Technology</text>

  <path d="M 250 180 L 250 195" class="line" marker-end="url(#arrow)"/>
  <path d="M 250 260 L 250 275" class="line" marker-end="url(#arrow)"/>

  <!-- TAOS -->
  <!-- Tightly coupled box indicator -->
  <rect x="420" y="100" width="340" height="260" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="590" y="380" class="small" fill="#c0392b">Tightly coupled physical constraints</text>

  <rect x="440" y="120" width="200" height="60" class="role-box"/>
  <text x="540" y="155" class="body-bold">Optimization</text>

  <rect x="440" y="200" width="200" height="60" class="role-box"/>
  <text x="540" y="235" class="body-bold">Architecture</text>

  <rect x="440" y="280" width="200" height="60" class="role-box"/>
  <text x="540" y="315" class="body-bold">Technology</text>

  <rect x="670" y="120" width="70" height="220" class="panel"/>
  <text x="705" y="230" class="body-bold" transform="rotate(-90 705,230)">Specialization</text>

  <!-- Downward arrows in TAOS -->
  <path d="M 540 180 L 540 195" class="line" marker-end="url(#arrow)"/>
  <path d="M 540 260 L 540 275" class="line" marker-end="url(#arrow)"/>

  <!-- Cross coupling arrows -->
  <path d="M 640 310 L 665 310" class="line" marker-end="url(#arrow)"/>
  <path d="M 670 290 L 645 290" class="line" marker-end="url(#arrow)"/>
  <path d="M 640 230 L 665 230" class="line" marker-end="url(#arrow)"/>
  <path d="M 670 210 L 645 210" class="line" marker-end="url(#arrow)"/>
  <path d="M 640 150 L 665 150" class="line" marker-end="url(#arrow)"/>
  <path d="M 670 130 L 645 130" class="line" marker-end="url(#arrow)"/>

</svg>
