<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 736 410" role="img" aria-labelledby="taos-title taos-desc">
  <title id="taos-title">TAO versus TAOS stack</title>
  <desc id="taos-desc">Two vertical stacks compared. The TAO stack has three layers, Optimization over Architecture over Technology, linked top to bottom. The TAOS stack repeats those three layers, adds a vertical Specialization panel coupled to each layer by double-headed arrows, and is enclosed by a red dashed boundary labeled tightly coupled physical constraints.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .eyebrow { font-size: 13px; font-weight: 700; fill: #136680; letter-spacing: 0.6px; }
      .box-label { font-size: 13px; font-weight: 700; fill: #20252B; }
      .panel-label { font-size: 12.5px; font-weight: 700; fill: #20252B; }
      .constraint-note { font-size: 11.4px; font-weight: 700; fill: #C62A2A; }
      .layer { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.45; }
      .spec-panel { fill: #F0ECFA; stroke: #6A4FC7; stroke-width: 1.45; }
      .flow { fill: none; stroke: #333333; stroke-width: 1.9; stroke-linecap: square; stroke-linejoin: miter; }
      .couple { fill: none; stroke: #333333; stroke-width: 1.7; stroke-linecap: square; stroke-linejoin: miter; }
      .constraint-boundary { fill: none; stroke: #DE3D3C; stroke-width: 1.6; stroke-dasharray: 5 4; }
    </style>
  </defs>

  <rect width="736" height="410" fill="#FFFFFF"/>
  <g class="font">

    <text class="eyebrow" x="140" y="66" text-anchor="middle">TAO STACK</text>
    <text class="eyebrow" x="420" y="66" text-anchor="middle">TAOS STACK</text>

    <!-- TAO stack -->
    <rect class="layer" x="50" y="90" width="180" height="66"/>
    <text class="box-label" x="140" y="128" text-anchor="middle">Optimization</text>
    <rect class="layer" x="50" y="176" width="180" height="66"/>
    <text class="box-label" x="140" y="214" text-anchor="middle">Architecture</text>
    <rect class="layer" x="50" y="262" width="180" height="66"/>
    <text class="box-label" x="140" y="300" text-anchor="middle">Technology</text>

    <path class="flow" d="M 140 156 V 176" marker-end="url(#arrow)"/>
    <path class="flow" d="M 140 242 V 262" marker-end="url(#arrow)"/>

    <!-- Tightly coupled boundary around the TAOS stack -->
    <rect class="constraint-boundary" x="314" y="80" width="372" height="264"/>

    <!-- TAOS stack -->
    <rect class="layer" x="330" y="90" width="180" height="66"/>
    <text class="box-label" x="420" y="128" text-anchor="middle">Optimization</text>
    <rect class="layer" x="330" y="176" width="180" height="66"/>
    <text class="box-label" x="420" y="214" text-anchor="middle">Architecture</text>
    <rect class="layer" x="330" y="262" width="180" height="66"/>
    <text class="box-label" x="420" y="300" text-anchor="middle">Technology</text>

    <path class="flow" d="M 420 156 V 176" marker-end="url(#arrow)"/>
    <path class="flow" d="M 420 242 V 262" marker-end="url(#arrow)"/>

    <!-- Specialization panel -->
    <rect class="spec-panel" x="555" y="90" width="115" height="238"/>
    <text class="panel-label" x="612" y="209" text-anchor="middle" transform="rotate(-90 612 209)">Specialization</text>

    <!-- Coupling between each layer and Specialization -->
    <path class="couple" d="M 510 123 H 555" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <path class="couple" d="M 510 209 H 555" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <path class="couple" d="M 510 295 H 555" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

    <text class="constraint-note" x="500" y="368" text-anchor="middle">tightly coupled physical constraints</text>
  </g>
</svg>
