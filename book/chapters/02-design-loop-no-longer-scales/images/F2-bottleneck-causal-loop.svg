<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <style>
      .node-rect { fill: #f8f9fa; stroke: #333; stroke-width: 2px; rx: 8px; }
      .text-title { font-family: -apple-system, sans-serif; font-size: 16px; font-weight: bold; fill: #111; }
      .text-body { font-family: -apple-system, sans-serif; font-size: 14px; fill: #333; text-anchor: middle; }
      .arrow { stroke: #d32f2f; stroke-width: 3px; fill: none; }
      .arrow-head { fill: #d32f2f; }
      .label-bg { fill: #fff; opacity: 0.9; }
      .label-text { font-family: -apple-system, sans-serif; font-size: 13px; font-weight: bold; fill: #d32f2f; text-anchor: middle; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow-head"/>
    </marker>
  </defs>

  <text x="400" y="40" class="text-title" text-anchor="middle">Causal Loop of Architecture Bottlenecks</text>

  <rect x="300" y="80" width="200" height="60" class="node-rect" />
  <text x="400" y="115" class="text-body">Missing Information</text>

  <rect x="550" y="200" width="200" height="60" class="node-rect" />
  <text x="650" y="235" class="text-body">Invalid Choices</text>

  <rect x="300" y="320" width="200" height="60" class="node-rect" />
  <text x="400" y="355" class="text-body">Wasted Evaluation</text>

  <rect x="50" y="200" width="200" height="60" class="node-rect" />
  <text x="150" y="235" class="text-body">Overloaded Review</text>

  <path d="M 500 110 Q 650 110 650 200" class="arrow" marker-end="url(#arrowhead)"/>
  <rect x="530" y="135" width="100" height="20" rx="4" class="label-bg" />
  <text x="580" y="150" class="label-text">Leads to</text>

  <path d="M 650 260 Q 650 350 500 350" class="arrow" marker-end="url(#arrowhead)"/>
  <rect x="530" y="295" width="100" height="20" rx="4" class="label-bg" />
  <text x="580" y="310" class="label-text">Triggers</text>

  <path d="M 300 350 Q 150 350 150 260" class="arrow" marker-end="url(#arrowhead)"/>
  <rect x="170" y="295" width="100" height="20" rx="4" class="label-bg" />
  <text x="220" y="310" class="label-text">Causes</text>

  <path d="M 150 200 Q 150 110 300 110" class="arrow" marker-end="url(#arrowhead)"/>
  <rect x="170" y="135" width="100" height="20" rx="4" class="label-bg" />
  <text x="220" y="150" class="label-text">Worsens</text>

</svg>
