<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 470" role="img" aria-labelledby="loop-title loop-desc">
  <title id="loop-title">The bottleneck causal loop</title>
  <desc id="loop-desc">A four-node self-reinforcing cycle. Missing information leads to invalid choices, which trigger wasted evaluation, which causes overloaded review, which worsens the missing information and closes the loop. Each node carries a short cause noted beneath its name.</desc>
  <defs>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#C62A2A"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .node-title { font-size: 13.5px; font-weight: 700; fill: #20252B; }
      .node-sub { font-size: 11.4px; fill: #444444; }
      .edge-label { font-size: 12px; font-weight: 700; fill: #59636D; }
      .center-note { font-size: 11.4px; fill: #8A95A0; }
      .node-teal { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.45; }
      .node-violet { fill: #F0ECFA; stroke: #6A4FC7; stroke-width: 1.45; }
      .node-green { fill: #E7F5EC; stroke: #1E9E48; stroke-width: 1.45; }
      .node-magenta { fill: #FBEDF4; stroke: #D24D96; stroke-width: 1.45; }
      .cycle-edge { fill: none; stroke: #C62A2A; stroke-width: 2.1; stroke-linecap: square; stroke-linejoin: miter; }
    </style>
  </defs>

  <rect width="760" height="470" fill="#FFFFFF"/>
  <g class="font">

    <rect class="node-teal" x="90" y="96" width="210" height="74"/>
    <text class="node-title" x="195" y="126" text-anchor="middle">Missing Information</text>
    <text class="node-sub" x="195" y="147" text-anchor="middle">inconsistent or stale state</text>

    <rect class="node-violet" x="460" y="96" width="210" height="74"/>
    <text class="node-title" x="565" y="126" text-anchor="middle">Invalid Choices</text>
    <text class="node-sub" x="565" y="147" text-anchor="middle">coupled, few software paths</text>

    <rect class="node-green" x="460" y="300" width="210" height="74"/>
    <text class="node-title" x="565" y="330" text-anchor="middle">Wasted Evaluation</text>
    <text class="node-sub" x="565" y="351" text-anchor="middle">scarce high-fidelity checks</text>

    <rect class="node-magenta" x="90" y="300" width="210" height="74"/>
    <text class="node-title" x="195" y="330" text-anchor="middle">Overloaded Review</text>
    <text class="node-sub" x="195" y="351" text-anchor="middle">conflicting results pile up</text>

    <path class="cycle-edge" d="M 300 133 H 460" marker-end="url(#arrow-red)"/>
    <path class="cycle-edge" d="M 565 170 V 300" marker-end="url(#arrow-red)"/>
    <path class="cycle-edge" d="M 460 337 H 300" marker-end="url(#arrow-red)"/>
    <path class="cycle-edge" d="M 195 300 V 170" marker-end="url(#arrow-red)"/>

    <text class="edge-label" x="380" y="126" text-anchor="middle">Leads to</text>
    <text class="edge-label" x="580" y="239" text-anchor="start">Triggers</text>
    <text class="edge-label" x="380" y="331" text-anchor="middle">Causes</text>
    <text class="edge-label" x="180" y="239" text-anchor="end">Worsens</text>

    <text class="center-note" x="380" y="240" text-anchor="middle">self-reinforcing cycle</text>
  </g>
</svg>
