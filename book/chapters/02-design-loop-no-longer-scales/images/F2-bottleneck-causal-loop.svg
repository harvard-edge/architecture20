<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" role="img">
  <defs>
    <style>
      .node-rect { fill: #f8f9fa; stroke: #333; stroke-width: 2px; rx: 8px; }
      .text-title { font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: bold; fill: #111; text-anchor: middle;}
      .text-body { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #333; text-anchor: middle; }
      .arrow { stroke: #d32f2f; stroke-width: 3px; fill: none; }
      .arrow-head { fill: #d32f2f; }
      .label-bg { fill: #fff; opacity: 0.9; }
      .label-text { font-family: Arial, Helvetica, sans-serif; font-size: 13px; font-weight: bold; fill: #d32f2f; text-anchor: middle; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow-head"/>
    </marker>
  </defs>

  <text x="500" y="40" class="text-title">Causal Loop of Architecture Bottlenecks</text>

  <!-- Top node -->
  <rect x="350" y="80" width="300" height="80" class="node-rect" />
  <text x="500" y="125" class="text-body">Missing Information</text>

  <!-- Right node -->
  <rect x="650" y="250" width="300" height="80" class="node-rect" />
  <text x="800" y="295" class="text-body">Invalid Choices</text>

  <!-- Bottom node -->
  <rect x="350" y="420" width="300" height="80" class="node-rect" />
  <text x="500" y="465" class="text-body">Wasted Evaluation</text>

  <!-- Left node -->
  <rect x="50" y="250" width="300" height="80" class="node-rect" />
  <text x="200" y="295" class="text-body">Overloaded Review</text>

  <!-- Arrows (scale the bounding box up to match) -->
  <!-- Top to Right -->
  <path d="M 650 120 Q 800 120 800 250" class="arrow" marker-end="url(#arrowhead)"/>
  <rect x="670" y="140" width="120" height="40" rx="4" class="label-bg" />
  <text x="730" y="165" class="label-text">Leads to</text>

  <!-- Right to Bottom -->
  <path d="M 800 330 Q 800 460 650 460" class="arrow" marker-end="url(#arrowhead)"/>
  <rect x="670" y="375" width="120" height="40" rx="4" class="label-bg" />
  <text x="730" y="400" class="label-text">Triggers</text>

  <!-- Bottom to Left -->
  <path d="M 350 460 Q 200 460 200 330" class="arrow" marker-end="url(#arrowhead)"/>
  <rect x="210" y="375" width="120" height="40" rx="4" class="label-bg" />
  <text x="270" y="400" class="label-text">Causes</text>

  <!-- Left to Top -->
  <path d="M 200 250 Q 200 120 350 120" class="arrow" marker-end="url(#arrowhead)"/>
  <rect x="210" y="140" width="120" height="40" rx="4" class="label-bg" />
  <text x="270" y="165" class="label-text">Worsens</text>

</svg>
