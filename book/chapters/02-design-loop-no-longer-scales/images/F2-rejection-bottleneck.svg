<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">The Rejection Bottleneck</title>
  <desc id="desc">A funnel diagram showing large AI-generated candidate sets narrowing through surrogate, simulation, and human-review stages until accountable architecture review becomes the throughput bottleneck.</desc>
  <defs>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .label-large { fill: #20252B; font-size: 13.5px; font-weight: 700; text-anchor: middle; }
      .label-medium { fill: #136680; font-size: 12.5px; font-weight: 700; text-anchor: middle; }
      .label-small { fill: #59636D; font-size: 11.4px; text-anchor: middle; }
      .alert { fill: #C62A2A; font-size: 13.5px; font-weight: 700; text-anchor: middle; }
      .funnel { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.5; vector-effect: non-scaling-stroke; }
      .neck { fill: #FDECEC; stroke: #DE3D3C; stroke-width: 2; vector-effect: non-scaling-stroke; }
      .separator { stroke: #59636D; stroke-width: 1.4; stroke-dasharray: 5 4; stroke-linecap: butt; vector-effect: non-scaling-stroke; }
      .review-box { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.5; vector-effect: non-scaling-stroke; }
    </style>
  </defs>

  <rect width="960" height="520" fill="#FFFFFF"/>

  <g class="font">
    <path class="funnel" d="M196 72H764L620 312H340Z"/>
    <path class="neck" d="M340 312H620V426H340Z"/>

    <line x1="248" y1="154" x2="712" y2="154" class="separator"/>
    <line x1="296" y1="234" x2="664" y2="234" class="separator"/>

    <text x="480" y="110" class="label-large">1,000,000+ Candidates</text>
    <text x="480" y="130" class="label-small">AI generative models / optimizers</text>

    <text x="480" y="192" class="label-medium">10,000 Candidates</text>
    <text x="480" y="212" class="label-small">cheap surrogate models and ML predictors</text>

    <text x="480" y="272" class="label-medium">50 Candidates</text>
    <text x="480" y="292" class="label-small">cycle-accurate simulation and EDA scripts</text>

    <text x="480" y="352" class="alert">THE REJECTION BOUND</text>
    <text x="480" y="374" class="label-large">5 Candidates / Day</text>
    <text x="480" y="394" class="label-small">manual review and bounded decision</text>

    <rect x="250" y="446" width="460" height="56" class="review-box"/>
    <text x="480" y="479" class="label-medium" text-anchor="middle">Accountable Architecture Review</text>
  </g>
</svg>
