<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 390" role="img">
  <title>Design pressure outgrows trusted feedback capacity</title>
  <desc>A clean conceptual plot showing architecture demand rising faster than credible feedback capacity, leaving a shaded feedback gap.</desc>
  <defs>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .axis { stroke: #333333; stroke-width: 1.4; fill: none; stroke-linecap: square; }
      .grid { stroke: #D5DEE3; stroke-width: 1; fill: none; }
      .demand { stroke: #DE3D3C; stroke-width: 4.2; fill: none; stroke-linecap: square; }
      .capacity { stroke: #1683A6; stroke-width: 4.2; fill: none; stroke-linecap: square; }
      .gap { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1; opacity: 0.9; }
      .label { font-size: 13.5px; font-weight: 700; fill: #222222; }
      .tiny { font-size: 11.4px; fill: #59636D; }
      .gap-label { font-size: 13px; font-weight: 700; fill: #136680; }
      .gap-small { font-size: 11.2px; fill: #444444; }
      .red { fill: #DE3D3C; font-weight: 700; stroke: #FFFFFF; stroke-width: 3; paint-order: stroke fill; }
      .blue { fill: #1683A6; font-weight: 700; stroke: #FFFFFF; stroke-width: 3; paint-order: stroke fill; }
      .callout { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .note { font-size: 12px; font-weight: 700; fill: #1683A6; }
    </style>
  </defs>

  <rect width="960" height="390" fill="#FFFFFF"/>

  <g class="font">
    <g>
      <line class="grid" x1="156" y1="84" x2="795" y2="84"/>
      <line class="grid" x1="156" y1="130" x2="795" y2="130"/>
      <line class="grid" x1="156" y1="176" x2="795" y2="176"/>
      <line class="grid" x1="156" y1="222" x2="795" y2="222"/>
      <line class="grid" x1="296" y1="58" x2="296" y2="270"/>
      <line class="grid" x1="456" y1="58" x2="456" y2="270"/>
      <line class="grid" x1="616" y1="58" x2="616" y2="270"/>
      <line class="grid" x1="776" y1="58" x2="776" y2="270"/>
    </g>

    <line class="axis" x1="156" y1="270" x2="814" y2="270"/>
    <line class="axis" x1="156" y1="58" x2="156" y2="270"/>
    <text class="tiny" x="142" y="166" text-anchor="middle" transform="rotate(-90 142 166)">relative burden</text>
    <text class="tiny" x="160" y="312" text-anchor="start">bounded loop</text>
    <text class="tiny" x="486" y="312" text-anchor="middle">design-loop pressure</text>
    <text class="tiny" x="812" y="312" text-anchor="end">higher commitment</text>

    <path class="gap" d="M 180 232 C 352 196 536 126 790 68 L 790 216 C 550 220 352 226 180 236 Z"/>
    <path class="demand" d="M 180 232 C 352 196 536 126 790 68"/>
    <path class="capacity" d="M 180 236 C 352 226 550 220 790 216"/>

    <circle cx="180" cy="232" r="6" fill="#FFFFFF" stroke="#DE3D3C" stroke-width="2.2"/>
    <circle cx="180" cy="236" r="6" fill="#FFFFFF" stroke="#1683A6" stroke-width="2.2"/>
    <circle cx="790" cy="68" r="6" fill="#FFFFFF" stroke="#DE3D3C" stroke-width="2.2"/>
    <circle cx="790" cy="216" r="6" fill="#FFFFFF" stroke="#1683A6" stroke-width="2.2"/>

    <text class="label red" x="552" y="46" text-anchor="middle">choices + constraints + evidence demand</text>
    <text class="label blue" x="504" y="254" text-anchor="middle">credible feedback and review capacity</text>

    <line x1="824" y1="74" x2="824" y2="216" stroke="#1683A6" stroke-width="2"/>
    <line x1="812" y1="74" x2="836" y2="74" stroke="#1683A6" stroke-width="2"/>
    <line x1="812" y1="216" x2="836" y2="216" stroke="#1683A6" stroke-width="2"/>
    <text class="gap-label" x="886" y="130" text-anchor="middle">feedback</text>
    <text class="gap-label" x="886" y="147" text-anchor="middle">gap</text>
    <text class="gap-small" x="886" y="166" text-anchor="middle">evidence that</text>
    <text class="gap-small" x="886" y="181" text-anchor="middle">can reject</text>

    <rect class="callout" x="176" y="324" width="608" height="44"/>
    <text class="note" x="480" y="342" text-anchor="middle">The bottleneck is credible evaluation, rejection, and commitment,</text>
    <text class="note" x="480" y="358" text-anchor="middle">not idea generation.</text>
  </g>
</svg>
