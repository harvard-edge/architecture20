<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 310" role="img">
  <title>The waterbed effect in an energy decomposition</title>
  <desc>Two stacked energy-breakdown bars stand on a common floor and compare a baseline design with a naively AI-optimized design. In the baseline, compute, memory, interconnect, and control/leakage segments are balanced. After an AI optimizer that ignores memory cost squeezes the compute segment, the memory and interconnect segments balloon, so the optimized stack rises past a dashed line marking the baseline total and total energy is not improved.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .center { font-size: 13px; font-weight: 700; fill: #20252B; }
      .seg { font-size: 11.2px; font-weight: 700; fill: #222222; }
      .muted { font-size: 11.2px; fill: #59636D; }
      .arrow { stroke: #333333; stroke-width: 2; fill: none; stroke-linecap: square; }
      .floor { stroke: #9AA8B5; stroke-width: 1.1; }
      .total { stroke: #59636D; stroke-width: 1.3; stroke-dasharray: 5 4; }
      .compute { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.4; }
      .memory { fill: #FDECEC; stroke: #DE3D3C; stroke-width: 1.4; }
      .interconnect { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.4; }
      .control { fill: #F0ECFA; stroke: #6A4FC7; stroke-width: 1.4; }
    </style>
  </defs>

  <rect width="700" height="310" fill="#FFFFFF"/>

  <!-- baseline-total reference -->
  <g class="font">
    <line class="total" x1="270" y1="112" x2="588" y2="112"/>
    <text class="muted" x="594" y="116">baseline total</text>
  </g>

  <!-- Baseline bar -->
  <g class="font">
    <rect class="compute" x="140" y="112" width="130" height="40"/>
    <text class="seg" x="205" y="136" text-anchor="middle">Compute</text>

    <rect class="memory" x="140" y="152" width="130" height="60"/>
    <text class="seg" x="205" y="186" text-anchor="middle">Memory</text>

    <rect class="interconnect" x="140" y="212" width="130" height="30"/>
    <text class="seg" x="205" y="231" text-anchor="middle">Interconnect</text>

    <rect class="control" x="140" y="242" width="130" height="28"/>
    <text class="seg" x="205" y="260" text-anchor="middle">Control/Leakage</text>
  </g>

  <!-- Arrow -->
  <g class="font">
    <path class="arrow" d="M 270 160 L 440 160" marker-end="url(#arrow)"/>
    <text class="muted" x="355" y="146" text-anchor="middle">AI optimizer</text>
    <text class="muted" x="355" y="178" text-anchor="middle">(ignores memory cost)</text>
  </g>

  <!-- Optimized bar -->
  <g class="font">
    <rect class="compute" x="440" y="58" width="130" height="26"/>
    <text class="seg" x="505" y="75" text-anchor="middle">Compute</text>

    <rect class="memory" x="440" y="84" width="130" height="100"/>
    <text class="seg" x="505" y="138" text-anchor="middle">Memory (ballooned)</text>

    <rect class="interconnect" x="440" y="184" width="130" height="60"/>
    <text class="seg" x="505" y="218" text-anchor="middle">Interconnect</text>

    <rect class="control" x="440" y="244" width="130" height="26"/>
    <text class="seg" x="505" y="261" text-anchor="middle">Control/Leakage</text>
  </g>

  <!-- common floor and column labels -->
  <g class="font">
    <line class="floor" x1="120" y1="270" x2="590" y2="270"/>
    <text class="center" x="205" y="292" text-anchor="middle">Baseline design</text>
    <text class="center" x="505" y="292" text-anchor="middle">"Optimized" design</text>
  </g>
</svg>
