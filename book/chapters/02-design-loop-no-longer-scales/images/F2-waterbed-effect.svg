<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="50 70 650 280" role="img">
  <title>F2 Waterbed Effect</title>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444444"/>
    </marker>

    <style>
      .font { font-family: sans-serif; }
      .title { font-size: 16px; font-weight: 700; fill: #202020; }
      .label { font-size: 14.4px; font-weight: 700; fill: #202020; }
      .label-white { font-size: 14.4px; font-weight: 700; fill: #FFFFFF; }
      .small { font-size: 9.2px; fill: #303030; }
      .small-white { font-size: 9.2px; fill: #FFFFFF; }
      .center { font-size: 12.0px; font-weight: 700; fill: #202020; }
      .note { font-size: 10.4px; font-weight: 700; fill: #1F5F7A; }
      .muted { font-size: 8.8px; fill: #555555; }
      .line { stroke: #444444; stroke-width: 1.15; fill: none; }
      .line-dashed { stroke: #444444; stroke-width: 1.15; fill: none; stroke-dasharray: 4,4; }
      .thin { stroke: #6F7E86; stroke-width: 1.05; fill: none; }
      .arrow-end { marker-end: url(#arrow); }
    </style>
  </defs>
  <rect x="50" y="70" width="650" height="280" fill="#FFFFFF"/>

  <g class="font">
  </g>

  <!-- Baseline Bar -->
  <g class="font">
    <text class="center" x="200" y="100" text-anchor="middle">Baseline Design</text>
    <rect x="150" y="120" width="100" height="40" fill="#1F5F7A" stroke="#1F5F7A"/>
    <text class="small-white" x="200" y="144" text-anchor="middle">Compute</text>

    <rect x="150" y="160" width="100" height="60" fill="#C44E52" stroke="#C44E52"/>
    <text class="small-white" x="200" y="194" text-anchor="middle">Memory</text>

    <rect x="150" y="220" width="100" height="30" fill="#1F5F7A" stroke="#1F5F7A"/>
    <text class="small-white" x="200" y="239" text-anchor="middle">Interconnect</text>

    <rect x="150" y="250" width="100" height="28" fill="#C44E52" stroke="#C44E52"/>
    <text class="small-white" x="200" y="267" text-anchor="middle">Control/Leakage</text>
  </g>

  <!-- Arrow -->
  <path class="line arrow-end" d="M 280 185 L 360 185"/>
  <text class="font muted" x="320" y="175" text-anchor="middle">AI Optimizer</text>
  <text class="font muted" x="320" y="200" text-anchor="middle">(ignores memory cost)</text>

  <!-- Optimized Bar -->
  <g class="font">
    <text class="center" x="480" y="100" text-anchor="middle">"Optimized" Design</text>
    <rect x="430" y="120" width="100" height="26" fill="#1F5F7A" stroke="#1F5F7A"/>
    <text class="small-white" x="480" y="136" text-anchor="middle">Compute</text>

    <rect x="430" y="146" width="100" height="100" fill="#C44E52" stroke="#C44E52"/>
    <text class="small-white" x="480" y="201" text-anchor="middle">Memory (Ballooned!)</text>

    <rect x="430" y="246" width="100" height="60" fill="#1F5F7A" stroke="#1F5F7A"/>
    <text class="small-white" x="480" y="280" text-anchor="middle">Interconnect</text>

    <rect x="430" y="306" width="100" height="26" fill="#C44E52" stroke="#C44E52"/>
    <text class="small-white" x="480" y="322" text-anchor="middle">Control/Leakage</text>
  </g>
</svg>
