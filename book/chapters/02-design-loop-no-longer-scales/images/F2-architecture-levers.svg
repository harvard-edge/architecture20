<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" role="img">
  <title>Architecture levers add state</title>
  <desc>Architecture levers create efficiency opportunity while adding state that a bounded architecture study must represent and evaluate.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .box { fill: #FFFFFF; stroke-width: 1.4; }
      .blue { stroke: #1683A6; fill: #E4F1F6; }
      .green { stroke: #1E9E48; fill: #E7F5EC; }
      .orange { stroke: #E68A17; fill: #FBF0DE; }
      .red { stroke: #DE3D3C; fill: #FDECEC; }
      .purple { stroke: #6A4FC7; fill: #F0ECFA; }
      .neutral { stroke: #9AA8B5; fill: #F5F8FA; }
      .label { font-size: 13.5px; font-weight: 700; fill: #222222; }
      .small { font-size: 12px; fill: #333333; }
      .note { font-size: 12px; font-weight: 700; fill: #1683A6; }
      .arrow { stroke: #333333; stroke-width: 2; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .glyph { fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
      .glyph-blue { color: #1683A6; }
      .glyph-green { color: #1E9E48; }
      .glyph-orange { color: #E68A17; }
      .glyph-red { color: #DE3D3C; }
      .glyph-purple { color: #6A4FC7; }
    </style>
  </defs>

  <rect width="960" height="300" fill="#FFFFFF"/>
  <g class="font">
    <rect class="box blue" x="45" y="68" width="150" height="100"/>
    <g class="glyph glyph-blue" transform="translate(109 78) scale(0.72)">
      <path d="M 10 22 L 10 4"/>
      <path d="M 4 10 L 10 4 L 16 10"/>
      <path d="M 3 22 L 17 22"/>
    </g>
    <text class="label" x="120" y="116" text-anchor="middle">Scaling</text>
    <text class="small" x="120" y="136" text-anchor="middle">device, voltage</text>
    <text class="small" x="120" y="152" text-anchor="middle">frequency</text>

    <rect class="box green" x="225" y="68" width="150" height="100"/>
    <g class="glyph glyph-green" transform="translate(289 78) scale(0.72)">
      <rect x="3" y="5" width="18" height="14"/>
      <path d="M 7 1 L 7 5"/>
      <path d="M 13 1 L 13 5"/>
      <path d="M 19 1 L 19 5"/>
      <path d="M 7 19 L 7 23"/>
      <path d="M 13 19 L 13 23"/>
      <path d="M 19 19 L 19 23"/>
    </g>
    <text class="label" x="300" y="116" text-anchor="middle">Microarchitecture</text>
    <text class="small" x="300" y="136" text-anchor="middle">ILP, caches</text>
    <text class="small" x="300" y="152" text-anchor="middle">parallelism</text>

    <rect class="box orange" x="405" y="68" width="150" height="100"/>
    <g class="glyph glyph-orange" transform="translate(469 78) scale(0.72)">
      <circle cx="12" cy="12" r="10"/>
      <circle cx="12" cy="12" r="4"/>
      <path d="M 19 5 L 24 0"/>
    </g>
    <text class="label" x="480" y="116" text-anchor="middle">Optimization</text>
    <text class="small" x="480" y="136" text-anchor="middle">co-design</text>
    <text class="small" x="480" y="152" text-anchor="middle">tool feedback</text>

    <rect class="box red" x="585" y="68" width="150" height="100"/>
    <g class="glyph glyph-red" transform="translate(649 78) scale(0.72)">
      <path d="M 12 1 L 14.5 8.5 L 22 11 L 14.5 13.5 L 12 21 L 9.5 13.5 L 2 11 L 9.5 8.5 Z"/>
    </g>
    <text class="label" x="660" y="116" text-anchor="middle">Specialization</text>
    <text class="small" x="660" y="136" text-anchor="middle">DSAs, vectors</text>
    <text class="small" x="660" y="152" text-anchor="middle">accelerators</text>

    <rect class="box purple" x="765" y="68" width="150" height="100"/>
    <g class="glyph glyph-purple" transform="translate(829 78) scale(0.72)">
      <rect x="0" y="4" width="9" height="9"/>
      <rect x="14" y="4" width="9" height="9"/>
      <rect x="7" y="17" width="9" height="9"/>
    </g>
    <text class="label" x="840" y="116" text-anchor="middle">Composition</text>
    <text class="small" x="840" y="136" text-anchor="middle">chiplets, systems</text>
    <text class="small" x="840" y="152" text-anchor="middle">deployment</text>

    <line class="arrow" x1="195" y1="118" x2="225" y2="118" marker-end="url(#arrow)"/>
    <line class="arrow" x1="375" y1="118" x2="405" y2="118" marker-end="url(#arrow)"/>
    <line class="arrow" x1="555" y1="118" x2="585" y2="118" marker-end="url(#arrow)"/>
    <line class="arrow" x1="735" y1="118" x2="765" y2="118" marker-end="url(#arrow)"/>

    <rect class="box neutral" x="144" y="202" width="672" height="72"/>
    <text class="note" x="480" y="226" text-anchor="middle">Each lever can recover efficiency, but it also adds study state.</text>
    <text class="small" x="480" y="245" text-anchor="middle">A credible comparison must carry constraints, interfaces, tool feedback,</text>
    <text class="small" x="480" y="261" text-anchor="middle">rejected alternatives, and evidence.</text>

    <line class="arrow" x1="480" y1="168" x2="480" y2="202" marker-end="url(#arrow)"/>
  </g>
</svg>
