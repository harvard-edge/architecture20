<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" role="img">
  <title>Architecture levers add state</title>
  <desc>Architecture levers create efficiency opportunity while adding state that the design loop must represent and evaluate.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: sans-serif; }
      .box { fill: #FFFFFF; stroke-width: 1.4; }
      .blue { stroke: #1F5F7A; fill: #EAF4F8; }
      .green { stroke: #2F7D4C; fill: #EFF8F1; }
      .orange { stroke: #D88A30; fill: #FFF7EA; }
      .red { stroke: #C44E52; fill: #FFF1F2; }
      .purple { stroke: #6F5AA8; fill: #F5F1FA; }
      .neutral { stroke: #9AA8B5; fill: #F8FAFC; }
      .label { font-size: 20px; font-weight: 700; fill: #222222; }
      .small { font-size: 15px; fill: #333333; }
      .note { font-size: 16px; font-weight: 700; fill: #1F5F7A; }
      .arrow { stroke: #333333; stroke-width: 1.8; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .glyph { fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
      .glyph-blue { color: #1F5F7A; }
      .glyph-green { color: #2F7D4C; }
      .glyph-orange { color: #D88A30; }
      .glyph-red { color: #C44E52; }
      .glyph-purple { color: #6F5AA8; }
    </style>
  </defs>

  <rect width="960" height="300" fill="#FFFFFF"/>
  <g class="font">
    <rect class="box blue" x="42" y="68" width="158" height="100"/>
    <g class="glyph glyph-blue" transform="translate(110 78) scale(0.72)">
      <path d="M 10 22 L 10 4"/>
      <path d="M 4 10 L 10 4 L 16 10"/>
      <path d="M 3 22 L 17 22"/>
    </g>
    <text class="label" x="121" y="116" text-anchor="middle">Scaling</text>
    <text class="small" x="121" y="138" text-anchor="middle">device, voltage</text>
    <text class="small" x="121" y="155" text-anchor="middle">frequency</text>

    <rect class="box green" x="222" y="68" width="158" height="100"/>
    <g class="glyph glyph-green" transform="translate(290 78) scale(0.72)">
      <rect x="3" y="5" width="18" height="14"/>
      <path d="M 7 1 L 7 5"/>
      <path d="M 13 1 L 13 5"/>
      <path d="M 19 1 L 19 5"/>
      <path d="M 7 19 L 7 23"/>
      <path d="M 13 19 L 13 23"/>
      <path d="M 19 19 L 19 23"/>
    </g>
    <text class="label" x="301" y="116" text-anchor="middle">Architecture</text>
    <text class="small" x="301" y="138" text-anchor="middle">ILP, caches</text>
    <text class="small" x="301" y="155" text-anchor="middle">parallelism</text>

    <rect class="box orange" x="402" y="68" width="158" height="100"/>
    <g class="glyph glyph-orange" transform="translate(470 78) scale(0.72)">
      <circle cx="12" cy="12" r="10"/>
      <circle cx="12" cy="12" r="4"/>
      <path d="M 19 5 L 24 0"/>
    </g>
    <text class="label" x="481" y="116" text-anchor="middle">Optimization</text>
    <text class="small" x="481" y="138" text-anchor="middle">co-design</text>
    <text class="small" x="481" y="155" text-anchor="middle">tool feedback</text>

    <rect class="box red" x="582" y="68" width="158" height="100"/>
    <g class="glyph glyph-red" transform="translate(650 78) scale(0.72)">
      <path d="M 12 1 L 14.5 8.5 L 22 11 L 14.5 13.5 L 12 21 L 9.5 13.5 L 2 11 L 9.5 8.5 Z"/>
    </g>
    <text class="label" x="661" y="116" text-anchor="middle">Specialization</text>
    <text class="small" x="661" y="138" text-anchor="middle">DSAs, vectors</text>
    <text class="small" x="661" y="155" text-anchor="middle">accelerators</text>

    <rect class="box purple" x="762" y="68" width="158" height="100"/>
    <g class="glyph glyph-purple" transform="translate(830 78) scale(0.72)">
      <rect x="0" y="4" width="9" height="9"/>
      <rect x="14" y="4" width="9" height="9"/>
      <rect x="7" y="17" width="9" height="9"/>
    </g>
    <text class="label" x="841" y="116" text-anchor="middle">Composition</text>
    <text class="small" x="841" y="138" text-anchor="middle">chiplets, systems</text>
    <text class="small" x="841" y="155" text-anchor="middle">deployment</text>

    <line class="arrow" x1="200" y1="111" x2="222" y2="111" marker-end="url(#arrow)"/>
    <line class="arrow" x1="380" y1="111" x2="402" y2="111" marker-end="url(#arrow)"/>
    <line class="arrow" x1="560" y1="111" x2="582" y2="111" marker-end="url(#arrow)"/>
    <line class="arrow" x1="740" y1="111" x2="762" y2="111" marker-end="url(#arrow)"/>

    <rect class="box neutral" x="144" y="202" width="672" height="72"/>
    <text class="note" x="480" y="224" text-anchor="middle">Each lever can recover efficiency, but it also adds loop state.</text>
    <text class="small" x="480" y="244" text-anchor="middle">The loop must carry constraints, interfaces, tool feedback,</text>
    <text class="small" x="480" y="262" text-anchor="middle">rejected alternatives, and evidence.</text>

    <line class="arrow" x1="480" y1="168" x2="480" y2="202" marker-end="url(#arrow)"/>
  </g>
</svg>
