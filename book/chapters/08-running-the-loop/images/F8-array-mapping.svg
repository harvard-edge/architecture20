<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 435" role="img" aria-labelledby="am-title am-desc">
  <title id="am-title">Mapping GEMM dimensions onto a systolic array</title>
  <desc id="am-desc">A GEMM workload with dimensions M, N, and K under a weight-stationary dataflow maps onto two systolic-array orientations. A wide 16 by 64 array (height 16, width 64) fits the workload's large N dimension, while a tall 64 by 16 array (height 64, width 16) fits the M dimension. A dashed double-headed connector shows that transposing M and N in the workload swaps which orientation is favored.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .box-title { font-size: 13px; font-weight: 700; fill: #20252B; }
      .box-sub { font-size: 11.4px; fill: #444444; }
      .map-violet { font-size: 12px; font-weight: 700; fill: #59429E; }
      .map-amber { font-size: 12px; font-weight: 700; fill: #8A5310; }
      .transpose-label { font-size: 12px; font-weight: 700; fill: #333333; }
      .gemm { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.45; }
      .arr-wide { fill: #F0ECFA; stroke: #6A4FC7; stroke-width: 1.45; }
      .arr-tall { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.45; }
      .edge { fill: none; stroke: #333333; stroke-width: 2; stroke-linecap: square; stroke-linejoin: miter; marker-end: url(#arrow); }
      .dashed { fill: none; stroke: #333333; stroke-width: 1.8; stroke-linecap: square; stroke-dasharray: 5 4; marker-start: url(#arrow); marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="760" height="435" fill="#FFFFFF"/>
  <g class="font">
    <rect class="gemm" x="270" y="40" width="220" height="60"/>
    <text class="box-title" x="380" y="68" text-anchor="middle">GEMM workload</text>
    <text class="box-sub" x="380" y="88" text-anchor="middle">M &#215; N &#215; K (weight-stationary)</text>

    <path class="edge" d="M 380 100 L 380 145 L 180 145 L 180 250"/>
    <path class="edge" d="M 380 100 L 380 145 L 590 145 L 590 210"/>
    <text class="map-violet" x="280" y="138" text-anchor="middle">fits wide N</text>
    <text class="map-amber" x="486" y="138" text-anchor="middle">fits tall M</text>

    <rect class="arr-wide" x="80" y="250" width="200" height="58"/>
    <text class="box-title" x="180" y="274" text-anchor="middle">16 &#215; 64 array</text>
    <text class="box-sub" x="180" y="292" text-anchor="middle">height 16, width 64</text>

    <rect class="arr-tall" x="558" y="210" width="64" height="150"/>
    <text class="box-title" x="640" y="272">64 &#215; 16 array</text>
    <text class="box-sub" x="640" y="290">height 64,</text>
    <text class="box-sub" x="640" y="308">width 16</text>

    <path class="dashed" d="M 180 308 L 180 405 L 590 405 L 590 360"/>
    <text class="transpose-label" x="385" y="398" text-anchor="middle">transpose M, N</text>
  </g>
</svg>
