<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      .title { font-family: -apple-system, sans-serif; font-size: 16px; font-weight: bold; fill: #111; text-anchor: middle;}
      .text-body { font-family: -apple-system, sans-serif; font-size: 14px; fill: #333; text-anchor: middle;}

      .box-wide { fill: #e8eaf6; stroke: #3f51b5; stroke-width: 2px; }
      .box-tall { fill: #fff3e0; stroke: #ff9800; stroke-width: 2px; }
      .box-gemm { fill: #e8f5e9; stroke: #4caf50; stroke-width: 2px; }

      .edge { stroke: #555; stroke-width: 2px; fill: none; }
      .dashed { stroke: #555; stroke-width: 2px; fill: none; stroke-dasharray: 4,4; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <text x="400" y="30" class="title">Systolic Array Mapping and Orientation</text>

  <!-- GEMM M, N, K -->
  <rect x="300" y="60" width="200" height="60" class="box-gemm" rx="4"/>
  <text x="400" y="85" class="text-body" font-weight="bold">GEMM Workload</text>
  <text x="400" y="105" class="text-body">M x N x K (Weight-Stationary)</text>

  <!-- 16 x 64 array -->
  <rect x="100" y="200" width="200" height="50" class="box-wide" rx="4"/>
  <text x="200" y="220" class="text-body" font-weight="bold">16 x 64 Array</text>
  <text x="200" y="240" class="text-body">Height: 16, Width: 64</text>

  <!-- 64 x 16 array -->
  <rect x="500" y="200" width="80" height="150" class="box-tall" rx="4"/>
  <text x="540" y="260" class="text-body" font-weight="bold" transform="rotate(-90 540 260)">64 x 16 Array</text>
  <text x="560" y="260" class="text-body" transform="rotate(-90 560 260)">Height: 64, Width: 16</text>

  <!-- Mapping arrows -->
  <path d="M 350 120 L 250 200" class="edge" marker-end="url(#arrow)"/>
  <text x="250" y="150" class="text-body" fill="#3f51b5">Fits wide N</text>

  <path d="M 450 120 L 520 200" class="edge" marker-end="url(#arrow)"/>
  <text x="520" y="150" class="text-body" fill="#ff9800">Fits tall M</text>

  <!-- Transposition arrow -->
  <path d="M 400 240 L 400 300" class="edge" marker-end="url(#arrow)"/>
  <text x="400" y="320" class="text-body" font-weight="bold">Transpose M, N</text>
  <path d="M 320 260 Q 400 180 480 260" class="dashed" marker-end="url(#arrow)"/>

</svg>
