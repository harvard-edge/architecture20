<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" role="img">
  <title>Where the turn stops: evidence attained versus commitment authorized</title>
  <desc>Two vertical five-rung ladders side by side. The left evidence ladder rises from analytic proxy through simulation-stage estimate, RTL and synthesis, physical and thermal, to silicon. The right commitment ladder rises from exploratory through experimental, implementation, integration, to irreversible. The bottom two rungs of each ladder are highlighted; an arrow links the simulation-stage evidence rung to the experimental commitment rung, labeled as where this turn stops, with simulation-stage evidence authorizing an experimental commitment that advances the survivor to an RTL study. The upper three rungs of both ladders are greyed out and tagged as deferred to later turns.</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .head { font-size: 13.5px; font-weight: 700; fill: #20252B; }
      .rung { font-size: 12px; font-weight: 700; fill: #20252B; }
      .rung-off { font-size: 12px; fill: #8A95A0; }
      .mid  { font-size: 11px; fill: #59636D; }
      .mid-b { font-size: 11.2px; font-weight: 700; fill: #20252B; }
      .tag  { font-size: 10.6px; font-style: italic; fill: #8A95A0; }
      .arrow { stroke: #333333; stroke-width: 1.9; fill: none; stroke-linecap: square; }
      .cut { stroke: #9AA8B5; stroke-width: 1.1; stroke-dasharray: 5 4; }
    </style>
  </defs>

  <rect width="700" height="320" fill="#FFFFFF"/>

  <g class="font">
    <!-- column headers -->
    <text class="head" x="165" y="28" text-anchor="middle">Evidence attained</text>
    <text class="head" x="535" y="28" text-anchor="middle">Commitment authorized</text>

    <!-- evidence ladder (bottom-up), greyed rungs 3-5 -->
    <rect x="60" y="40"  width="210" height="40" fill="#F5F8FA" stroke="#9AA8B5" stroke-width="1.1"/>
    <text class="rung-off" x="165" y="65" text-anchor="middle">Silicon</text>
    <rect x="60" y="92"  width="210" height="40" fill="#F5F8FA" stroke="#9AA8B5" stroke-width="1.1"/>
    <text class="rung-off" x="165" y="117" text-anchor="middle">Physical / thermal</text>
    <rect x="60" y="144" width="210" height="40" fill="#F5F8FA" stroke="#9AA8B5" stroke-width="1.1"/>
    <text class="rung-off" x="165" y="169" text-anchor="middle">RTL / synthesis</text>
    <rect x="60" y="196" width="210" height="40" fill="#E7F5EC" stroke="#1E9E48" stroke-width="2"/>
    <text class="rung" x="165" y="221" text-anchor="middle">Simulation-stage estimate</text>
    <rect x="60" y="248" width="210" height="40" fill="#E7F5EC" stroke="#1E9E48" stroke-width="1.35"/>
    <text class="rung" x="165" y="273" text-anchor="middle">Analytic proxy</text>

    <!-- commitment ladder (bottom-up), greyed rungs 3-5 -->
    <rect x="430" y="40"  width="210" height="40" fill="#F5F8FA" stroke="#9AA8B5" stroke-width="1.1"/>
    <text class="rung-off" x="535" y="65" text-anchor="middle">Irreversible</text>
    <rect x="430" y="92"  width="210" height="40" fill="#F5F8FA" stroke="#9AA8B5" stroke-width="1.1"/>
    <text class="rung-off" x="535" y="117" text-anchor="middle">Integration</text>
    <rect x="430" y="144" width="210" height="40" fill="#F5F8FA" stroke="#9AA8B5" stroke-width="1.1"/>
    <text class="rung-off" x="535" y="169" text-anchor="middle">Implementation</text>
    <rect x="430" y="196" width="210" height="40" fill="#FBEDF4" stroke="#D24D96" stroke-width="2"/>
    <text class="rung" x="535" y="221" text-anchor="middle">Experimental</text>
    <rect x="430" y="248" width="210" height="40" fill="#FBEDF4" stroke="#D24D96" stroke-width="1.35"/>
    <text class="rung" x="535" y="273" text-anchor="middle">Exploratory</text>

    <!-- attained/deferred cut lines -->
    <line class="cut" x1="60" y1="190" x2="270" y2="190"/>
    <line class="cut" x1="430" y1="190" x2="640" y2="190"/>
    <text class="tag" x="350" y="96" text-anchor="middle">deferred to</text>
    <text class="tag" x="350" y="110" text-anchor="middle">later turns</text>

    <!-- stopping-point link -->
    <text class="mid-b" x="350" y="186" text-anchor="middle">the turn stops here</text>
    <line class="arrow" x1="276" y1="216" x2="424" y2="216" marker-end="url(#arr)"/>
    <text class="mid" x="350" y="240" text-anchor="middle">simulation-stage evidence</text>
    <text class="mid" x="350" y="254" text-anchor="middle">authorizes an experimental</text>
    <text class="mid" x="350" y="268" text-anchor="middle">commitment, advance to</text>
    <text class="mid" x="350" y="282" text-anchor="middle">an RTL study</text>
  </g>
</svg>
