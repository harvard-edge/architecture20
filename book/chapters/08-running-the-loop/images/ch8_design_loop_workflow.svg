<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 450">
    <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .panel-title { font-size: 13.5px; font-weight: 700; fill: #20252B; }
      .panel-subtitle { font-size: 11.5px; fill: #59636D; }
      .body-bold { font-size: 12.5px; font-weight: 700; fill: #222222; }
      .chip { font-size: 12.5px; font-weight: 700; fill: #222222; }
      .small { font-size: 11.2px; fill: #444444; }
      .panel { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .role-box { fill: #FFFFFF; stroke: #1683A6; stroke-width: 1.45; }
      .line { stroke: #333333; stroke-width: 1.9; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
    </style>
  </defs>

  <text x="425" y="50" class="panel-title">Bounded Study Workflow</text>

  <rect x="40" y="190" width="140" height="60" class="role-box"/>
  <text x="110" y="218" class="body-bold">Preregistration</text>
  <text x="110" y="235" class="small">Define Hypotheses</text>

  <path d="M 180 220 L 230 220" class="line" marker-end="url(#arrow)"/>

  <rect x="240" y="190" width="140" height="60" class="role-box"/>
  <text x="310" y="218" class="body-bold">Bounded</text>
  <text x="310" y="235" class="body-bold">Generation</text>

  <path d="M 380 220 L 430 220" class="line" marker-end="url(#arrow)"/>

  <rect x="440" y="190" width="140" height="60" class="role-box"/>
  <text x="510" y="218" class="body-bold">Deterministic</text>
  <text x="510" y="235" class="body-bold">Evaluation</text>

  <path d="M 580 220 L 620 120 L 640 120" class="line" marker-end="url(#arrow)"/>
  <path d="M 580 220 L 620 180 L 640 180" class="line" marker-end="url(#arrow)"/>
  <path d="M 580 220 L 620 260 L 640 260" class="line" marker-end="url(#arrow)"/>
  <path d="M 580 220 L 620 320 L 640 320" class="line" marker-end="url(#arrow)"/>

  <rect x="650" y="100" width="160" height="40" class="role-box" fill="#d5f5e3" stroke="#27ae60"/>
  <text x="730" y="125" class="body-bold">1. Accept Target</text>

  <rect x="650" y="160" width="160" height="40" class="role-box" fill="#fadbd8" stroke="#c0392b"/>
  <text x="730" y="185" class="body-bold">2. Reject Target</text>

  <rect x="650" y="240" width="160" height="40" class="role-box" fill="#ebdef0" stroke="#8e44ad"/>
  <text x="730" y="265" class="body-bold">3. Modify Bounds</text>

  <rect x="650" y="300" width="160" height="40" class="role-box" fill="#e5e7e9" stroke="#7f8c8d"/>
  <text x="730" y="325" class="body-bold">4. Abandon Study</text>
</svg>
