<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" aria-labelledby="wf-title wf-desc">
  <title id="wf-title">Bounded four-stage study workflow</title>
  <desc id="wf-desc">A left-to-right flow of three stages leads to four judgment outcomes. Preregistration defines the hypotheses, bounded generation proposes candidates, and deterministic evaluation simulates and scores them. From the evaluation stage, four straight arrows fan out to the four possible judgments: accept the target, reject the target, modify the bounds, or abandon the study.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .stage-title { font-size: 13px; font-weight: 700; fill: #20252B; }
      .stage-sub { font-size: 11.4px; fill: #59636D; }
      .outcome-label { font-size: 13px; font-weight: 700; fill: #20252B; }
      .s-pre  { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.45; }
      .s-gen  { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.45; }
      .s-eval { fill: #E7F5EC; stroke: #1E9E48; stroke-width: 1.45; }
      .outcome { fill: #FBEDF4; stroke: #D24D96; stroke-width: 1.45; }
      .edge { fill: none; stroke: #333333; stroke-width: 2; stroke-linecap: square; stroke-linejoin: miter; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="960" height="360" fill="#FFFFFF"/>
  <g class="font">
    <rect class="s-pre" x="40" y="142" width="180" height="76"/>
    <text class="stage-title" x="130" y="175" text-anchor="middle">Preregistration</text>
    <text class="stage-sub" x="130" y="195" text-anchor="middle">define hypotheses</text>

    <rect class="s-gen" x="250" y="142" width="180" height="76"/>
    <text class="stage-title" x="340" y="175" text-anchor="middle">Bounded generation</text>
    <text class="stage-sub" x="340" y="195" text-anchor="middle">propose candidates</text>

    <rect class="s-eval" x="460" y="142" width="180" height="76"/>
    <text class="stage-title" x="550" y="175" text-anchor="middle">Deterministic</text>
    <text class="stage-title" x="550" y="195" text-anchor="middle">evaluation</text>

    <path class="edge" d="M 220 180 L 250 180"/>
    <path class="edge" d="M 430 180 L 460 180"/>

    <path class="edge" d="M 640 180 L 730 75"/>
    <path class="edge" d="M 640 180 L 730 145"/>
    <path class="edge" d="M 640 180 L 730 215"/>
    <path class="edge" d="M 640 180 L 730 285"/>

    <rect class="outcome" x="730" y="50" width="190" height="50"/>
    <text class="outcome-label" x="825" y="80" text-anchor="middle">1. Accept target</text>

    <rect class="outcome" x="730" y="120" width="190" height="50"/>
    <text class="outcome-label" x="825" y="150" text-anchor="middle">2. Reject target</text>

    <rect class="outcome" x="730" y="190" width="190" height="50"/>
    <text class="outcome-label" x="825" y="220" text-anchor="middle">3. Modify bounds</text>

    <rect class="outcome" x="730" y="260" width="190" height="50"/>
    <text class="outcome-label" x="825" y="290" text-anchor="middle">4. Abandon study</text>
  </g>
</svg>
