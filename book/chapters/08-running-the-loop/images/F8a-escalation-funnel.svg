<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 492" role="img">
  <title>The worked turn as an escalation funnel: cost per evaluation and rejection authority rise together</title>
  <desc>Left-to-right funnel of the worked turn. Three generated candidates enter a proxy screen with three evaluations and no rejection authority, all three escalate to a simulation-stage estimate with three evaluations that can overturn the proxy ranking and reject on the 8 ms and 3 W gates, two candidates are rejected and kept as records, and one survivor advances to a greyed, deferred RTL study. Below the stages, schematic bars show relative cost per evaluation rising from about one times at the proxy to about ten-to-the-third to ten-to-the-fourth times at the simulation stage, with the deferred RTL stage costlier still. A bottom note states that cost per evaluation and rejection authority rise together, so the turn's feedback budget is dominated by its three escalations.</desc>

  <defs>
    <marker id="arrF8a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .eyebrow { font-size: 13px; font-weight: 700; fill: #136680; letter-spacing: 0.6px; }
      .box-label { font-size: 13px; font-weight: 700; fill: #20252B; }
      .box-label-off { font-size: 13px; font-weight: 700; fill: #8A95A0; }
      .body { font-size: 11.4px; fill: #444444; }
      .body-off { font-size: 11.4px; fill: #8A95A0; }
      .rej-lead { font-size: 11.2px; font-weight: 700; fill: #C62A2A; }
      .rej-body { font-size: 11.2px; fill: #444444; }
      .tag { font-size: 10.8px; font-weight: 700; fill: #3E474B; }
      .tag-off { font-size: 10.8px; font-style: italic; fill: #8A95A0; }
      .bar-val-proxy { font-size: 12px; font-weight: 700; fill: #8A5310; }
      .bar-val-sim { font-size: 12px; font-weight: 700; fill: #157A38; }
      .stage-tag { font-size: 10.8px; fill: #59636D; }
      .note { font-size: 12px; font-weight: 700; fill: #1683A6; }
      .arrow { stroke: #333333; stroke-width: 2.0; fill: none; stroke-linecap: square; }
      .axis { stroke: #9AA8B5; stroke-width: 1.1; }
    </style>
  </defs>

  <rect width="920" height="492" fill="#FFFFFF"/>

  <g class="font">
    <!-- authority eyebrow -->
    <text class="eyebrow" x="30" y="30">REJECTION AUTHORITY RISES</text>
    <line class="arrow" x1="286" y1="26" x2="884" y2="26" marker-end="url(#arrF8a)"/>

    <!-- entry: generated candidates -->
    <rect x="30" y="73" width="120" height="64" fill="#F0ECFA" stroke="#6A4FC7" stroke-width="1.5"/>
    <text class="box-label" x="90" y="99" text-anchor="middle">3 candidates</text>
    <text class="body" x="90" y="117" text-anchor="middle">generated</text>

    <!-- stage 1: proxy screen -->
    <rect x="180" y="56" width="190" height="98" fill="#FBF0DE" stroke="#E68A17" stroke-width="1.5"/>
    <text class="box-label" x="275" y="78" text-anchor="middle">Proxy screen</text>
    <text class="body" x="275" y="96" text-anchor="middle">3 evaluations</text>
    <text class="body" x="275" y="114" text-anchor="middle">no rejection authority,</text>
    <text class="body" x="275" y="132" text-anchor="middle">guides escalation only</text>

    <!-- stage 2: simulation-stage estimate -->
    <rect x="440" y="56" width="220" height="98" fill="#E7F5EC" stroke="#1E9E48" stroke-width="2"/>
    <text class="box-label" x="550" y="78" text-anchor="middle">Simulation-stage estimate</text>
    <text class="body" x="550" y="96" text-anchor="middle">3 evaluations</text>
    <text class="body" x="550" y="114" text-anchor="middle">overturns the proxy ranking,</text>
    <text class="body" x="550" y="132" text-anchor="middle">rejects on the 8 ms / 3 W gates</text>

    <!-- stage 3: deferred RTL study -->
    <rect x="730" y="56" width="160" height="98" fill="#F5F8FA" stroke="#9AA8B5" stroke-width="1.1" stroke-dasharray="5 4"/>
    <text class="box-label-off" x="810" y="78" text-anchor="middle">RTL study</text>
    <text class="body-off" x="810" y="96" text-anchor="middle">next turn</text>
    <text class="body-off" x="810" y="114" text-anchor="middle">can confirm or reject</text>
    <text class="body-off" x="810" y="132" text-anchor="middle">the survivor</text>

    <!-- flow arrows -->
    <line class="arrow" x1="150" y1="105" x2="180" y2="105" marker-end="url(#arrF8a)"/>
    <text class="tag" x="405" y="81" text-anchor="middle">all 3</text>
    <text class="tag" x="405" y="94" text-anchor="middle">escalate</text>
    <line class="arrow" x1="370" y1="105" x2="440" y2="105" marker-end="url(#arrF8a)"/>
    <text class="tag" x="695" y="94" text-anchor="middle">1 survivor</text>
    <line class="arrow" x1="660" y1="105" x2="730" y2="105" marker-end="url(#arrF8a)"/>

    <!-- rejected records -->
    <line class="arrow" x1="550" y1="154" x2="550" y2="186" marker-end="url(#arrF8a)"/>
    <rect x="440" y="186" width="220" height="44" fill="#FDECEC" stroke="#DE3D3C" stroke-width="1.4"/>
    <text class="rej-lead" x="550" y="204" text-anchor="middle">2 rejected on the gates,</text>
    <text class="rej-body" x="550" y="221" text-anchor="middle">recorded, not deleted</text>

    <!-- cost strip -->
    <text class="eyebrow" x="30" y="266">RELATIVE COST PER EVALUATION (ILLUSTRATIVE RATIOS)</text>

    <rect x="215" y="380" width="120" height="16" fill="#FBF0DE" stroke="#E68A17" stroke-width="1.4"/>
    <text class="bar-val-proxy" x="275" y="372" text-anchor="middle">~1&#215; (unit)</text>

    <rect x="490" y="308" width="120" height="88" fill="#E7F5EC" stroke="#1E9E48" stroke-width="1.4"/>
    <text class="bar-val-sim" x="550" y="300" text-anchor="middle">~10&#179;&#8211;10&#8308;&#215;</text>

    <rect x="750" y="288" width="120" height="108" fill="#F5F8FA" stroke="#9AA8B5" stroke-width="1.1" stroke-dasharray="5 4"/>
    <text class="tag-off" x="810" y="280" text-anchor="middle">costlier still</text>

    <line class="axis" x1="200" y1="396" x2="884" y2="396"/>
    <text class="stage-tag" x="275" y="414" text-anchor="middle">proxy screen</text>
    <text class="stage-tag" x="550" y="414" text-anchor="middle">simulation-stage estimate</text>
    <text class="stage-tag" x="810" y="414" text-anchor="middle">RTL study (deferred)</text>

    <!-- takeaway bar -->
    <rect x="30" y="430" width="860" height="42" fill="#F5F8FA" stroke="#9AA8B5" stroke-width="1.1"/>
    <text class="note" x="460" y="448" text-anchor="middle">Cost per evaluation and rejection authority rise together, so the turn's budget is dominated by its three escalations.</text>
    <text class="note" x="460" y="464" text-anchor="middle">Ratios are illustrative and bar heights schematic, not to scale.</text>
  </g>
</svg>
