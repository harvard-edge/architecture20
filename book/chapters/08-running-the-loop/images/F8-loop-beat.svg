<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" role="img">
  <title>The five beats of one design-loop turn</title>
  <desc>A left-to-right flow of five beats making up one design-loop turn: generation proposes candidates (actions allowed); a cheap proxy screens them (state seen), where the loosely coupled accelerator ranks first; escalation to a memory-aware simulation charges data movement and produces evidence; rejection applies the 8 millisecond deadline and 3 watt power screen, rejecting the accelerator and the vector CPU (alternatives rejected); and the architect commits the surviving shared-memory SoC block to an RTL study (ownership). A note explains that the accelerator wins the proxy but fails once data movement is charged.</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .beat { font-size: 13.5px; font-weight: 700; fill: #20252B; }
      .body { font-size: 11px; fill: #59636D; }
      .tag  { font-size: 10.6px; font-style: italic; fill: #59636D; }
      .num  { font-size: 10.5px; font-weight: 700; fill: #FFFFFF; }
      .arrow { stroke: #333333; stroke-width: 1.9; fill: none; stroke-linecap: square; }
      .note { font-size: 11.2px; fill: #59636D; }
      .verdict-bad { font-size: 11px; font-weight: 700; fill: #C62A2A; }
      .verdict-ok  { font-size: 11px; font-weight: 700; fill: #157A38; }
    </style>
  </defs>

  <rect width="700" height="300" fill="#FFFFFF"/>

  <g class="font">
    <!-- five beat cards -->
    <!-- 1 Generate (amber/action) -->
    <rect x="20"  y="60" width="126" height="72" fill="#FBF0DE" stroke="#E68A17" stroke-width="1.35"/>
    <rect x="24" y="64" width="20" height="20" fill="#E68A17"/><text class="num" x="34" y="77" text-anchor="middle">1</text>
    <text class="beat" x="52" y="78">Generate</text>
    <text class="body" x="30" y="102">Propose three</text>
    <text class="body" x="30" y="118">compute designs.</text>
    <text class="tag"  x="80" y="150" text-anchor="middle">actions allowed</text>

    <!-- 2 Proxy screen (blue/state seen) -->
    <rect x="156" y="60" width="126" height="72" fill="#E7F5EC" stroke="#1E9E48" stroke-width="1.35"/>
    <rect x="160" y="64" width="20" height="20" fill="#1E9E48"/><text class="num" x="170" y="77" text-anchor="middle">2</text>
    <text class="beat" x="188" y="78">Proxy screen</text>
    <text class="body" x="166" y="98">Op-count proxy</text>
    <text class="body" x="166" y="110">ranks accelerator</text>
    <text class="body" x="166" y="122">first.</text>
    <text class="tag"  x="216" y="150" text-anchor="middle">state seen</text>

    <!-- 3 Escalate to simulation (blue, stronger/evidence) -->
    <rect x="292" y="60" width="126" height="72" fill="#FBF0DE" stroke="#E68A17" stroke-width="2"/>
    <rect x="296" y="64" width="20" height="20" fill="#E68A17"/><text class="num" x="306" y="77" text-anchor="middle">3</text>
    <text class="beat" x="324" y="78">Escalate</text>
    <text class="body" x="302" y="98">Memory-aware sim</text>
    <text class="body" x="302" y="110">charges data</text>
    <text class="body" x="302" y="122">movement.</text>
    <text class="tag"  x="352" y="150" text-anchor="middle">evidence</text>

    <!-- 4 Reject (red) -->
    <rect x="428" y="60" width="126" height="72" fill="#FDECEC" stroke="#DE3D3C" stroke-width="1.35"/>
    <rect x="432" y="64" width="20" height="20" fill="#DE3D3C"/><text class="num" x="442" y="77" text-anchor="middle">4</text>
    <text class="beat" x="460" y="78">Reject</text>
    <text class="body" x="438" y="98">8 ms deadline and</text>
    <text class="body" x="438" y="110">3 W screen reject</text>
    <text class="body" x="438" y="122">accelerator + vector.</text>
    <text class="tag"  x="488" y="150" text-anchor="middle">alternatives rejected</text>

    <!-- 5 Commit (green) -->
    <rect x="564" y="60" width="126" height="72" fill="#FBEDF4" stroke="#D24D96" stroke-width="1.35"/>
    <rect x="568" y="64" width="20" height="20" fill="#D24D96"/><text class="num" x="578" y="77" text-anchor="middle">5</text>
    <text class="beat" x="596" y="78">Commit</text>
    <text class="body" x="574" y="98">Architect advances</text>
    <text class="body" x="574" y="110">the SoC block to an</text>
    <text class="body" x="574" y="122">RTL study.</text>
    <text class="tag"  x="624" y="150" text-anchor="middle">ownership</text>

    <!-- flow arrows -->
    <line class="arrow" x1="146" y1="96" x2="156" y2="96" marker-end="url(#arr)"/>
    <line class="arrow" x1="282" y1="96" x2="292" y2="96" marker-end="url(#arr)"/>
    <line class="arrow" x1="418" y1="96" x2="428" y2="96" marker-end="url(#arr)"/>
    <line class="arrow" x1="554" y1="96" x2="564" y2="96" marker-end="url(#arr)"/>

    <!-- round grouping under the beats -->
    <text class="note" x="148" y="172" text-anchor="middle">Round One</text>
    <text class="note" x="352" y="172" text-anchor="middle">Round Two</text>
    <text class="note" x="488" y="172" text-anchor="middle">Round Three</text>
    <text class="note" x="624" y="172" text-anchor="middle">Round Four</text>

    <!-- proxy-mirage note strip -->
    <rect x="20" y="196" width="670" height="86" fill="#F5F8FA" stroke="#9AA8B5" stroke-width="1"/>
    <text class="note" x="34" y="218" font-weight="700" fill="#20252B">The proxy is a mirage.</text>
    <text class="note" x="34" y="236">The cheap op-count proxy ranks the loosely coupled accelerator first.</text>
    <text class="note" x="34" y="252">Simulation charges data movement, reversing its energy and latency rank.</text>
    <text class="verdict-bad" x="34" y="270">accelerator: reject (8.8 ms, 3.2 W)</text>
    <text class="verdict-bad" x="250" y="270">vector: reject (9.5 ms)</text>
    <text class="verdict-ok"  x="430" y="270">SoC block: advances to RTL study</text>
  </g>
</svg>
