<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="100%" height="100%">
  <defs>
    <marker id="arrow-forward" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 2 L 8 5 L 0 8 Z" fill="#3E474B" />
    </marker>
  </defs>

  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  </style>

  <!-- Agent Architect Box -->
  <rect x="30" y="105" width="180" height="90" rx="8" fill="#FBF0DE" stroke="#E68A17" stroke-width="2" />

  <!-- Agent Glyph -->
  <rect x="45" y="132" width="16" height="16" rx="2" fill="none" stroke="#E68A17" stroke-width="2"/>
  <line x1="53" y1="128" x2="53" y2="132" stroke="#E68A17" stroke-width="2"/>
  <line x1="53" y1="148" x2="53" y2="152" stroke="#E68A17" stroke-width="2"/>
  <line x1="41" y1="140" x2="45" y2="140" stroke="#E68A17" stroke-width="2"/>
  <line x1="61" y1="140" x2="65" y2="140" stroke="#E68A17" stroke-width="2"/>

  <!-- Agent Text -->
  <text x="75" y="145" font-weight="bold" fill="#8A5310" font-size="14">Generation</text>
  <text x="75" y="163" fill="#8A5310" font-size="13">Agent Architect</text>

  <!-- Trajectory Logger Box -->
  <rect x="360" y="105" width="180" height="90" rx="8" fill="#E7F5EC" stroke="#1E9E48" stroke-width="2" />

  <!-- Evidence Glyph -->
  <path d="M 375 132 L 387 132 L 393 138 L 393 150 L 375 150 Z" fill="none" stroke="#1E9E48" stroke-width="2"/>
  <polyline points="387 132 387 138 393 138" fill="none" stroke="#1E9E48" stroke-width="2"/>
  <polyline points="380 142 383 145 388 139" fill="none" stroke="#1E9E48" stroke-width="2"/>

  <!-- Logger Text -->
  <text x="405" y="145" font-weight="bold" fill="#157A38" font-size="14">Prediction</text>
  <text x="405" y="163" fill="#157A38" font-size="13">Trajectory Logger</text>

  <!-- Simulator Sandbox Box -->
  <rect x="690" y="105" width="180" height="90" rx="8" fill="#E4F1F6" stroke="#1683A6" stroke-width="2" />

  <!-- Tool Glyph -->
  <rect x="705" y="133" width="18" height="14" rx="2" fill="none" stroke="#1683A6" stroke-width="2"/>
  <line x1="709" y1="138" x2="714" y2="138" stroke="#1683A6" stroke-width="2"/>
  <line x1="709" y1="143" x2="712" y2="143" stroke="#1683A6" stroke-width="2"/>

  <!-- Simulator Text -->
  <text x="735" y="145" font-weight="bold" fill="#136680" font-size="14">Optimization</text>
  <text x="735" y="163" fill="#136680" font-size="13">Simulator Sandbox</text>

  <!-- Arrows -->
  <line x1="210" y1="135" x2="355" y2="135" stroke="#3E474B" stroke-width="2" marker-end="url(#arrow-forward)" />
  <text x="285" y="127" text-anchor="middle" fill="#3E474B" font-size="13">Proposes Action</text>

  <line x1="540" y1="135" x2="685" y2="135" stroke="#3E474B" stroke-width="2" marker-end="url(#arrow-forward)" />
  <text x="615" y="127" text-anchor="middle" fill="#3E474B" font-size="13">Forwards to Environment</text>

  <line x1="690" y1="175" x2="545" y2="175" stroke="#3E474B" stroke-width="2" marker-end="url(#arrow-forward)" />
  <text x="615" y="195" text-anchor="middle" fill="#3E474B" font-size="13">Returns State/Metric</text>

  <line x1="360" y1="175" x2="215" y2="175" stroke="#3E474B" stroke-width="2" marker-end="url(#arrow-forward)" />
  <text x="285" y="195" text-anchor="middle" fill="#3E474B" font-size="13">Records &amp; Relays</text>
</svg>
