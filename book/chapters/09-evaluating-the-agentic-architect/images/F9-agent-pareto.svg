<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" role="img" aria-labelledby="pareto-title pareto-desc">
  <title id="pareto-title">Comparing AI-agent architects on a cost-quality plane</title>
  <desc id="pareto-desc">A conceptual scatter plot comparing AI-agent architects on a cost-quality plane. The horizontal axis is total evaluation compute, inference plus simulation, increasing to the right; the vertical axis is best design quality reached, increasing upward. Five agents are plotted as points. A weak agent sits at low compute and low quality, a balanced agent at moderate compute and high quality, and a frontier model at high compute and the highest quality; a dashed violet Pareto frontier connects these three non-dominated agents. Two agents lie clearly below the frontier: a prompt-tuned specialist at moderate compute and medium quality, and a stochastic brute-force agent at high compute but only mediocre quality. A horizontal green line marks a human-expert quality baseline that the balanced and frontier agents exceed but the others do not. A dashed amber vertical line marks an affordable compute budget; the balanced agent is the highest-quality choice at or below that budget.</desc>
  <defs>
    <marker id="arrow-axis" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#59636D"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .axis { stroke: #59636D; stroke-width: 1.4; fill: none; }
      .axis-title { font-size: 12.5px; fill: #333333; }
      .frontier { stroke: #6A4FC7; stroke-width: 2; fill: none; stroke-dasharray: 5 4; stroke-linecap: round; }
      .frontier-lbl { font-size: 12px; font-weight: 700; fill: #59429E; }
      .leader { stroke: #6A4FC7; stroke-width: 1.1; fill: none; }
      .baseline { stroke: #1E9E48; stroke-width: 1.4; fill: none; }
      .ref-green { font-size: 12px; font-weight: 700; fill: #157A38; }
      .budget { stroke: #E68A17; stroke-width: 1.6; fill: none; stroke-dasharray: 5 4; }
      .ref-amber { font-size: 12px; font-weight: 700; fill: #8A5310; }
      .pt-teal { font-size: 12.5px; font-weight: 700; fill: #136680; }
      .pt-mag { font-size: 12.5px; font-weight: 700; fill: #A82E70; }
      .pt-mag-sub { font-size: 11px; fill: #A82E70; }
      .pt-red { font-size: 12px; font-weight: 700; fill: #C62A2A; }
      .pt-grey { font-size: 11.5px; font-weight: 700; fill: #8A95A0; }
    </style>
  </defs>

  <rect width="820" height="480" fill="#FFFFFF"/>
  <g class="font">
    <!-- axes -->
    <line class="axis" x1="90" y1="400" x2="786" y2="400" marker-end="url(#arrow-axis)"/>
    <line class="axis" x1="90" y1="400" x2="90" y2="54" marker-end="url(#arrow-axis)"/>
    <text class="axis-title" x="438" y="440" text-anchor="middle">Total evaluation compute (inference + simulation)</text>
    <text class="axis-title" x="36" y="320" transform="rotate(-90 36 320)">Best design quality reached</text>

    <!-- human-expert baseline (evidence green, solid) -->
    <line class="baseline" x1="90" y1="190" x2="786" y2="190"/>
    <text class="ref-green" x="780" y="182" text-anchor="end">Human-expert baseline</text>

    <!-- affordable budget (methods amber, dashed) -->
    <line class="budget" x1="445" y1="400" x2="445" y2="74"/>
    <text class="ref-amber" x="445" y="64" text-anchor="middle">Budget you can afford</text>

    <!-- Pareto frontier (design violet, dashed) through the three non-dominated agents -->
    <path class="frontier" d="M 160 350 Q 210 180 380 130 Q 540 95 690 90"/>
    <line class="leader" x1="245" y1="156" x2="300" y2="164"/>
    <text class="frontier-lbl" x="205" y="150" text-anchor="middle">Pareto frontier</text>

    <!-- agents: dots -->
    <circle cx="160" cy="350" r="6" fill="#1683A6" stroke="#FFFFFF" stroke-width="1.3"/>
    <circle cx="380" cy="130" r="13" fill="none" stroke="#D24D96" stroke-width="1.4"/>
    <circle cx="380" cy="130" r="8.5" fill="#D24D96" stroke="#FFFFFF" stroke-width="1.6"/>
    <circle cx="690" cy="90" r="6" fill="#1683A6" stroke="#FFFFFF" stroke-width="1.3"/>
    <circle cx="660" cy="250" r="6" fill="#DE3D3C" stroke="#FFFFFF" stroke-width="1.3"/>
    <circle cx="340" cy="250" r="6" fill="#8A95A0" stroke="#FFFFFF" stroke-width="1.3"/>

    <!-- agents: labels -->
    <text class="pt-teal" x="160" y="373" text-anchor="middle">Weak agent</text>

    <text class="pt-mag" x="375" y="95" text-anchor="middle">Balanced agent</text>
    <text class="pt-mag-sub" x="375" y="110" text-anchor="middle">best affordable choice</text>

    <text class="pt-teal" x="660" y="72" text-anchor="middle">Frontier model</text>

    <text class="pt-red" x="660" y="273" text-anchor="middle">Stochastic</text>
    <text class="pt-red" x="660" y="288" text-anchor="middle">brute-force</text>

    <text class="pt-grey" x="340" y="273" text-anchor="middle">Prompt-tuned</text>
    <text class="pt-grey" x="340" y="288" text-anchor="middle">specialist</text>
  </g>
</svg>
