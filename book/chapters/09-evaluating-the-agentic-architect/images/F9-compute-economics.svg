<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 470" role="img" aria-labelledby="econ-title econ-desc">
  <title id="econ-title">The economics of agentic evaluation</title>
  <desc id="econ-desc">A conceptual line plot with intrinsic agent capability on the horizontal axis and total computational cost on the vertical axis. Simulation cost starts high for a weak agent and falls as capability rises, because a stronger agent brute-forces the simulator less. Inference cost starts low and rises as the model grows larger and more expensive to run. Their sum, the total search compute, is a U-shaped curve with a minimum at an optimal balance point. The high-simulation end is a stochastic brute-force regime; the high-capability end is a zero-shot heavy regime dominated by inference cost.</desc>
  <defs>
    <marker id="arrow-neutral" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#59636D"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .axis-label { font-size: 12.5px; fill: #333333; }
      .axis-hint  { font-size: 11px; fill: #8A95A0; }
      .legend     { font-size: 12.5px; font-weight: 700; }
      .regime-h   { font-size: 12.5px; font-weight: 700; }
      .regime-b   { font-size: 11.5px; }
      .opt-title  { font-size: 12.5px; font-weight: 700; fill: #20252B; }
      .opt-sub    { font-size: 11px; fill: #59636D; }
      .spine  { fill: none; stroke: #9AA8B5; stroke-width: 1.3; stroke-linecap: butt; }
      .leader { fill: none; stroke: #8A95A0; stroke-width: 1; }
      .sim { fill: none; stroke: #DE3D3C; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
      .inf { fill: none; stroke: #1683A6; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
      .tot { fill: none; stroke: #D24D96; stroke-width: 2.6; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 5 4; }
    </style>
  </defs>

  <rect width="800" height="470" fill="#FFFFFF"/>
  <g class="font">

    <!-- axes (open, arrowed to show increasing direction) -->
    <path class="spine" d="M 100 400 L 100 45"  marker-end="url(#arrow-neutral)"/>
    <path class="spine" d="M 100 400 L 690 400" marker-end="url(#arrow-neutral)"/>

    <!-- cost curves -->
    <path class="sim" d="M 100.0 93.4 L 109.8 113.0 L 119.7 131.4 L 129.5 148.4 L 139.3 164.3 L 149.2 179.2 L 159.0 193.0 L 168.8 205.9 L 178.7 218.0 L 188.5 229.2 L 198.3 239.6 L 208.2 249.4 L 218.0 258.5 L 227.8 266.9 L 237.7 274.9 L 247.5 282.2 L 257.3 289.1 L 267.2 295.5 L 277.0 301.5 L 286.8 307.0 L 296.7 312.2 L 306.5 317.1 L 316.3 321.6 L 326.2 325.8 L 336.0 329.7 L 345.8 333.4 L 355.7 336.8 L 365.5 340.0 L 375.3 343.0 L 385.2 345.7 L 395.0 348.3 L 404.8 350.7 L 414.7 352.9 L 424.5 355.0 L 434.3 357.0 L 444.2 358.8 L 454.0 360.5 L 463.8 362.1 L 473.7 363.5 L 483.5 364.9 L 493.3 366.2 L 503.2 367.4 L 513.0 368.5 L 522.8 369.5 L 532.7 370.5 L 542.5 371.4 L 552.3 372.3 L 562.2 373.0 L 572.0 373.8 L 581.8 374.5 L 591.7 375.1 L 601.5 375.7 L 611.3 376.2 L 621.2 376.8 L 631.0 377.2 L 640.8 377.7 L 650.7 378.1 L 660.5 378.5 L 670.3 378.9 L 680.2 379.2 L 690.0 379.5"/>
    <path class="inf" d="M 100.0 388.7 L 109.8 388.1 L 119.7 387.4 L 129.5 386.7 L 139.3 386.0 L 149.2 385.3 L 159.0 384.4 L 168.8 383.6 L 178.7 382.7 L 188.5 381.7 L 198.3 380.7 L 208.2 379.7 L 218.0 378.6 L 227.8 377.4 L 237.7 376.2 L 247.5 374.9 L 257.3 373.5 L 267.2 372.0 L 277.0 370.5 L 286.8 368.9 L 296.7 367.2 L 306.5 365.4 L 316.3 363.5 L 326.2 361.5 L 336.0 359.4 L 345.8 357.1 L 355.7 354.8 L 365.5 352.3 L 375.3 349.7 L 385.2 347.0 L 395.0 344.1 L 404.8 341.0 L 414.7 337.8 L 424.5 334.3 L 434.3 330.7 L 444.2 327.0 L 454.0 323.0 L 463.8 318.7 L 473.7 314.3 L 483.5 309.6 L 493.3 304.6 L 503.2 299.4 L 513.0 293.9 L 522.8 288.1 L 532.7 282.0 L 542.5 275.5 L 552.3 268.7 L 562.2 261.5 L 572.0 253.9 L 581.8 245.9 L 591.7 237.4 L 601.5 228.5 L 611.3 219.1 L 621.2 209.2 L 631.0 198.8 L 640.8 187.8 L 650.7 176.1 L 660.5 163.9 L 670.3 150.9 L 680.2 137.3 L 690.0 122.9"/>
    <path class="tot" d="M 100.0 82.1 L 109.8 101.1 L 119.7 118.8 L 129.5 135.2 L 139.3 150.4 L 149.2 164.4 L 159.0 177.5 L 168.8 189.5 L 178.7 200.6 L 188.5 210.9 L 198.3 220.4 L 208.2 229.1 L 218.0 237.0 L 227.8 244.4 L 237.7 251.0 L 247.5 257.1 L 257.3 262.6 L 267.2 267.5 L 277.0 272.0 L 286.8 275.9 L 296.7 279.4 L 306.5 282.5 L 316.3 285.1 L 326.2 287.3 L 336.0 289.1 L 345.8 290.5 L 355.7 291.6 L 365.5 292.3 L 375.3 292.7 L 385.2 292.7 L 395.0 292.3 L 404.8 291.7 L 414.7 290.7 L 424.5 289.4 L 434.3 287.7 L 444.2 285.8 L 454.0 283.4 L 463.8 280.8 L 473.7 277.8 L 483.5 274.5 L 493.3 270.8 L 503.2 266.8 L 513.0 262.4 L 522.8 257.6 L 532.7 252.5 L 542.5 246.9 L 552.3 240.9 L 562.2 234.5 L 572.0 227.7 L 581.8 220.3 L 591.7 212.5 L 601.5 204.2 L 611.3 195.4 L 621.2 186.0 L 631.0 176.0 L 640.8 165.4 L 650.7 154.2 L 660.5 142.4 L 670.3 129.8 L 680.2 116.5 L 690.0 102.4"/>

    <!-- frameless curve legend (clear band above the U minimum) -->
    <line x1="300" y1="150" x2="326" y2="150" stroke="#D24D96" stroke-width="2.6" stroke-dasharray="5 4"/>
    <text class="legend" x="332" y="154" fill="#D24D96">Total Search Compute</text>
    <line x1="300" y1="172" x2="326" y2="172" stroke="#DE3D3C" stroke-width="2.4"/>
    <text class="legend" x="332" y="176" fill="#DE3D3C">Simulation Cost (Simulator Tax)</text>
    <line x1="300" y1="194" x2="326" y2="194" stroke="#1683A6" stroke-width="2.4"/>
    <text class="legend" x="332" y="198" fill="#1683A6">Inference Cost (Model Execution)</text>

    <!-- regime: stochastic brute-force (high simulation cost, weak agent) -->
    <circle cx="110" cy="113" r="3" fill="#DE3D3C"/>
    <path class="leader" d="M 148 96 L 116 111"/>
    <text class="regime-h" x="150" y="86" fill="#C62A2A">Stochastic Brute-Force</text>
    <text class="regime-b" x="150" y="102" fill="#C62A2A">(Weak Agent, High Sim Cost)</text>

    <!-- regime: zero-shot heavy (high inference cost, frontier model) -->
    <circle cx="670" cy="151" r="3" fill="#1683A6"/>
    <path class="leader" d="M 630 106 L 666 147"/>
    <text class="regime-h" x="688" y="86" fill="#136680" text-anchor="end">Zero-Shot Heavy</text>
    <text class="regime-b" x="688" y="102" fill="#136680" text-anchor="end">(Massive Model, High Inference Cost)</text>

    <!-- optimal balance at the U minimum -->
    <circle cx="381" cy="293" r="4.5" fill="#D24D96"/>
    <path class="leader" d="M 386 296 L 432 305"/>
    <text class="opt-title" x="438" y="306">Optimal Balance</text>
    <text class="opt-sub" x="438" y="321">minimum total compute</text>

    <!-- axis titles -->
    <text class="axis-label" x="395" y="440" text-anchor="middle">Intrinsic Agent Capability (e.g., Model Parameters)</text>
    <text class="axis-hint" x="108" y="415">weaker agent</text>
    <text class="axis-hint" x="682" y="415" text-anchor="end">frontier model</text>
    <text class="axis-label" x="32" y="345" transform="rotate(-90 32 345)">Total Computational Cost (Joules / Time)</text>
  </g>
</svg>
