<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <style>
      .text-title { font-family: -apple-system, sans-serif; font-size: 16px; font-weight: bold; fill: #111; text-anchor: middle;}
      .text-body { font-family: -apple-system, sans-serif; font-size: 14px; fill: #333; text-anchor: middle;}
      .text-light { font-family: -apple-system, sans-serif; font-size: 12px; fill: #666; text-anchor: middle;}
      .timeline { stroke: #999; stroke-width: 3px; stroke-dasharray: 5,5; }
      .box-ai { fill: #f3e5f5; stroke: #8e24aa; stroke-width: 2px; rx: 4px; }
      .box-sim { fill: #e8f5e9; stroke: #43a047; stroke-width: 2px; rx: 4px; }
      .arrow { stroke: #d32f2f; stroke-width: 2px; fill: none; }
      .arrow-head { fill: #d32f2f; }
      .conflict-icon { fill: #d32f2f; font-weight: bold; font-size: 24px; text-anchor: middle;}
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow-head"/>
    </marker>
  </defs>

  <text x="400" y="30" class="text-title">The Split-Brain Causality Problem in Architecture AI</text>

  <line x1="200" y1="80" x2="200" y2="280" class="timeline" />
  <text x="200" y="60" class="text-body" font-weight="bold">AI / LLM State</text>

  <line x1="600" y1="80" x2="600" y2="280" class="timeline" />
  <text x="600" y="60" class="text-body" font-weight="bold">Project / Sim State</text>

  <rect x="100" y="90" width="200" height="40" class="box-ai" />
  <text x="200" y="115" class="text-body">Training Data Cutoff (V1)</text>

  <rect x="500" y="90" width="200" height="40" class="box-sim" />
  <text x="600" y="115" class="text-body">Project Baseline (V1)</text>

  <rect x="500" y="160" width="200" height="40" class="box-sim" />
  <text x="600" y="175" class="text-body" font-weight="bold">Compiler Updated (V2)</text>
  <text x="600" y="192" class="text-light">New latencies introduced</text>

  <path d="M 300 110 Q 400 150 300 230" class="arrow" marker-end="url(#arrowhead)"/>
  <rect x="100" y="210" width="200" height="40" class="box-ai" />
  <text x="200" y="225" class="text-body">Hallucinates fix for V1</text>
  <text x="200" y="242" class="text-light">Assumes old compiler</text>

  <path d="M 300 230 L 490 230" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="400" y="220" class="conflict-icon">X</text>
  <text x="400" y="250" class="text-body" fill="#d32f2f">Causality Violation!</text>

</svg>
