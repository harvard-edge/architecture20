<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 376" role="img" aria-labelledby="sb-title sb-desc">
  <title id="sb-title">State inconsistency between stale AI knowledge and current project state</title>
  <desc id="sb-desc">Two columns compare a stale artificial-intelligence knowledge state on the left with the current project state on the right. Both start at compiler version one: the AI holds training data at version one, and the project baseline is at version one. Over time the project advances when the compiler updates to version two, introducing new latencies and limits, while the AI knowledge stays frozen at version one and produces a hallucinated fix that still assumes version one. A red arrow marked with a cross shows that applying the stale version-one fix to the current version-two project causes a constraint violation.</desc>
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1E9E48"/>
    </marker>
    <marker id="arrow-violet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6A4FC7"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#DE3D3C"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .eyebrow-ai { font-size: 13px; font-weight: 700; fill: #59429E; letter-spacing: 0.6px; }
      .eyebrow-proj { font-size: 13px; font-weight: 700; fill: #157A38; letter-spacing: 0.6px; }
      .box-title { font-size: 13px; font-weight: 700; fill: #20252B; }
      .box-sub { font-size: 11.5px; fill: #333333; }
      .trans { font-size: 11px; fill: #59636D; }
      .violation { font-size: 12px; font-weight: 700; fill: #C62A2A; }
      .note { font-size: 11.5px; font-weight: 700; fill: #1683A6; }
      .ai-box { fill: #F0ECFA; stroke: #6A4FC7; stroke-width: 1.5; }
      .proj-box { fill: #E7F5EC; stroke: #1E9E48; stroke-width: 1.5; }
      .bar { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .flow-green { fill: none; stroke: #1E9E48; stroke-width: 2; stroke-linecap: square; }
      .flow-violet { fill: none; stroke: #6A4FC7; stroke-width: 2; stroke-linecap: square; stroke-dasharray: 5 4; }
      .flow-red { fill: none; stroke: #DE3D3C; stroke-width: 2.1; stroke-linecap: square; }
      .cross { stroke: #DE3D3C; stroke-width: 2.5; stroke-linecap: round; }
    </style>
  </defs>

  <rect width="800" height="376" fill="#FFFFFF"/>
  <g class="font">
    <text class="eyebrow-ai" x="215" y="54" text-anchor="middle">STALE AI KNOWLEDGE</text>
    <text class="eyebrow-proj" x="625" y="54" text-anchor="middle">CURRENT PROJECT STATE</text>

    <rect class="ai-box" x="90" y="76" width="250" height="64"/>
    <text class="box-title" x="215" y="104" text-anchor="middle">Training data (V1)</text>
    <text class="box-sub" x="215" y="122" text-anchor="middle">compiler V1 assumed</text>

    <rect class="proj-box" x="500" y="76" width="250" height="64"/>
    <text class="box-title" x="625" y="104" text-anchor="middle">Project baseline (V1)</text>
    <text class="box-sub" x="625" y="122" text-anchor="middle">compiler V1</text>

    <path class="flow-violet" d="M 215 140 L 215 172"/>
    <text class="trans" x="215" y="190" text-anchor="middle">knowledge frozen</text>
    <path class="flow-violet" d="M 215 200 L 215 236" marker-end="url(#arrow-violet)"/>

    <path class="flow-green" d="M 625 140 L 625 172"/>
    <text class="trans" x="625" y="190" text-anchor="middle">compiler updated</text>
    <path class="flow-green" d="M 625 200 L 625 236" marker-end="url(#arrow-green)"/>

    <rect class="ai-box" x="90" y="236" width="250" height="64"/>
    <text class="box-title" x="215" y="264" text-anchor="middle">Hallucinated fix</text>
    <text class="box-sub" x="215" y="282" text-anchor="middle">still assumes V1</text>

    <rect class="proj-box" x="500" y="236" width="250" height="64"/>
    <text class="box-title" x="625" y="264" text-anchor="middle">Project now at V2</text>
    <text class="box-sub" x="625" y="282" text-anchor="middle">new latencies, new limits</text>

    <text class="violation" x="420" y="250" text-anchor="middle">constraint violation</text>
    <path class="flow-red" d="M 340 268 L 500 268" marker-end="url(#arrow-red)"/>
    <line class="cross" x1="413" y1="261" x2="427" y2="275"/>
    <line class="cross" x1="427" y1="261" x2="413" y2="275"/>

    <rect class="bar" x="40" y="316" width="720" height="40"/>
    <text class="note" x="400" y="333" text-anchor="middle">The AI reasons from a stale V1 world model while the project has advanced to V2.</text>
    <text class="note" x="400" y="347" text-anchor="middle">Its fix assumes V1 and violates the current V2 constraints.</text>
  </g>
</svg>
