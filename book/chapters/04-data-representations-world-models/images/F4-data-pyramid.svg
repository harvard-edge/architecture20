<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .bg { fill: #fcfcfc; }
      .text-title { font-family: -apple-system, sans-serif; font-size: 16px; font-weight: bold; fill: #111; }
      .text-body { font-family: -apple-system, sans-serif; font-size: 14px; fill: #333; text-anchor: middle; }
      .text-light { font-family: -apple-system, sans-serif; font-size: 13px; fill: #666; text-anchor: middle; }
      .layer1 { fill: #e3f2fd; stroke: #1976d2; stroke-width: 2px; }
      .layer2 { fill: #bbdefb; stroke: #1976d2; stroke-width: 2px; }
      .layer3 { fill: #90caf9; stroke: #1976d2; stroke-width: 2px; }
      .layer4 { fill: #64b5f6; stroke: #1976d2; stroke-width: 2px; }
      .layer5 { fill: #42a5f5; stroke: #1976d2; stroke-width: 2px; }
    </style>
  </defs>

  <text x="400" y="40" class="text-title" text-anchor="middle">The Architectural Data Pyramid</text>

  <polygon points="100,420 700,420 630,350 170,350" class="layer1" />
  <text x="400" y="380" class="text-body" font-weight="bold">Background Knowledge (Broadest, Static)</text>
  <text x="400" y="405" class="text-light">Unstructured Text, Specifications, Academic Papers</text>

  <polygon points="170,350 630,350 560,280 240,280" class="layer2" />
  <text x="400" y="310" class="text-body" font-weight="bold">Extracted Relations</text>
  <text x="400" y="335" class="text-light">Knowledge Graphs, Architecture Ontologies, Dependency Matrices</text>

  <polygon points="240,280 560,280 490,210 310,210" class="layer3" />
  <text x="400" y="240" class="text-body" font-weight="bold">Environment Descriptions</text>
  <text x="400" y="265" class="text-light">DSL Models, Intermediate Representations, Configurations</text>

  <polygon points="310,210 490,210 440,140 360,140" class="layer4" />
  <text x="400" y="170" class="text-body" font-weight="bold">Execution History</text>
  <text x="400" y="195" class="text-light">Sim Logs, Synthesis Reports</text>

  <polygon points="360,140 440,140 400,90" class="layer5" />
  <text x="400" y="125" class="text-body" font-weight="bold" fill="#fff">Live</text>
  <text x="400" y="145" class="text-light" font-size="11" fill="#fff">State</text>

  <path d="M 80,420 L 80,100" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrow)" />
  <text x="65" y="260" class="text-light" transform="rotate(-90 65 260)">Increasing Specificity &amp; Cost</text>

  <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
  </marker>

</svg>
