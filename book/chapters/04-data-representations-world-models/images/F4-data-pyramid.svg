<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" role="img" aria-labelledby="pyr-title pyr-desc">
  <title id="pyr-title">Architectural data fidelity pyramid</title>
  <desc id="pyr-desc">A five-tier pyramid ordered from a broad, cheap, abundant base to a narrow, specific, costly apex. From bottom to top the tiers are background knowledge (unstructured text, specifications, papers), extracted relations (knowledge graphs, ontologies, dependency matrices), environment descriptions (DSL models, intermediate representations, configurations), execution history (simulation logs, synthesis reports), and live state (current run, most specific). A vertical axis on the left points upward to show increasing specificity and cost.</desc>
  <defs>
    <marker id="arrow-up" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#59636D"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .axis-label { font-size: 11.5px; font-weight: 700; fill: #59636D; letter-spacing: 0.4px; }
      .tier-title { font-size: 13.5px; font-weight: 700; fill: #20252B; }
      .tier-sub { font-size: 11.5px; fill: #333333; }
      .t1 { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.5; }
      .t2 { fill: #F0ECFA; stroke: #6A4FC7; stroke-width: 1.5; }
      .t3 { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.5; }
      .t4 { fill: #E7F5EC; stroke: #1E9E48; stroke-width: 1.5; }
      .t5 { fill: #FBEDF4; stroke: #D24D96; stroke-width: 1.5; }
    </style>
  </defs>

  <rect width="900" height="470" fill="#FFFFFF"/>
  <g class="font">
    <polygon class="t1" points="175,432 855,432 816,360 214,360"/>
    <text class="tier-title" x="515" y="386" text-anchor="middle">Background knowledge (broadest, static)</text>
    <text class="tier-sub" x="515" y="408" text-anchor="middle">unstructured text, specifications, academic papers</text>

    <polygon class="t2" points="214,360 816,360 777,288 253,288"/>
    <text class="tier-title" x="515" y="314" text-anchor="middle">Extracted relations</text>
    <text class="tier-sub" x="515" y="336" text-anchor="middle">knowledge graphs, architecture ontologies, dependency matrices</text>

    <polygon class="t3" points="253,288 777,288 738,216 292,216"/>
    <text class="tier-title" x="515" y="242" text-anchor="middle">Environment descriptions</text>
    <text class="tier-sub" x="515" y="264" text-anchor="middle">DSL models, intermediate representations, configurations</text>

    <polygon class="t4" points="292,216 738,216 699,144 331,144"/>
    <text class="tier-title" x="515" y="170" text-anchor="middle">Execution history</text>
    <text class="tier-sub" x="515" y="192" text-anchor="middle">sim logs, synthesis reports</text>

    <polygon class="t5" points="331,144 699,144 660,72 370,72"/>
    <text class="tier-title" x="515" y="100" text-anchor="middle">Live state</text>
    <text class="tier-sub" x="515" y="122" text-anchor="middle">current run, most specific</text>

    <line x1="150" y1="432" x2="150" y2="72" stroke="#59636D" stroke-width="2" marker-end="url(#arrow-up)"/>
    <text class="axis-label" x="95" y="252" text-anchor="middle" transform="rotate(-90 95 252)">Increasing specificity &amp; cost</text>
  </g>
</svg>
