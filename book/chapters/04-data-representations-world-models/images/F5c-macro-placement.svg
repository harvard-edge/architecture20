<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" role="img">
  <title>Reinforcement-learning macro placement loop</title>
  <desc>A placement policy chooses the location of the next macro on a chip floorplan. The partial floorplan is evaluated for density, congestion, and total wirelength, and that evaluation returns to the policy as reward. The step repeats, one macro at a time, until every macro is placed and total wirelength is minimized.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .label { font-size: 13px; font-weight: 700; fill: #222222; }
      .small { font-size: 11.4px; fill: #444444; }
      .cap { font-size: 11.4px; fill: #444444; }
      .note { font-size: 11.8px; font-weight: 700; fill: #157A38; }
      .policy { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.6; }
      .canvas { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.6; }
      .feedback { fill: #E7F5EC; stroke: #1E9E48; stroke-width: 1.6; }
      .macro { fill: #6A4FC7; }
      .macro-next { fill: #F0ECFA; stroke: #6A4FC7; stroke-width: 1.6; stroke-dasharray: 5 3; }
      .grid { stroke: #C9D6DF; stroke-width: 1; }
      .arrow { stroke: #333333; stroke-width: 2; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
    </style>
  </defs>

  <rect width="660" height="400" fill="#FFFFFF"/>
  <g class="font">

    <!-- Policy (methods-amber) -->
    <rect class="policy" x="210" y="34" width="240" height="56"/>
    <text class="label" x="330" y="60" text-anchor="middle">Placement policy</text>
    <text class="small" x="330" y="78" text-anchor="middle">chooses the next macro's location</text>

    <!-- Chip canvas (workload-teal) -->
    <text class="small" x="534" y="146" text-anchor="end">Partial floorplan</text>
    <rect class="canvas" x="468" y="152" width="160" height="150"/>
    <!-- floorplan grid -->
    <line class="grid" x1="500" y1="152" x2="500" y2="302"/>
    <line class="grid" x1="532" y1="152" x2="532" y2="302"/>
    <line class="grid" x1="564" y1="152" x2="564" y2="302"/>
    <line class="grid" x1="596" y1="152" x2="596" y2="302"/>
    <line class="grid" x1="468" y1="182" x2="628" y2="182"/>
    <line class="grid" x1="468" y1="212" x2="628" y2="212"/>
    <line class="grid" x1="468" y1="242" x2="628" y2="242"/>
    <line class="grid" x1="468" y1="272" x2="628" y2="272"/>
    <!-- placed macros -->
    <rect class="macro" x="474" y="158" width="48" height="28"/>
    <rect class="macro" x="536" y="158" width="40" height="22"/>
    <rect class="macro" x="474" y="212" width="28" height="46"/>
    <rect class="macro" x="586" y="204" width="36" height="40"/>
    <rect class="macro" x="520" y="248" width="42" height="28"/>
    <!-- macro currently being placed -->
    <rect class="macro-next" x="574" y="254" width="46" height="36"/>

    <!-- Evaluate (evidence-green) -->
    <rect class="feedback" x="210" y="318" width="240" height="56"/>
    <text class="label" x="330" y="344" text-anchor="middle">Evaluate placement</text>
    <text class="small" x="330" y="362" text-anchor="middle">density, congestion, total wirelength</text>

    <!-- loop arrows (orthogonal) -->
    <path class="arrow" d="M 450 62 H 548 V 150" marker-end="url(#arrow)"/>
    <text class="cap" x="500" y="52" text-anchor="middle">place one macro</text>

    <path class="arrow" d="M 548 302 V 346 H 452" marker-end="url(#arrow)"/>

    <path class="arrow" d="M 210 346 H 120 V 62 H 208" marker-end="url(#arrow)"/>
    <text class="cap" x="112" y="206" text-anchor="end">reward</text>

    <!-- interior note -->
    <text class="small" x="330" y="196" text-anchor="middle">Placement is sequential: one macro per step,</text>
    <text class="small" x="330" y="212" text-anchor="middle">repeated until every macro is placed.</text>
    <text class="note" x="330" y="238" text-anchor="middle">Objective: minimize total wirelength</text>

  </g>
</svg>
