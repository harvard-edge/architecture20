<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" role="img">
  <title>QuArch boundary test</title>
  <desc>Diagram showing QuArch-style paper questions as one layer of architecture data and linked design trajectories as the additional layer needed for tool use and review.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .title { font-size: 13.5px; font-weight: 700; fill: #222222; }
      .label { font-size: 12.5px; font-weight: 700; fill: #222222; }
      .small { font-size: 11.4px; fill: #444444; }
      .note { font-size: 12px; font-weight: 700; fill: #1683A6; }
      .knowledge { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.5; }
      .trajectory { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.5; }
      .item { fill: #F5F8FA; stroke-width: 1.1; }
      .knowledge-item { stroke: #1683A6; }
      .trajectory-item { stroke: #1683A6; }
      .gap { fill: #FDECEC; stroke: #DE3D3C; stroke-width: 1.4; }
      .bar { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .arrow { stroke: #333333; stroke-width: 2; fill: none; stroke-linecap: square; }
    </style>
  </defs>

  <rect width="720" height="380" fill="#FFFFFF"/>
  <g class="font">
    <rect class="knowledge" x="45" y="50" width="255" height="228"/>
    <text class="title" x="172.5" y="79" text-anchor="middle">paper-knowledge layer</text>
    <text class="small" x="172.5" y="100" text-anchor="middle">what a benchmark can ask from text</text>

    <rect class="item knowledge-item" x="72" y="122" width="201" height="34"/>
    <text class="label" x="172.5" y="144" text-anchor="middle">concept recall</text>
    <rect class="item knowledge-item" x="72" y="166" width="201" height="34"/>
    <text class="label" x="172.5" y="188" text-anchor="middle">published relationships</text>
    <rect class="item knowledge-item" x="72" y="210" width="201" height="34"/>
    <text class="label" x="172.5" y="232" text-anchor="middle">paper-level reasoning</text>

    <rect class="gap" x="322" y="124" width="76" height="76"/>
    <text class="label" x="360" y="151" text-anchor="middle">boundary</text>
    <text class="small" style="font-size: 9.8px" x="360" y="170" text-anchor="middle">papers omit</text>
    <text class="small" style="font-size: 9.8px" x="360" y="185" text-anchor="middle">design state</text>
    <line class="arrow" x1="300" y1="162" x2="322" y2="162" marker-end="url(#arrow)"/>
    <line class="arrow" x1="398" y1="162" x2="420" y2="162" marker-end="url(#arrow)"/>

    <rect class="trajectory" x="420" y="50" width="255" height="228"/>
    <text class="title" x="547.5" y="79" text-anchor="middle">design-trajectory layer</text>
    <text class="small" x="547.5" y="100" text-anchor="middle">what tool use and claim review need</text>

    <rect class="item trajectory-item" x="436" y="118" width="104" height="34"/>
    <text class="label" x="488" y="140" text-anchor="middle">claim + scope</text>
    <rect class="item trajectory-item" x="548" y="118" width="112" height="34"/>
    <text class="label" x="604" y="140" text-anchor="middle">state + action</text>
    <rect class="item trajectory-item" x="436" y="162" width="104" height="34"/>
    <text class="label" style="font-size: 11.2px" x="488" y="184" text-anchor="middle">tool observation</text>
    <rect class="item trajectory-item" x="548" y="162" width="112" height="34"/>
    <text class="label" x="604" y="184" text-anchor="middle">provenance</text>
    <rect class="item trajectory-item" x="436" y="206" width="104" height="34"/>
    <text class="label" x="488" y="228" text-anchor="middle">failed paths</text>
    <rect class="item trajectory-item" x="548" y="206" width="112" height="34"/>
    <text class="label" x="604" y="228" text-anchor="middle">review + decision</text>

    <rect class="bar" x="74" y="313" width="572" height="42"/>
    <text class="note" x="360" y="331" text-anchor="middle">QuArch tests architectural knowledge derived from papers</text>
    <text class="note" x="360" y="347" text-anchor="middle">AI-assisted design needs linked trajectories for tool use and review</text>
  </g>
</svg>
