<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" role="img">
  <title>Paired, versioned, multi-fidelity trajectory record</title>
  <desc>Two-turn trajectory diagram. From design state version one, a proposed action and anticipated effect lead through a tool observation tagged with cost, fidelity, and provenance to an accept decision that produces state version two. A rejected alternative from the same state ends in a recorded reject decision. A second turn uses the retained records when choosing the next action and advances to state version three only after an accept decision.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1683A6"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .label { font-size: 13.5px; font-weight: 700; fill: #222222; }
      .small { font-size: 11.4px; fill: #444444; }
      .tag { font-size: 11.4px; font-weight: 700; fill: #3E474B; }
      .note { font-size: 12px; font-weight: 700; fill: #1683A6; }
      .state { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.4; }
      .action { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.4; }
      .obs { fill: #E7F5EC; stroke: #1E9E48; stroke-width: 1.4; }
      .dec { fill: #FBEDF4; stroke: #D24D96; stroke-width: 1.4; }
      .rej { fill: #FDECEC; stroke: #DE3D3C; stroke-width: 1.4; }
      .bar { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .arrow { stroke: #333333; stroke-width: 2; fill: none; stroke-linecap: square; }
      .keep { stroke: #1683A6; stroke-width: 1.8; fill: none; stroke-dasharray: 5 4; stroke-linecap: square; }
    </style>
  </defs>

  <rect width="720" height="400" fill="#FFFFFF"/>
  <g class="font">
    <text class="tag" x="20" y="54">turn 1</text>

    <rect class="state" x="20" y="64" width="120" height="58"/>
    <text class="label" x="80" y="88" text-anchor="middle">design state</text>
    <text class="small" x="80" y="106" text-anchor="middle">version 1</text>

    <rect class="action" x="160" y="64" width="120" height="58"/>
    <text class="label" x="220" y="83" text-anchor="middle">action A</text>
    <text class="small" x="220" y="101" text-anchor="middle">proposed change</text>
    <text class="small" x="220" y="115" text-anchor="middle">anticipated effect</text>

    <rect class="obs" x="300" y="64" width="120" height="58"/>
    <text class="label" x="360" y="83" text-anchor="middle">tool observation</text>
    <text class="small" x="360" y="99" text-anchor="middle">cost, fidelity,</text>
    <text class="small" x="360" y="113" text-anchor="middle">provenance</text>

    <rect class="dec" x="440" y="64" width="120" height="58"/>
    <text class="label" x="500" y="88" text-anchor="middle">decision</text>
    <text class="small" x="500" y="106" text-anchor="middle">accept change</text>

    <rect class="state" x="580" y="64" width="120" height="58"/>
    <text class="label" x="640" y="88" text-anchor="middle">design state</text>
    <text class="small" x="640" y="106" text-anchor="middle">version 2</text>

    <line class="arrow" x1="140" y1="93" x2="160" y2="93" marker-end="url(#arrow)"/>
    <line class="arrow" x1="280" y1="93" x2="300" y2="93" marker-end="url(#arrow)"/>
    <line class="arrow" x1="420" y1="93" x2="440" y2="93" marker-end="url(#arrow)"/>
    <line class="arrow" x1="560" y1="93" x2="580" y2="93" marker-end="url(#arrow)"/>

    <text class="tag" x="160" y="162">rejected alternative, same turn</text>

    <rect class="action" x="160" y="170" width="120" height="58"/>
    <text class="label" x="220" y="189" text-anchor="middle">action B</text>
    <text class="small" x="220" y="207" text-anchor="middle">alternative change</text>
    <text class="small" x="220" y="221" text-anchor="middle">anticipated effect</text>

    <rect class="obs" x="300" y="170" width="120" height="58"/>
    <text class="label" x="360" y="189" text-anchor="middle">tool observation</text>
    <text class="small" x="360" y="205" text-anchor="middle">cost, fidelity,</text>
    <text class="small" x="360" y="219" text-anchor="middle">provenance</text>

    <rect class="rej" x="440" y="170" width="150" height="58"/>
    <text class="label" x="515" y="189" text-anchor="middle">decision: reject</text>
    <text class="small" x="515" y="205" text-anchor="middle">candidate and reason</text>
    <text class="small" x="515" y="219" text-anchor="middle">fidelity retained</text>

    <path class="arrow" d="M 80 122 L 80 199 L 160 199" marker-end="url(#arrow)"/>
    <line class="arrow" x1="280" y1="199" x2="300" y2="199" marker-end="url(#arrow)"/>
    <line class="arrow" x1="420" y1="199" x2="440" y2="199" marker-end="url(#arrow)"/>

    <text class="tag" x="20" y="262">turn 2</text>
    <path class="arrow" d="M 620 122 L 620 244 L 80 244 L 80 270" marker-end="url(#arrow)"/>

    <rect class="state" x="20" y="270" width="120" height="58"/>
    <text class="label" x="80" y="294" text-anchor="middle">design state</text>
    <text class="small" x="80" y="312" text-anchor="middle">version 2</text>

    <rect class="action" x="160" y="270" width="120" height="58"/>
    <text class="label" x="220" y="294" text-anchor="middle">action C</text>
    <text class="small" x="220" y="312" text-anchor="middle">uses prior records</text>

    <rect class="obs" x="300" y="270" width="120" height="58"/>
    <text class="label" x="360" y="289" text-anchor="middle">tool observation</text>
    <text class="small" x="360" y="305" text-anchor="middle">possibly at a new</text>
    <text class="small" x="360" y="319" text-anchor="middle">fidelity level</text>

    <rect class="dec" x="440" y="270" width="120" height="58"/>
    <text class="label" x="500" y="294" text-anchor="middle">decision</text>
    <text class="small" x="500" y="312" text-anchor="middle">accept change</text>

    <rect class="state" x="580" y="270" width="120" height="58"/>
    <text class="label" x="640" y="294" text-anchor="middle">design state</text>
    <text class="small" x="640" y="312" text-anchor="middle">version 3</text>

    <line class="arrow" x1="140" y1="299" x2="160" y2="299" marker-end="url(#arrow)"/>
    <line class="arrow" x1="280" y1="299" x2="300" y2="299" marker-end="url(#arrow)"/>
    <line class="arrow" x1="420" y1="299" x2="440" y2="299" marker-end="url(#arrow)"/>
    <line class="arrow" x1="560" y1="299" x2="580" y2="299" marker-end="url(#arrow)"/>

    <rect class="bar" x="40" y="352" width="640" height="38"/>
    <text class="note" x="360" y="368" text-anchor="middle">the trajectory keeps the winner and the rejected alternative linked to their state and action</text>
    <text class="note" x="360" y="383" text-anchor="middle">so the next turn can use what was already ruled out, and at what fidelity</text>
  </g>
</svg>
