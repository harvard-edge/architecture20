<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
    <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .panel-title { font-size: 13.5px; font-weight: 700; fill: #20252B; }
      .panel-subtitle { font-size: 11.5px; fill: #59636D; }
      .body-bold { font-size: 12.5px; font-weight: 700; fill: #222222; }
      .chip { font-size: 12.5px; font-weight: 700; fill: #222222; }
      .small { font-size: 11.2px; fill: #444444; }
      .panel { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .role-box { fill: #FFFFFF; stroke: #1683A6; stroke-width: 1.45; }
      .line { stroke: #333333; stroke-width: 1.9; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
    </style>
  </defs>

  <text x="400" y="40" class="panel-title">Knowledge Fusion at Inference Time</text>

  <!-- Sources -->
  <rect x="120" y="100" width="160" height="60" class="panel"/>
  <text x="200" y="127" class="body-bold">Pretrained</text>
  <text x="200" y="145" class="body-bold">Parameters</text>

  <rect x="320" y="100" width="160" height="60" class="panel"/>
  <text x="400" y="135" class="body-bold">RAG Context</text>

  <rect x="520" y="100" width="160" height="60" class="panel"/>
  <text x="600" y="127" class="body-bold">Explicit Design</text>
  <text x="600" y="145" class="body-bold">State</text>

  <!-- Central Fusion Box -->
  <rect x="300" y="260" width="200" height="80" class="role-box"/>
  <text x="400" y="295" class="body-bold">Inference Time</text>
  <text x="400" y="315" class="body-bold">Knowledge Fusion</text>

  <!-- Arrows -->
  <path d="M 230 160 L 330 255" class="line" marker-end="url(#arrow)"/>
  <path d="M 400 160 L 400 255" class="line" marker-end="url(#arrow)"/>
  <path d="M 570 160 L 470 255" class="line" marker-end="url(#arrow)"/>

</svg>
