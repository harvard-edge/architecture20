<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 468" role="img">
  <title>Representation, consequence model, tool observation, and trajectory</title>
  <desc>A representation record supplies current design state and context for a proposed action with an anticipated effect. The represented state and action feed a scoped consequence model that returns a prediction and an environment that applies declared checks before invoking a tool. The tool returns an observation with cost, fidelity, and provenance. The state, action, anticipated effect, prediction, observation, coverage, failures, and decision remain connected in the trajectory record. Replay additionally requires runnable inputs and environment details.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1683A6"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .panel-title { font-size: 13.5px; font-weight: 700; fill: #222222; }
      .label { font-size: 12.2px; font-weight: 700; fill: #222222; }
      .small { font-size: 11.2px; fill: #444444; }
      .note { font-size: 11.8px; font-weight: 700; fill: #1683A6; }
      .panel { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.4; }
      .rep { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.4; }
      .action { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.4; }
      .model { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.4; }
      .tool { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.4; }
      .obs { fill: #E7F5EC; stroke: #1E9E48; stroke-width: 1.4; }
      .trajectory { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.4; }
      .arrow { stroke: #333333; stroke-width: 2; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .record { stroke: #1683A6; stroke-width: 2; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
    </style>
  </defs>

  <rect width="720" height="468" fill="#FFFFFF"/>
  <g class="font">
    <rect class="panel rep" x="30" y="35" width="205" height="190"/>
    <text class="panel-title" x="132.5" y="61" text-anchor="middle">Representation record</text>
    <text class="small" x="132.5" y="81" text-anchor="middle">state an AI method can inspect</text>

    <rect class="rep" x="50" y="96" width="165" height="30"/>
    <text class="label" x="132.5" y="116" text-anchor="middle">current design + workload</text>
    <rect class="rep" x="50" y="137" width="165" height="30"/>
    <text class="label" x="132.5" y="157" text-anchor="middle">constraints + context</text>
    <rect class="rep" x="50" y="178" width="165" height="30"/>
    <text class="label" x="132.5" y="198" text-anchor="middle">observations + decisions</text>

    <rect class="panel action" x="275" y="75" width="150" height="110"/>
    <text class="panel-title" x="350" y="105" text-anchor="middle">Proposed action</text>
    <text class="small" x="350" y="131" text-anchor="middle">field + proposed value</text>
    <text class="small" x="350" y="154" text-anchor="middle">anticipated effect</text>

    <rect class="panel model" x="465" y="35" width="225" height="190"/>
    <text class="panel-title" x="577.5" y="61" text-anchor="middle">Scoped consequence model</text>
    <text class="small" x="577.5" y="81" text-anchor="middle">predicts within stated limits</text>

    <rect class="model" x="485" y="96" width="185" height="30"/>
    <text class="label" x="577.5" y="116" text-anchor="middle">supported state + actions</text>
    <rect class="model" x="485" y="137" width="185" height="30"/>
    <text class="label" x="577.5" y="157" text-anchor="middle">model prediction</text>
    <rect class="model" x="485" y="178" width="185" height="30"/>
    <text class="label" x="577.5" y="198" text-anchor="middle">uncertainty + scope limits</text>

    <line class="arrow" x1="235" y1="130" x2="275" y2="130" marker-end="url(#arrow)"/>
    <line class="arrow" x1="425" y1="130" x2="465" y2="130" marker-end="url(#arrow)"/>

    <rect class="panel tool" x="130" y="275" width="220" height="72"/>
    <text class="panel-title" x="240" y="299" text-anchor="middle">Environment + tool path</text>
    <text class="small" x="240" y="320" text-anchor="middle">applies checks; invokes tool</text>
    <text class="small" x="240" y="337" text-anchor="middle">using represented state + action</text>

    <rect class="panel obs" x="405" y="275" width="220" height="72"/>
    <text class="panel-title" x="515" y="299" text-anchor="middle">Tool observation</text>
    <text class="small" x="515" y="320" text-anchor="middle">returned value + status</text>
    <text class="small" x="515" y="337" text-anchor="middle">cost, fidelity, provenance</text>

    <path class="arrow" d="M 132.5 225 L 132.5 250 L 185 250 L 185 275" marker-end="url(#arrow)"/>
    <path class="arrow" d="M 350 185 L 350 250 L 295 250 L 295 275" marker-end="url(#arrow)"/>
    <line class="arrow" x1="350" y1="311" x2="405" y2="311" marker-end="url(#arrow)"/>

    <rect class="panel trajectory" x="85" y="380" width="550" height="62"/>
    <text class="panel-title" x="360" y="401" text-anchor="middle">Trajectory record</text>
    <text class="small" x="360" y="419" text-anchor="middle">state + action + anticipated effect + prediction</text>
    <text class="small" x="360" y="435" text-anchor="middle">observation + provenance + coverage + failures + decision</text>

    <line class="record" x1="515" y1="347" x2="515" y2="380" marker-end="url(#arrow-blue)"/>
    <path class="record" d="M 625 225 L 665 225 L 665 365 L 600 365 L 600 380" marker-end="url(#arrow-blue)"/>

    <text class="note" x="360" y="461" text-anchor="middle">replay additionally requires runnable inputs + environment details</text>
  </g>
</svg>
