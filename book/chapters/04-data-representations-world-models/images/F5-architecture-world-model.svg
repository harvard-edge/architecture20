<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 468" role="img">
  <title>Architecture representation and world model</title>
  <desc>Two side-by-side panels. The left teal panel, representation record, lists workload traces and metadata, architecture description, tool configs and logs, and constraints and objectives. The right amber panel, architecture world model, lists state and action space, dynamics and costs, constraints and invalid actions, and uncertainty and scope limits. An arrow labeled conditions and prediction runs from the representation panel to the world-model panel. Below, a tools-return-feedback box feeds an evidence-updates-state box, and teal feedback arrows return from the evidence box to the bottom edges of both panels. A bottom bar notes that provenance, coverage, labels, and failures make feedback reusable.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1683A6"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .panel-title { font-size: 13.5px; font-weight: 700; fill: #222222; }
      .label { font-size: 12.5px; font-weight: 700; fill: #222222; }
      .small { font-size: 11.4px; fill: #444444; }
      .note { font-size: 12px; font-weight: 700; fill: #1683A6; }
      .bar { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .panel { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.5; }
      .rep { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.4; }
      .world { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.4; }
      .tool { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.4; }
      .evidence { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.4; }
      .arrow { stroke: #333333; stroke-width: 2.1; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .feedback { stroke: #1683A6; stroke-width: 2; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .glyph { fill: none; stroke: currentColor; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
      .glyph-rep { color: #1683A6; }
      .glyph-world { color: #E68A17; }
    </style>
  </defs>

  <rect width="720" height="468" fill="#FFFFFF"/>
  <g class="font">

    <rect class="panel rep" x="40" y="41" width="285" height="255"/>
    <g class="glyph glyph-rep" transform="translate(62 55)">
      <rect x="0" y="0" width="18" height="22"/>
      <path d="M 5 7 L 14 7"/>
      <path d="M 5 13 L 14 13"/>
      <path d="M 5 18 L 11 18"/>
    </g>
    <text class="panel-title" x="92" y="71">Representation record</text>
    <text class="small" x="62" y="98">What the study can read, compare, and update.</text>

    <rect class="rep" x="62" y="116" width="238" height="31"/>
    <text class="label" x="78" y="136">workload traces + metadata</text>
    <rect class="rep" x="62" y="156" width="238" height="31"/>
    <text class="label" x="78" y="176">architecture description</text>
    <rect class="rep" x="62" y="196" width="238" height="31"/>
    <text class="label" x="78" y="216">tool configs + logs</text>
    <rect class="rep" x="62" y="236" width="238" height="31"/>
    <text class="label" x="78" y="256">constraints + objectives</text>

    <rect class="panel world" x="395" y="41" width="285" height="255"/>
    <g class="glyph glyph-world" transform="translate(417 55)">
      <path d="M 11 1 L 21 7 L 21 19 L 11 25 L 1 19 L 1 7 Z"/>
      <path d="M 11 1 L 11 13 L 21 7"/>
      <path d="M 11 13 L 1 7"/>
      <path d="M 11 13 L 11 25"/>
    </g>
    <text class="panel-title" x="449" y="71">Architecture world model</text>
    <text class="small" x="417" y="98">What the model predicts an action will change.</text>

    <rect class="world" x="417" y="116" width="238" height="31"/>
    <text class="label" x="433" y="136">state + action space</text>
    <rect class="world" x="417" y="156" width="238" height="31"/>
    <text class="label" x="433" y="176">dynamics + costs</text>
    <rect class="world" x="417" y="196" width="238" height="31"/>
    <text class="label" x="433" y="216">constraints + invalid actions</text>
    <rect class="world" x="417" y="236" width="238" height="31"/>
    <text class="label" x="433" y="256">uncertainty + scope limits</text>

    <line class="arrow" x1="325" y1="169" x2="395" y2="169" marker-end="url(#arrow)"/>
    <text class="small" x="360" y="158" text-anchor="middle">conditions</text>
    <text class="small" x="360" y="184" text-anchor="middle">prediction</text>

    <rect class="tool" x="145" y="331" width="190" height="48"/>
    <text class="label" x="240" y="352" text-anchor="middle">tools return feedback</text>
    <text class="small" x="240" y="369" text-anchor="middle">simulation, synthesis, runtime</text>

    <rect class="evidence" x="385" y="331" width="190" height="48"/>
    <text class="label" x="480" y="352" text-anchor="middle">evidence updates state</text>
    <text class="small" x="480" y="369" text-anchor="middle">including rejected candidates</text>

    <line class="arrow" x1="335" y1="355" x2="385" y2="355" marker-end="url(#arrow)"/>
    <line class="feedback" x1="537" y1="331" x2="537" y2="296" marker-end="url(#arrow-blue)"/>
    <path class="feedback" d="M 480 379 L 480 408 L 90 408 L 90 296" marker-end="url(#arrow-blue)"/>

    <rect class="bar" x="40" y="418" width="640" height="30"/>
    <text class="note" x="360" y="437" text-anchor="middle">provenance, coverage, labels, and failures make feedback reusable</text>
  </g>
</svg>
