<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 410" role="img">
  <title>Architecture environment and tool interface</title>
  <desc>A diagram showing how an Architecture 2.0 environment binds a bounded study and workload to action schemas, tools, observations, feedback, provenance, and rejection. Three amber input boxes on the left (study and workload, action schema, constraints) feed an amber environment-boundary panel whose internal pipeline validates the action, calls the tool flow, observes results, and logs provenance. From the pipeline, a red arrow exits to a reject-or-escalate box, and teal arrows exit to feedback and evidence-record boxes on the right. A bottom bar states that the environment contract combines workload, action, observation, constraint, cost, provenance, and rejection.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#DE3D3C"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .panel-title { font-size: 13.5px; font-weight: 700; fill: #20252B; }
      .label { font-size: 13px; font-weight: 700; fill: #222222; }
      .small { font-size: 11.4px; fill: #444444; }
      .note { font-size: 12px; font-weight: 700; fill: #1683A6; }
      .bar { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .input { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.4; }
      .env { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.4; }
      .tool { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.4; }
      .feedback { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.4; }
      .reject { fill: #FDECEC; stroke: #DE3D3C; stroke-width: 1.4; }
      .arrow { stroke: #333333; stroke-width: 2; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .reject-arrow { stroke: #DE3D3C; stroke-width: 2; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .glyph { fill: none; stroke: currentColor; stroke-width: 1.55; stroke-linecap: round; stroke-linejoin: round; }
      .glyph-input { color: #E68A17; }
      .glyph-env { color: #E68A17; }
      .glyph-tool { color: #E68A17; }
      .glyph-feedback { color: #1683A6; }
      .glyph-reject { color: #DE3D3C; }
    </style>
  </defs>

  <rect width="720" height="410" fill="#FFFFFF"/>
  <g class="font">

    <rect class="input" x="45" y="71" width="200" height="58"/>
    <g class="glyph glyph-input" transform="translate(60 86)">
      <rect x="0" y="0" width="16" height="20"/>
      <path d="M 4 7 L 12 7"/>
      <path d="M 4 13 L 10 13"/>
    </g>
    <text class="label" x="90" y="95" text-anchor="start">study + workload</text>
    <text class="small" x="90" y="114" text-anchor="start">intent, traces, version</text>

    <rect class="input" x="45" y="159" width="200" height="58"/>
    <g class="glyph glyph-input" transform="translate(60 174)">
      <path d="M 2 10 L 15 10"/>
      <path d="M 11 5 L 16 10 L 11 15"/>
      <path d="M 2 4 L 8 4"/>
      <path d="M 2 16 L 8 16"/>
    </g>
    <text class="label" x="90" y="183" text-anchor="start">action schema</text>
    <text class="small" x="90" y="202" text-anchor="start">knobs, edits, commands</text>

    <rect class="input" x="45" y="247" width="200" height="58"/>
    <g class="glyph glyph-input" transform="translate(60 262)">
      <path d="M 8 1 L 16 9 L 16 19 L 0 19 L 0 9 Z"/>
      <path d="M 5 11 L 11 11"/>
    </g>
    <text class="label" x="90" y="271" text-anchor="start">constraints</text>
    <text class="small" x="90" y="290" text-anchor="start">legal states, limits</text>

    <rect class="env" x="270" y="46" width="210" height="287"/>
    <text class="panel-title" x="375" y="76" text-anchor="middle">environment boundary</text>

    <rect class="env" x="305" y="96" width="140" height="39"/>
    <text class="label" x="375" y="120" text-anchor="middle">validate action</text>

    <rect class="tool" x="305" y="156" width="140" height="39"/>
    <text class="label" x="375" y="180" text-anchor="middle">call tool flow</text>

    <rect class="feedback" x="305" y="216" width="140" height="39"/>
    <text class="label" x="375" y="240" text-anchor="middle">observe results</text>

    <rect class="feedback" x="305" y="276" width="140" height="39"/>
    <text class="label" x="375" y="300" text-anchor="middle">log provenance</text>

    <rect class="reject" x="512.5" y="99" width="150" height="58"/>
    <text class="label" x="587.5" y="120" text-anchor="middle">reject / escalate</text>
    <text class="small" x="587.5" y="137" text-anchor="middle">invalid or</text>
    <text class="small" x="587.5" y="150" text-anchor="middle">insufficient</text>

    <rect class="feedback" x="512.5" y="201" width="150" height="58"/>
    <text class="label" x="587.5" y="225" text-anchor="middle">feedback</text>
    <text class="small" x="587.5" y="244" text-anchor="middle">metrics, logs, reports</text>

    <rect class="feedback" x="512.5" y="275" width="150" height="58"/>
    <text class="label" x="587.5" y="295" text-anchor="middle">evidence record</text>
    <text class="small" x="587.5" y="313" text-anchor="middle">cost, fidelity,</text>
    <text class="small" x="587.5" y="326" text-anchor="middle">support</text>

    <line class="arrow" x1="245" y1="100" x2="270" y2="100" marker-end="url(#arrow)"/>
    <line class="arrow" x1="245" y1="188" x2="270" y2="188" marker-end="url(#arrow)"/>
    <line class="arrow" x1="245" y1="276" x2="270" y2="276" marker-end="url(#arrow)"/>

    <line class="reject-arrow" x1="445" y1="115" x2="512.5" y2="115" marker-end="url(#arrow-red)"/>
    <line class="arrow" x1="445" y1="236" x2="512.5" y2="236" marker-end="url(#arrow)"/>
    <line class="arrow" x1="445" y1="296" x2="512.5" y2="296" marker-end="url(#arrow)"/>

    <line class="arrow" x1="375" y1="135" x2="375" y2="156" marker-end="url(#arrow)"/>
    <line class="arrow" x1="375" y1="195" x2="375" y2="216" marker-end="url(#arrow)"/>
    <line class="arrow" x1="375" y1="255" x2="375" y2="276" marker-end="url(#arrow)"/>

    <rect class="bar" x="40" y="352" width="640" height="38"/>
    <text class="note" x="360" y="368" text-anchor="middle">environment contract = workload + action + observation</text>
    <text class="note" x="360" y="383" text-anchor="middle">+ constraint + cost + provenance + rejection</text>
  </g>
</svg>
