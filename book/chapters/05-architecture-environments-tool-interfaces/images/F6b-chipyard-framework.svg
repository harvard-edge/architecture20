<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 295" role="img">
  <title>Chipyard framework as an integrated environment</title>
  <desc>A flow diagram of the Chipyard SoC-generation framework inside one bounding panel. A configuration system on the left passes parameters to a Chisel generators box listing Rocket, BOOM, and Hwacha, which feeds a FIRRTL compiler on the right. From the compiler, a fan-out routes downward to three backend boxes: RTL simulation with Verilator and VCS, a VLSI flow with Hammer, and FPGA emulation with FireSim, tagged simulate, synthesize, and emulate. One configuration therefore reaches every evaluation path.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .label { font-size: 13.5px; font-weight: 700; fill: #20252B; }
      .small { font-size: 12px; fill: #333333; }
      .micro { font-size: 11px; fill: #59636D; }
      .panel { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .config { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.4; }
      .generator { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.4; }
      .compiler { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.4; }
      .backend { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.4; }
      .arrow { stroke: #333333; stroke-width: 1.9; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .tag { fill: #FFFFFF; stroke: #1683A6; stroke-width: 0.8; }
      .tagtext { font-size: 11px; font-weight: 700; fill: #3E474B; }
    </style>
  </defs>
  <rect x="0" y="0" width="820" height="295" fill="#FFFFFF"/>
  <rect class="panel" x="48" y="28" width="724" height="239"/>
  <g class="font">
    <rect class="config" x="72" y="64" width="166" height="76"/>
    <text class="label" x="155" y="94" text-anchor="middle">Configuration</text>
    <text class="label" x="155" y="114" text-anchor="middle">system</text>
    <rect class="generator" x="312" y="54" width="174" height="90"/>
    <text class="label" x="399" y="78" text-anchor="middle">Chisel generators</text>
    <text class="small" x="399" y="99" text-anchor="middle">Rocket</text>
    <text class="small" x="399" y="118" text-anchor="middle">BOOM</text>
    <text class="small" x="399" y="137" text-anchor="middle">Hwacha</text>
    <rect class="compiler" x="560" y="64" width="150" height="76"/>
    <text class="label" x="635" y="94" text-anchor="middle">FIRRTL</text>
    <text class="label" x="635" y="114" text-anchor="middle">compiler</text>
    <line class="arrow" x1="238" y1="102" x2="312" y2="102" marker-end="url(#arrow)"/>
    <rect class="tag" x="240" y="73" width="70" height="22"/>
    <text class="tagtext" x="275" y="88" text-anchor="middle">parameters</text>
    <line class="arrow" x1="486" y1="102" x2="560" y2="102" marker-end="url(#arrow)"/>
    <rect class="backend" x="160" y="186" width="150" height="54"/>
    <text class="label" x="235" y="208" text-anchor="middle">RTL simulation</text>
    <text class="micro" x="235" y="226" text-anchor="middle">Verilator, VCS</text>
    <rect class="backend" x="338" y="186" width="150" height="54"/>
    <text class="label" x="413" y="208" text-anchor="middle">VLSI flow</text>
    <text class="micro" x="413" y="226" text-anchor="middle">Hammer</text>
    <rect class="backend" x="516" y="186" width="150" height="54"/>
    <text class="label" x="591" y="208" text-anchor="middle">FPGA emulation</text>
    <text class="micro" x="591" y="226" text-anchor="middle">FireSim</text>
    <polyline points="635,140 635,152 235,152" fill="none" stroke="#333333" stroke-width="1.9" stroke-linecap="square" stroke-linejoin="miter"/>
    <line class="arrow" x1="235" y1="152" x2="235" y2="186" marker-end="url(#arrow)"/>
    <line class="arrow" x1="413" y1="152" x2="413" y2="186" marker-end="url(#arrow)"/>
    <line class="arrow" x1="591" y1="152" x2="591" y2="186" marker-end="url(#arrow)"/>
    <rect class="tag" x="207" y="156" width="56" height="22"/>
    <text class="tagtext" x="235" y="171" text-anchor="middle">simulate</text>
    <rect class="tag" x="375" y="156" width="76" height="22"/>
    <text class="tagtext" x="413" y="171" text-anchor="middle">synthesize</text>
    <rect class="tag" x="562" y="156" width="58" height="22"/>
    <text class="tagtext" x="591" y="171" text-anchor="middle">emulate</text>
  </g>
</svg>
