<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <style>
      .text-title { font-family: -apple-system, sans-serif; font-size: 16px; font-weight: bold; fill: #111; text-anchor: middle;}
      .text-body { font-family: -apple-system, sans-serif; font-size: 14px; fill: #333; text-anchor: middle;}
      .text-light { font-family: -apple-system, sans-serif; font-size: 12px; fill: #666; text-anchor: middle;}
      .text-hash { font-family: monospace; font-size: 11px; fill: #1565c0; text-anchor: middle;}
      .box-intent { fill: #f3e5f5; stroke: #8e24aa; stroke-width: 2px; rx: 8px; }
      .box-sw { fill: #e3f2fd; stroke: #1976d2; stroke-width: 2px; rx: 4px; }
      .box-hw { fill: #e8f5e9; stroke: #43a047; stroke-width: 2px; rx: 4px; }
      .box-eval { fill: #fff3e0; stroke: #f57c00; stroke-width: 2px; rx: 4px; }
      .arrow { stroke: #555; stroke-width: 2px; fill: none; }
      .arrow-head { fill: #555; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow-head"/>
    </marker>
  </defs>

  <text x="400" y="30" class="text-title">Architectural Artifact Lineage &amp; Cryptographic Provenance</text>

  <rect x="300" y="60" width="200" height="50" class="box-intent" />
  <text x="400" y="85" class="text-body" font-weight="bold">Lighthouse Intent</text>
  <text x="400" y="100" class="text-hash">hash: 8f4c2b9...</text>

  <path d="M 350 110 L 200 150" class="arrow" marker-end="url(#arrowhead)"/>
  <rect x="100" y="150" width="200" height="50" class="box-sw" />
  <text x="200" y="175" class="text-body" font-weight="bold">Software S2 (MLIR)</text>
  <text x="200" y="190" class="text-hash">hash: 3a19f01...</text>

  <path d="M 450 110 L 600 150" class="arrow" marker-end="url(#arrowhead)"/>
  <rect x="500" y="150" width="200" height="50" class="box-hw" />
  <text x="600" y="175" class="text-body" font-weight="bold">Hardware H3 (Chisel)</text>
  <text x="600" y="190" class="text-hash">hash: e7b23c5...</text>

  <path d="M 200 200 L 200 240" class="arrow" marker-end="url(#arrowhead)"/>
  <rect x="100" y="240" width="200" height="50" class="box-sw" />
  <text x="200" y="265" class="text-body" font-weight="bold">Binary B2 (Compiled)</text>
  <text x="200" y="280" class="text-hash">hash: 9d81e4a...</text>

  <path d="M 600 200 L 600 240" class="arrow" marker-end="url(#arrowhead)"/>
  <rect x="500" y="240" width="200" height="50" class="box-hw" />
  <text x="600" y="265" class="text-body" font-weight="bold">RTL R3 (Elaborated)</text>
  <text x="600" y="280" class="text-hash">hash: f01c6b2...</text>

  <path d="M 300 265 L 390 320" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M 500 265 L 410 320" class="arrow" marker-end="url(#arrowhead)"/>
  
  <rect x="250" y="320" width="300" height="60" class="box-eval" />
  <text x="400" y="345" class="text-body" font-weight="bold">Evaluation Instance (B2 + R3)</text>
  <text x="400" y="360" class="text-body">Simulated together</text>
  <text x="400" y="375" class="text-hash">hash: 2c54d19...</text>

</svg>
