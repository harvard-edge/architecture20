<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 496" role="img" aria-labelledby="lineage-title lineage-desc">
  <title id="lineage-title">Artifact lineage and cryptographic provenance</title>
  <desc id="lineage-desc">A lineage tree. One Lighthouse intent fans out into a software branch and a hardware branch. Software S2 in MLIR compiles into binary B2. Hardware H3 in Chisel elaborates into RTL R3. Binary B2 and RTL R3 recombine into a single evaluation instance that is simulated together. Every box carries a content hash. A bottom bar states that hashing every artifact from its inputs makes each evaluation reproducible: changing one artifact creates a new evaluation identity, and a hash proves artifact identity rather than functional equivalence.</desc>
  <defs>
    <marker id="arrow-dark" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .box-title { font-size: 13px; font-weight: 700; fill: #20252B; }
      .hash { font-size: 11px; fill: #59636D; }
      .eval-sub { font-size: 11px; fill: #444444; }
      .note { font-size: 12px; font-weight: 700; fill: #1683A6; }
      .violet { fill: #F0ECFA; stroke: #6A4FC7; stroke-width: 1.45; }
      .teal   { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.45; }
      .amber  { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.45; }
      .green  { fill: #E7F5EC; stroke: #1E9E48; stroke-width: 1.45; }
      .bar { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .flow { fill: none; stroke: #333333; stroke-width: 2; stroke-linecap: square; stroke-linejoin: miter; marker-end: url(#arrow-dark); }
      .stem { fill: none; stroke: #333333; stroke-width: 2; stroke-linecap: square; }
    </style>
  </defs>

  <rect width="800" height="496" fill="#FFFFFF"/>
  <g class="font">
    <rect class="violet" x="300" y="48" width="200" height="52"/>
    <text class="box-title" x="400" y="72" text-anchor="middle">Lighthouse intent</text>
    <text class="hash" x="400" y="92" text-anchor="middle">hash 8f4c2b9…</text>

    <rect class="teal" x="80" y="152" width="200" height="52"/>
    <text class="box-title" x="180" y="176" text-anchor="middle">Software S2 (MLIR)</text>
    <text class="hash" x="180" y="196" text-anchor="middle">hash 3a19f01…</text>

    <rect class="amber" x="520" y="152" width="200" height="52"/>
    <text class="box-title" x="620" y="176" text-anchor="middle">Hardware H3 (Chisel)</text>
    <text class="hash" x="620" y="196" text-anchor="middle">hash e7b23c5…</text>

    <rect class="teal" x="80" y="250" width="200" height="52"/>
    <text class="box-title" x="180" y="274" text-anchor="middle">Binary B2 (compiled)</text>
    <text class="hash" x="180" y="294" text-anchor="middle">hash 9d81e4a…</text>

    <rect class="amber" x="520" y="250" width="200" height="52"/>
    <text class="box-title" x="620" y="274" text-anchor="middle">RTL R3 (elaborated)</text>
    <text class="hash" x="620" y="294" text-anchor="middle">hash f01c6b2…</text>

    <rect class="green" x="280" y="348" width="240" height="68"/>
    <text class="box-title" x="400" y="370" text-anchor="middle">Evaluation instance</text>
    <text class="eval-sub" x="400" y="390" text-anchor="middle">B2 + R3, simulated together</text>
    <text class="hash" x="400" y="408" text-anchor="middle">hash 2c54d19…</text>

    <path class="stem" d="M 400 100 V 124"/>
    <path class="flow" d="M 400 124 H 180 V 152"/>
    <path class="flow" d="M 400 124 H 620 V 152"/>
    <path class="flow" d="M 180 204 V 250"/>
    <path class="flow" d="M 620 204 V 250"/>
    <path class="flow" d="M 180 302 V 336 H 350 V 348"/>
    <path class="flow" d="M 620 302 V 336 H 450 V 348"/>

    <rect class="bar" x="30" y="432" width="740" height="44"/>
    <text class="note" x="400" y="450" text-anchor="middle">Every artifact is hashed from its inputs, so changing one (say B2) creates a new evaluation identity,</text>
    <text class="note" x="400" y="466" text-anchor="middle">even when the root intent is unchanged. A hash proves artifact identity, not functional equivalence.</text>
  </g>
</svg>
