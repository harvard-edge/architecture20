<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
    <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .panel-title { font-size: 13.5px; font-weight: 700; fill: #20252B; }
      .panel-subtitle { font-size: 11.5px; fill: #59636D; }
      .body-bold { font-size: 12.5px; font-weight: 700; fill: #222222; }
      .chip { font-size: 12.5px; font-weight: 700; fill: #222222; }
      .small { font-size: 11.2px; fill: #444444; }
      .panel { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .role-box { fill: #FFFFFF; stroke: #1683A6; stroke-width: 1.45; }
      .line { stroke: #333333; stroke-width: 1.9; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
    </style>
  </defs>

  <text x="400" y="40" class="panel-title">Sim-to-Real Funnel</text>

  <!-- Funnel background outline -->
  <polygon points="120,75 680,75 520,185 500,295 500,350 300,350 300,295 280,185" class="panel"/>

  <!-- Analytical Models -->
  <rect x="150" y="60" width="500" height="60" class="role-box"/>
  <text x="400" y="86" class="body-bold">Analytical Models</text>
  <text x="400" y="106" class="small">Millions of Candidates</text>

  <path d="M 400 120 L 400 160" class="line" marker-end="url(#arrow)"/>

  <!-- Cycle-Accurate Simulators -->
  <rect x="250" y="170" width="300" height="60" class="role-box"/>
  <text x="400" y="196" class="body-bold">Cycle-Accurate Simulators</text>
  <text x="400" y="216" class="small">Thousands of Candidates</text>

  <path d="M 400 230 L 400 270" class="line" marker-end="url(#arrow)"/>

  <!-- Physical VLSI -->
  <rect x="300" y="280" width="200" height="60" class="role-box"/>
  <text x="400" y="306" class="body-bold">Physical VLSI</text>
  <text x="400" y="326" class="small">Handful of Candidates</text>
</svg>
