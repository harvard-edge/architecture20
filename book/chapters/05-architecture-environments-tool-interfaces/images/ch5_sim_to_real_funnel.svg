<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 392" role="img" aria-labelledby="funnel-title funnel-desc">
  <title id="funnel-title">Sim-to-real multi-fidelity funnel</title>
  <desc id="funnel-desc">A three-stage funnel narrowing from top to bottom. Fast analytical models screen millions of candidates, cycle-accurate simulators evaluate thousands, and physical VLSI signoff verifies a handful. Each stage is a role-tinted box of decreasing width connected by a downward arrow, set inside a light neutral funnel outline. A guide on the right marks that fidelity and cost rise as the candidate count falls.</desc>
  <defs>
    <marker id="arrow-dark" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#59636D"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .box-title { font-size: 13px; font-weight: 700; fill: #20252B; }
      .box-sub { font-size: 11.5px; fill: #59636D; }
      .anno { font-size: 11px; fill: #59636D; }
      .funnel { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .amber { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.45; }
      .teal  { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.45; }
      .green { fill: #E7F5EC; stroke: #1E9E48; stroke-width: 1.45; }
      .flow { fill: none; stroke: #333333; stroke-width: 2; stroke-linecap: square; marker-end: url(#arrow-dark); }
      .guide { fill: none; stroke: #59636D; stroke-width: 1.4; stroke-linecap: square; marker-end: url(#arrow-muted); }
    </style>
  </defs>

  <rect width="760" height="392" fill="#FFFFFF"/>
  <g class="font">
    <polygon class="funnel" points="118.5,64 641.5,64 480,344 280,344"/>

    <rect class="amber" x="160" y="72" width="440" height="64"/>
    <text class="box-title" x="380" y="100" text-anchor="middle">Analytical models</text>
    <text class="box-sub" x="380" y="120" text-anchor="middle">millions of candidates</text>

    <rect class="teal" x="230" y="176" width="300" height="64"/>
    <text class="box-title" x="380" y="204" text-anchor="middle">Cycle-accurate simulators</text>
    <text class="box-sub" x="380" y="224" text-anchor="middle">thousands of candidates</text>

    <rect class="green" x="280" y="280" width="200" height="64"/>
    <text class="box-title" x="380" y="308" text-anchor="middle">Physical VLSI signoff</text>
    <text class="box-sub" x="380" y="328" text-anchor="middle">handful of candidates</text>

    <path class="flow" d="M 380 136 V 176"/>
    <path class="flow" d="M 380 240 V 280"/>

    <line class="guide" x1="660" y1="80" x2="660" y2="336"/>
    <text class="anno" x="668" y="92">fast,</text>
    <text class="anno" x="668" y="108">low cost</text>
    <text class="anno" x="668" y="316">high fidelity,</text>
    <text class="anno" x="668" y="332">high cost</text>
  </g>
</svg>
