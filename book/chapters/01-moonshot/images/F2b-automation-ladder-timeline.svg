<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 412" role="img">
  <title>Five stages of design automation with widening unit of intent</title>
  <desc>A five-step staircase rises from lower left to upper right, with one box for each stage of design automation. From bottom to top: logic synthesis (1980s to 1990s) turning Boolean and RTL intent into gate-level structure; high-level synthesis (1990s to 2000s) turning algorithmic behavior into RTL candidates; domain-specific synthesis (2000s to 2010s) turning kernel and DSL intent into specialized code and hardware; agile hardware generation (2010s to 2020s) turning parameterized templates into bespoke SoC instances; and AI-assisted architecture (2020s onward), emphasized in teal, turning workload intent into an evidence-backed finding or decision. A horizontal arrow along the bottom marks approximate eras in time order, and a vertical arrow on the right is labeled widening unit of intent and artifact.</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .era  { font-size: 10.8px; font-weight: 700; fill: #8A5310; }
      .era-t { font-size: 10.8px; font-weight: 700; fill: #136680; }
      .name { font-size: 12.5px; font-weight: 700; fill: #20252B; }
      .sub  { font-size: 11.2px; fill: #333333; }
      .axis { font-size: 11px; fill: #59636D; }
      .arrow { stroke: #333333; stroke-width: 1.9; fill: none; stroke-linecap: square; }
    </style>
  </defs>

  <rect width="760" height="412" fill="#FFFFFF"/>

  <g class="font">
    <!-- stage 5: AI-assisted architecture (emphasized, teal) -->
    <rect x="240" y="40" width="400" height="54" fill="#E4F1F6" stroke="#1683A6" stroke-width="2"/>
    <text class="era-t" x="254" y="57">2020s onward</text>
    <text class="name" x="254" y="73">AI-assisted architecture</text>
    <text class="sub" x="254" y="87">workload intent &#8594; evidence-backed finding or decision</text>

    <!-- stage 4: agile hardware generation -->
    <rect x="190" y="104" width="370" height="54" fill="#FBF0DE" stroke="#E68A17" stroke-width="1.4"/>
    <text class="era" x="204" y="121">2010s&#8211;2020s</text>
    <text class="name" x="204" y="137">Agile hardware generation</text>
    <text class="sub" x="204" y="151">parameterized templates &#8594; bespoke SoC instances</text>

    <!-- stage 3: domain-specific synthesis -->
    <rect x="140" y="168" width="340" height="54" fill="#FBF0DE" stroke="#E68A17" stroke-width="1.4"/>
    <text class="era" x="154" y="185">2000s&#8211;2010s</text>
    <text class="name" x="154" y="201">Domain-specific synthesis</text>
    <text class="sub" x="154" y="215">kernel and DSL intent &#8594; specialized code and hardware</text>

    <!-- stage 2: high-level synthesis -->
    <rect x="90" y="232" width="310" height="54" fill="#FBF0DE" stroke="#E68A17" stroke-width="1.4"/>
    <text class="era" x="104" y="249">1990s&#8211;2000s</text>
    <text class="name" x="104" y="265">High-level synthesis</text>
    <text class="sub" x="104" y="279">algorithmic behavior &#8594; RTL candidates</text>

    <!-- stage 1: logic synthesis -->
    <rect x="40" y="296" width="280" height="54" fill="#FBF0DE" stroke="#E68A17" stroke-width="1.4"/>
    <text class="era" x="54" y="313">1980s&#8211;1990s</text>
    <text class="name" x="54" y="329">Logic synthesis</text>
    <text class="sub" x="54" y="343">Boolean and RTL intent &#8594; gate-level structure</text>

    <!-- time axis -->
    <line class="arrow" x1="40" y1="372" x2="640" y2="372" marker-end="url(#arr)"/>
    <text class="axis" x="340" y="392" text-anchor="middle">time (era spans approximate)</text>

    <!-- widening annotation -->
    <line class="arrow" x1="688" y1="352" x2="688" y2="50" marker-end="url(#arr)"/>
    <text class="axis" x="688" y="374" text-anchor="middle">widening unit of</text>
    <text class="axis" x="688" y="389" text-anchor="middle">intent and artifact</text>
  </g>
</svg>
