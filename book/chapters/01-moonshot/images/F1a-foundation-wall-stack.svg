<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" role="img">
  <title>Comparing a foundation-model pattern with an AI-assisted architecture study</title>
  <desc>A two-panel comparison between a general foundation-model stack and a bounded AI-assisted architecture study that connects architecture inputs to study outputs through representations, tools, experiments, evidence, and architectural judgment.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .label { font-size: 13.5px; font-weight: 700; fill: #20252B; }
      .small { font-size: 11.4px; fill: #333333; }
      .micro { font-size: 11.2px; fill: #59636D; }
      .bar-note { font-size: 12px; font-weight: 700; fill: #1683A6; }
      .panel { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .box-blue { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.4; }
      .box-violet { fill: #F0ECFA; stroke: #6A4FC7; stroke-width: 1.4; }
      .wall { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .line { stroke: #333333; stroke-width: 1.9; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
    </style>
  </defs>

  <rect width="900" height="720" fill="#FFFFFF"/>

  <rect class="panel" x="50" y="35" width="800" height="268"/>
  <text class="font label" x="76" y="65">A. General foundation-model pattern</text>
  <text class="font micro" x="76" y="85">Heterogeneous inputs are embedded into a central foundation and adapted to many downstream tasks.</text>

  <g class="font">
    <text class="label" x="78" y="123">Inputs</text>
    <rect class="box-blue" x="78" y="137" width="210" height="28"/>
    <text class="small" x="96" y="156">Images and video</text>
    <rect class="box-blue" x="78" y="173" width="210" height="28"/>
    <text class="small" x="96" y="192">Text and documents</text>
    <rect class="box-blue" x="78" y="209" width="210" height="28"/>
    <text class="small" x="96" y="228">Audio and speech</text>
    <rect class="box-blue" x="78" y="245" width="210" height="28"/>
    <text class="small" x="96" y="264">Code and structured data</text>

    <rect class="wall" x="354" y="125" width="190" height="126"/>
    <g transform="translate(423,141)">
      <rect x="0" y="12" width="52" height="24" fill="#F0ECFA" stroke="#333333" stroke-width="1.1"/>
      <rect x="8" y="6" width="52" height="24" fill="#FFFFFF" stroke="#333333" stroke-width="1.1"/>
      <rect x="16" y="0" width="52" height="24" fill="#F0ECFA" stroke="#333333" stroke-width="1.1"/>
    </g>
    <text class="label" x="449" y="192" text-anchor="middle">Foundation</text>
    <text class="label" x="449" y="213" text-anchor="middle">model</text>
    <text class="micro" x="449" y="235" text-anchor="middle">shared learned substrate</text>

    <text class="label" x="616" y="123">Downstream use cases</text>
    <rect class="box-violet" x="616" y="137" width="206" height="28"/>
    <text class="small" x="634" y="156">Question answering</text>
    <rect class="box-violet" x="616" y="173" width="206" height="28"/>
    <text class="small" x="634" y="192">Coding assistance</text>
    <rect class="box-violet" x="616" y="209" width="206" height="28"/>
    <text class="small" x="634" y="228">Summarization</text>
    <rect class="box-violet" x="616" y="245" width="206" height="28"/>
    <text class="small" x="634" y="264">Planning and retrieval</text>
  </g>

  <line class="line" x1="288" y1="188" x2="354" y2="188" marker-end="url(#arrow)"/>
  <line class="line" x1="544" y1="188" x2="616" y2="188" marker-end="url(#arrow)"/>

  <rect class="panel" x="50" y="339" width="800" height="304"/>
  <text class="font label" x="76" y="369">B. Bounded AI-assisted architecture study</text>
  <text class="font micro" x="76" y="389">The center connects architectural representations to tools and experiments under evidence and architect judgment.</text>

  <g class="font">
    <text class="label" x="78" y="425">Architecture inputs</text>
    <rect class="box-blue" x="78" y="435" width="220" height="38"/>
    <text class="small" x="96" y="451">Workload traces</text>
    <text class="small" x="96" y="465">and benchmarks</text>
    <rect class="box-blue" x="78" y="475" width="220" height="38"/>
    <text class="small" x="96" y="491">Specs, constraints,</text>
    <text class="small" x="96" y="505">and budgets</text>
    <rect class="box-blue" x="78" y="515" width="220" height="38"/>
    <text class="small" x="96" y="531">RTL, IP, configs,</text>
    <text class="small" x="96" y="545">and libraries</text>
    <rect class="box-blue" x="78" y="555" width="220" height="38"/>
    <text class="small" x="96" y="571">PDK, EDA, and simulator</text>
    <text class="small" x="96" y="585">assumptions</text>
    <rect class="box-blue" x="78" y="595" width="220" height="38"/>
    <text class="small" x="96" y="611">Verification and</text>
    <text class="small" x="96" y="625">evidence logs</text>

    <rect class="wall" x="350" y="451" width="200" height="172"/>
    <g transform="translate(423,463)">
      <rect x="0" y="0" width="54" height="34" fill="#F0ECFA" stroke="#333333" stroke-width="1.2"/>
      <line x1="-7" y1="8" x2="0" y2="8" stroke="#333333" stroke-width="1.2"/>
      <line x1="-7" y1="17" x2="0" y2="17" stroke="#333333" stroke-width="1.2"/>
      <line x1="-7" y1="26" x2="0" y2="26" stroke="#333333" stroke-width="1.2"/>
      <line x1="54" y1="8" x2="61" y2="8" stroke="#333333" stroke-width="1.2"/>
      <line x1="54" y1="17" x2="61" y2="17" stroke="#333333" stroke-width="1.2"/>
      <line x1="54" y1="26" x2="61" y2="26" stroke="#333333" stroke-width="1.2"/>
      <rect x="17" y="9" width="20" height="16" fill="#FFFFFF" stroke="#333333" stroke-width="1"/>
      <path d="M 20 18 L 25 23 L 36 12" fill="none" stroke="#1683A6" stroke-width="2"/>
    </g>
    <text class="label" x="450" y="519" text-anchor="middle">AI-assisted</text>
    <text class="label" x="450" y="540" text-anchor="middle">architecture study</text>
    <text class="micro" x="450" y="564" text-anchor="middle">representations + tools</text>
    <text class="micro" x="450" y="581" text-anchor="middle">experiments + evidence</text>
    <text class="micro" x="450" y="598" text-anchor="middle">architect judgment</text>

    <text class="label" x="610" y="425">Study outputs</text>
    <rect class="box-violet" x="610" y="435" width="220" height="38"/>
    <text class="small" x="628" y="451">ISA and extension</text>
    <text class="small" x="628" y="465">exploration</text>
    <rect class="box-violet" x="610" y="475" width="220" height="38"/>
    <text class="small" x="628" y="491">Microarchitecture</text>
    <text class="small" x="628" y="505">proposals</text>
    <rect class="box-violet" x="610" y="515" width="220" height="38"/>
    <text class="small" x="628" y="539">Accelerator and SoC options</text>
    <rect class="box-violet" x="610" y="555" width="220" height="38"/>
    <text class="small" x="628" y="579">RTL and testbench fragments</text>
    <rect class="box-violet" x="610" y="595" width="220" height="38"/>
    <text class="small" x="628" y="611">DSE and verification</text>
    <text class="small" x="628" y="625">packages</text>
  </g>

  <line class="line" x1="298" y1="537" x2="350" y2="537" marker-end="url(#arrow)"/>
  <line class="line" x1="550" y1="537" x2="610" y2="537" marker-end="url(#arrow)"/>

  <rect x="50" y="663" width="800" height="34" fill="#F5F8FA" stroke="#9AA8B5" stroke-width="1.1"/>
  <text class="font bar-note" x="450" y="685" text-anchor="middle">AI-assisted studies connect representations, tools, experiments, evidence, and architectural judgment.</text>
</svg>
