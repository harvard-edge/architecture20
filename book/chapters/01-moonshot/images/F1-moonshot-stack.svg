<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 830" role="img">
  <title>F1 moonshot prompt to AI-assisted architecture study</title>
  <desc>The lighthouse prompt expands into architecture obligations and an AI-assisted architecture study. Six architecture capabilities are supported by explicit study state, methods and tools, evidence, and architect decision support rather than a direct prompt-to-chip path.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1683A6"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .panel-title { font-size: 13.5px; font-weight: 700; fill: #20252B; }
      .panel-subtitle { font-size: 11.5px; fill: #59636D; }
      .body-bold { font-size: 12.5px; font-weight: 700; fill: #222222; }
      .chip { font-size: 12.5px; font-weight: 700; fill: #222222; }
      .small { font-size: 11.2px; fill: #444444; }
      .boundary-body { font-size: 11.5px; fill: #333333; }
      .prompt-line { font-size: 12px; fill: #333333; }
      .prompt-strong { font-weight: 700; }
      .micro { font-size: 11.2px; fill: #59636D; }
      .panel { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .role-box { fill: #FFFFFF; stroke-width: 1.45; }
      .line { stroke: #333333; stroke-width: 1.9; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .blue-line { stroke: #1683A6; stroke-width: 2.0; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .label-bg { fill: #FFFFFF; opacity: 0.94; }
      .glyph { fill: none; stroke: currentColor; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
      .glyph-blue { color: #1683A6; }
      .glyph-green { color: #1E9E48; }
      .glyph-orange { color: #E68A17; }
      .glyph-red { color: #DE3D3C; }
    </style>
  </defs>

  <rect width="900" height="830" fill="#FFFFFF"/>

  <rect class="panel" x="50" y="28" width="800" height="172"/>
  <g class="glyph glyph-blue" transform="translate(74 40)">
    <rect x="0" y="0" width="13" height="17"/>
    <path d="M 3.5 5 L 9.5 5"/>
    <path d="M 3.5 9 L 9.5 9"/>
    <path d="M 3.5 13 L 7.5 13"/>
  </g>
  <text class="font panel-title" x="100" y="52">Lighthouse prompt</text>
  <text class="font panel-subtitle" x="100" y="69">A compact request with large hidden state</text>
  <rect x="82" y="82" width="736" height="104" fill="#FFFFFF" stroke="#9AA8B5" stroke-width="1.1"/>
  <g class="font">
    <text class="prompt-line" x="110" y="102">
      Design a low-power <tspan class="prompt-strong" fill="#59429E">64-bit RISC-V-based</tspan>
      <tspan class="prompt-strong" fill="#59429E">compute subsystem</tspan>
    </text>
    <text class="prompt-line" x="110" y="121">
      for an <tspan class="prompt-strong" fill="#136680">XRBench-class real-time mobile XR workload</tspan>,
    </text>
    <text class="prompt-line" x="110" y="140">
      realize it as a <tspan class="prompt-strong" fill="#59429E">vector-capable CPU, accelerator, or SoC block</tspan>,
    </text>
    <text class="prompt-line" x="110" y="159">
      under a <tspan class="prompt-strong" fill="#C62A2A">3 W TDP target in a 3 nm-class LP mobile process</tspan>,
    </text>
    <text class="prompt-line" x="110" y="178">
      and return a <tspan class="prompt-strong" fill="#157A38">design-space report with evidence and rejected alternatives</tspan>.
    </text>
  </g>

  <line class="line" x1="450" y1="200" x2="450" y2="236" marker-end="url(#arrow)"/>

  <rect class="panel" x="50" y="236" width="800" height="260"/>
  <g class="glyph glyph-green" transform="translate(74 248)">
    <rect x="0" y="0" width="14" height="18"/>
    <path d="M 3.5 5.5 L 5.5 7.5 L 10 3.5"/>
    <path d="M 3.5 11 L 10.5 11"/>
    <path d="M 3.5 14.5 L 8 14.5"/>
  </g>
  <text class="font panel-title" x="100" y="260">Architecture obligations</text>
  <text class="font panel-subtitle" x="100" y="277">What the prompt immediately forces an architect to define</text>

  <g class="font">
    <rect class="role-box" x="82" y="290" width="350" height="42" stroke="#1683A6"/>
    <text class="body-bold" x="100" y="307">XRBench workload</text>
    <text class="small" x="100" y="323">multi-model streams, deadlines</text>

    <rect class="role-box" x="468" y="290" width="350" height="42" stroke="#6A4FC7"/>
    <text class="body-bold" x="486" y="307">ISA and ABI contract</text>
    <text class="small" x="486" y="323">RISC-V baseline, extensions, compatibility</text>

    <rect class="role-box" x="82" y="340" width="350" height="42" stroke="#6A4FC7"/>
    <text class="body-bold" x="100" y="357">CPU / accelerator / SoC block</text>
    <text class="small" x="100" y="373">partitioning, vector support, interfaces</text>

    <rect class="role-box" x="468" y="340" width="350" height="42" stroke="#6A4FC7"/>
    <text class="body-bold" x="486" y="357">Memory and data movement</text>
    <text class="small" x="486" y="373">locality, hierarchy, interconnect energy</text>

    <rect class="role-box" x="82" y="390" width="350" height="42" stroke="#DE3D3C"/>
    <text class="body-bold" x="100" y="407">3 W power envelope</text>
    <text class="small" x="100" y="423">activity, thermal, energy/QoE tradeoff</text>

    <rect class="role-box" x="468" y="390" width="350" height="42" stroke="#E68A17"/>
    <text class="body-bold" x="486" y="407">Compiler/runtime stack</text>
    <text class="small" x="486" y="423">codegen, libraries, deployment</text>

    <rect class="role-box" x="82" y="440" width="350" height="42" stroke="#DE3D3C"/>
    <text class="body-bold" x="100" y="457">3 nm-class physical constraints</text>
    <text class="small" x="100" y="473">process, timing, leakage, signoff</text>

    <rect class="role-box" x="468" y="440" width="350" height="42" stroke="#1E9E48"/>
    <text class="body-bold" x="486" y="457">Reliability and verification</text>
    <text class="small" x="486" y="473">correctness, corner cases, rejection</text>
  </g>

  <line class="line" x1="450" y1="496" x2="450" y2="532" marker-end="url(#arrow)"/>

  <rect class="panel" x="50" y="532" width="800" height="186"/>
  <g class="glyph glyph-orange" transform="translate(72 544)">
    <path d="M 3.6 8.4 A 7.2 7.2 0 0 1 15 3.6"/>
    <path d="M 15 3.6 L 14.4 8.4 L 10.2 6.6"/>
    <path d="M 15.6 10.8 A 7.2 7.2 0 0 1 4.2 15.6"/>
    <path d="M 4.2 15.6 L 4.8 10.8 L 9 12.6"/>
  </g>
  <text class="font panel-title" x="100" y="556">AI-assisted architecture study</text>
  <text class="font panel-subtitle" x="100" y="573">Architecture capabilities guide represented execution and analysis</text>

  <g class="font">
    <rect class="role-box" x="82" y="586" width="736" height="44" stroke="#6A4FC7"/>
    <text class="body-bold" x="100" y="604">Architecture work</text>
    <text class="small" x="100" y="621">formulate, explore, implement, evaluate, explain, defend</text>

    <rect class="role-box" x="82" y="644" width="150" height="32" stroke="#1683A6"/>
    <text class="chip" x="157" y="664" text-anchor="middle">Study state</text>

    <rect class="role-box" x="256" y="644" width="182" height="32" stroke="#E68A17"/>
    <text class="chip" x="347" y="664" text-anchor="middle">Methods + tools</text>

    <rect class="role-box" x="462" y="644" width="132" height="32" stroke="#1E9E48"/>
    <text class="chip" x="528" y="664" text-anchor="middle">Evidence</text>

    <rect class="role-box" x="618" y="644" width="200" height="32" stroke="#D24D96"/>
    <text class="chip" x="718" y="664" text-anchor="middle">Decision support</text>

    <line class="line" x1="232" y1="660" x2="256" y2="660" marker-end="url(#arrow)"/>
    <line class="line" x1="438" y1="660" x2="462" y2="660" marker-end="url(#arrow)"/>
    <line class="line" x1="594" y1="660" x2="618" y2="660" marker-end="url(#arrow)"/>

    <path class="blue-line" d="M 718 676 L 718 696 L 66 696 L 66 660 L 82 660" marker-end="url(#arrow-blue)"/>
    <rect class="label-bg" x="300" y="683" width="300" height="26"/>
    <text class="font micro" x="450" y="700" text-anchor="middle">architect judgment redirects the study</text>
  </g>

  <rect x="50" y="732" width="800" height="70" fill="#F5F8FA" stroke="#9AA8B5" stroke-width="1.1"/>
  <g class="glyph glyph-red" transform="translate(74 746)">
    <path d="M 7.2 0 L 14.4 7.2 L 14.4 16.8 L 0 16.8 L 0 7.2 Z"/>
    <path d="M 4.8 9.6 L 9.6 9.6"/>
  </g>
  <text class="font body-bold" x="100" y="756">Boundary condition</text>
  <text class="font boundary-body" x="100" y="774">AI supports the architecture study through explicit state, tools, evidence,</text>
  <text class="font boundary-body" x="100" y="790">and decision support, not prompt-to-chip automation.</text>
</svg>
