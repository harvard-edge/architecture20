<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 0 960 1080" role="img">
  <title>F1 moonshot prompt to AI-assisted architecture study</title>
  <desc>The lighthouse prompt expands into architecture obligations and an AI-assisted architecture study. Six architecture capabilities are supported by explicit study state, methods and tools, evidence, and architect decision support rather than a direct prompt-to-chip path.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1683A6"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#DE3D3C"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .panel-title { font-size: 27.5px; font-weight: 700; fill: #202020; }
      .panel-subtitle { font-size: 16.5px; fill: #555555; }
      .body { font-size: 20.9px; fill: #242424; }
      .body-bold { font-size: 20.9px; font-weight: 700; fill: #242424; }
      .chip { font-size: 18.7px; font-weight: 700; fill: #242424; }
      .small { font-size: 15.4px; fill: #444444; }
      .boundary-body { font-size: 18.4px; fill: #242424; }
      .prompt-line { font-size: 17.2px; fill: #242424; }
      .prompt-strong { font-weight: 700; }
      .micro { font-size: 13.2px; fill: #666666; }
      .panel { fill: #F6F8FA; stroke: #9AA8B5; stroke-width: 1.6; }
      .prompt-fill { fill: #F6F8FA; }
      .obligation-fill { fill: #F6F8FA; }
      .loop-fill { fill: #F6F8FA; }
      .role-box { fill: #FFFFFF; stroke-width: 1.6; }
      .line { stroke: #333333; stroke-width: 1.8; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .soft-line { stroke: #879098; stroke-width: 1.5; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .blue-line { stroke: #1683A6; stroke-width: 1.8; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .glyph { fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
      .glyph-blue { color: #1683A6; }
      .glyph-green { color: #1E9E48; }
      .glyph-orange { color: #E68A17; }
      .glyph-red { color: #DE3D3C; }
    </style>
  </defs>

  <rect x="-30" width="960" height="1080" fill="#FFFFFF"/>

  <rect class="panel prompt-fill" x="50" y="35" width="800" height="235"/>
  <g class="glyph glyph-blue" transform="translate(78 55)">
    <rect x="0" y="0" width="22" height="28"/>
    <path d="M 6 8 L 16 8"/>
    <path d="M 6 14 L 16 14"/>
    <path d="M 6 20 L 12 20"/>
  </g>
  <text class="font panel-title" x="118" y="76">Lighthouse prompt</text>
  <text class="font panel-subtitle" x="118" y="100">A compact request with large hidden state</text>
  <rect x="82" y="124" width="736" height="134" fill="#FFFFFF" stroke="#9AA8B5" stroke-width="1.4"/>
  <g class="font">
    <text class="prompt-line" x="110" y="150">
      Design a low-power <tspan class="prompt-strong" fill="#59429E">64-bit RISC-V-based</tspan>
      <tspan class="prompt-strong" fill="#59429E">compute subsystem</tspan>
    </text>
    <text class="prompt-line" x="110" y="174">
      for an <tspan class="prompt-strong" fill="#136680">XRBench-class real-time mobile XR workload</tspan>,
    </text>
    <text class="prompt-line" x="110" y="198">
      realize it as a <tspan class="prompt-strong" fill="#59429E">vector-capable CPU, accelerator, or SoC block</tspan>,
    </text>
    <text class="prompt-line" x="110" y="222">
      under a <tspan class="prompt-strong" fill="#C62A2A">3 W TDP target in a 3 nm-class LP mobile process</tspan>,
    </text>
    <text class="prompt-line" x="110" y="244">
      and return a <tspan class="prompt-strong" fill="#157A38">design-space report with evidence and rejected alternatives</tspan>.
    </text>
  </g>

  <line class="line" x1="450" y1="285" x2="450" y2="322" marker-end="url(#arrow)"/>

  <rect class="panel obligation-fill" x="50" y="335" width="800" height="345"/>
  <g class="glyph glyph-green" transform="translate(78 354)">
    <rect x="0" y="0" width="24" height="30"/>
    <path d="M 6 9 L 9 12 L 17 5"/>
    <path d="M 6 18 L 18 18"/>
    <path d="M 6 24 L 14 24"/>
  </g>
  <text class="font panel-title" x="118" y="376">Architecture obligations</text>
  <text class="font panel-subtitle" x="118" y="400">What the prompt immediately forces an architect to define</text>

  <g class="font">
    <rect class="role-box" x="82" y="424" width="350" height="54" stroke="#1683A6"/>
    <text class="body-bold" x="102" y="447">XRBench workload</text>
    <text class="small" x="102" y="468">multi-model streams, deadlines</text>

    <rect class="role-box" x="468" y="424" width="350" height="54" stroke="#6A4FC7"/>
    <text class="body-bold" x="488" y="447">ISA and ABI contract</text>
    <text class="small" x="488" y="468">RISC-V baseline, extensions, compatibility</text>

    <rect class="role-box" x="82" y="486" width="350" height="54" stroke="#6A4FC7"/>
    <text class="body-bold" x="102" y="509">CPU / accelerator / SoC block</text>
    <text class="small" x="102" y="530">partitioning, vector support, interfaces</text>

    <rect class="role-box" x="468" y="486" width="350" height="54" stroke="#6A4FC7"/>
    <text class="body-bold" x="488" y="509">Memory and data movement</text>
    <text class="small" x="488" y="530">locality, hierarchy, interconnect energy</text>

    <rect class="role-box" x="82" y="548" width="350" height="54" stroke="#DE3D3C"/>
    <text class="body-bold" x="102" y="571">3 W power envelope</text>
    <text class="small" x="102" y="592">activity, thermal, energy/QoE tradeoff</text>

    <rect class="role-box" x="468" y="548" width="350" height="54" stroke="#E68A17"/>
    <text class="body-bold" x="488" y="571">Compiler/runtime stack</text>
    <text class="small" x="488" y="592">codegen, libraries, deployment</text>

    <rect class="role-box" x="82" y="610" width="350" height="54" stroke="#DE3D3C"/>
    <text class="body-bold" x="102" y="633">3 nm-class physical constraints</text>
    <text class="small" x="102" y="654">process, timing, leakage, signoff</text>

    <rect class="role-box" x="468" y="610" width="350" height="54" stroke="#1E9E48"/>
    <text class="body-bold" x="488" y="633">Reliability and verification</text>
    <text class="small" x="488" y="654">correctness, corner cases, rejection</text>
  </g>

  <line class="line" x1="450" y1="697" x2="450" y2="734" marker-end="url(#arrow)"/>

  <rect class="panel loop-fill" x="50" y="747" width="800" height="235"/>
  <g class="glyph glyph-orange" transform="translate(76 767)">
    <path d="M 6 14 A 12 12 0 0 1 25 6"/>
    <path d="M 25 6 L 24 14 L 17 11"/>
    <path d="M 26 18 A 12 12 0 0 1 7 26"/>
    <path d="M 7 26 L 8 18 L 15 21"/>
  </g>
  <text class="font panel-title" x="118" y="788">AI-assisted architecture study</text>
  <text class="font panel-subtitle" x="118" y="812">Architecture capabilities guide represented execution and analysis</text>

  <g class="font">
    <rect class="role-box" x="82" y="828" width="736" height="66" stroke="#6A4FC7"/>
    <text class="body-bold" x="102" y="854">Architecture work</text>
    <text class="small" x="102" y="878">formulate, explore, implement, evaluate, explain, defend</text>

    <rect class="role-box" x="82" y="906" width="150" height="42" stroke="#1683A6"/>
    <text class="chip" x="157" y="932" text-anchor="middle">Study state</text>

    <rect class="role-box" x="256" y="906" width="182" height="42" stroke="#E68A17"/>
    <text class="chip" x="347" y="932" text-anchor="middle">Methods + tools</text>

    <rect class="role-box" x="462" y="906" width="132" height="42" stroke="#1E9E48"/>
    <text class="chip" x="528" y="932" text-anchor="middle">Evidence</text>

    <rect class="role-box" x="618" y="906" width="200" height="42" stroke="#D24D96"/>
    <text class="chip" x="718" y="932" text-anchor="middle">Decision support</text>

    <line class="soft-line" x1="232" y1="927" x2="256" y2="927" marker-end="url(#arrow)"/>
    <line class="soft-line" x1="438" y1="927" x2="462" y2="927" marker-end="url(#arrow)"/>
    <line class="soft-line" x1="594" y1="927" x2="618" y2="927" marker-end="url(#arrow)"/>

    <path class="blue-line" d="M 718 948 L 718 969 L 66 969 L 66 927 L 82 927" marker-end="url(#arrow-blue)"/>
    <rect x="304" y="953" width="356" height="24" fill="#EEF2F5"/>
    <text class="font micro" x="482" y="969" text-anchor="middle">architect judgment redirects the study</text>
  </g>

  <rect x="50" y="985" width="800" height="82" fill="#F6F8FA" stroke="#333333" stroke-width="1.3"/>
  <g class="glyph glyph-red" transform="translate(78 1001)">
    <path d="M 12 0 L 24 12 L 24 28 L 0 28 L 0 12 Z"/>
    <path d="M 8 16 L 16 16"/>
  </g>
  <text class="font body-bold" x="118" y="1018">Boundary condition</text>
  <text class="font boundary-body" x="118" y="1040">AI supports the architecture study through explicit state, tools, evidence,</text>
  <text class="font boundary-body" x="118" y="1056">and decision support, not prompt-to-chip automation.</text>
</svg>
