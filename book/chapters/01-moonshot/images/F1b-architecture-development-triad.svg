<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 470" role="img">
  <title>F1b bounded methods in an architecture study</title>
  <desc>A Venn-style diagram showing generation, prediction, and optimization as bounded, interacting methods within a broader architecture study governed by the architect. A small self-loop at the right cycles through generate, predict, optimize, and compare/revise.</desc>
  <defs>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .label { font-size: 13.5px; font-weight: 700; fill: #20252B; }
      .small { font-size: 11.2px; fill: #333333; }
      .center { font-size: 12.5px; font-weight: 700; fill: #20252B; }
      .note { font-size: 12px; font-weight: 700; fill: #1683A6; }
      .muted { font-size: 11.2px; fill: #59636D; }
      .thin { stroke: #59636D; stroke-width: 1.5; fill: none; }
    </style>
  </defs>
  <rect width="760" height="470" fill="#FFFFFF"/>
  <circle cx="283" cy="168" r="130" fill="#1683A6" fill-opacity="0.24" stroke="#1683A6" stroke-width="1.5"/>
  <circle cx="417" cy="168" r="130" fill="#6A4FC7" fill-opacity="0.24" stroke="#6A4FC7" stroke-width="1.5"/>
  <circle cx="350" cy="278" r="130" fill="#E68A17" fill-opacity="0.26" stroke="#E68A17" stroke-width="1.5"/>
  <g class="font">
    <text class="label" x="220" y="122" text-anchor="middle">Generation</text>
    <text class="small" x="220" y="144" text-anchor="middle">artifacts, candidates,</text>
    <text class="small" x="220" y="159" text-anchor="middle">tests, implementations</text>
    <text class="label" x="480" y="122" text-anchor="middle">Prediction</text>
    <text class="small" x="480" y="144" text-anchor="middle">behavior, cost,</text>
    <text class="small" x="480" y="159" text-anchor="middle">risk, uncertainty</text>
    <text class="label" x="350" y="318" text-anchor="middle">Optimization</text>
    <text class="small" x="350" y="340" text-anchor="middle">tradeoffs under constraints</text>
    <text class="center" x="350" y="181" text-anchor="middle">Methods interact</text>
    <text class="center" x="350" y="199" text-anchor="middle">within a bounded</text>
    <text class="center" x="350" y="215" text-anchor="middle">architecture study</text>
  </g>
  <g class="font" transform="translate(600,110)">
    <path class="thin" d="M 0.8 -6.3 A 62 62 0 1 1 -34.2 78.2"/>
    <polygon points="-38.9,68.2 -38.3,80.1 -30.1,76.3" fill="#59636D"/>
    <text class="muted" x="22" y="31" text-anchor="middle">generate</text>
    <text class="muted" x="22" y="50" text-anchor="middle">predict</text>
    <text class="muted" x="22" y="69" text-anchor="middle">optimize</text>
    <text class="muted" x="22" y="88" text-anchor="middle">compare/revise</text>
  </g>
  <rect x="60" y="416" width="640" height="26" fill="#F5F8FA" stroke="#9AA8B5" stroke-width="1.1"/>
  <text class="font note" x="380" y="433" text-anchor="middle">architect defines the study and judges mechanisms + evidence + tradeoffs</text>
</svg>
