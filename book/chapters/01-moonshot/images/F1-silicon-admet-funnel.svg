<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      .box { fill: #f8f9fa; stroke: #333; stroke-width: 2px; rx: 8px; }
      .box-dark { fill: #e9ecef; stroke: #333; stroke-width: 2px; rx: 8px; }
      .text-title { font-family: -apple-system, sans-serif; font-size: 16px; font-weight: bold; fill: #111; }
      .text-body { font-family: -apple-system, sans-serif; font-size: 14px; fill: #333; }
      .arrow { stroke: #666; stroke-width: 2px; fill: none; }
      .arrow-head { fill: #666; }
      .label { font-family: -apple-system, sans-serif; font-size: 12px; fill: #666; font-style: italic; }
      .highlight { fill: #e3f2fd; stroke: #1976d2; stroke-width: 2px; rx: 8px; }
      .funnel-shape { fill: #f1f8ff; stroke: #0366d6; stroke-width: 2px; opacity: 0.8; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow-head"/>
    </marker>
  </defs>

  <text x="400" y="30" class="text-title" text-anchor="middle">The "Silicon ADMET" Funnel</text>
  <text x="400" y="50" class="text-body" text-anchor="middle">Parallels between Drug Discovery and Architecture Verification</text>

  <g transform="translate(50, 80)">
    <text x="150" y="20" class="text-title" text-anchor="middle">Drug Discovery (ADMET)</text>
    <polygon points="0,40 300,40 250,250 50,250" class="funnel-shape" />
    <rect x="50" y="60" width="200" height="40" class="box" />
    <text x="150" y="85" class="text-body" text-anchor="middle">In-silico Screening</text>
    <text x="150" y="100" class="label" text-anchor="middle">(10,000+ candidates)</text>
    <rect x="75" y="130" width="150" height="40" class="box" />
    <text x="150" y="155" class="text-body" text-anchor="middle">In-vitro Testing</text>
    <text x="150" y="170" class="label" text-anchor="middle">(Toxicity, Binding)</text>
    <rect x="100" y="200" width="100" height="40" class="box-dark" />
    <text x="150" y="225" class="text-body" text-anchor="middle">Clinical Trials</text>
  </g>

  <g transform="translate(450, 80)">
    <text x="150" y="20" class="text-title" text-anchor="middle">Silicon Design</text>
    <polygon points="0,40 300,40 250,250 50,250" class="funnel-shape" />
    <rect x="50" y="60" width="200" height="40" class="box" />
    <text x="150" y="85" class="text-body" text-anchor="middle">Fast ISA Simulators</text>
    <text x="150" y="100" class="label" text-anchor="middle">(High-level performance proxy)</text>
    <rect x="75" y="130" width="150" height="40" class="box" />
    <text x="150" y="155" class="text-body" text-anchor="middle">RTL &amp; Logic Synth</text>
    <text x="150" y="170" class="label" text-anchor="middle">(Power, Thermal, Area limits)</text>
    <rect x="100" y="200" width="100" height="40" class="box-dark" />
    <text x="150" y="225" class="text-body" text-anchor="middle">Physical Signoff</text>
  </g>

  <line x1="360" y1="150" x2="440" y2="150" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="400" y="140" class="text-title" text-anchor="middle">Isomorphic</text>
  <text x="400" y="170" class="label" text-anchor="middle">Filters</text>

  <rect x="250" y="350" width="300" height="40" class="highlight" />
  <text x="400" y="375" class="text-body" text-anchor="middle">Goal: Weed out decoys before expensive stages</text>
</svg>
