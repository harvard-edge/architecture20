<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" role="img">
  <title>Human-orchestrated and AI-assisted architecture studies</title>
  <desc>A two-panel comparison showing that both human-orchestrated and AI-assisted architecture studies iterate. The human-orchestrated study leaves much of its state in expert practice, while the AI-assisted study makes inputs, actions, evidence, rejection, and decision authority explicit.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1683A6"/>
    </marker>
    <marker id="arrow-gov" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#DE3D3C"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .title { font-size: 13.5px; font-weight: 700; fill: #20252B; }
      .subtitle { font-size: 11.5px; fill: #59636D; }
      .node-label { font-size: 12.5px; font-weight: 700; fill: #20252B; }
      .node-body { font-size: 11.4px; fill: #3E474B; }
      .center-label { font-size: 12.5px; font-weight: 700; fill: #20252B; }
      .center-body { font-size: 11.4px; fill: #59636D; }
      .implicit-label { font-size: 12.5px; font-weight: 700; fill: #8A95A0; }
      .implicit-body { font-size: 11.4px; fill: #8A95A0; }
      .takeaway { font-size: 12px; font-weight: 700; fill: #1683A6; }
      .bar { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .label-bg { fill: #FFFFFF; opacity: 0.94; }
      .divider { stroke: #1683A6; stroke-width: 0.9; }
      .edge { stroke: #333333; stroke-width: 1.9; fill: none; stroke-linecap: square; stroke-linejoin: miter; marker-end: url(#arrow); }
      .edge-blue { stroke: #1683A6; stroke-width: 2.0; fill: none; stroke-linecap: square; stroke-linejoin: miter; marker-end: url(#arrow-blue); }
      .edge-gov { stroke: #DE3D3C; stroke-width: 1.9; fill: none; stroke-linecap: square; stroke-linejoin: miter; marker-end: url(#arrow-gov); }
      .node { fill: #FFFFFF; stroke: #9AA8B5; stroke-width: 1.1; }
      .state { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.4; }
      .evidence { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.4; }
      .human { fill: #FDECEC; stroke: #DE3D3C; stroke-width: 1.4; }
      .reject { fill: #FDECEC; stroke: #DE3D3C; stroke-width: 1.4; }
      .implicit { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; stroke-dasharray: 5 4; }
      .glyph { fill: none; stroke: currentColor; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
      .glyph-human { color: #DE3D3C; }
      .glyph-state { color: #1683A6; }
      .glyph-evidence { color: #1683A6; }
      .glyph-reject { color: #DE3D3C; }
    </style>
  </defs>

  <rect width="960" height="440" fill="#FFFFFF"/>

  <g class="font">
    <text class="title" x="240" y="44" text-anchor="middle">Human-orchestrated architecture study</text>
    <text class="subtitle" x="240" y="66" text-anchor="middle">State and rationale remain largely in expert practice.</text>

    <text class="title" x="720" y="44" text-anchor="middle">AI-assisted architecture study</text>
    <text class="subtitle" x="720" y="66" text-anchor="middle">Inputs, actions, evidence, and authority are explicit.</text>

    <line class="divider" x1="480" y1="86" x2="480" y2="385"/>

    <!-- Left: existing loop, with implicit state carried by human practice. -->
    <rect class="node" x="176" y="98" width="128" height="48"/>
    <text class="node-label" x="240" y="118" text-anchor="middle">Intent</text>
    <text class="node-body" x="240" y="135" text-anchor="middle">workload + goal</text>

    <rect class="node" x="325" y="184" width="128" height="48"/>
    <text class="node-label" x="389" y="204" text-anchor="middle">Model / scripts</text>
    <text class="node-body" x="389" y="221" text-anchor="middle">assumptions</text>

    <rect class="node" x="285" y="312" width="128" height="48"/>
    <text class="node-label" x="349" y="332" text-anchor="middle">Candidate</text>
    <text class="node-body" x="349" y="349" text-anchor="middle">design choice</text>

    <rect class="node" x="67" y="312" width="128" height="48"/>
    <text class="node-label" x="131" y="332" text-anchor="middle">Tool feedback</text>
    <text class="node-body" x="131" y="349" text-anchor="middle">simulate, measure</text>

    <rect class="human" x="27" y="184" width="128" height="48"/>
    <g class="glyph glyph-human" transform="translate(34 197)">
      <circle cx="8" cy="5" r="3.8"/>
      <path d="M 2 20 C 4 14, 6 12, 8 12 C 10 12, 12 14, 14 20"/>
    </g>
    <text class="node-label" x="103" y="204" text-anchor="middle">Expert review</text>
    <text class="node-body" x="103" y="221" text-anchor="middle">carries state</text>

    <rect class="implicit" x="169" y="194" width="142" height="74"/>
    <text class="center-label" x="240" y="217" text-anchor="middle">implicit state</text>
    <text class="center-body" x="240" y="235" text-anchor="middle">assumptions + logic</text>
    <text class="center-body" x="240" y="252" text-anchor="middle">failed candidates</text>

    <polyline class="edge" points="304,122 389,122 389,184"/>
    <polyline class="edge" points="389,232 389,312"/>
    <polyline class="edge" points="285,336 195,336"/>
    <polyline class="edge" points="131,312 131,232"/>
    <polyline class="edge" points="91,184 91,122 176,122"/>

    <!-- Transition. -->
    <path class="edge-blue" d="M 424 78 L 536 78"/>
    <path class="label-bg" d="M 390 84 H 570 V 102 H 390 Z"/>
    <text class="subtitle" x="480" y="96" text-anchor="middle">make study state explicit</text>

    <!-- Right: represented state, evidence, rejection, and decision authority. -->
    <rect class="state" x="646" y="102" width="148" height="54"/>
    <g class="glyph glyph-state" transform="translate(652 115)">
      <rect x="0" y="0" width="14" height="18"/>
      <path d="M 4 6 L 11 6"/>
      <path d="M 4 12 L 9 12"/>
    </g>
    <text class="node-label" x="731" y="123" text-anchor="middle">Representation</text>
    <text class="node-body" x="731" y="140" text-anchor="middle">workload, design</text>

    <rect class="state" x="818" y="184" width="127" height="54"/>
    <g class="glyph glyph-state" transform="translate(826 197)">
      <rect x="0" y="0" width="16" height="16"/>
      <path d="M 4 4 L 12 4"/>
      <path d="M 4 8 L 12 8"/>
      <path d="M 4 12 L 9 12"/>
    </g>
    <text class="node-label" x="855" y="205" text-anchor="start">Environment</text>
    <text class="node-body" x="881" y="222" text-anchor="middle">actions + output</text>

    <rect class="state" x="808" y="315" width="132" height="54"/>
    <text class="node-label" x="874" y="336" text-anchor="middle">Methods</text>
    <text class="node-body" x="874" y="353" text-anchor="middle">generate, predict</text>

    <rect class="evidence" x="525" y="315" width="160" height="54"/>
    <g class="glyph glyph-evidence" transform="translate(534 328)">
      <rect x="0" y="0" width="14" height="18"/>
      <path d="M 4 6 L 11 6"/>
      <path d="M 4 11 L 11 11"/>
      <path d="M 4 15 L 8 15"/>
    </g>
    <text class="node-label" x="605" y="336" text-anchor="middle">Evidence</text>
    <text class="node-body" x="605" y="353" text-anchor="middle">results, provenance</text>

    <rect class="reject" x="500" y="184" width="135" height="54"/>
    <g class="glyph glyph-reject" transform="translate(509 198)">
      <path d="M 8 0 L 16 8 L 16 18 L 0 18 L 0 8 Z"/>
      <path d="M 5 10 L 11 10"/>
    </g>
    <text class="node-label" x="535" y="205" text-anchor="start">Reject/revise</text>
    <text class="node-body" x="567" y="222" text-anchor="middle">weak evidence</text>

    <rect class="human" x="655" y="195" width="150" height="72"/>
    <text class="center-label" x="735" y="218" text-anchor="middle">Architect review</text>
    <text class="center-body" x="735" y="236" text-anchor="middle">accept or revise</text>
    <text class="center-body" x="735" y="253" text-anchor="middle">escalate or commit</text>

    <polyline class="edge-blue" points="794,129 885,129 885,184"/>
    <polyline class="edge-blue" points="885,238 885,315"/>
    <polyline class="edge-blue" points="808,342 685,342"/>
    <polyline class="edge-blue" points="568,315 568,238"/>
    <polyline class="edge-blue" points="568,184 568,129 646,129"/>
    <polyline class="edge-gov" points="670,315 670,267"/>
    <polyline class="edge-gov" points="720,195 720,156"/>

    <text class="takeaway" x="480" y="414" text-anchor="middle">AI assistance makes inputs, actions, evidence, and decision authority explicit.</text>
  </g>
</svg>
