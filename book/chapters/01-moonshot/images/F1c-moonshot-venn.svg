<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="80 20 560 325" role="img">
  <title>Architecture moonshot conditions</title>
  <desc>A Venn diagram showing that an architecture moonshot sits at the intersection of a grand architecture challenge, a radical design-loop target, and an enabling AI, data, and tool breakthrough.</desc>
  <defs>
    <style>
      .font { font-family: sans-serif; }
      .label { font-size: 14.4px; font-weight: 700; fill: #202020; }
      .small { font-size: 9.2px; fill: #303030; }
      .center { font-size: 12px; font-weight: 700; fill: #202020; }
      .note { font-size: 10.4px; font-weight: 700; fill: #1683A6; }
    </style>
  </defs>
  <rect x="80" y="20" width="560" height="325" fill="#FFFFFF"/>
  <circle cx="300" cy="132" r="88" fill="#1683A6" fill-opacity="0.55" stroke="#1683A6" stroke-width="1.5"/>
  <circle cx="420" cy="132" r="88" fill="#1683A6" fill-opacity="0.55" stroke="#1683A6" stroke-width="1.5"/>
  <circle cx="360" cy="212" r="88" fill="#DE3D3C" fill-opacity="0.60" stroke="#DE3D3C" stroke-width="1.5"/>
  <g class="font">
    <text class="label" x="270" y="91" text-anchor="middle" style="white-space: pre;">Grand</text>
    <text class="label" x="270" y="108" text-anchor="middle" style="white-space: pre;">challenge</text>
    <text class="small" x="270" y="130" text-anchor="middle" style="white-space: pre;">ordinary practice</text>
    <text class="small" x="270" y="145" text-anchor="middle" style="white-space: pre;">cannot scale</text>
    <text class="label" x="450" y="91" text-anchor="middle" style="white-space: pre;">Radical</text>
    <text class="label" x="450" y="108" text-anchor="middle" style="white-space: pre;">target</text>
    <text class="small" x="450" y="130" text-anchor="middle" style="white-space: pre;">change the</text>
    <text class="small" x="450" y="145" text-anchor="middle" style="white-space: pre;">design loop</text>
    <text class="label" x="360" y="249" text-anchor="middle" style="white-space: pre;">Breakthrough</text>
    <text class="small" x="360" y="271" text-anchor="middle" style="white-space: pre;">AI + data + tools make</text>
    <text class="small" x="360" y="286" text-anchor="middle" style="white-space: pre;">the target plausible</text>
    <text class="center" x="360" y="168" text-anchor="middle" style="white-space: pre;">Architecture</text>
    <text class="center" x="360" y="185" text-anchor="middle" style="white-space: pre;">moonshot</text>
    <text class="small" x="360" y="205" text-anchor="middle" style="white-space: pre;">represent, explore,</text>
    <text class="small" x="360" y="220" text-anchor="middle" style="white-space: pre;">test, reject, justify</text>
  </g>
  <rect x="128" y="306" width="464" height="22" fill="#F0ECFA" stroke="#1683A6" stroke-width="1"/>
  <text class="font note" x="360" y="321" text-anchor="middle" style="white-space: pre;">grand challenge + radical target + enabling breakthrough</text>
</svg>
