<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 470" role="img">
  <title>Architecture moonshot conditions</title>
  <desc>A Venn diagram showing that an architecture moonshot sits at the intersection of a grand architecture challenge, a target for rigorous AI-assisted architecture practice, and enabling AI, data, and tool breakthroughs. A bottom bar lists the six practice verbs: formulate, explore, implement, evaluate, explain, and defend.</desc>
  <defs>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .label { font-size: 13.5px; font-weight: 700; fill: #20252B; }
      .small { font-size: 11.2px; fill: #333333; }
      .center { font-size: 12.5px; font-weight: 700; fill: #20252B; }
      .note { font-size: 12px; font-weight: 700; fill: #1683A6; }
    </style>
  </defs>
  <rect width="760" height="470" fill="#FFFFFF"/>
  <circle cx="316" cy="160" r="118" fill="#1683A6" fill-opacity="0.24" stroke="#1683A6" stroke-width="1.5"/>
  <circle cx="444" cy="160" r="118" fill="#6A4FC7" fill-opacity="0.24" stroke="#6A4FC7" stroke-width="1.5"/>
  <circle cx="380" cy="276" r="118" fill="#E68A17" fill-opacity="0.26" stroke="#E68A17" stroke-width="1.5"/>
  <g class="font">
    <text class="label" x="262" y="110" text-anchor="middle">Grand</text>
    <text class="label" x="262" y="127" text-anchor="middle">challenge</text>
    <text class="small" x="262" y="149" text-anchor="middle">ad hoc coordination</text>
    <text class="small" x="262" y="164" text-anchor="middle">cannot address alone</text>
    <text class="label" x="498" y="110" text-anchor="middle">Radical</text>
    <text class="label" x="498" y="127" text-anchor="middle">target</text>
    <text class="small" x="498" y="149" text-anchor="middle">rigorous AI-assisted</text>
    <text class="small" x="498" y="164" text-anchor="middle">architecture practice</text>
    <text class="label" x="380" y="310" text-anchor="middle">Breakthrough</text>
    <text class="small" x="380" y="332" text-anchor="middle">AI + data + tools make</text>
    <text class="small" x="380" y="347" text-anchor="middle">the target plausible</text>
    <text class="center" x="380" y="186" text-anchor="middle">Architecture</text>
    <text class="center" x="380" y="203" text-anchor="middle">moonshot</text>
  </g>
  <rect x="80" y="406" width="600" height="40" fill="#F5F8FA" stroke="#9AA8B5" stroke-width="1.1"/>
  <text class="font note" x="380" y="422" text-anchor="middle">grand challenge + rigorous practice target + enabling breakthrough</text>
  <text class="font note" x="380" y="438" text-anchor="middle">the moonshot practice: formulate, explore, implement, evaluate, explain, defend</text>
</svg>
