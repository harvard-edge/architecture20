<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 360" role="img" aria-labelledby="review-title review-desc">
  <title id="review-title">The review bottleneck</title>
  <desc id="review-desc">A queueing diagram of AI-assisted design review. An amber AI generator proposes candidates at a high arrival rate lambda through three closely spaced arrows into a review queue that holds pending candidates. A single arrow leaves the queue at the constrained settlement rate mu into a green human-review box, then to a magenta settled box. Because proposals arrive faster than trusted review settles them, the queue grows and human verification, not proposal supply, sets the pace.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .node-title { font-size: 13px; font-weight: 700; fill: #20252B; }
      .node-sub { font-size: 11.4px; fill: #59636D; }
      .eyebrow { font-size: 12px; font-weight: 700; fill: #59636D; letter-spacing: 0.5px; }
      .chip-text { font-size: 11px; fill: #8A95A0; }
      .rate-amber { font-size: 12.5px; font-weight: 700; fill: #8A5310; }
      .rate-green { font-size: 12.5px; font-weight: 700; fill: #157A38; }
      .sub-tag { font-size: 9px; }
      .amber { fill: #FBF0DE; stroke: #E68A17; stroke-width: 1.5; }
      .green { fill: #E7F5EC; stroke: #1E9E48; stroke-width: 1.5; }
      .magenta { fill: #FBEDF4; stroke: #D24D96; stroke-width: 1.5; }
      .panel { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .chip { fill: #FFFFFF; stroke: #9AA8B5; stroke-width: 1.1; }
      .bar { fill: #F5F8FA; stroke: #9AA8B5; stroke-width: 1.1; }
      .note { font-size: 12px; font-weight: 700; fill: #1683A6; }
      .edge { fill: none; stroke: #333333; stroke-width: 2; stroke-linecap: square; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="940" height="360" fill="#FFFFFF"/>
  <g class="font">
    <!-- AI generator -->
    <rect class="amber" x="36" y="104" width="172" height="92"/>
    <text class="node-title" x="122" y="140" text-anchor="middle">AI Generator</text>
    <text class="node-sub" x="122" y="160" text-anchor="middle">proposes candidates</text>
    <text class="node-sub" x="122" y="178" text-anchor="middle">at a high arrival rate</text>

    <!-- fast input rate label -->
    <text class="rate-amber" x="247" y="100" text-anchor="middle">&#955;<tspan class="sub-tag" dy="3">propose</tspan></text>

    <!-- fast arrows: generator -> queue -->
    <path class="edge" d="M 208 132 H 286"/>
    <path class="edge" d="M 208 150 H 286"/>
    <path class="edge" d="M 208 168 H 286"/>

    <!-- review queue -->
    <rect class="panel" x="286" y="92" width="250" height="118"/>
    <text class="eyebrow" x="300" y="112">REVIEW QUEUE</text>
    <rect class="chip" x="302" y="122" width="218" height="22"/>
    <text class="chip-text" x="411" y="137" text-anchor="middle">pending candidate</text>
    <rect class="chip" x="302" y="150" width="218" height="22"/>
    <text class="chip-text" x="411" y="165" text-anchor="middle">pending candidate</text>
    <rect class="chip" x="302" y="178" width="218" height="22"/>
    <text class="chip-text" x="411" y="193" text-anchor="middle">pending candidate</text>

    <!-- slow settlement rate label -->
    <text class="rate-green" x="574" y="134" text-anchor="middle">&#956;<tspan class="sub-tag" dy="3">review</tspan></text>

    <!-- slow arrow: queue -> review -->
    <path class="edge" d="M 536 150 H 612"/>

    <!-- human review -->
    <rect class="green" x="612" y="104" width="172" height="92"/>
    <text class="node-title" x="698" y="140" text-anchor="middle">Human Review</text>
    <text class="node-sub" x="698" y="160" text-anchor="middle">trusted settlement</text>
    <text class="node-sub" x="698" y="178" text-anchor="middle">bounded throughput</text>

    <!-- arrow: review -> settled -->
    <path class="edge" d="M 784 150 H 812"/>

    <!-- settled output -->
    <rect class="magenta" x="812" y="110" width="96" height="80"/>
    <text class="node-title" x="860" y="144" text-anchor="middle">Settled</text>
    <text class="node-sub" x="860" y="164" text-anchor="middle">accepted or</text>
    <text class="node-sub" x="860" y="180" text-anchor="middle">rejected</text>

    <!-- takeaway note bar -->
    <rect class="bar" x="36" y="300" width="872" height="40"/>
    <text class="note" x="472" y="325" text-anchor="middle">Proposals arrive faster than trusted review settles them, so more generation grows the queue, not progress.</text>
  </g>
</svg>
