<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="flywheel-title flywheel-desc">
  <title id="flywheel-title">The hardware flywheel effect</title>
  <desc id="flywheel-desc">A six-node compounding loop that turns clockwise. Post-silicon fleet telemetry from one generation calibrates the AI surrogate models used to design the next generation. The stages are: capture fleet telemetry, extract workloads and bottlenecks, calibrate AI surrogate models, run AI-assisted search for the next generation, tapeout that silicon, and deploy it, whose telemetry is captured in turn. Green nodes are telemetry and evidence, violet nodes are AI surrogate and search work, teal nodes are silicon deliverables.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .eyebrow { font-size: 13px; font-weight: 700; fill: #136680; letter-spacing: 0.6px; }
      .eyebrow-sub { font-size: 11.5px; fill: #59636D; }
      .node-title { font-size: 12.5px; font-weight: 700; fill: #20252B; }
      .node-sub { font-size: 11.4px; fill: #59636D; }
      .teal { fill: #E4F1F6; stroke: #1683A6; stroke-width: 1.5; }
      .violet { fill: #F0ECFA; stroke: #6A4FC7; stroke-width: 1.5; }
      .green { fill: #E7F5EC; stroke: #1E9E48; stroke-width: 1.5; }
      .edge { fill: none; stroke: #333333; stroke-width: 2; stroke-linecap: square; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="800" height="500" fill="#FFFFFF"/>
  <g class="font">
    <!-- flywheel arcs (clockwise) -->
    <path class="edge" d="M 354 100 Q 400 60 446 100"/>
    <path class="edge" d="M 545.6 126 Q 613.6 158.5 604.4 224"/>
    <path class="edge" d="M 604.4 276 Q 613.6 341.5 545.6 374"/>
    <path class="edge" d="M 446 400 Q 400 440 354 400"/>
    <path class="edge" d="M 254.4 374 Q 186.4 341.5 195.6 276"/>
    <path class="edge" d="M 195.6 224 Q 186.4 158.5 254.4 126"/>

    <!-- center eyebrow -->
    <text class="eyebrow" x="400" y="244" text-anchor="middle">COMPOUNDING LOOP</text>
    <text class="eyebrow-sub" x="400" y="264" text-anchor="middle">Gen N &#8594; Gen N+1</text>

    <!-- 1. Extract (top-left, telemetry) -->
    <rect class="green" x="186" y="74" width="168" height="52"/>
    <text class="node-title" x="270" y="97" text-anchor="middle">Extract Workloads</text>
    <text class="node-title" x="270" y="115" text-anchor="middle">&amp; Bottlenecks</text>

    <!-- 2. Calibrate (top-right, surrogate) -->
    <rect class="violet" x="446" y="74" width="168" height="52"/>
    <text class="node-title" x="530" y="97" text-anchor="middle">Calibrate AI</text>
    <text class="node-title" x="530" y="115" text-anchor="middle">Surrogate Models</text>

    <!-- 3. AI-Assisted Search (right, generation) -->
    <rect class="violet" x="536" y="224" width="168" height="52"/>
    <text class="node-title" x="620" y="246" text-anchor="middle">AI-Assisted Search</text>
    <text class="node-sub" x="620" y="265" text-anchor="middle">Gen N+1</text>

    <!-- 4. Tapeout (bottom-right, silicon) -->
    <rect class="teal" x="446" y="374" width="168" height="52"/>
    <text class="node-title" x="530" y="396" text-anchor="middle">Tapeout Silicon</text>
    <text class="node-sub" x="530" y="415" text-anchor="middle">Gen N+1</text>

    <!-- 5. Deploy (bottom-left, silicon) -->
    <rect class="teal" x="186" y="374" width="168" height="52"/>
    <text class="node-title" x="270" y="396" text-anchor="middle">Deploy Silicon</text>
    <text class="node-sub" x="270" y="415" text-anchor="middle">Gen N</text>

    <!-- 6. Capture (left, telemetry) -->
    <rect class="green" x="96" y="224" width="168" height="52"/>
    <text class="node-title" x="180" y="247" text-anchor="middle">Capture Fleet</text>
    <text class="node-title" x="180" y="265" text-anchor="middle">Telemetry</text>
  </g>
</svg>
