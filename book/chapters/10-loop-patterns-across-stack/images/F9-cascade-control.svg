<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      .title { font-family: -apple-system, sans-serif; font-size: 16px; font-weight: bold; fill: #111; text-anchor: middle;}
      .text-body { font-family: -apple-system, sans-serif; font-size: 14px; fill: #333; text-anchor: middle;}
      .box-outer { fill: none; stroke: #3f51b5; stroke-width: 2px; stroke-dasharray: 4,4; rx: 8px; }
      .box-inner { fill: none; stroke: #ff9800; stroke-width: 2px; rx: 8px; }
      .node { fill: #f5f5f5; stroke: #555; stroke-width: 2px; rx: 4px; }
      .edge { stroke: #555; stroke-width: 2px; fill: none; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <text x="400" y="30" class="title">Cascade Control and the Smith Predictor</text>

  <!-- Outer Loop -->
  <rect x="50" y="60" width="700" height="300" class="box-outer"/>
  <text x="400" y="80" class="text-body" fill="#3f51b5" font-weight="bold">Slow Outer Loop (LLM / Architect)</text>
  <text x="400" y="100" class="text-body" fill="#3f51b5">Semantic Planning &amp; Morphological Decisions</text>

  <!-- Inner Loop -->
  <rect x="250" y="140" width="450" height="150" class="box-inner"/>
  <text x="475" y="160" class="text-body" fill="#ff9800" font-weight="bold">Fast Inner Loop (SLM / Compiler / Tuning)</text>

  <!-- Nodes -->
  <rect x="80" y="200" width="120" height="40" class="node"/>
  <text x="140" y="225" class="text-body">Architect / LLM</text>

  <rect x="280" y="200" width="120" height="40" class="node"/>
  <text x="340" y="225" class="text-body">SLM Optimizer</text>

  <rect x="520" y="200" width="120" height="40" class="node"/>
  <text x="580" y="225" class="text-body">Physical System</text>

  <rect x="300" y="300" width="200" height="40" class="node"/>
  <text x="400" y="325" class="text-body" font-weight="bold">Smith Predictor / Gate</text>

  <!-- Edges -->
  <!-- Architect to SLM -->
  <path d="M 200 220 L 280 220" class="edge" marker-end="url(#arrow)"/>

  <!-- SLM to System -->
  <path d="M 400 220 L 520 220" class="edge" marker-end="url(#arrow)"/>

  <!-- Inner Feedback -->
  <path d="M 580 240 L 580 270 L 340 270 L 340 240" class="edge" marker-end="url(#arrow)"/>

  <!-- Outer Feedback -->
  <path d="M 640 220 L 700 220 L 700 320 L 500 320" class="edge" marker-end="url(#arrow)"/>
  <path d="M 300 320 L 140 320 L 140 240" class="edge" marker-end="url(#arrow)"/>

  <text x="600" y="310" class="text-body">Delayed Telemetry</text>

</svg>
