# Architecture 2.0 design-loop card, schema version 2.0.
# This starter claims only the context profile. Replace every empty value, then run:
#   ./arch2 validate card design-loop-card/template.yaml
# Mark another profile complete only after adding and validating its required bindings.
schema_version: "2.0"
design_loop_card:
  card_id: ""
  profiles:
    context: complete
    inspectability: not_claimed
    replay: not_claimed
    independent_review: not_claimed
    disclosure: not_claimed
    decision_rights: not_claimed
  profile_gaps: {}
  intent:
    objective: ""
    constraints: []
    non_goals: []
  task:
    kind: ""
    description: ""
  design_space:
    legal: []
    invalid: []
    deferred: []
  claims:
    - claim_id: ""
      claim_type: architecture_outcome
      statement: ""
      baseline_or_comparator: ""
      outcome: ""
      scope: ""
      non_claims: []
      status: proposed
      evidence_refs: []
  evidence:
    records: []
  failed_or_rejected: []
  gates: []
  decision_rights: []
  accountable_decision:
    status: pending
    holder_id: ""
    action: ""
    rationale: ""
    claim_refs: []
    authorized_scope: ""
    reopen_conditions: []
