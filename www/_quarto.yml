project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "!discord.qmd"
    - "!huggingface.qmd"
  resources:
    - ../book/images/favicon.svg
    - ../book/images/favicon-16.png
    - ../book/images/favicon-32.png
    - ../book/images/favicon-48.png
    - ../book/images/favicon.ico
    - ../book/images/apple-touch-icon.png
    - ../book/images/icon-192.png
    - ../book/images/icon-512.png
    - ../book/images/arch2-card.png
    - ../book/images/site.webmanifest
    - submit-form.js
    - ../schemas/design-loop-card.v1.schema.json
    - ../schemas/design-loop-card.v1.1.schema.json
    - ../schemas/design-loop-card.md
    - ../design-loop-card/template.yaml
    - ../design-loop-card/template.md
    - ../examples/design-loop-cards/level-0-context.yaml
    - ../examples/design-loop-cards/level-1-auditable.yaml
    - ../examples/design-loop-cards/level-2-replayable.yaml
    - ../examples/design-loop-cards/level-3-independent.yaml

metadata-files:
  - ../_global/navbar.yml

website:
  title: "Architecture 2.0"
  site-url: "https://arch2.mlsysbook.ai"
  description: "The engineering discipline of AI-assisted computer architecture"

format:
  html:
    theme:
      - cosmo
      - ../_global/theme.scss
    include-in-header:
      text: |
        <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
        <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16.png">
        <link rel="icon" href="/images/favicon.ico" sizes="any">
        <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
        <link rel="manifest" href="/images/site.webmanifest">
        <meta name="theme-color" content="#12384a">
    include-before-body:
      - ../_global/site-main-before.html
    include-after-body:
      - ../_global/site-main-after.html
      - ../_global/site-accessibility.html
      - ../_global/site-footer.html
      - ../_global/navbar-behavior.html
