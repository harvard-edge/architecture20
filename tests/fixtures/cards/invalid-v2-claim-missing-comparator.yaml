      statement: The candidate may improve the declared outcome.
      outcome: Not tested.
      scope: The declared comparison only.
      non_claims:
        - The candidate is implementation-ready.
      status: proposed
      evidence_refs: []
  evidence:
    records: []
  failed_or_rejected: []
  gates: []
  decision_rights: []
