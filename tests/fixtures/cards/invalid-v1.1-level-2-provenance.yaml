schema_version: "1.1"
design_loop_card:
  card_id: invalid-level-2-provenance
  conformance_level: 2
  intent:
    objective: Demonstrate replay provenance failures.
    constraints:
    - Hold the workload constant.
    non_goals:
    - Authorize implementation.
  task: dse
  design_space:
    legal:
    - Compare two fixed candidates.
    invalid:
    - Change the workload.
    deferred:
    - Physical design.
  representation:
    state_schema_id: example.state.v1
    ir_level: Architecture parameters.
    reads:
    - Candidate parameters.
    writes:
    - Proxy summaries.
    uncertainties:
    - Physical effects are omitted.
  environment:
    environment_id: example.environment.v1
    actions:
    - Evaluate one fixed candidate.
    invalid_actions:
    - Modify the workload.
    blast_radius_limit: Analysis only.
    observations:
    - Estimated cycles.
    fidelity: proxy
  method_role:
    roles:
    - predict
    actor_map:
    - actor_id: analyst
      role: Run and interpret the proxy.
      reads:
      - Candidate parameters.
      writes:
      - Evidence summary.
      authority: May recommend another experiment.
  feedback_budget:
    evaluations: 1
    latency: One second.
    cost: Negligible.
    fidelity: Proxy.
  evidence:
    baseline_id: baseline
    records:
    - evidence_id: evidence-1
      kind: proxy summary
      workload_id: workload-1
      seed: deterministic
      provenance:
        tool_version: example 1.0
        parameter_hash: sha256:not-a-digest
  negative_traces:
  - candidate_id: rejected-1
    reason: Candidate regressed against the baseline.
    stage: proxy evaluation
    gate: baseline comparison
