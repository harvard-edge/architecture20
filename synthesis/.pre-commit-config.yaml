# Arch2Synthesis pre-commit checks.
#
# Install:       pip install pre-commit && pre-commit install
# Run all:       pre-commit run --all-files
# Run book gate: ./arch2 check precommit

repos:
  - repo: local
    hooks:
      - id: arch2-precommit
        name: "Arch2: fast manuscript gate"
        entry: ./arch2 check precommit
        language: system
        always_run: true
        pass_filenames: false
        require_serial: true
