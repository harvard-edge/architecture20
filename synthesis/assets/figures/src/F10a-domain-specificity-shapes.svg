<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 566" role="img">
  <title>Domain specificity has many shapes</title>
  <desc>A clean matrix showing that domain-specific architecture can specialize for kernels, precision, memory behavior, interfaces, deployment context, drift, and verification burden.</desc>
  <defs>
    <style>
      .font { font-family: sans-serif; }
      .center { fill: #F4F1FA; stroke: #333333; stroke-width: 1.5; }
      .blue { fill: #F4F1FA; stroke: #1F5F7A; }
      .green { fill: #F4F1FA; stroke: #1F5F7A; }
      .orange { fill: #F4F1FA; stroke: #C44E52; }
      .purple { fill: #F4F1FA; stroke: #1F5F7A; }
      .red { fill: #F4F1FA; stroke: #C44E52; }
      .gray { fill: #F4F1FA; stroke: #1F5F7A; }
      .card { stroke-width: 1.4; }
      .label { font-size: 20px; font-weight: 700; fill: #222222; }
      .body { font-size: 15.5px; fill: #333333; }
      .small { font-size: 14px; fill: #555555; }
      .note { font-size: 15px; font-weight: 700; fill: #1F5F7A; }
      .line { stroke: #1F5F7A; stroke-width: 1.2; fill: none; stroke-linecap: square; }
    </style>
  </defs>

  <rect width="960" height="566" fill="#FFFFFF"/>
  <g class="font" transform="translate(0,-54)">


    <rect class="center" x="338" y="238" width="284" height="110"/>
    <text class="label" x="480" y="270" text-anchor="middle">domain-specific</text>
    <text class="label" x="480" y="294" text-anchor="middle">architecture claim</text>
    <text class="body" x="480" y="322" text-anchor="middle">what shape is stable enough</text>
    <text class="body" x="480" y="337" text-anchor="middle">to specialize?</text>

    <line class="line" x1="338" y1="268" x2="254" y2="204"/>
    <line class="line" x1="480" y1="238" x2="480" y2="204"/>
    <line class="line" x1="622" y1="268" x2="706" y2="204"/>
    <line class="line" x1="338" y1="322" x2="254" y2="406"/>
    <line class="line" x1="480" y1="348" x2="480" y2="406"/>
    <line class="line" x1="622" y1="322" x2="706" y2="406"/>

    <rect class="card blue" x="88" y="138" width="230" height="84"/>
    <text class="label" x="203" y="164" text-anchor="middle">kernel family</text>
    <text class="body" x="203" y="187" text-anchor="middle">operation mix, reuse,</text>
    <text class="body" x="203" y="205" text-anchor="middle">dataflow, sparsity</text>

    <rect class="card green" x="365" y="138" width="230" height="84"/>
    <text class="label" x="480" y="164" text-anchor="middle">data + precision</text>
    <text class="body" x="480" y="187" text-anchor="middle">numerical contract,</text>
    <text class="body" x="480" y="205" text-anchor="middle">range, error tolerance</text>

    <rect class="card orange" x="642" y="138" width="230" height="84"/>
    <text class="label" x="757" y="164" text-anchor="middle">memory behavior</text>
    <text class="body" x="757" y="187" text-anchor="middle">locality, bandwidth,</text>
    <text class="body" x="757" y="205" text-anchor="middle">movement, footprint</text>

    <rect class="card purple" x="88" y="384" width="230" height="84"/>
    <text class="label" x="203" y="410" text-anchor="middle">program interface</text>
    <text class="body" x="203" y="433" text-anchor="middle">API, compiler IR,</text>
    <text class="body" x="203" y="451" text-anchor="middle">runtime, libraries</text>

    <rect class="card red" x="365" y="384" width="230" height="84"/>
    <text class="label" x="480" y="410" text-anchor="middle">deployment and QoS</text>
    <text class="body" x="480" y="433" text-anchor="middle">latency, power, thermal,</text>
    <text class="body" x="480" y="451" text-anchor="middle">isolation, updates</text>

    <rect class="card gray" x="642" y="384" width="230" height="84"/>
    <text class="label" x="757" y="410" text-anchor="middle">drift + verification</text>
    <text class="body" x="757" y="433" text-anchor="middle">portability, tests,</text>
    <text class="body" x="757" y="451" text-anchor="middle">coverage, maintenance</text>

    <rect class="center" x="188" y="504" width="584" height="34"/>
    <text class="note" x="480" y="526" text-anchor="middle">The loop must record the domain shape before claiming specialization.</text>
  </g>
</svg>
