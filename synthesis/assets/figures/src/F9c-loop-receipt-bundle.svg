<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 390" role="img">
  <title>Loop receipt bundle</title>
  <desc>Diagram showing a loop receipt as a reviewable bundle of task, input, candidate, run, evidence, and decision artifacts rather than only a winning candidate.</desc>
  <defs>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .title { font-size: 17px; font-weight: 700; fill: #222222; }
      .label { font-size: 13.4px; font-weight: 700; fill: #222222; }
      .small { font-size: 11.2px; fill: #444444; }
      .note { font-size: 12px; font-weight: 700; fill: #285F7A; }
      .bundle { fill: #F4FAF2; stroke: #54A24B; stroke-width: 1.5; }
      .folder { fill: #ffffff; stroke: #54A24B; stroke-width: 1.1; }
      .file { fill: #F0F7FF; stroke: #4E79A7; stroke-width: 1.1; }
      .decision { fill: #FFF8EE; stroke: #D88A30; stroke-width: 1.1; }
      .bar { fill: #F5F8FA; stroke: #8AA7B8; stroke-width: 1.1; }
    </style>
  </defs>

  <rect width="720" height="390" fill="#ffffff"/>
  <g class="font">
    <rect class="bundle" x="70" y="42" width="580" height="268"/>
    <text class="title" x="360" y="75" text-anchor="middle">loop receipt bundle</text>
    <text class="small" x="360" y="96" text-anchor="middle">the reviewable residue of one loop turn</text>

    <rect class="file" x="88" y="122" width="124" height="42"/>
    <text class="label" x="150" y="140" text-anchor="middle">README.md</text>
    <text class="small" x="150" y="156" text-anchor="middle">claim boundary</text>

    <rect class="folder" x="224" y="122" width="124" height="42"/>
    <text class="label" x="286" y="140" text-anchor="middle">inputs/</text>
    <text class="small" x="286" y="156" text-anchor="middle">workload state</text>

    <rect class="folder" x="360" y="122" width="124" height="42"/>
    <text class="label" x="422" y="140" text-anchor="middle">prompts-agent/</text>
    <text class="small" x="422" y="156" text-anchor="middle">model trace</text>

    <rect class="folder" x="496" y="122" width="124" height="42"/>
    <text class="label" x="558" y="140" text-anchor="middle">candidates/</text>
    <text class="small" x="558" y="156" text-anchor="middle">records and rejects</text>

    <rect class="folder" x="88" y="205" width="124" height="42"/>
    <text class="label" x="150" y="223" text-anchor="middle">runs/proxy/</text>
    <text class="small" x="150" y="239" text-anchor="middle">cheap screens</text>

    <rect class="folder" x="224" y="205" width="124" height="42"/>
    <text class="label" x="286" y="223" text-anchor="middle">runs/sim/</text>
    <text class="small" x="286" y="239" text-anchor="middle">stronger checks</text>

    <rect class="folder" x="360" y="205" width="124" height="42"/>
    <text class="label" x="422" y="223" text-anchor="middle">evidence/</text>
    <text class="small" x="422" y="239" text-anchor="middle">ledger and limits</text>

    <rect class="decision" x="496" y="205" width="124" height="42"/>
    <text class="label" x="558" y="223" text-anchor="middle">decisions/</text>
    <text class="small" x="558" y="239" text-anchor="middle">owner and next</text>

    <rect class="bar" x="76" y="332" width="568" height="42"/>
    <text class="note" x="360" y="350" text-anchor="middle">the reusable artifact is not the winner alone</text>
    <text class="note" x="360" y="366" text-anchor="middle">it is the inputs, failures, evidence, and decision path</text>
  </g>
</svg>
