<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" role="img">
  <title>Teaching progression for Architecture 2.0</title>
  <desc>Progression diagram showing Architecture 2.0 teaching moving from producing an artifact toward exposing loop state, recording evidence, defending rejection, and owning the commitment.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .label { font-size: 12.8px; font-weight: 700; fill: #222222; }
      .small { font-size: 10.8px; fill: #444444; }
      .note { font-size: 12px; font-weight: 700; fill: #285F7A; }
      .artifact { fill: #FFF8EE; stroke: #D88A30; stroke-width: 1.25; }
      .loop { fill: #F0F7FF; stroke: #4E79A7; stroke-width: 1.25; }
      .evidence { fill: #F8F5FC; stroke: #7E6AA8; stroke-width: 1.25; }
      .reject { fill: #FFF4F4; stroke: #C44E52; stroke-width: 1.25; }
      .commit { fill: #F4FAF2; stroke: #54A24B; stroke-width: 1.25; }
      .bar { fill: #F5F8FA; stroke: #8AA7B8; stroke-width: 1.1; }
      .arrow { stroke: #333333; stroke-width: 1.8; fill: none; stroke-linecap: square; }
    </style>
  </defs>

  <rect width="720" height="320" fill="#ffffff"/>
  <g class="font">
    <rect class="artifact" x="52" y="52" width="108" height="68"/>
    <text class="label" x="106" y="75" text-anchor="middle">produce</text>
    <text class="label" x="106" y="92" text-anchor="middle">artifact</text>
    <text class="small" x="106" y="110" text-anchor="middle">design sketch</text>

    <rect class="loop" x="188" y="52" width="108" height="68"/>
    <text class="label" x="242" y="75" text-anchor="middle">expose</text>
    <text class="label" x="242" y="92" text-anchor="middle">loop card</text>
    <text class="small" x="242" y="110" text-anchor="middle">state and actions</text>

    <rect class="evidence" x="324" y="52" width="108" height="68"/>
    <text class="label" x="378" y="75" text-anchor="middle">record</text>
    <text class="label" x="378" y="92" text-anchor="middle">evidence</text>
    <text class="small" x="378" y="110" text-anchor="middle">fidelity/traces</text>

    <rect class="reject" x="460" y="52" width="108" height="68"/>
    <text class="label" x="514" y="75" text-anchor="middle">defend</text>
    <text class="label" x="514" y="92" text-anchor="middle">rejection</text>
    <text class="small" x="514" y="110" text-anchor="middle">what says no</text>

    <rect class="commit" x="596" y="52" width="108" height="68"/>
    <text class="label" x="650" y="75" text-anchor="middle">own</text>
    <text class="label" x="650" y="92" text-anchor="middle">commitment</text>
    <text class="small" x="650" y="110" text-anchor="middle">risk and scope</text>

    <line class="arrow" x1="160" y1="86" x2="188" y2="86" marker-end="url(#arrow)"/>
    <line class="arrow" x1="296" y1="86" x2="324" y2="86" marker-end="url(#arrow)"/>
    <line class="arrow" x1="432" y1="86" x2="460" y2="86" marker-end="url(#arrow)"/>
    <line class="arrow" x1="568" y1="86" x2="596" y2="86" marker-end="url(#arrow)"/>

    <rect class="loop" x="96" y="166" width="528" height="60"/>
    <text class="label" x="360" y="185" text-anchor="middle">same artifact, higher bar</text>
    <text class="small" x="360" y="204" text-anchor="middle">students still build, inspect, and debug real systems</text>
    <text class="small" x="360" y="219" text-anchor="middle">assessment asks whether the loop makes the claim credible</text>

    <rect class="bar" x="72" y="270" width="576" height="28"/>
    <text class="note" x="360" y="289" text-anchor="middle">teaching shifts scarce time toward evidence, rejection, and accountable judgment</text>
  </g>
</svg>
