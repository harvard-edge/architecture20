<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 646" role="img">
  <title>Design-loop card example for the lighthouse prompt</title>
  <desc>A filled example design-loop card for a RISC-V mobile XR compute subsystem under a 3 W, 3 nm-class low-power mobile envelope.</desc>
  <defs>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .prompt { font-size: 18.2px; fill: #222222; }
      .prompt-strong { font-weight: 700; }
      .card { fill: #ffffff; stroke: #333333; stroke-width: 1.7; }
      .prompt-box { fill: #F7FAFC; stroke: #9EADB8; stroke-width: 1.4; }
      .tile { fill: #ffffff; stroke-width: 1.35; }
      .blue { stroke: #4C78A8; fill: #F2F7FC; }
      .green { stroke: #54A24B; fill: #F4FAF2; }
      .orange { stroke: #D88A30; fill: #FFF8EE; }
      .red { stroke: #C44E52; fill: #FFF4F4; }
      .purple { stroke: #7E6AA8; fill: #F8F5FC; }
      .neutral { stroke: #CABEA8; fill: #FAF8F4; }
      .label { font-size: 18.2px; font-weight: 700; fill: #222222; }
      .body { font-size: 15.0px; fill: #333333; }
      .note { font-size: 12.8px; fill: #666666; }
    </style>
  </defs>

  <rect width="960" height="646" fill="#ffffff"/>
  <rect class="card" x="28" y="24" width="904" height="598"/>

  <g transform="translate(0,-54)">
  <rect class="prompt-box" x="58" y="108" width="844" height="88"/>
  <text class="font prompt" x="78" y="135">
    Design a low-power <tspan class="prompt-strong" fill="#54A24B">64-bit RISC-V compute subsystem</tspan>
    for <tspan class="prompt-strong" fill="#4C78A8">mobile XR</tspan>
  </text>
  <text class="font prompt" x="78" y="160">
    under a <tspan class="prompt-strong" fill="#C44E52">3 W, 3 nm-class LP envelope</tspan>,
  </text>
  <text class="font prompt" x="78" y="183">
    returning a <tspan class="prompt-strong" fill="#7E6AA8">DSE report with evidence and rejected alternatives</tspan>.
  </text>

  <g class="font">
    <rect class="tile blue" x="58" y="205" width="402" height="74"/>
    <text class="label" x="80" y="229">Intent</text>
    <text class="body" x="80" y="251">Improve mobile XR efficiency under power,</text>
    <text class="body" x="80" y="269">reliability, memory, and deployment constraints.</text>

    <rect class="tile blue" x="500" y="205" width="402" height="74"/>
    <text class="label" x="522" y="229">Task</text>
    <text class="body" x="522" y="251">Bounded DSE for a RISC-V compute subsystem;</text>
    <text class="body" x="522" y="269">start with an accelerator and memory slice.</text>

    <rect class="tile green" x="58" y="293" width="402" height="80"/>
    <text class="label" x="80" y="317">Representation / world model</text>
    <text class="body" x="80" y="339">XRBench traces, architecture parameters,</text>
    <text class="body" x="80" y="357">compiler assumptions, power model, constraints.</text>

    <rect class="tile orange" x="500" y="293" width="402" height="80"/>
    <text class="label" x="522" y="317">Environment / tool interface</text>
    <text class="body" x="522" y="339">Simulator or cost model plus workload harness;</text>
    <text class="body" x="522" y="357">actions change tiling, memory, or vector width.</text>

    <rect class="tile orange" x="58" y="387" width="402" height="80"/>
    <text class="label" x="80" y="411">Method role</text>
    <text class="body" x="80" y="433">Generate candidates, predict cost, optimize,</text>
    <text class="body" x="80" y="451">critique assumptions, and write evidence reports.</text>

    <rect class="tile purple" x="500" y="387" width="402" height="80"/>
    <text class="label" x="522" y="411">Feedback budget</text>
    <text class="body" x="522" y="433">Many cheap proxies, fewer simulations,</text>
    <text class="body" x="522" y="451">rare high-fidelity checks before review.</text>

    <rect class="tile purple" x="58" y="481" width="402" height="80"/>
    <text class="label" x="80" y="505">Evidence</text>
    <text class="body" x="80" y="527">Pareto comparison over latency, energy,</text>
    <text class="body" x="80" y="545">area proxy, memory traffic, QoS, and sensitivity.</text>

    <rect class="tile red" x="500" y="481" width="402" height="80"/>
    <text class="label" x="522" y="505">Negative traces</text>
    <text class="body" x="522" y="527">Violates 3 W, misses real-time, exceeds bandwidth,</text>
    <text class="body" x="522" y="545">unsupported software or fidelity failure.</text>

    <rect class="tile red" x="58" y="575" width="402" height="52"/>
    <text class="label" x="80" y="599">Rejection authority</text>
    <text class="body" x="80" y="619">Checks, tool failures, QoS misses, review.</text>

    <rect class="tile neutral" x="500" y="575" width="402" height="52"/>
    <text class="label" x="522" y="599">Human decision</text>
    <text class="body" x="522" y="619">Refine, escalate fidelity, change scope, or reject.</text>
  </g>

  <text class="font note" x="58" y="656">Example card, not a completed design claim.</text>
  </g>
</svg>
