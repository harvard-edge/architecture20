<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 525" role="img">
  <title>Classical and explicit architecture design loops</title>
  <desc>A two-panel diagram showing Architecture 1.0 and Architecture 2.0 as circular design loops. The old loop carries much state in expert review, while the new loop represents state, tools, methods, evidence, rejection, and architect decisions explicitly.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#A33A3A"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .panel { fill: #ffffff; stroke: #333333; stroke-width: 1.6; }
      .panel-title { font-size: 20.7px; font-weight: 700; fill: #222222; }
      .panel-subtitle { font-size: 13px; fill: #555555; }
      .box { stroke-width: 1.35; }
      .blue { fill: #F0F7FF; stroke: #4E79A7; }
      .green { fill: #F4FAF2; stroke: #54A24B; }
      .orange { fill: #FFF8EE; stroke: #D88A30; }
      .purple { fill: #F8F5FC; stroke: #7E6AA8; }
      .red { fill: #FFF4F4; stroke: #C44E52; }
      .neutral { fill: #FAF8F4; stroke: #CABEA8; }
      .label { font-size: 15px; font-weight: 700; fill: #222222; }
      .body { font-size: 12px; fill: #333333; }
      .small { font-size: 12.6px; fill: #555555; }
      .note { font-size: 13.8px; font-weight: 700; fill: #356C8C; }
      .loop { stroke: #333333; stroke-width: 1.8; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .loop-ring { stroke: #555555; stroke-width: 2.0; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .loop-faint { stroke: #8A8A8A; stroke-width: 1.2; fill: none; stroke-linecap: square; stroke-linejoin: miter; stroke-dasharray: 5 5; }
      .red-arrow { stroke: #A33A3A; stroke-width: 2; fill: none; stroke-linecap: square; stroke-linejoin: miter; stroke-dasharray: 7 5; }
    </style>
  </defs>

  <rect width="980" height="525" fill="#ffffff"/>

  <g class="font">
    <rect class="panel" x="46" y="42" width="420" height="406"/>
    <rect class="panel" x="514" y="42" width="420" height="406"/>

    <text class="panel-title" x="256" y="76" text-anchor="middle">Architecture 1.0: human-carried loop</text>
    <text class="panel-subtitle" x="256" y="98" text-anchor="middle">The loop is real, but much of its state remains implicit.</text>

    <path class="loop-ring" d="M 256 128 C 360 128 428 194 428 276 C 428 358 360 424 256 424" marker-end="url(#arrow)"/>
    <path class="loop-ring" d="M 256 424 C 152 424 84 358 84 276 C 84 194 152 128 256 128" marker-end="url(#arrow)"/>

    <rect class="box blue" x="92" y="142" width="132" height="56"/>
    <text class="label" x="158" y="165" text-anchor="middle">intent</text>
    <text class="body" x="158" y="184" text-anchor="middle">workload + goal</text>

    <rect class="box green" x="288" y="142" width="132" height="56"/>
    <text class="label" x="354" y="165" text-anchor="middle">model/scripts</text>
    <text class="body" x="354" y="184" text-anchor="middle">local assumptions</text>

    <rect class="box orange" x="300" y="274" width="132" height="56"/>
    <text class="label" x="366" y="297" text-anchor="middle">candidate</text>
    <text class="body" x="366" y="316" text-anchor="middle">design choice</text>

    <rect class="box purple" x="92" y="274" width="132" height="56"/>
    <text class="label" x="158" y="297" text-anchor="middle">tool run</text>
    <text class="body" x="158" y="316" text-anchor="middle">simulate, measure</text>

    <rect class="box neutral" x="146" y="370" width="220" height="56"/>
    <text class="label" x="256" y="393" text-anchor="middle">expert review</text>
    <text class="body" x="256" y="412" text-anchor="middle">carries assumptions and judgment</text>

    <text class="panel-title" x="724" y="76" text-anchor="middle">Architecture 2.0: explicit loop state</text>
    <text class="panel-subtitle" x="724" y="100" text-anchor="middle">State, actions, evidence, and rejection are represented.</text>

    <path class="loop-ring" d="M 724 126 C 840 126 912 194 912 276 C 912 358 840 426 724 426" marker-end="url(#arrow)"/>
    <path class="loop-ring" d="M 724 426 C 608 426 536 358 536 276 C 536 194 608 126 724 126" marker-end="url(#arrow)"/>

    <rect class="box blue" x="544" y="144" width="170" height="64"/>
    <text class="label" x="629" y="166" text-anchor="middle">representation</text>
    <text class="body" x="629" y="185" text-anchor="middle">workload, design</text>
    <text class="body" x="629" y="201" text-anchor="middle">constraints</text>

    <rect class="box green" x="756" y="144" width="170" height="64"/>
    <text class="label" x="841" y="166" text-anchor="middle">environment</text>
    <text class="body" x="841" y="185" text-anchor="middle">permitted actions</text>
    <text class="body" x="841" y="201" text-anchor="middle">feedback</text>

    <rect class="box orange" x="756" y="250" width="170" height="64"/>
    <text class="label" x="841" y="272" text-anchor="middle">method roles</text>
    <text class="body" x="841" y="291" text-anchor="middle">generate, predict</text>
    <text class="body" x="841" y="307" text-anchor="middle">optimize</text>

    <rect class="box purple" x="756" y="356" width="170" height="64"/>
    <text class="label" x="841" y="378" text-anchor="middle">evidence ledger</text>
    <text class="body" x="841" y="397" text-anchor="middle">cost, fidelity</text>
    <text class="body" x="841" y="413" text-anchor="middle">provenance</text>

    <rect class="box red" x="544" y="356" width="170" height="64"/>
    <text class="label" x="629" y="378" text-anchor="middle">reject / revise</text>
    <text class="body" x="629" y="397" text-anchor="middle">invalid or weak</text>
    <text class="body" x="629" y="413" text-anchor="middle">evidence</text>

    <rect class="box neutral" x="544" y="250" width="170" height="64"/>
    <text class="label" x="629" y="272" text-anchor="middle">architect decision</text>
    <text class="body" x="629" y="291" text-anchor="middle">accept, escalate</text>
    <text class="body" x="629" y="307" text-anchor="middle">commit</text>

    <path class="red-arrow" d="M 466 276 L 514 276" marker-end="url(#arrow-red)"/>

    <rect class="box red" x="246" y="468" width="488" height="42"/>
    <text class="label" x="490" y="494" text-anchor="middle">the design loop itself becomes the artifact</text>
  </g>
</svg>
