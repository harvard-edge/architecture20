<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" role="img">
  <title>Architecture 1.0 and Architecture 2.0 design loops</title>
  <desc>A two-panel comparison showing that Architecture 1.0 carries much loop state implicitly in human practice, while Architecture 2.0 represents loop state, evidence, rejection, method roles, and architect decisions explicitly.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4A5560"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F5F7A"/>
    </marker>
    <marker id="arrow-gov" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#C44E52"/>
    </marker>
    <style>
      .font { font-family: sans-serif; }
      .title { font-size: 19px; font-weight: 700; fill: #202426; }
      .subtitle { font-size: 12px; fill: #536067; }
      .node-label { font-size: 13px; font-weight: 700; fill: #202426; }
      .node-body { font-size: 10.6px; fill: #3E474B; }
      .center-label { font-size: 12.8px; font-weight: 700; fill: #202426; }
      .center-body { font-size: 10.4px; fill: #4A5560; }
      .takeaway { font-size: 13.2px; font-weight: 700; fill: #1F5F7A; }
      .divider { stroke: #1F5F7A; stroke-width: 0.9; }
      .edge { stroke: #4A5560; stroke-width: 1.9; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .edge-blue { stroke: #1F5F7A; stroke-width: 2.0; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-blue); }
      .edge-gov { stroke: #C44E52; stroke-width: 1.7; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-gov); }
      .node { fill: #FFFFFF; stroke: #6E7A80; stroke-width: 1.2; }
      .state { fill: #F4F1FA; stroke: #1F5F7A; stroke-width: 1.35; }
      .evidence { fill: #F4F1FA; stroke: #1F5F7A; stroke-width: 1.3; }
      .human { fill: #F4F1FA; stroke: #C44E52; stroke-width: 1.3; }
      .reject { fill: #F4F1FA; stroke: #C44E52; stroke-width: 1.3; }
      .implicit { fill: #F4F1FA; stroke: #8A8A8A; stroke-width: 1.25; stroke-dasharray: 5 4; }
      .ghost-loop { stroke: #1F5F7A; stroke-width: 1.1; fill: none; stroke-dasharray: 4 5; }
      .glyph { fill: none; stroke: currentColor; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
      .glyph-human { color: #C44E52; }
      .glyph-state { color: #1F5F7A; }
      .glyph-evidence { color: #1F5F7A; }
      .glyph-reject { color: #C44E52; }
    </style>
  </defs>

  <rect width="960" height="440" fill="#FFFFFF"/>

  <g class="font">
    <text class="title" x="240" y="44" text-anchor="middle">Architecture 1.0: human-carried loop</text>
    <text class="subtitle" x="240" y="66" text-anchor="middle">Much of the loop state remains implicit.</text>

    <text class="title" x="720" y="44" text-anchor="middle">Architecture 2.0: represented loop</text>
    <text class="subtitle" x="720" y="66" text-anchor="middle">State, evidence, and rejection are made explicit.</text>

    <line class="divider" x1="480" y1="86" x2="480" y2="385"/>

    <!-- Left: existing loop, with implicit state carried by human practice. -->
    <rect class="node" x="176" y="98" width="128" height="48" rx="5"/>
    <text class="node-label" x="240" y="118" text-anchor="middle">Intent</text>
    <text class="node-body" x="240" y="135" text-anchor="middle">workload + goal</text>

    <rect class="node" x="325" y="184" width="128" height="48" rx="5"/>
    <text class="node-label" x="389" y="204" text-anchor="middle">Model / scripts</text>
    <text class="node-body" x="389" y="221" text-anchor="middle">local assumptions</text>

    <rect class="node" x="285" y="312" width="128" height="48" rx="5"/>
    <text class="node-label" x="349" y="332" text-anchor="middle">Candidate</text>
    <text class="node-body" x="349" y="349" text-anchor="middle">design choice</text>

    <rect class="node" x="67" y="312" width="128" height="48" rx="5"/>
    <text class="node-label" x="131" y="332" text-anchor="middle">Tool feedback</text>
    <text class="node-body" x="131" y="349" text-anchor="middle">simulate, measure</text>

    <rect class="human" x="27" y="184" width="128" height="48" rx="5"/>
    <g class="glyph glyph-human" transform="translate(42 197)">
      <circle cx="8" cy="5" r="3.8"/>
      <path d="M 2 20 C 4 14, 6 12, 8 12 C 10 12, 12 14, 14 20"/>
    </g>
    <text class="node-label" x="106" y="204" text-anchor="middle">Expert review</text>
    <text class="node-body" x="106" y="221" text-anchor="middle">carries state</text>

    <rect class="implicit" x="169" y="194" width="142" height="74" rx="8"/>
    <text class="center-label" x="240" y="217" text-anchor="middle">implicit state</text>
    <text class="center-body" x="240" y="235" text-anchor="middle">assumptions, rationale</text>
    <text class="center-body" x="240" y="250" text-anchor="middle">why candidates failed</text>

    <polyline class="edge" points="304,122 389,122 389,184"/>
    <polyline class="edge" points="389,232 389,312"/>
    <polyline class="edge" points="285,336 195,336"/>
    <polyline class="edge" points="131,312 131,232"/>
    <polyline class="edge" points="91,184 91,122 176,122"/>

    <!-- Transition. -->
    <path class="edge-blue" d="M 424 78 L 536 78"/>
    <text class="subtitle" x="480" y="96" text-anchor="middle">make loop state explicit</text>

    <!-- Right: represented state, evidence, rejection, and decision authority. -->
    <rect class="state" x="646" y="102" width="148" height="54" rx="5"/>
    <g class="glyph glyph-state" transform="translate(660 115)">
      <rect x="0" y="0" width="14" height="18"/>
      <path d="M 4 6 L 11 6"/>
      <path d="M 4 12 L 9 12"/>
    </g>
    <text class="node-label" x="731" y="123" text-anchor="middle">Representation</text>
    <text class="node-body" x="731" y="140" text-anchor="middle">workload, design</text>

    <rect class="state" x="817" y="184" width="128" height="54" rx="5"/>
    <g class="glyph glyph-state" transform="translate(832 197)">
      <rect x="0" y="0" width="16" height="16"/>
      <path d="M 4 4 L 12 4"/>
      <path d="M 4 8 L 12 8"/>
      <path d="M 4 12 L 9 12"/>
    </g>
    <text class="node-label" x="890" y="205" text-anchor="middle">Environment</text>
    <text class="node-body" x="890" y="222" text-anchor="middle">actions + feedback</text>

    <rect class="state" x="783" y="315" width="132" height="54" rx="5"/>
    <text class="node-label" x="849" y="336" text-anchor="middle">Method roles</text>
    <text class="node-body" x="849" y="353" text-anchor="middle">generate, predict</text>

    <rect class="evidence" x="525" y="315" width="132" height="54" rx="5"/>
    <g class="glyph glyph-evidence" transform="translate(538 328)">
      <rect x="0" y="0" width="14" height="18"/>
      <path d="M 4 6 L 11 6"/>
      <path d="M 4 11 L 11 11"/>
      <path d="M 4 15 L 8 15"/>
    </g>
    <text class="node-label" x="600" y="336" text-anchor="middle">Evidence ledger</text>
    <text class="node-body" x="600" y="353" text-anchor="middle">cost, provenance</text>

    <rect class="reject" x="495" y="184" width="128" height="54" rx="5"/>
    <g class="glyph glyph-reject" transform="translate(510 198)">
      <path d="M 8 0 L 16 8 L 16 18 L 0 18 L 0 8 Z"/>
      <path d="M 5 10 L 11 10"/>
    </g>
    <text class="node-label" x="568" y="205" text-anchor="middle">Reject / revise</text>
    <text class="node-body" x="568" y="222" text-anchor="middle">weak evidence</text>

    <rect class="human" x="637" y="195" width="166" height="72" rx="8"/>
    <g class="glyph glyph-human" transform="translate(656 208)">
      <circle cx="8" cy="5" r="3.8"/>
      <path d="M 2 20 C 4 14, 6 12, 8 12 C 10 12, 12 14, 14 20"/>
    </g>
    <text class="center-label" x="735" y="218" text-anchor="middle">Architect decision</text>
    <text class="center-body" x="735" y="236" text-anchor="middle">accept, revise, escalate</text>
    <text class="center-body" x="735" y="251" text-anchor="middle">or commit</text>

    <polyline class="edge-blue" points="794,129 881,129 881,184"/>
    <polyline class="edge-blue" points="881,238 881,315"/>
    <polyline class="edge-blue" points="783,342 657,342"/>
    <polyline class="edge-blue" points="559,315 559,238"/>
    <polyline class="edge-blue" points="559,184 559,129 646,129"/>
    <polyline class="edge-gov" points="645,315 645,267"/>
    <polyline class="edge-gov" points="720,195 720,156"/>

    <text class="takeaway" x="480" y="414" text-anchor="middle">The shift is not automation of the architect; it is representation and governance of the design loop.</text>
  </g>
</svg>
