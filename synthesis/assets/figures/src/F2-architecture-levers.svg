<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" role="img">
  <title>Architecture levers add state</title>
  <desc>Architecture levers create efficiency opportunity while adding state that the design loop must represent and evaluate.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .box { fill: #ffffff; stroke-width: 1.4; }
      .blue { stroke: #4E79A7; fill: #F0F7FF; }
      .green { stroke: #54A24B; fill: #F4FAF2; }
      .orange { stroke: #D88A30; fill: #FFF8EE; }
      .red { stroke: #C44E52; fill: #FFF4F4; }
      .purple { stroke: #7E6AA8; fill: #F8F5FC; }
      .neutral { stroke: #9AA8B5; fill: #F8FAFC; }
      .label { font-size: 20px; font-weight: 700; fill: #222222; }
      .small { font-size: 15px; fill: #333333; }
      .note { font-size: 16px; font-weight: 700; fill: #356C8C; }
      .arrow { stroke: #333333; stroke-width: 1.8; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
    </style>
  </defs>

  <rect width="960" height="300" fill="#ffffff"/>
  <g class="font">
    <rect class="box blue" x="42" y="68" width="158" height="86"/>
    <text class="label" x="121" y="100" text-anchor="middle">Scaling</text>
    <text class="small" x="121" y="125" text-anchor="middle">device, voltage</text>
    <text class="small" x="121" y="144" text-anchor="middle">frequency</text>

    <rect class="box green" x="222" y="68" width="158" height="86"/>
    <text class="label" x="301" y="100" text-anchor="middle">Architecture</text>
    <text class="small" x="301" y="125" text-anchor="middle">ILP, caches</text>
    <text class="small" x="301" y="144" text-anchor="middle">parallelism</text>

    <rect class="box orange" x="402" y="68" width="158" height="86"/>
    <text class="label" x="481" y="100" text-anchor="middle">Optimization</text>
    <text class="small" x="481" y="125" text-anchor="middle">co-design</text>
    <text class="small" x="481" y="144" text-anchor="middle">tool feedback</text>

    <rect class="box red" x="582" y="68" width="158" height="86"/>
    <text class="label" x="661" y="100" text-anchor="middle">Specialization</text>
    <text class="small" x="661" y="125" text-anchor="middle">DSAs, vectors</text>
    <text class="small" x="661" y="144" text-anchor="middle">accelerators</text>

    <rect class="box purple" x="762" y="68" width="158" height="86"/>
    <text class="label" x="841" y="100" text-anchor="middle">Composition</text>
    <text class="small" x="841" y="125" text-anchor="middle">chiplets, systems</text>
    <text class="small" x="841" y="144" text-anchor="middle">deployment</text>

    <line class="arrow" x1="200" y1="111" x2="222" y2="111" marker-end="url(#arrow)"/>
    <line class="arrow" x1="380" y1="111" x2="402" y2="111" marker-end="url(#arrow)"/>
    <line class="arrow" x1="560" y1="111" x2="582" y2="111" marker-end="url(#arrow)"/>
    <line class="arrow" x1="740" y1="111" x2="762" y2="111" marker-end="url(#arrow)"/>

    <rect class="box neutral" x="144" y="202" width="672" height="72"/>
    <text class="note" x="480" y="224" text-anchor="middle">Each lever can recover efficiency, but it also adds loop state.</text>
    <text class="small" x="480" y="244" text-anchor="middle">The loop must carry constraints, interfaces, tool feedback,</text>
    <text class="small" x="480" y="262" text-anchor="middle">rejected alternatives, and evidence.</text>

    <line class="arrow" x1="480" y1="154" x2="480" y2="202" marker-end="url(#arrow)"/>
  </g>
</svg>
