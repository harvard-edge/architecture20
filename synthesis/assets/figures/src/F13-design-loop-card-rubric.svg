<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 446" role="img">
  <title>Design-loop card and review rubric</title>
  <desc>A clean rectangular diagram showing design-loop card fields flowing into a review rubric and readiness decision.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .label { font-size: 14px; font-weight: 700; fill: #222222; }
      .small { font-size: 11.5px; fill: #444444; }
      .micro { font-size: 10.5px; fill: #555555; }
      .note { font-size: 12px; font-weight: 700; fill: #356C8C; }
      .card { fill: #F0F7FF; stroke: #4E79A7; stroke-width: 1.4; }
      .rubric { fill: #FFF8EE; stroke: #D88A30; stroke-width: 1.4; }
      .status { fill: #F8F5FC; stroke: #7E6AA8; stroke-width: 1.4; }
      .ready { fill: #F4FAF2; stroke: #54A24B; stroke-width: 1.4; }
      .warn { fill: #FFF4F4; stroke: #C44E52; stroke-width: 1.4; }
      .use { fill: #F8FAFC; stroke: #9AA8B5; stroke-width: 1.3; }
      .arrow { stroke: #333333; stroke-width: 2; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
    </style>
  </defs>

  <rect width="720" height="446" fill="#ffffff"/>
  <g class="font" transform="translate(0,-54)">


    <text class="note" x="70" y="116">1. fill the card</text>
    <rect class="card" x="70" y="132" width="244" height="188"/>
    <text class="label" x="192" y="156" text-anchor="middle">loop fields</text>

    <rect class="use" x="92" y="174" width="92" height="30"/>
    <text class="micro" x="138" y="193" text-anchor="middle">intent + task</text>
    <rect class="use" x="200" y="174" width="92" height="30"/>
    <text class="micro" x="246" y="193" text-anchor="middle">representation</text>
    <rect class="use" x="92" y="211" width="92" height="30"/>
    <text class="micro" x="138" y="230" text-anchor="middle">environment</text>
    <rect class="use" x="200" y="211" width="92" height="30"/>
    <text class="micro" x="246" y="230" text-anchor="middle">method role</text>
    <rect class="use" x="92" y="248" width="92" height="30"/>
    <text class="micro" x="138" y="267" text-anchor="middle">feedback</text>
    <rect class="use" x="200" y="248" width="92" height="30"/>
    <text class="micro" x="246" y="267" text-anchor="middle">evidence</text>
    <rect class="use" x="92" y="285" width="92" height="30"/>
    <text class="micro" x="138" y="304" text-anchor="middle">negative traces</text>
    <rect class="use" x="200" y="285" width="92" height="30"/>
    <text class="micro" x="246" y="304" text-anchor="middle">human decision</text>

    <line class="arrow" x1="314" y1="226" x2="352" y2="226" marker-end="url(#arrow)"/>

    <text class="note" x="360" y="116">2. apply the rubric</text>
    <rect class="rubric" x="352" y="132" width="140" height="188"/>
    <text class="label" x="422" y="156" text-anchor="middle">review lens</text>
    <text class="small" x="422" y="186" text-anchor="middle">Is the task bounded?</text>
    <text class="small" x="422" y="213" text-anchor="middle">Is evidence enough?</text>
    <text class="small" x="422" y="240" text-anchor="middle">What failed?</text>
    <text class="small" x="422" y="267" text-anchor="middle">What can reject?</text>
    <text class="small" x="422" y="294" text-anchor="middle">Who decides?</text>

    <line class="arrow" x1="492" y1="226" x2="530" y2="226" marker-end="url(#arrow)"/>

    <text class="note" x="530" y="116">3. assign status</text>
    <rect class="status" x="530" y="132" width="120" height="188"/>
    <text class="label" x="590" y="156" text-anchor="middle">readiness</text>
    <rect class="ready" x="552" y="178" width="76" height="30"/>
    <text class="micro" x="590" y="197" text-anchor="middle">ready</text>
    <rect class="rubric" x="552" y="224" width="76" height="30"/>
    <text class="micro" x="590" y="243" text-anchor="middle">evidence</text>
    <rect class="warn" x="552" y="270" width="76" height="30"/>
    <text class="micro" x="590" y="289" text-anchor="middle">unsafe</text>

    <rect class="use" x="82" y="358" width="556" height="48"/>
    <text class="label" x="360" y="379" text-anchor="middle">where it is used</text>
    <text class="small" x="360" y="398" text-anchor="middle">paper review, project proposal, reading group, class assignment, design review</text>
  </g>
</svg>
