<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img">
  <title>Tools become environments preview</title>
  <desc>Side-by-side diagram contrasting an opaque tool wrapper with an Architecture 2.0 environment contract that exposes legal actions, observations, costs, provenance, invalid-action semantics, and rejection paths.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#356C8C"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .title { font-size: 17px; font-weight: 700; fill: #222222; }
      .label { font-size: 13.5px; font-weight: 700; fill: #222222; }
      .small { font-size: 11.4px; fill: #444444; }
      .note { font-size: 12px; font-weight: 700; fill: #285F7A; }
      .left-panel { fill: #FFF8EE; stroke: #D88A30; stroke-width: 1.5; }
      .right-panel { fill: #F4FAF2; stroke: #54A24B; stroke-width: 1.5; }
      .tool-box { fill: #ffffff; stroke: #D88A30; stroke-width: 1.2; }
      .contract-box { fill: #ffffff; stroke: #54A24B; stroke-width: 1.2; }
      .warn-box { fill: #FFF4F4; stroke: #C44E52; stroke-width: 1.2; }
      .bar { fill: #F5F8FA; stroke: #8AA7B8; stroke-width: 1.1; }
      .arrow { stroke: #333333; stroke-width: 1.8; fill: none; stroke-linecap: square; }
      .blue-arrow { stroke: #356C8C; stroke-width: 2.1; fill: none; stroke-linecap: square; }
    </style>
  </defs>

  <rect width="720" height="360" fill="#ffffff"/>
  <g class="font">
    <rect class="left-panel" x="45" y="42" width="250" height="224"/>
    <text class="title" x="170" y="72" text-anchor="middle">tool wrapper</text>
    <text class="small" x="170" y="94" text-anchor="middle">connects a method to a tool</text>

    <rect class="tool-box" x="88" y="116" width="164" height="38"/>
    <text class="label" x="170" y="140" text-anchor="middle">call tool</text>

    <rect class="tool-box" x="88" y="170" width="164" height="38"/>
    <text class="label" x="170" y="194" text-anchor="middle">get score or log</text>

    <rect class="warn-box" x="76" y="224" width="188" height="28"/>
    <text class="small" x="170" y="243" text-anchor="middle">hidden semantics stay hidden</text>

    <line class="arrow" x1="170" y1="154" x2="170" y2="170" marker-end="url(#arrow)"/>
    <line class="arrow" x1="170" y1="208" x2="170" y2="224" marker-end="url(#arrow)"/>

    <line class="blue-arrow" x1="312" y1="154" x2="394" y2="154" marker-end="url(#arrow-blue)"/>
    <text class="note" x="353" y="136" text-anchor="middle">expose</text>
    <text class="note" x="353" y="174" text-anchor="middle">contract</text>

    <rect class="right-panel" x="410" y="30" width="265" height="260"/>
    <text class="title" x="542.5" y="60" text-anchor="middle">architecture environment</text>
    <text class="small" x="542.5" y="82" text-anchor="middle">makes action and feedback auditable</text>

    <rect class="contract-box" x="433" y="105" width="105" height="38"/>
    <text class="label" x="485.5" y="129" text-anchor="middle">legal actions</text>

    <rect class="contract-box" x="548" y="105" width="105" height="38"/>
    <text class="label" x="600.5" y="129" text-anchor="middle">observations</text>

    <rect class="contract-box" x="433" y="155" width="105" height="38"/>
    <text class="label" x="485.5" y="179" text-anchor="middle">cost/fidelity</text>

    <rect class="contract-box" x="548" y="155" width="105" height="38"/>
    <text class="label" x="600.5" y="179" text-anchor="middle">provenance</text>

    <rect class="contract-box" x="433" y="205" width="105" height="48"/>
    <text class="label" x="485.5" y="225" text-anchor="middle">invalid-action</text>
    <text class="label" x="485.5" y="241" text-anchor="middle">semantics</text>

    <rect class="contract-box" x="548" y="205" width="105" height="48"/>
    <text class="label" x="600.5" y="225" text-anchor="middle">rejection</text>
    <text class="label" x="600.5" y="241" text-anchor="middle">conditions</text>

    <rect class="bar" x="72" y="312" width="576" height="28"/>
    <text class="note" x="360" y="331" text-anchor="middle">feedback becomes evidence only when the wrapper defines what can act, fail, and reject</text>
  </g>
</svg>
