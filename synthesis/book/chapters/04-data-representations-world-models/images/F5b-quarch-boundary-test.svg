<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" role="img">
  <title>QuArch boundary test</title>
  <desc>Diagram showing QuArch-style paper questions as one layer of architecture data and Architecture 2.0 loop records as the additional layer needed for action and rejection.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: sans-serif; }
      .title { font-size: 17px; font-weight: 700; fill: #222222; }
      .label { font-size: 13.5px; font-weight: 700; fill: #222222; }
      .small { font-size: 11.4px; fill: #444444; }
      .note { font-size: 12px; font-weight: 700; fill: #1F5F7A; }
      .knowledge { fill: #F4F1FA; stroke: #1F5F7A; stroke-width: 1.5; }
      .loop { fill: #F4F1FA; stroke: #1F5F7A; stroke-width: 1.5; }
      .item { fill: #FFFFFF; stroke-width: 1.1; }
      .knowledge-item { stroke: #1F5F7A; }
      .loop-item { stroke: #1F5F7A; }
      .gap { fill: #F4F1FA; stroke: #C44E52; stroke-width: 1.2; }
      .bar { fill: #F4F1FA; stroke: #1F5F7A; stroke-width: 1.1; }
      .arrow { stroke: #333333; stroke-width: 2; fill: none; stroke-linecap: square; }
    </style>
  </defs>

  <rect width="720" height="380" fill="#FFFFFF"/>
  <g class="font">
    <rect class="knowledge" x="45" y="50" width="255" height="228"/>
    <text class="title" x="172.5" y="79" text-anchor="middle">paper-knowledge layer</text>
    <text class="small" x="172.5" y="100" text-anchor="middle">what a benchmark can ask from text</text>

    <rect class="item knowledge-item" x="72" y="122" width="201" height="34"/>
    <text class="label" x="172.5" y="144" text-anchor="middle">concept recall</text>
    <rect class="item knowledge-item" x="72" y="166" width="201" height="34"/>
    <text class="label" x="172.5" y="188" text-anchor="middle">published relationships</text>
    <rect class="item knowledge-item" x="72" y="210" width="201" height="34"/>
    <text class="label" x="172.5" y="232" text-anchor="middle">paper-level reasoning</text>

    <rect class="gap" x="322" y="124" width="76" height="76"/>
    <text class="label" x="360" y="151" text-anchor="middle">boundary</text>
    <text class="small" x="360" y="170" text-anchor="middle">knowledge</text>
    <text class="small" x="360" y="185" text-anchor="middle">is not state</text>
    <line class="arrow" x1="300" y1="162" x2="322" y2="162" marker-end="url(#arrow)"/>
    <line class="arrow" x1="398" y1="162" x2="420" y2="162" marker-end="url(#arrow)"/>

    <rect class="loop" x="420" y="50" width="255" height="228"/>
    <text class="title" x="547.5" y="79" text-anchor="middle">loop-state layer</text>
    <text class="small" x="547.5" y="100" text-anchor="middle">what action and rejection need</text>

    <rect class="item loop-item" x="447" y="118" width="93" height="34"/>
    <text class="label" x="493.5" y="140" text-anchor="middle">tool configs</text>
    <rect class="item loop-item" x="555" y="118" width="93" height="34"/>
    <text class="label" x="601.5" y="140" text-anchor="middle">constraints</text>
    <rect class="item loop-item" x="447" y="162" width="93" height="34"/>
    <text class="label" x="493.5" y="184" text-anchor="middle">failed runs</text>
    <rect class="item loop-item" x="555" y="162" width="93" height="34"/>
    <text class="label" x="601.5" y="184" text-anchor="middle">provenance</text>
    <rect class="item loop-item" x="447" y="206" width="93" height="34"/>
    <text class="label" x="493.5" y="228" text-anchor="middle">rejections</text>
    <rect class="item loop-item" x="555" y="206" width="93" height="34"/>
    <text class="label" x="601.5" y="228" text-anchor="middle">review notes</text>

    <rect class="bar" x="74" y="313" width="572" height="42"/>
    <text class="note" x="360" y="331" text-anchor="middle">QuArch bootstraps architectural knowledge from papers</text>
    <text class="note" x="360" y="347" text-anchor="middle">synthesis also needs loop records for action and rejection</text>
  </g>
</svg>
