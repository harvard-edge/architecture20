<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 626" role="img">
  <title>Code generation narrow waist for specialization</title>
  <desc>A vertical diagram showing code generation as the narrow waist between domain intent, specialized architecture mechanisms, and feedback-based acceptance or rejection.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: sans-serif; }
      .top { fill: #F4F1FA; stroke: #1F5F7A; stroke-width: 1.4; }
      .hw { fill: #F4F1FA; stroke: #1F5F7A; stroke-width: 1.4; }
      .waist { fill: #F4F1FA; stroke: #C44E52; stroke-width: 1.6; }
      .feedback { fill: #F4F1FA; stroke: #1F5F7A; stroke-width: 1.4; }
      .gate { fill: #F4F1FA; stroke: #C44E52; stroke-width: 1.4; }
      .label { font-size: 20px; font-weight: 700; fill: #222222; }
      .body { font-size: 15.5px; fill: #333333; }
      .small { font-size: 14px; fill: #555555; }
      .note { font-size: 15px; font-weight: 700; fill: #1F5F7A; }
      .arrow { stroke: #333333; stroke-width: 2; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .glyph { fill: none; stroke: currentColor; stroke-width: 1.85; stroke-linecap: round; stroke-linejoin: round; }
      .glyph-top { color: #1F5F7A; }
      .glyph-hw { color: #1F5F7A; }
      .glyph-waist { color: #C44E52; }
      .glyph-feedback { color: #1F5F7A; }
    </style>
  </defs>

  <rect width="860" height="626" fill="#FFFFFF"/>
  <g class="font" transform="translate(0,-54)">


    <rect class="top" x="175" y="126" width="510" height="78"/>
    <g class="glyph glyph-top" transform="translate(204 141)">
      <rect x="0" y="0" width="22" height="26"/>
      <path d="M 5 9 L 17 9"/>
      <path d="M 5 16 L 14 16"/>
    </g>
    <text class="label" x="454" y="154" text-anchor="middle">domain intent + workload distribution</text>
    <text class="body" x="454" y="177" text-anchor="middle">semantics, input mix, QoS, deployment context, drift</text>

    <line class="arrow" x1="430" y1="204" x2="430" y2="242" marker-end="url(#arrow)"/>

    <rect class="hw" x="92" y="246" width="272" height="88"/>
    <text class="label" x="228" y="274" text-anchor="middle">architecture mechanisms</text>
    <text class="body" x="228" y="297" text-anchor="middle">dataflow, memory, precision,</text>
    <text class="body" x="228" y="315" text-anchor="middle">accelerators, chiplets</text>

    <rect class="hw" x="496" y="246" width="272" height="88"/>
    <text class="label" x="632" y="274" text-anchor="middle">hardware constraints</text>
    <text class="body" x="632" y="297" text-anchor="middle">power, area, timing, bandwidth,</text>
    <text class="body" x="632" y="315" text-anchor="middle">thermal, reliability, cost</text>

    <rect x="411" y="278" width="38" height="24" rx="4" fill="#FFFFFF" stroke="#333333" stroke-width="1.2"/>
    <line class="arrow" x1="364" y1="290" x2="411" y2="290" marker-end="url(#arrow)"/>
    <line class="arrow" x1="496" y1="290" x2="449" y2="290" marker-end="url(#arrow)"/>
    <circle cx="430" cy="290" r="3.2" fill="#333333"/>

    <path class="waist" d="M 250 370 L 610 370 L 555 470 L 305 470 Z"/>
    <g class="glyph glyph-waist" transform="translate(318 382)">
      <path d="M 4 4 L 11 11 L 4 18"/>
      <path d="M 18 4 L 11 11 L 18 18"/>
      <path d="M 22 4 L 28 18"/>
    </g>
    <text class="label" x="454" y="397" text-anchor="middle">code-generation waist</text>
    <text class="body" x="430" y="421" text-anchor="middle">programming model, compiler IR,</text>
    <text class="body" x="430" y="438" text-anchor="middle">libraries, runtime, generated code</text>
    <text class="small" x="430" y="456" text-anchor="middle">where specialization becomes usable</text>

    <line class="arrow" x1="430" y1="302" x2="430" y2="368" marker-end="url(#arrow)"/>
    <line class="arrow" x1="430" y1="470" x2="430" y2="505" marker-end="url(#arrow)"/>

    <rect class="feedback" x="158" y="508" width="544" height="62"/>
    <g class="glyph glyph-feedback" transform="translate(216 520)">
      <rect x="0" y="0" width="22" height="26"/>
      <path d="M 5 9 L 17 9"/>
      <path d="M 5 15 L 17 15"/>
      <path d="M 5 21 L 12 21"/>
    </g>
    <text class="label" x="455" y="532" text-anchor="middle">tool feedback + measurements</text>
    <text class="body" x="455" y="554" text-anchor="middle">tests, profiling, simulation, synthesis, telemetry</text>

    <rect class="gate" x="112" y="590" width="154" height="44"/>
    <text class="body" x="189" y="616" text-anchor="middle">correctness</text>

    <rect class="gate" x="274" y="590" width="154" height="44"/>
    <text class="body" x="351" y="616" text-anchor="middle">performance</text>

    <rect class="gate" x="436" y="590" width="154" height="44"/>
    <text class="body" x="513" y="616" text-anchor="middle">portability</text>

    <rect class="gate" x="598" y="590" width="154" height="44"/>
    <text class="body" x="675" y="616" text-anchor="middle">maintainability</text>

    <text class="note" x="430" y="656" text-anchor="middle">accept, reject, or revise the loop before committing the architecture</text>
  </g>
</svg>
