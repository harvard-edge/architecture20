<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 405" role="img">
  <title>Loop patterns across the stack</title>
  <desc>A clean diagram comparing Architecture 2.0 loop patterns from fast software loops to high-commitment RTL and physical-design loops.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .label { font-size: 14px; font-weight: 700; fill: #222222; }
      .small { font-size: 11.5px; fill: #444444; }
      .note { font-size: 12px; font-weight: 700; fill: #356C8C; }
      .ontology { fill: #F8FAFC; stroke: #9AA8B5; stroke-width: 1.3; }
      .fast { fill: #F0F7FF; stroke: #4E79A7; stroke-width: 1.4; }
      .mid { fill: #F4FAF2; stroke: #54A24B; stroke-width: 1.4; }
      .system { fill: #FFF8EE; stroke: #D88A30; stroke-width: 1.4; }
      .hard { fill: #F8F5FC; stroke: #7E6AA8; stroke-width: 1.4; }
      .reject { fill: #FFF4F4; stroke: #C44E52; stroke-width: 1.4; }
      .arrow { stroke: #333333; stroke-width: 2; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
    </style>
  </defs>

  <rect width="720" height="405" fill="#ffffff"/>
  <g class="font">

    <rect class="ontology" x="70" y="62" width="580" height="48"/>
    <text class="label" x="360" y="83" text-anchor="middle">shared ontology</text>
    <text class="small" x="360" y="100" text-anchor="middle">task to representation to environment to method to evidence to human decision</text>

    <rect class="fast" x="70" y="150" width="130" height="112"/>
    <text class="label" x="135" y="174" text-anchor="middle">fast software</text>
    <text class="small" x="135" y="197" text-anchor="middle">feedback: fast</text>
    <text class="small" x="135" y="219" text-anchor="middle">commitment: low</text>
    <text class="small" x="135" y="241" text-anchor="middle">reject: tests</text>

    <rect class="mid" x="215" y="150" width="130" height="112"/>
    <text class="label" x="280" y="174" text-anchor="middle">workload + DSE</text>
    <text class="small" x="280" y="197" text-anchor="middle">feedback: staged</text>
    <text class="small" x="280" y="219" text-anchor="middle">commitment: mid</text>
    <text class="small" x="280" y="241" text-anchor="middle">reject: coverage</text>

    <rect class="system" x="360" y="150" width="130" height="112"/>
    <text class="label" x="425" y="174" text-anchor="middle">co-design + fleet</text>
    <text class="small" x="425" y="197" text-anchor="middle">feedback: noisy</text>
    <text class="small" x="425" y="219" text-anchor="middle">commitment: high</text>
    <text class="small" x="425" y="241" text-anchor="middle">reject: telemetry</text>

    <rect class="hard" x="505" y="150" width="145" height="112"/>
    <text class="label" x="577.5" y="174" text-anchor="middle">RTL / physical</text>
    <text class="small" x="577.5" y="197" text-anchor="middle">feedback: slow</text>
    <text class="small" x="577.5" y="219" text-anchor="middle">commitment: very high</text>
    <text class="small" x="577.5" y="241" text-anchor="middle">reject: signoff</text>

    <line class="arrow" x1="200" y1="206" x2="215" y2="206" marker-end="url(#arrow)"/>
    <line class="arrow" x1="345" y1="206" x2="360" y2="206" marker-end="url(#arrow)"/>
    <line class="arrow" x1="490" y1="206" x2="505" y2="206" marker-end="url(#arrow)"/>

    <rect class="reject" x="105" y="292" width="510" height="38"/>
    <text class="label" x="360" y="316" text-anchor="middle">higher commitment means more critique, evidence, and approval</text>

    <line class="arrow" x1="115" y1="373" x2="605" y2="373" marker-end="url(#arrow)"/>
    <text class="note" x="360" y="392" text-anchor="middle">feedback latency and evidence burden increase; acceptable autonomy narrows</text>
  </g>
</svg>
