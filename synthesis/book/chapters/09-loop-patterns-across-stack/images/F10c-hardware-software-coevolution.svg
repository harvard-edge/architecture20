<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img">
  <title>Hardware/software co-evolution loop</title>
  <desc>A two-lane Architecture 2.0 loop in which hardware target state and software code paths evolve together through a shared evidence ledger, rejection gate, and architect decision.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#356C8C"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .title { font-size: 21px; font-weight: 700; fill: #202426; }
      .subtitle { font-size: 12.5px; fill: #536067; }
      .lane-label { font-size: 12px; font-weight: 700; fill: #66717A; letter-spacing: 0; }
      .label { font-size: 13.5px; font-weight: 700; fill: #222222; }
      .body { font-size: 10.8px; fill: #444444; }
      .micro { font-size: 10px; fill: #555555; }
      .note { font-size: 12.5px; font-weight: 700; fill: #356C8C; }
      .hw-panel { fill: #F7FAFC; stroke: #9CB8C8; stroke-width: 1.2; }
      .sw-panel { fill: #F7FBF5; stroke: #A9C6A3; stroke-width: 1.2; }
      .hw { fill: #F2F7FC; stroke: #4C78A8; stroke-width: 1.4; }
      .sw { fill: #F4FAF2; stroke: #54A24B; stroke-width: 1.4; }
      .evidence { fill: #FFF8EE; stroke: #D88A30; stroke-width: 1.5; }
      .gate { fill: #FFF4F4; stroke: #C44E52; stroke-width: 1.4; }
      .takeaway { fill: #F7FAFC; stroke: #9CB8C8; stroke-width: 1.3; }
      .arrow { stroke: #333333; stroke-width: 1.8; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .blue-arrow { stroke: #356C8C; stroke-width: 1.55; fill: none; stroke-linecap: square; stroke-linejoin: miter; opacity: 0.92; }
      .pin { stroke: #356C8C; stroke-width: 1.3; fill: none; stroke-linecap: square; }
      .code { stroke: #4C78A8; stroke-width: 1.4; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
    </style>
  </defs>

  <rect width="900" height="520" fill="#ffffff"/>
  <g class="font">
    <text class="title" x="54" y="38">Hardware/software co-evolution loop</text>
    <text class="subtitle" x="54" y="58">Generated code becomes architecture evidence only when both snapshots are recorded.</text>

    <rect class="hw-panel" x="54" y="86" width="348" height="248" rx="5"/>
    <text class="lane-label" x="80" y="112">HARDWARE TARGET STATE</text>
    <g transform="translate(338,96)">
      <rect x="16" y="12" width="24" height="24" rx="3" fill="#ffffff" stroke="#356C8C" stroke-width="1.5"/>
      <line class="pin" x1="10" y1="18" x2="16" y2="18"/>
      <line class="pin" x1="10" y1="30" x2="16" y2="30"/>
      <line class="pin" x1="40" y1="18" x2="46" y2="18"/>
      <line class="pin" x1="40" y1="30" x2="46" y2="30"/>
      <line class="pin" x1="22" y1="6" x2="22" y2="12"/>
      <line class="pin" x1="34" y1="6" x2="34" y2="12"/>
      <line class="pin" x1="22" y1="36" x2="22" y2="42"/>
      <line class="pin" x1="34" y1="36" x2="34" y2="42"/>
    </g>

    <rect class="hw" x="92" y="136" width="236" height="46" rx="4"/>
    <text class="label" x="210" y="154" text-anchor="middle">target spec</text>
    <text class="body" x="210" y="171" text-anchor="middle">workload, budget, legal knobs</text>

    <rect class="hw" x="92" y="206" width="236" height="46" rx="4"/>
    <text class="label" x="210" y="224" text-anchor="middle">hardware snapshot</text>
    <text class="body" x="210" y="241" text-anchor="middle">ISA, memory, timing state</text>

    <rect class="hw" x="92" y="276" width="236" height="46" rx="4"/>
    <text class="label" x="210" y="294" text-anchor="middle">implementation hooks</text>
    <text class="body" x="210" y="311" text-anchor="middle">simulator, RTL, counters</text>

    <rect class="sw-panel" x="498" y="86" width="348" height="248" rx="5"/>
    <text class="lane-label" x="524" y="112">SOFTWARE PATH STATE</text>
    <g transform="translate(782,98)">
      <rect x="12" y="10" width="44" height="28" rx="4" fill="#ffffff" stroke="#54A24B" stroke-width="1.5"/>
      <path class="code" d="M 25 18 L 19 24 L 25 30"/>
      <path class="code" d="M 43 18 L 49 24 L 43 30"/>
      <line class="code" x1="30" y1="32" x2="38" y2="16"/>
    </g>

    <rect class="sw" x="572" y="136" width="236" height="46" rx="4"/>
    <text class="label" x="690" y="154" text-anchor="middle">software interface</text>
    <text class="body" x="690" y="171" text-anchor="middle">compiler, runtime, API</text>

    <rect class="sw" x="572" y="206" width="236" height="46" rx="4"/>
    <text class="label" x="690" y="224" text-anchor="middle">generated path</text>
    <text class="body" x="690" y="241" text-anchor="middle">kernels, schedules, libraries</text>

    <rect class="sw" x="572" y="276" width="236" height="46" rx="4"/>
    <text class="label" x="690" y="294" text-anchor="middle">workload feedback</text>
    <text class="body" x="690" y="311" text-anchor="middle">tests, profiles, failures</text>

    <line class="arrow" x1="328" y1="159" x2="572" y2="159" marker-end="url(#arrow)"/>
    <rect x="408" y="135" width="84" height="26" fill="#ffffff" opacity="0.94"/>
    <text class="micro" x="450" y="151" text-anchor="middle">exposes knobs</text>

    <line class="blue-arrow" x1="572" y1="229" x2="328" y2="229" marker-end="url(#arrow-blue)"/>
    <rect x="402" y="228" width="96" height="26" fill="#ffffff" opacity="0.94"/>
    <text class="micro" x="450" y="244" text-anchor="middle" fill="#356C8C">changes target</text>

    <rect class="evidence" x="178" y="362" width="544" height="58" rx="5"/>
    <text class="label" x="450" y="384" text-anchor="middle">shared evidence ledger</text>
    <text class="body" x="450" y="402" text-anchor="middle">hardware snapshot, software artifact, tests, metrics, rejected variants</text>

    <line class="arrow" x1="210" y1="322" x2="210" y2="362" marker-end="url(#arrow)"/>
    <line class="arrow" x1="690" y1="322" x2="690" y2="362" marker-end="url(#arrow)"/>

    <rect class="gate" x="378" y="438" width="144" height="34" rx="4"/>
    <text class="label" x="450" y="460" text-anchor="middle">reject / revise</text>
    <line class="arrow" x1="450" y1="420" x2="450" y2="438" marker-end="url(#arrow)"/>

    <path class="blue-arrow" d="M 378 455 L 42 455 L 42 159 L 92 159" marker-end="url(#arrow-blue)"/>
    <path class="blue-arrow" d="M 522 455 L 858 455 L 858 159 L 808 159" marker-end="url(#arrow-blue)"/>

    <rect class="takeaway" x="118" y="486" width="664" height="28" rx="2"/>
    <text class="note" x="450" y="505" text-anchor="middle">co-evolution is credible only when both sides of the loop are versioned</text>
  </g>
</svg>
