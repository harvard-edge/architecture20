<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 390" role="img">
  <title>Long horizon architecture task timeline</title>
  <desc>Timeline diagram showing a long-horizon architecture task preserving state, acting through valid interfaces, gathering feedback, rejecting or repairing, and ending in human commitment.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: sans-serif; }
      .title { font-size: 17px; font-weight: 700; fill: #222222; }
      .label { font-size: 12.6px; font-weight: 700; fill: #222222; }
      .small { font-size: 10.8px; fill: #444444; }
      .note { font-size: 12px; font-weight: 700; fill: #1F5F7A; }
      .stage { fill: #EAF4F8; stroke: #1F5F7A; stroke-width: 1.25; }
      .memory { fill: #EAF4F8; stroke: #1F5F7A; stroke-width: 1.25; }
      .reject { fill: #FFF1F2; stroke: #C44E52; stroke-width: 1.25; }
      .commit { fill: #EAF4F8; stroke: #1F5F7A; stroke-width: 1.25; }
      .bar { fill: #F8FAFC; stroke: #9AA8B5; stroke-width: 1.1; }
      .arrow { stroke: #333333; stroke-width: 1.8; fill: none; stroke-linecap: square; }
      .glyph { fill: none; stroke: currentColor; stroke-width: 1.4; stroke-linecap: round; stroke-linejoin: round; }
      .glyph-stage { color: #1F5F7A; }
      .glyph-memory { color: #1F5F7A; }
      .glyph-reject { color: #C44E52; }
      .glyph-commit { color: #1F5F7A; }
    </style>
  </defs>

  <rect width="720" height="390" fill="#FFFFFF"/>
  <g class="font">
    <text class="title" x="360" y="45" text-anchor="middle">long-horizon architecture task</text>
    <text class="small" x="360" y="68" text-anchor="middle">the unit of evaluation is the loop across time, not one prompt response</text>

    <rect class="stage" x="43" y="122" width="94" height="58"/>
    <g class="glyph glyph-stage" transform="translate(81 128)">
      <rect x="0" y="0" width="18" height="20"/>
      <path d="M 4 7 L 14 7"/>
      <path d="M 4 13 L 10 13"/>
    </g>
    <text class="label" x="90" y="154" text-anchor="middle">task slice</text>
    <text class="small" x="90" y="171" text-anchor="middle">claim boundary</text>

    <rect class="memory" x="156" y="122" width="94" height="58"/>
    <g class="glyph glyph-memory" transform="translate(194 128)">
      <path d="M 3 3 L 15 3 L 18 7 L 18 19 L 3 19 Z"/>
      <path d="M 6 9 L 14 9"/>
      <path d="M 6 14 L 12 14"/>
    </g>
    <text class="label" x="203" y="154" text-anchor="middle">state memory</text>
    <text class="small" x="203" y="171" text-anchor="middle">history</text>

    <rect class="stage" x="269" y="122" width="94" height="58"/>
    <g class="glyph glyph-stage" transform="translate(307 128)">
      <path d="M 2 10 L 14 10"/>
      <path d="M 10 5 L 15 10 L 10 15"/>
      <path d="M 2 4 L 8 4"/>
      <path d="M 2 16 L 8 16"/>
    </g>
    <text class="label" x="316" y="154" text-anchor="middle">valid action</text>
    <text class="small" x="316" y="171" text-anchor="middle">tool interface</text>

    <rect class="stage" x="382" y="122" width="94" height="58"/>
    <g class="glyph glyph-stage" transform="translate(419 128)">
      <path d="M 2 5 L 8 5 L 8 15 L 13 15 L 13 20 L 2 20 Z"/>
      <path d="M 8 10 L 16 10"/>
    </g>
    <text class="label" x="429" y="154" text-anchor="middle">feedback</text>
    <text class="small" x="429" y="171" text-anchor="middle">right fidelity</text>

    <rect class="reject" x="495" y="122" width="94" height="58"/>
    <g class="glyph glyph-reject" transform="translate(533 128)">
      <path d="M 4 4 L 16 16"/>
      <path d="M 16 4 L 4 16"/>
    </g>
    <text class="label" x="542" y="154" text-anchor="middle">reject/repair</text>
    <text class="small" x="542" y="171" text-anchor="middle">negative traces</text>

    <rect class="commit" x="608" y="122" width="94" height="58"/>
    <g class="glyph glyph-commit" transform="translate(647 128)">
      <circle cx="8" cy="5" r="3.8"/>
      <path d="M 2 20 C 4 14, 6 12, 8 12 C 10 12, 12 14, 14 20"/>
    </g>
    <text class="label" x="655" y="154" text-anchor="middle">human</text>
    <text class="label" x="655" y="170" text-anchor="middle">commitment</text>

    <line class="arrow" x1="137" y1="151" x2="156" y2="151" marker-end="url(#arrow)"/>
    <line class="arrow" x1="250" y1="151" x2="269" y2="151" marker-end="url(#arrow)"/>
    <line class="arrow" x1="363" y1="151" x2="382" y2="151" marker-end="url(#arrow)"/>
    <line class="arrow" x1="476" y1="151" x2="495" y2="151" marker-end="url(#arrow)"/>
    <line class="arrow" x1="589" y1="151" x2="608" y2="151" marker-end="url(#arrow)"/>

    <rect class="memory" x="80" y="228" width="560" height="62"/>
    <g class="glyph glyph-memory" transform="translate(238 237)">
      <rect x="0" y="0" width="18" height="22"/>
      <path d="M 4 7 L 14 7"/>
      <path d="M 4 12 L 14 12"/>
      <path d="M 4 17 L 10 17"/>
    </g>
    <text class="label" x="374" y="248" text-anchor="middle">persistent loop record</text>
    <text class="small" x="360" y="267" text-anchor="middle">travels across days, workload revisions, and tool versions</text>
    <text class="small" x="360" y="282" text-anchor="middle">keeps candidates, failures, evidence, waivers, decisions, and escalation triggers</text>

    <line class="arrow" x1="203" y1="180" x2="240" y2="228" marker-end="url(#arrow)"/>
    <line class="arrow" x1="542" y1="180" x2="480" y2="228" marker-end="url(#arrow)"/>

    <rect class="bar" x="68" y="331" width="584" height="28"/>
    <text class="note" x="360" y="350" text-anchor="middle">success means an architect can accept, reject, or escalate from preserved evidence</text>
  </g>
</svg>
