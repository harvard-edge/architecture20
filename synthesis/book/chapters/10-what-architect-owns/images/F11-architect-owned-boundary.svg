<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 500" role="img">
  <title>What the architect owns</title>
  <desc>A clean rectangular diagram separating assistable Architecture 2.0 loop work from nondelegable architectural responsibility.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: sans-serif; }
      .label { font-size: 14px; font-weight: 700; fill: #222222; }
      .small { font-size: 11.5px; fill: #444444; }
      .micro { font-size: 10.5px; fill: #555555; }
      .note { font-size: 12px; font-weight: 700; fill: #1F5F7A; }
      .assist { fill: #F4F1FA; stroke: #1F5F7A; stroke-width: 1.4; }
      .record { fill: #EAF4F8; stroke: #1F5F7A; stroke-width: 1.3; }
      .own { fill: #FFF1F2; stroke: #C44E52; stroke-width: 1.4; }
      .field { fill: #F4F1FA; stroke: #1F5F7A; stroke-width: 1.4; }
      .boundary { fill: #F4F1FA; stroke: #1F5F7A; stroke-width: 1.5; }
      .arrow { stroke: #333333; stroke-width: 2; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .thin { stroke: #555555; stroke-width: 1.4; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
    </style>
  </defs>

  <rect width="720" height="500" fill="#FFFFFF"/>
  <g class="font" transform="translate(0,-54)">


    <text class="note" x="70" y="116">assistable loop work</text>
    <rect class="assist" x="70" y="134" width="100" height="54"/>
    <text class="label" x="120" y="156" text-anchor="middle">represent</text>
    <text class="micro" x="120" y="174" text-anchor="middle">state + traces</text>

    <rect class="assist" x="190" y="134" width="100" height="54"/>
    <text class="label" x="240" y="156" text-anchor="middle">generate</text>
    <text class="micro" x="240" y="174" text-anchor="middle">candidates</text>

    <rect class="assist" x="310" y="134" width="100" height="54"/>
    <text class="label" x="360" y="156" text-anchor="middle">evaluate</text>
    <text class="micro" x="360" y="174" text-anchor="middle">tools + proxies</text>

    <rect class="assist" x="430" y="134" width="100" height="54"/>
    <text class="label" x="480" y="156" text-anchor="middle">critique</text>
    <text class="micro" x="480" y="174" text-anchor="middle">find failures</text>

    <rect class="assist" x="550" y="134" width="100" height="54"/>
    <text class="label" x="600" y="156" text-anchor="middle">record</text>
    <text class="micro" x="600" y="174" text-anchor="middle">evidence</text>

    <line class="arrow" x1="170" y1="161" x2="190" y2="161" marker-end="url(#arrow)"/>
    <line class="arrow" x1="290" y1="161" x2="310" y2="161" marker-end="url(#arrow)"/>
    <line class="arrow" x1="410" y1="161" x2="430" y2="161" marker-end="url(#arrow)"/>
    <line class="arrow" x1="530" y1="161" x2="550" y2="161" marker-end="url(#arrow)"/>

    <rect class="record" x="94" y="215" width="532" height="48"/>
    <text class="label" x="360" y="236" text-anchor="middle">evidence record</text>
    <text class="small" x="360" y="254" text-anchor="middle">assumptions, tool versions, uncertainty, failures, rejected alternatives, provenance</text>

    <line class="thin" x1="600" y1="188" x2="600" y2="215"/>
    <line class="thin" x1="360" y1="263" x2="360" y2="294"/>

    <rect class="boundary" x="70" y="294" width="580" height="124"/>
    <text class="note" x="360" y="318" text-anchor="middle">architect-owned accountability boundary</text>

    <rect class="own" x="80" y="338" width="104" height="52"/>
    <text class="label" x="132" y="358" text-anchor="middle">intent</text>
    <text class="micro" x="132" y="376" text-anchor="middle">and constraints</text>

    <rect class="own" x="194" y="338" width="104" height="52"/>
    <text class="label" x="246" y="358" text-anchor="middle">abstraction</text>
    <text class="micro" x="246" y="376" text-anchor="middle">representation</text>

    <rect class="own" x="308" y="338" width="104" height="52"/>
    <text class="label" x="360" y="358" text-anchor="middle">evidence</text>
    <text class="micro" x="360" y="376" text-anchor="middle">standard</text>

    <rect class="own" x="422" y="338" width="104" height="52"/>
    <text class="label" x="474" y="358" text-anchor="middle">reject</text>
    <text class="micro" x="474" y="376" text-anchor="middle">or commit</text>

    <rect class="own" x="536" y="338" width="104" height="52"/>
    <text class="label" x="588" y="358" text-anchor="middle">answer</text>
    <text class="micro" x="588" y="376" text-anchor="middle">for result</text>

    <line class="arrow" x1="184" y1="364" x2="194" y2="364" marker-end="url(#arrow)"/>
    <line class="arrow" x1="298" y1="364" x2="308" y2="364" marker-end="url(#arrow)"/>
    <line class="arrow" x1="412" y1="364" x2="422" y2="364" marker-end="url(#arrow)"/>
    <line class="arrow" x1="526" y1="364" x2="536" y2="364" marker-end="url(#arrow)"/>

    <rect class="field" x="145" y="454" width="430" height="28"/>
    <text class="small" x="360" y="473" text-anchor="middle">community infrastructure: schemas, benchmarks, provenance, shared tasks</text>
  </g>
</svg>
