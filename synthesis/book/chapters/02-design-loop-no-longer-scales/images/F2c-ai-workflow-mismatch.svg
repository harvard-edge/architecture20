<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img">
  <title>Generic machine-learning workflow versus architecture workflow</title>
  <desc>A comparison between a common machine-learning workflow and an architecture workflow. The architecture workflow adds represented constraints, legal actions, expensive tools, evidence ledgers, rejection gates, drift, and negative traces.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .panel-label { font-size: 17.2px; font-weight: 700; fill: #222222; }
      .panel-note { font-size: 14.9px; fill: #555555; }
      .box { fill: #ffffff; stroke-width: 1.35; }
      .blue { fill: #F2F7FC; stroke: #4C78A8; }
      .green { fill: #F4FAF2; stroke: #54A24B; }
      .orange { fill: #FFF8EE; stroke: #D88A30; }
      .purple { fill: #F8F5FC; stroke: #7E6AA8; }
      .red { fill: #FFF4F4; stroke: #C44E52; }
      .neutral { fill: #FAF8F4; stroke: #CABEA8; }
      .label { font-size: 17.2px; font-weight: 700; fill: #222222; }
      .body { font-size: 13.8px; fill: #333333; }
      .tag { font-size: 12.6px; font-weight: 700; fill: #A33A3A; }
      .arrow { stroke: #333333; stroke-width: 1.8; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .loop { stroke: #356C8C; stroke-width: 2; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .callout { fill: #F5FAFD; stroke: #356C8C; stroke-width: 1.2; }
    </style>
  </defs>

  <rect width="960" height="520" fill="#ffffff"/>

  <g class="font">
    <text class="panel-label" x="56" y="54">common ML</text>
    <text class="panel-note" x="56" y="76">A useful teaching model, but it assumes the examples, labels, actions, and losses are comparatively easy to define.</text>

    <rect class="box blue" x="58" y="112" width="122" height="58"/>
    <text class="label" x="119" y="135" text-anchor="middle">data</text>
    <text class="body" x="119" y="154" text-anchor="middle">examples</text>

    <rect class="box green" x="214" y="112" width="122" height="58"/>
    <text class="label" x="275" y="135" text-anchor="middle">preprocess</text>
    <text class="body" x="275" y="154" text-anchor="middle">features, labels</text>

    <rect class="box orange" x="370" y="112" width="122" height="58"/>
    <text class="label" x="431" y="135" text-anchor="middle">train</text>
    <text class="body" x="431" y="154" text-anchor="middle">optimize loss</text>

    <rect class="box purple" x="526" y="112" width="122" height="58"/>
    <text class="label" x="587" y="135" text-anchor="middle">validate</text>
    <text class="body" x="587" y="154" text-anchor="middle">held-out metric</text>

    <rect class="box neutral" x="682" y="112" width="122" height="58"/>
    <text class="label" x="743" y="135" text-anchor="middle">deploy</text>
    <text class="body" x="743" y="154" text-anchor="middle">serve + monitor</text>

    <line class="arrow" x1="180" y1="141" x2="214" y2="141" marker-end="url(#arrow)"/>
    <line class="arrow" x1="336" y1="141" x2="370" y2="141" marker-end="url(#arrow)"/>
    <line class="arrow" x1="492" y1="141" x2="526" y2="141" marker-end="url(#arrow)"/>
    <line class="arrow" x1="648" y1="141" x2="682" y2="141" marker-end="url(#arrow)"/>

    <text class="panel-label" x="56" y="244">architecture</text>
    <text class="panel-note" x="56" y="266">The same surface pattern becomes a loop with constraints, legal actions, expensive feedback, rejection, and human commitment.</text>

    <rect class="box blue" x="58" y="312" width="128" height="64"/>
    <text class="label" x="122" y="335" text-anchor="middle">collect</text>
    <text class="body" x="122" y="354" text-anchor="middle">artifacts, traces</text>
    <text class="tag" x="122" y="392" text-anchor="middle">sparse / proprietary</text>

    <rect class="box green" x="208" y="312" width="128" height="64"/>
    <text class="label" x="272" y="335" text-anchor="middle">represent</text>
    <text class="body" x="272" y="350" text-anchor="middle">state +</text>
    <text class="body" x="272" y="366" text-anchor="middle">constraints</text>
    <text class="tag" x="272" y="392" text-anchor="middle">missing failures</text>

    <rect class="box orange" x="358" y="312" width="128" height="64"/>
    <text class="label" x="422" y="335" text-anchor="middle">act</text>
    <text class="body" x="422" y="354" text-anchor="middle">legal edits only</text>
    <text class="tag" x="422" y="392" text-anchor="middle">invalid actions</text>

    <rect class="box purple" x="508" y="312" width="128" height="64"/>
    <text class="label" x="572" y="335" text-anchor="middle">evaluate</text>
    <text class="body" x="572" y="354" text-anchor="middle">sim, synth, EDA</text>
    <text class="tag" x="572" y="392" text-anchor="middle">costly feedback</text>

    <rect class="box neutral" x="658" y="312" width="128" height="64"/>
    <text class="label" x="722" y="335" text-anchor="middle">evidence</text>
    <text class="body" x="722" y="350" text-anchor="middle">ledger +</text>
    <text class="body" x="722" y="366" text-anchor="middle">provenance</text>
    <text class="tag" x="722" y="392" text-anchor="middle">proxy mismatch</text>

    <rect class="box red" x="808" y="312" width="128" height="64"/>
    <text class="label" x="872" y="335" text-anchor="middle">decide</text>
    <text class="body" x="872" y="354" text-anchor="middle">reject / commit</text>
    <text class="tag" x="872" y="392" text-anchor="middle">human gate</text>

    <line class="arrow" x1="186" y1="344" x2="208" y2="344" marker-end="url(#arrow)"/>
    <line class="arrow" x1="336" y1="344" x2="358" y2="344" marker-end="url(#arrow)"/>
    <line class="arrow" x1="486" y1="344" x2="508" y2="344" marker-end="url(#arrow)"/>
    <line class="arrow" x1="636" y1="344" x2="658" y2="344" marker-end="url(#arrow)"/>
    <line class="arrow" x1="786" y1="344" x2="808" y2="344" marker-end="url(#arrow)"/>

    <path class="loop" d="M 864 312 L 864 278 L 122 278 L 122 312" marker-end="url(#arrow)"/>
    <rect x="278" y="286" width="416" height="20" fill="#ffffff" opacity="0.92"/>
    <text class="panel-note" x="486" y="301" text-anchor="middle">version drift, negative traces, and rejected alternatives feed the next loop</text>

    <rect class="callout" x="150" y="424" width="660" height="74"/>
    <text class="label" x="480" y="450" text-anchor="middle">Every architecture workflow step must carry validity, cost, provenance,</text>
    <text class="label" x="480" y="468" text-anchor="middle">and rejection.</text>
    <text class="body" x="480" y="488" text-anchor="middle">That is why the usual ML pipeline becomes a design loop.</text>
  </g>
</svg>
