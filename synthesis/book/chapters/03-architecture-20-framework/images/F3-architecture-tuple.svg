<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" role="img">
  <title>Architecture tuple mapping</title>
  <desc>Clean block diagram showing state flowing to action, action to transition, transition to observation and reward/cost, with a rectangular loop iteration back to state.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: sans-serif; }
      .label { font-size: 15px; font-weight: 700; fill: #222222; }
      .small { font-size: 11.5px; fill: #444444; }
      .state { fill: #F4F1FA; stroke: #1F5F7A; stroke-width: 1.35; }
      .action { fill: #F4F1FA; stroke: #1F5F7A; stroke-width: 1.35; }
      .transition { fill: #F4F1FA; stroke: #C44E52; stroke-width: 1.35; }
      .observation { fill: #F4F1FA; stroke: #C44E52; stroke-width: 1.35; }
      .reward { fill: #F4F1FA; stroke: #1F5F7A; stroke-width: 1.35; }
      .arrow { stroke: #333333; stroke-width: 1.9; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .loop { stroke: #555555; stroke-width: 1.35; fill: none; stroke-linecap: square; stroke-linejoin: miter; stroke-dasharray: 4,4; }
      .loop-label { font-size: 10.5px; font-weight: 700; fill: #555555; }
    </style>
  </defs>

  <rect width="720" height="280" fill="#FFFFFF"/>

  <g class="font">
    <rect class="state" x="64" y="102" width="96" height="58"/>
    <text class="label" x="112" y="127" text-anchor="middle">S</text>
    <text class="small" x="112" y="146" text-anchor="middle">State</text>

    <rect class="action" x="220" y="102" width="96" height="58"/>
    <text class="label" x="268" y="127" text-anchor="middle">A</text>
    <text class="small" x="268" y="146" text-anchor="middle">Action</text>

    <rect class="transition" x="376" y="102" width="96" height="58"/>
    <text class="label" x="424" y="127" text-anchor="middle">T</text>
    <text class="small" x="424" y="146" text-anchor="middle">Transition</text>

    <rect class="observation" x="548" y="54" width="100" height="58"/>
    <text class="label" x="598" y="79" text-anchor="middle">O</text>
    <text class="small" x="598" y="98" text-anchor="middle">Observation</text>

    <rect class="reward" x="548" y="150" width="100" height="58"/>
    <text class="label" x="598" y="175" text-anchor="middle">R</text>
    <text class="small" x="598" y="194" text-anchor="middle">Reward/Cost</text>

    <line class="arrow" x1="160" y1="131" x2="220" y2="131" marker-end="url(#arrow)"/>
    <line class="arrow" x1="316" y1="131" x2="376" y2="131" marker-end="url(#arrow)"/>

    <polyline class="arrow" points="472,116 510,116 510,83 548,83" marker-end="url(#arrow)"/>
    <polyline class="arrow" points="472,146 510,146 510,179 548,179" marker-end="url(#arrow)"/>

    <polyline class="loop" points="598,208 598,236 398,236"/>
    <polyline class="loop" points="280,236 112,236 112,160" marker-end="url(#arrow)"/>
    <rect x="292" y="224" width="94" height="20" fill="#FFFFFF"/>
    <text class="loop-label" x="339" y="238" text-anchor="middle">Loop iteration</text>
  </g>
</svg>
