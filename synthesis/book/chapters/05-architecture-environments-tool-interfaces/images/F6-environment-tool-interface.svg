<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 446" role="img">
  <title>Architecture environment and tool interface</title>
  <desc>A clean diagram showing how an Architecture 2.0 environment turns workload state, action schemas, tools, observations, feedback, provenance, and rejection into a credible loop.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#C44E52"/>
    </marker>
    <style>
      .font { font-family: sans-serif; }
      .panel-title { font-size: 17px; font-weight: 700; fill: #222222; }
      .label { font-size: 14px; font-weight: 700; fill: #222222; }
      .small { font-size: 12px; fill: #444444; }
      .note { font-size: 12px; font-weight: 700; fill: #1F5F7A; }
      .input { fill: #F4F1FA; stroke: #1F5F7A; stroke-width: 1.4; }
      .env { fill: #F4F1FA; stroke: #1F5F7A; stroke-width: 1.4; }
      .tool { fill: #F4F1FA; stroke: #C44E52; stroke-width: 1.4; }
      .feedback { fill: #F4F1FA; stroke: #1F5F7A; stroke-width: 1.4; }
      .reject { fill: #F4F1FA; stroke: #C44E52; stroke-width: 1.4; }
      .arrow { stroke: #333333; stroke-width: 2; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .reject-arrow { stroke: #C44E52; stroke-width: 2; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .glyph { fill: none; stroke: currentColor; stroke-width: 1.55; stroke-linecap: round; stroke-linejoin: round; }
      .glyph-input { color: #1F5F7A; }
      .glyph-env { color: #1F5F7A; }
      .glyph-tool { color: #C44E52; }
      .glyph-feedback { color: #1F5F7A; }
      .glyph-reject { color: #C44E52; }
    </style>
  </defs>

  <rect width="720" height="446" fill="#FFFFFF"/>
  <g class="font" transform="translate(0,-54)">


    <rect class="input" x="65" y="125" width="155" height="58"/>
    <g class="glyph glyph-input" transform="translate(80 140)">
      <rect x="0" y="0" width="16" height="20"/>
      <path d="M 4 7 L 12 7"/>
      <path d="M 4 13 L 10 13"/>
    </g>
    <text class="label" x="151" y="149" text-anchor="middle">task + workload</text>
    <text class="small" x="151" y="168" text-anchor="middle">intent, traces, version</text>

    <rect class="input" x="65" y="213" width="155" height="58"/>
    <g class="glyph glyph-input" transform="translate(80 228)">
      <path d="M 2 10 L 15 10"/>
      <path d="M 11 5 L 16 10 L 11 15"/>
      <path d="M 2 4 L 8 4"/>
      <path d="M 2 16 L 8 16"/>
    </g>
    <text class="label" x="151" y="237" text-anchor="middle">action schema</text>
    <text class="small" x="151" y="256" text-anchor="middle">knobs, edits, commands</text>

    <rect class="input" x="65" y="301" width="155" height="58"/>
    <g class="glyph glyph-input" transform="translate(80 316)">
      <path d="M 8 1 L 16 9 L 16 19 L 0 19 L 0 9 Z"/>
      <path d="M 5 11 L 11 11"/>
    </g>
    <text class="label" x="151" y="325" text-anchor="middle">constraints</text>
    <text class="small" x="151" y="344" text-anchor="middle">legal states, limits</text>

    <rect class="env" x="270" y="100" width="210" height="287"/>
    <text class="panel-title" x="375" y="130" text-anchor="middle">environment boundary</text>

    <rect class="env" x="305" y="168" width="140" height="39"/>
    <text class="label" x="375" y="192" text-anchor="middle">validate action</text>

    <rect class="tool" x="305" y="218" width="140" height="39"/>
    <text class="label" x="375" y="242" text-anchor="middle">call tool flow</text>

    <rect class="feedback" x="305" y="274" width="140" height="39"/>
    <text class="label" x="375" y="298" text-anchor="middle">observe results</text>

    <rect class="feedback" x="305" y="330" width="140" height="39"/>
    <text class="label" x="375" y="354" text-anchor="middle">log provenance</text>

    <rect class="reject" x="520" y="153" width="135" height="58"/>
    <text class="label" x="587.5" y="174" text-anchor="middle">reject / escalate</text>
    <text class="small" x="587.5" y="191" text-anchor="middle">invalid or</text>
    <text class="small" x="587.5" y="204" text-anchor="middle">insufficient</text>

    <rect class="feedback" x="520" y="255" width="135" height="58"/>
    <text class="label" x="587.5" y="279" text-anchor="middle">feedback</text>
    <text class="small" x="587.5" y="298" text-anchor="middle">metrics, logs, reports</text>

    <rect class="feedback" x="520" y="329" width="135" height="58"/>
    <text class="label" x="587.5" y="349" text-anchor="middle">evidence record</text>
    <text class="small" x="587.5" y="367" text-anchor="middle">cost, fidelity,</text>
    <text class="small" x="587.5" y="380" text-anchor="middle">support</text>

    <line class="arrow" x1="220" y1="154" x2="270" y2="154" marker-end="url(#arrow)"/>
    <line class="arrow" x1="220" y1="242" x2="270" y2="242" marker-end="url(#arrow)"/>
    <line class="arrow" x1="220" y1="330" x2="270" y2="330" marker-end="url(#arrow)"/>

    <line class="reject-arrow" x1="445" y1="188" x2="520" y2="182" marker-end="url(#arrow-red)"/>
    <line class="arrow" x1="445" y1="294" x2="520" y2="294" marker-end="url(#arrow)"/>
    <line class="arrow" x1="445" y1="350" x2="520" y2="350" marker-end="url(#arrow)"/>

    <line class="arrow" x1="375" y1="207" x2="375" y2="218" marker-end="url(#arrow)"/>
    <line class="arrow" x1="375" y1="257" x2="375" y2="274" marker-end="url(#arrow)"/>
    <line class="arrow" x1="375" y1="313" x2="375" y2="330" marker-end="url(#arrow)"/>

    <text class="note" x="360" y="423" text-anchor="middle">environment contract = workload + action + observation + constraint + cost + provenance + rejection</text>
  </g>
</svg>
