<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 446" role="img">
  <title>Evidence chain with rejection gates</title>
  <desc>A clean rectangular diagram showing how an Architecture 2.0 claim moves from low-fidelity feedback to higher-fidelity evidence, rejection gates, and human commitment.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .label { font-size: 14px; font-weight: 700; fill: #222222; }
      .small { font-size: 12px; fill: #444444; }
      .micro { font-size: 10.5px; fill: #555555; }
      .note { font-size: 12px; font-weight: 700; fill: #356C8C; }
      .claim { fill: #F0F7FF; stroke: #4E79A7; stroke-width: 1.4; }
      .proxy { fill: #F4FAF2; stroke: #54A24B; stroke-width: 1.4; }
      .sim { fill: #FFF8EE; stroke: #D88A30; stroke-width: 1.4; }
      .impl { fill: #F8F5FC; stroke: #7E6AA8; stroke-width: 1.4; }
      .commit { fill: #F0F7FF; stroke: #356C8C; stroke-width: 1.4; }
      .reject { fill: #FFF4F4; stroke: #C44E52; stroke-width: 1.4; }
      .record { fill: #F8FAFC; stroke: #9AA8B5; stroke-width: 1.3; }
      .arrow { stroke: #333333; stroke-width: 2; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .thin { stroke: #555555; stroke-width: 1.4; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
    </style>
  </defs>

  <rect width="720" height="446" fill="#ffffff"/>
  <g class="font" transform="translate(0,-54)">


    <rect class="claim" x="62" y="126" width="102" height="72"/>
    <text class="label" x="113" y="151" text-anchor="middle">claim</text>
    <text class="small" x="113" y="171" text-anchor="middle">task, intent,</text>
    <text class="small" x="113" y="188" text-anchor="middle">constraints</text>

    <rect class="proxy" x="192" y="126" width="112" height="72"/>
    <text class="label" x="248" y="151" text-anchor="middle">proxy</text>
    <text class="small" x="248" y="171" text-anchor="middle">models, rules,</text>
    <text class="small" x="248" y="188" text-anchor="middle">cheap runs</text>

    <rect class="sim" x="332" y="126" width="112" height="72"/>
    <text class="label" x="388" y="151" text-anchor="middle">simulation</text>
    <text class="small" x="388" y="171" text-anchor="middle">workloads,</text>
    <text class="small" x="388" y="188" text-anchor="middle">configs, seeds</text>

    <rect class="impl" x="472" y="126" width="112" height="72"/>
    <text class="label" x="528" y="151" text-anchor="middle">build flow</text>
    <text class="small" x="528" y="171" text-anchor="middle">synthesis,</text>
    <text class="small" x="528" y="188" text-anchor="middle">emulation</text>

    <rect class="commit" x="598" y="126" width="72" height="72"/>
    <text class="label" x="634" y="151" text-anchor="middle">act</text>
    <text class="micro" x="634" y="171" text-anchor="middle">deploy</text>
    <text class="micro" x="634" y="188" text-anchor="middle">commit</text>

    <line class="arrow" x1="164" y1="162" x2="192" y2="162" marker-end="url(#arrow)"/>
    <line class="arrow" x1="304" y1="162" x2="332" y2="162" marker-end="url(#arrow)"/>
    <line class="arrow" x1="444" y1="162" x2="472" y2="162" marker-end="url(#arrow)"/>
    <line class="arrow" x1="584" y1="162" x2="598" y2="162" marker-end="url(#arrow)"/>

    <rect class="reject" x="199" y="232" width="98" height="44"/>
    <text class="small" x="248" y="250" text-anchor="middle">reject if proxy</text>
    <text class="small" x="248" y="267" text-anchor="middle">misses target</text>

    <rect class="reject" x="339" y="232" width="98" height="44"/>
    <text class="small" x="388" y="250" text-anchor="middle">reject if run</text>
    <text class="small" x="388" y="267" text-anchor="middle">is invalid</text>

    <rect class="reject" x="479" y="232" width="98" height="44"/>
    <text class="small" x="528" y="250" text-anchor="middle">reject if PPA</text>
    <text class="small" x="528" y="267" text-anchor="middle">or timing fails</text>

    <rect class="reject" x="592" y="232" width="66" height="44"/>
    <text class="micro" x="625" y="250" text-anchor="middle">human</text>
    <text class="micro" x="625" y="267" text-anchor="middle">hold</text>

    <line class="thin" x1="248" y1="198" x2="248" y2="232"/>
    <line class="thin" x1="388" y1="198" x2="388" y2="232"/>
    <line class="thin" x1="528" y1="198" x2="528" y2="232"/>
    <line class="thin" x1="634" y1="198" x2="634" y2="232"/>

    <rect class="record" x="82" y="314" width="556" height="58"/>
    <text class="label" x="360" y="336" text-anchor="middle">evidence record</text>
    <text class="small" x="360" y="356" text-anchor="middle">provenance, assumptions, workload versions, tool versions, uncertainty, rejected alternatives</text>

    <line class="arrow" x1="112" y1="408" x2="600" y2="408" marker-end="url(#arrow)"/>
    <text class="note" x="356" y="429" text-anchor="middle">fidelity, latency, cost, and commitment increase; acceptable autonomy narrows</text>
  </g>
</svg>
