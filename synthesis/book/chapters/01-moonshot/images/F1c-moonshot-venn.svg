<svg xmlns="http://www.w3.org/2000/svg" viewBox="130 55 500 320" role="img">
  <title>Architecture moonshot conditions</title>
  <desc>A Venn diagram showing that an architecture moonshot sits at the intersection of a grand architecture challenge, a radical design-loop target, and an enabling AI, data, and tool breakthrough.</desc>
  <defs>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .label { font-size: 22px; font-weight: 700; fill: #202020; }
      .small { font-size: 13.6px; fill: #303030; }
      .center { font-size: 18px; font-weight: 700; fill: #202020; }
      .note { font-size: 15.9px; font-weight: 700; fill: #356C8C; }
      .box { fill: #F5FAFD; stroke: #356C8C; stroke-width: 1.2; }
    </style>
  </defs>

  <rect width="760" height="400" fill="#ffffff"/>

  <g class="font">
    <circle cx="305" cy="174" r="112" fill="#9ECBE1" fill-opacity="0.58" stroke="#356C8C" stroke-width="1.5"/>
    <circle cx="455" cy="174" r="112" fill="#B8D7A8" fill-opacity="0.58" stroke="#5F8F4E" stroke-width="1.5"/>
    <circle cx="380" cy="254" r="112" fill="#F0C27B" fill-opacity="0.62" stroke="#B07021" stroke-width="1.5"/>

    <text class="label" x="275" y="112" text-anchor="middle">Grand</text>
    <text class="label" x="275" y="137" text-anchor="middle">challenge</text>
    <text class="small" x="250" y="152" text-anchor="middle">ordinary practice</text>
    <text class="small" x="250" y="170" text-anchor="middle">cannot scale</text>

    <text class="label" x="485" y="112" text-anchor="middle">Radical</text>
    <text class="label" x="485" y="137" text-anchor="middle">target</text>
    <text class="small" x="510" y="152" text-anchor="middle">change the</text>
    <text class="small" x="510" y="170" text-anchor="middle">design loop</text>

    <text class="label" x="380" y="304" text-anchor="middle">Breakthrough</text>
    <text class="small" x="380" y="330" text-anchor="middle">AI + data + tools make</text>
    <text class="small" x="380" y="348" text-anchor="middle">the target plausible</text>

    <text class="center" x="380" y="210" text-anchor="middle">Architecture</text>
    <text class="center" x="380" y="232" text-anchor="middle">moonshot</text>
    <text class="small" x="380" y="256" text-anchor="middle">represent, explore,</text>
    <text class="small" x="380" y="275" text-anchor="middle">test, reject, justify</text>

  </g>
</svg>
