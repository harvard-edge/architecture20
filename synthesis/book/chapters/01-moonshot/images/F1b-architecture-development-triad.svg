<svg xmlns="http://www.w3.org/2000/svg" viewBox="80 20 560 325" role="img">
  <title>F1b architecture development triad</title>
  <desc>A Venn-style diagram showing generation, prediction, and optimization intersecting in closed-loop architectural synthesis.</desc>
  <defs>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .label { font-size: 14.4px; font-weight: 700; fill: #202020; }
      .small { font-size: 9.2px; fill: #303030; }
      .center { font-size: 12.0px; font-weight: 700; fill: #202020; }
      .note { font-size: 10.4px; font-weight: 700; fill: #285F7A; }
      .muted { font-size: 8.8px; fill: #555555; }
      .line { stroke: #444444; stroke-width: 1.15; fill: none; }
      .thin { stroke: #6F7E86; stroke-width: 1.05; fill: none; }
    </style>
  </defs>

  <rect x="80" y="20" width="560" height="325" fill="#ffffff"/>

  <circle cx="300" cy="132" r="88" fill="#9ECBE1" fill-opacity="0.55" stroke="#356C8C" stroke-width="1.5"/>
  <circle cx="420" cy="132" r="88" fill="#B8D7A8" fill-opacity="0.55" stroke="#5F8F4E" stroke-width="1.5"/>
  <circle cx="360" cy="212" r="88" fill="#F0C27B" fill-opacity="0.60" stroke="#B07021" stroke-width="1.5"/>

  <g class="font">
    <text class="label" x="270" y="100" text-anchor="middle">Generation</text>
    <text class="small" x="270" y="122" text-anchor="middle">artifacts, candidates,</text>
    <text class="small" x="270" y="138" text-anchor="middle">tests, explanations</text>

    <text class="label" x="450" y="100" text-anchor="middle">Prediction</text>
    <text class="small" x="450" y="122" text-anchor="middle">behavior, cost,</text>
    <text class="small" x="450" y="138" text-anchor="middle">risk, uncertainty</text>

    <text class="label" x="360" y="259" text-anchor="middle">Optimization</text>
    <text class="small" x="360" y="279" text-anchor="middle">tradeoffs under constraints</text>

    <text class="center" x="360" y="170" text-anchor="middle">Closed-loop</text>
    <text class="center" x="360" y="190" text-anchor="middle">architectural synthesis</text>
  </g>

  <g class="font" transform="translate(572,104)">
    <path class="thin" d="M 20 0 C 54 0, 74 22, 74 52 C 74 82, 52 104, 22 104 C -6 104, -25 86, -27 62"/>
    <polygon points="-27,62 -31,72 -20,68" fill="#6F7E86"/>
    <text class="muted" x="22" y="31" text-anchor="middle">generate</text>
    <text class="muted" x="22" y="50" text-anchor="middle">predict</text>
    <text class="muted" x="22" y="69" text-anchor="middle">optimize</text>
    <text class="muted" x="22" y="88" text-anchor="middle">reject/revise</text>
  </g>

  <rect x="128" y="306" width="464" height="22" fill="#F5F8FA" stroke="#8AA7B8" stroke-width="1"/>
  <text class="font note" x="360" y="321" text-anchor="middle">architect governs intent + constraints + evidence + rejection</text>
</svg>
