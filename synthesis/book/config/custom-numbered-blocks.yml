filter-metadata:
  arch2-ext/custom-numbered-blocks:
    icon-path: "assets/images/icons/callouts"
    # SVG is the icon master. HTML/EPUB consume the SVG; the LaTeX/PDF build
    # consumes the PDF (pdflatex cannot embed SVG). Both are regenerated from
    # the SVG by scripts/make_callout_icons.py. colors = [background, accent];
    # the HTML tint is auto-derived from the accent, so the accent (colors[1])
    # is the meaningful value. Palette: red reserved for failure, gray for
    # field-note; the other nine are spread across a muted hue wheel so no two
    # callouts collide (see .claude/rules visual-system / native-callouts).
    icon-format: "pdf"
    icon-format-html: "svg"
    groups:
      crux:
        colors: ["F9F0E8", "C06A1B"]
        collapse: false
        numbered: false
      learning-objectives:
        colors: ["ECF2EE", "3F7A52"]
        collapse: false
        numbered: false
      carry-forward:
        colors: ["EAF2F4", "2C7E8C"]
        collapse: false
        numbered: false
      lighthouse:
        colors: ["F5EEF1", "A35C7A"]
        collapse: false
        numbered: false
      field-note:
        colors: ["EEEFF0", "59636D"]
        collapse: false
        numbered: false
      evidence-packet:
        colors: ["F0EDF2", "6B4A82"]
        collapse: false
        numbered: false
      architect-checkpoint:
        colors: ["E9EFF2", "1F5F7A"]
        collapse: false
        numbered: false
      failure-mode:
        colors: ["F9EDED", "C24A4F"]
        collapse: false
        numbered: false
      design-principle:
        colors: ["F5F2E8", "9A781E"]
        collapse: false
        numbered: false
      engineer-move:
        colors: ["EFF2EB", "5F7A33"]
        collapse: false
        numbered: false
      research-question:
        colors: ["EDEFF6", "4E63A6"]
        collapse: false
        numbered: false
    classes:
      callout-crux:
        label: "The crux"
        group: crux
      callout-learning-objectives:
        label: "What this chapter gives you"
        group: learning-objectives
      callout-carry-forward:
        label: "What to carry forward"
        group: carry-forward
      callout-lighthouse:
        label: "Lighthouse prompt"
        group: lighthouse
      callout-field-note:
        label: "Field note"
        group: field-note
      callout-evidence-packet:
        label: "Evidence packet"
        group: evidence-packet
      callout-architect-checkpoint:
        label: "Architect's checkpoint"
        group: architect-checkpoint
      callout-failure-mode:
        label: "Failure mode"
        group: failure-mode
      callout-design-principle:
        label: "Design principle"
        group: design-principle
        prefix: pri
      callout-engineer-move:
        label: "Engineer move"
        group: engineer-move
      callout-research-question:
        label: "Open research questions"
        group: research-question
