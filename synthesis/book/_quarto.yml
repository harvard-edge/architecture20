project:
  type: book
  output-dir: _build
  execute-dir: project
  resources:
    - images/favicon.svg
    - images/favicon-16.png
    - images/favicon-32.png
    - images/favicon-48.png
    - images/favicon.ico
    - images/apple-touch-icon.png
    - images/icon-192.png
    - images/icon-512.png
    - images/arch2-card.png
    - images/site.webmanifest
  # No pre/post-render hooks: the arch2 CLI owns the pipeline (prepare -> render
  # -> finalize) so `quarto render` and `arch2 build`/`render` do not bounce
  # through hook scripts. Build the book with `./arch2 build`.
  preview:
    browser: true
    navigate: true

book:
  title: "Architecture 2.0"
  subtitle: "Designing the Loops that Design the Chips"
  author: "Vijay Janapa Reddi"
  description: "A work-in-progress synthesis lecture on agentic design loops for computing-system synthesis."
  search: true
  page-navigation: true
  downloads:
    - pdf
    - epub
  page-footer:
    left: "Architecture 2.0 preview"
    center: "Part of the [mlsysbook.ai](https://mlsysbook.ai) family"
    right: "Preview v0.2.0"
  chapters:
    - index.qmd
    - acknowledgments.qmd
    - about-the-author.qmd
    - ---
    - chapters/01-moonshot/index.qmd
    - chapters/02-design-loop-no-longer-scales/index.qmd
    - chapters/03-architecture-20-framework/index.qmd
    - chapters/04-data-representations-world-models/index.qmd
    - chapters/05-architecture-environments-tool-interfaces/index.qmd
    - chapters/06-methods-generation-prediction-optimization/index.qmd
    - chapters/07-feedback-verification-trust/index.qmd
    - chapters/08-running-the-loop/index.qmd
    - chapters/09-loop-patterns-across-stack/index.qmd
    - chapters/10-what-architect-owns/index.qmd
  appendices:
    - appendices/appendix-a-bootstrapping/index.qmd
    - appendices/appendix-b-design-loop-card/index.qmd
    - appendices/appendix-c-resource-catalog/index.qmd
    - appendices/appendix-d-architecture-20-resources/index.qmd

website:
  site-url: "https://arch2.mlsysbook.ai"
  bread-crumbs: true
  # Favicon + social-card (open-graph / twitter) metadata is injected via
  # format.html.include-in-header (_includes/head-icons.html) because Quarto
  # type:book does not emit those website keys into the page head.
  announcement:
    icon: info-circle
    dismissable: true
    content: "Part of the [mlsysbook.ai](https://mlsysbook.ai) family. **Work in progress** preview v0.2.0 for the [ISCA 2026 Architecture 2.0 workshop](https://harvard-edge.github.io/isca-26-arch-2-workshop/)."
    type: warning
    position: below-navbar

author:
  - name: "Vijay Janapa Reddi"
    url: "https://vijay.seas.harvard.edu"
institute: "Harvard John A. Paulson School of Engineering and Applied Sciences"
date: today  # auto-stamps the build/render date; formatted by date-format below
date-format: "MMMM D, YYYY"
reference-section-title: "References"
metadata-files:
  - config/custom-numbered-blocks.yml

bibliography:
  - ../references/references.bib
csl: csl/chicago-author-date.csl
filters:
  - epigraph.lua
  - arch2-ext/custom-numbered-blocks
  - include-code-files
  - pseudocode

execute:
  echo: false
  warning: false
  message: false
  freeze: auto
  env:
    MPLBACKEND: "Agg"

jupyter: python3

format:
  html:
    reference-section-title: "Notes"
    theme:
      - cosmo
      - _styles/arch2-html.scss
    include-in-header:
      - _includes/head-icons.html
    include-after-body:
      - _includes/author-link.html
    default-image-extension: svg
    reference-location: margin
    citation-location: margin
    citations-hover: true
    lightbox:
      match: auto
      effect: fade
      desc-position: bottom
      loop: true
      css-class: arch2-lightbox
    toc: true
    toc-depth: 3
    number-sections: true
    fig-cap-location: bottom
    tbl-cap-location: top
    callout-appearance: simple
    anchor-sections: true
    smooth-scroll: true
    link-external-icon: true
  pdf:
    documentclass: SNmono
    reference-location: margin
    default-image-extension: pdf
    biblio-style: spbasic
    cite-method: natbib
    classoption:
      - graybox
      - envcountchap
      - sectrefs
      - natbib
      - openany
    code-block-fontsize: \small
    code-overflow: wrap
    include-in-header: tex/springer-header.tex
    include-before-body: tex/frontmatter.tex
    pdf-engine: pdflatex
    toc: false
    number-sections: true
    fig-caption: true
    fig-cap-location: bottom
    fig-pos: 'ht'
    tbl-cap-location: top
  epub:
    cover-image: images/arch2-cover.png
    default-image-extension: svg
    toc: true
    toc-depth: 3
    number-sections: true
    fig-cap-location: bottom
    tbl-cap-location: top
    callout-appearance: simple
