project:
  type: book
  output-dir: _build
  execute-dir: project
  pre-render:
    - scripts/prepare_render.py
  post-render:
    - scripts/finalize_render.py
  preview:
    browser: true
    navigate: true

book:
  title: "Architecture 2.0"
  subtitle: "Agentic Design Loops for System Synthesis"
  author: "Vijay Janapa Reddi"
  description: "A work-in-progress synthesis lecture on agentic design loops for system synthesis."
  cover-image: assets/images/arch2-cover.png
  search: true
  page-navigation: true
  downloads:
    - pdf
    - epub
  page-footer:
    left: "Architecture 2.0 preview"
    right: "Preview v0.2.0"
  chapters:
    - index.qmd
    - chapters/01-moonshot/index.qmd
    - chapters/02-design-loop-no-longer-scales/index.qmd
    - chapters/03-architecture-20-framework/index.qmd
    - chapters/04-data-representations-world-models/index.qmd
    - chapters/05-architecture-environments-tool-interfaces/index.qmd
    - chapters/06-methods-generation-prediction-optimization/index.qmd
    - chapters/07-feedback-verification-trust/index.qmd
    - chapters/08-running-the-loop/index.qmd
    - chapters/09-loop-patterns-across-stack/index.qmd
    - chapters/10-what-architect-owns/index.qmd
  appendices:
    - appendices/appendix-a-bootstrapping/index.qmd
    - appendices/appendix-b-design-loop-card/index.qmd
    - appendices/appendix-c-resource-catalog/index.qmd
    - appendices/appendix-d-architecture-20-resources/index.qmd

website:
  bread-crumbs: true
  announcement:
    icon: info-circle
    dismissable: true
    content: "**Work in progress.** Preview v0.2.0 for the [ISCA 2026 Architecture 2.0 workshop](https://harvard-edge.github.io/isca-26-arch-2-workshop/)."
    type: warning
    position: below-navbar

author:
  - name: "Vijay Janapa Reddi"
    url: "https://vijay.seas.harvard.edu"
institute: "Harvard John A. Paulson School of Engineering and Applied Sciences"
date: "2026-06-25"
date-format: "MMMM D, YYYY"
reference-section-title: "References"
metadata-files:
  - config/custom-numbered-blocks.yml

bibliography:
  - ../references/references.bib
csl: csl/chicago-author-date.csl
filters:
  - arch2-ext/custom-numbered-blocks
  - include-code-files

execute:
  echo: false
  warning: false
  message: false
  freeze: auto
  env:
    MPLBACKEND: "Agg"

jupyter: python3

format:
  html:
    theme:
      - cosmo
      - _styles/arch2-html.scss
    include-after-body:
      - _includes/author-link.html
    default-image-extension: svg
    citation-location: margin
    citations-hover: true
    lightbox:
      match: auto
      effect: fade
      desc-position: bottom
      loop: true
      css-class: arch2-lightbox
    toc: true
    toc-depth: 3
    number-sections: true
    fig-cap-location: bottom
    tbl-cap-location: top
    callout-appearance: simple
    anchor-sections: true
    smooth-scroll: true
    link-external-icon: true
  pdf:
    documentclass: SNmono
    default-image-extension: pdf
    biblio-style: spbasic
    cite-method: natbib
    classoption:
      - graybox
      - envcountchap
      - sectrefs
      - natbib
      - openany
    include-in-header: tex/springer-header.tex
    pdf-engine: pdflatex
    toc: false
    number-sections: true
    fig-caption: true
    fig-cap-location: bottom
    tbl-cap-location: top
  epub:
    default-image-extension: svg
    toc: true
    toc-depth: 3
    number-sections: true
    fig-cap-location: bottom
    tbl-cap-location: top
    callout-appearance: simple
