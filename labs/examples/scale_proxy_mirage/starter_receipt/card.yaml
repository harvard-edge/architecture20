schema_version: "2.0"
design_loop_card:
  card_id: scale-proxy-mirage
  profiles:
    context: complete
    inspectability: not_claimed
    replay: not_claimed
    independent_review: not_claimed
    disclosure: not_claimed
    decision_rights: not_claimed
  profile_gaps: {}
  intent:
    objective: Select one systolic-array candidate for a stronger architecture study of an XR-like GEMM workload slice.
    constraints:
      - Keep the workload, weight-stationary dataflow, SRAM allocation, and clock fixed.
      - Reject candidates that exceed 1024 processing elements or 90000 simulated cycles.
    non_goals:
      - Claim RTL readiness, physical-design feasibility, power signoff, or product suitability.
    risks:
      - A compact GEMM slice may not represent the full XR model.
      - Architecture simulation omits compiler, RTL, physical, power, and thermal effects.
  task:
    kind: systolic_array_design_space_exploration
    description: Compare declared array shapes under fixed proxy and SCALE-Sim evaluation stages.
  design_space:
    legal:
      - Weight-stationary 8x8, 16x16, 32x32, and 64x64 arrays with 128 KiB SRAM per operand and 64 words/cycle DRAM bandwidth.
    invalid:
      - Candidates above the 1024-PE silicon budget.
      - Candidates above the 90000-cycle workload deadline.
      - Candidates with another dataflow or memory allocation.
    deferred:
      - Compiler scheduling, RTL, physical layout, power, thermal behavior, and full-model quality.
  claims:
    - claim_id: claim-gate-passing-latency
      claim_type: architecture_outcome
      statement: One candidate that passes both declared checks may have the lowest simulated latency and warrant a next-fidelity study.
      baseline_or_comparator: The declared baseline and every evaluated candidate that passes both rejection checks.
      outcome: Not tested in the starter card.
      scope: The fixed XR-like GEMM slice, SCALE-Sim configuration, and declared candidates.
      non_claims:
        - The selected candidate is ready for RTL, signoff, tapeout, or product use.
      status: proposed
      evidence_refs: []
  evidence:
    records: []
  failed_or_rejected: []
  gates: []
  decision_rights: []
  accountable_decision:
    status: pending
    holder_id: architecture-lab-learner
    action: Decide whether one candidate advances to a next-fidelity architecture study.
    rationale: The starter card has no executed evidence.
    claim_refs:
      - claim-gate-passing-latency
    authorized_scope: No advancement is authorized by the starter card.
    reopen_conditions:
      - The bounded study produces evidence for review.
  x-arch2-labs:
    lab_id: scale_proxy_mirage
    template_status: bootstrap
    note: The runner adds evidence and replay bindings; the learner records the decision separately.
