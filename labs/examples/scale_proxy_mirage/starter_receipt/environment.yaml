schema_version: arch2-loop-environment/v0.1
lab_id: scale_proxy_mirage
legal_actions:
  array_rows: [8, 16, 32, 64]
  array_cols: [8, 16, 32, 64]
  dataflow: ["ws"]
  sram_kb_each: [128]
  dram_bandwidth_words_per_cycle: [64]
observations:
  proxy:
    - proxy_cycles
    - proxy_rank
  scalesim:
    - total_cycles
    - stall_cycles
    - min_layer_util_pct
    - avg_layer_util_pct
    - max_observed_dram_bw_words_per_cycle
invalid_actions:
  - "candidate exceeds the declared silicon/area budget"
  - "candidate uses an unsupported dataflow"
  - "candidate misses the declared cycle deadline"
cost:
  proxy: "static estimate"
  scalesim: "one SCALE-Sim run per candidate"
provenance:
  topology: "workloads/xr_slice_gemm.csv"
  layout: "layouts/default_layout.csv"
  simulator: "SCALE-Sim 3.0.0"
# Hard gates decide the commitment. Diagnostics only explain a result.
rejection_authority:
  - gate: area_budget_pes
    threshold: 1024
  - gate: deadline_cycles
    threshold: 90000
diagnostics:
  - min_layer_util_pct
  - roofline_bound
  - dram_energy_fraction
